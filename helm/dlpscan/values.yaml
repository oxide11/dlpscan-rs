replicaCount: 2

image:
  repository: ghcr.io/oxide11/dlpscan-rs
  tag: "2.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: dlpscan.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# DLPScan configuration
config:
  logLevel: "info"
  logFormat: "json"
  apiPort: 8000
  metricsPort: 9090
  rateLimit: 100
  maxPayloadBytes: 10485760
  minConfidence: 0.5
  requireContext: true
  cacheEnabled: true

  # SIEM integration (optional)
  siem:
    enabled: false
    type: ""  # splunk, elasticsearch, datadog, syslog
    endpoint: ""
    # token is stored in secrets.siemToken below

  # Vault backend
  vault:
    backend: "memory"  # memory, file, redis
    redisUrl: ""

# Secrets (use K8s secrets or external secrets operator)
# WARNING: Do not set secrets directly in values files for production.
# Use External Secrets Operator, Sealed Secrets, or --set on the command line.
secrets:
  apiKey: ""
  vaultEncryptionKey: ""
  siemToken: ""

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
        - port: 9090
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP

# Temporary directory for file processing
tmpVolume:
  sizeLimit: 1Gi
