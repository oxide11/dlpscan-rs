{{- if or .Values.secrets.apiKey .Values.secrets.vaultEncryptionKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dlpscan.fullname" . }}-secrets
  labels:
    {{- include "dlpscan.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.apiKey }}
  api-key: {{ .Values.secrets.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.vaultEncryptionKey }}
  vault-encryption-key: {{ .Values.secrets.vaultEncryptionKey | b64enc | quote }}
  {{- end }}
{{- end }}
