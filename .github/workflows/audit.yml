name: audit

# `cargo-deny` is the workspace's checking gate for the policies
# declared in `deny.toml`:
#
#   * advisories — fail the build on any RustSec advisory marked
#     vulnerable or yanked. unmaintained = warn.
#   * licenses   — fail on a license outside the allow-list.
#   * sources    — refuse anything outside crates.io.
#   * bans       — multiple-versions warns; wildcards permitted.
#
# The triage doc tracking which crates still need a bump lives at
# `docs/dependency-audit.md`.
#
# Runs: every push, every PR to main, plus a weekly cron so a
# dormant branch still re-checks against the current advisory
# database. Independent of the security-extended CodeQL workflow
# (different surface).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly — Tuesday 14:23 UTC. Off-the-hour to dodge cron
    # stampede. One day off CodeQL's Monday so the two reports
    # land on different days for the on-call to triage.
    - cron: "23 14 * * 2"

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      # cargo-deny resolves the workspace's full lockfile, so we
      # need cargo on PATH but no Rust source build. Toolchain
      # version stays in lockstep with the rest of CI.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      # `check` runs all four sections of deny.toml (advisories,
      # licenses, bans, sources). Failures are fatal — let the
      # operator decide whether to add an exception (with a
      # rationale comment) or remediate the dep.
      - name: cargo deny check
        run: cargo deny check
