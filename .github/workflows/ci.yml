name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# CI is read-only: fetches source, runs cargo build/test/clippy/fmt.
# Declaring the minimum token scope closes the CodeQL
# "Workflow does not contain permissions" finding and prevents a
# compromised action from escalating to write access.
permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 60

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test --lib
      - name: Integration tests
        run: cargo test --test integration_test
      - name: Evasion tests
        run: cargo test --test evasion_test
      - name: Forensics tests
        run: cargo test --test forensics_test
      - name: Evadex regression tests
        run: cargo test --test evadex_regressions

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -- -D warnings -A dead-code -A unused-imports

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt
      - run: cargo fmt --check

  version-sync:
    # Every place Siphon's version is declared — workspace crates,
    # ui/package.json, Helm appVersion, Helm image tag — must agree
    # with the root Cargo.toml. Runs on every push so a stale
    # Helm tag or a forgotten UI bump lands as a red check.
    name: Version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: bash scripts/check-version-sync.sh

  ui:
    # Next.js static export + typecheck + lint. Runs on any change
    # so the SPA's type safety and bundle emit are verified every
    # push, independent of the Rust pipeline.
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
