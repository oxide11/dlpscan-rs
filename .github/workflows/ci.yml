name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 60

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -- -D warnings -A dead-code -A unused-imports

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove cargo registry overrides
        run: rm -f ~/.cargo/config.toml ~/.cargo/config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
          components: rustfmt
      - run: cargo fmt --check
