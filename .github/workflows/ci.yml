name: CI

# Minimal, proven CI for the Siphon workspace. Each job is
# independent so a clippy break doesn't block test, and one slow
# dependency can't drag the whole pipeline. Re-add coverage piece
# by piece (CodeQL, DevSkim, cargo-deny, release image push) once
# the base is confirmed green and we know which third-party
# actions resolve cleanly in the runner.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 60

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --lib
        run: cargo test --workspace --lib --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `-A dead_code` and `-A unused_imports` mirror the local
      # convention from CLAUDE.md so cleanup work doesn't have to
      # ride alongside the change that triggers the warning.
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings -A dead_code -A unused_imports
