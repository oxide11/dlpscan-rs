// Live role store · localStorage[ir:roles]. Seeded from
// IR_SYSTEM_ROLES the first time it's read. Writes fire
// 'ir:rolesChanged' so subscribed components re-render.
const IR_ROLES_KEY = 'ir:roles';

function readRoles() {
  try {
    const raw = localStorage.getItem(IR_ROLES_KEY);
    if (!raw) {
      const seeded = JSON.parse(JSON.stringify(IR_SYSTEM_ROLES));
      localStorage.setItem(IR_ROLES_KEY, JSON.stringify(seeded));
      return seeded;
    }
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed === 'object') ? parsed : { ...IR_SYSTEM_ROLES };
  } catch {
    return { ...IR_SYSTEM_ROLES };
  }
}
function writeRoles(dict) {
  try { localStorage.setItem(IR_ROLES_KEY, JSON.stringify(dict)); } catch {}
  window.dispatchEvent(new CustomEvent('ir:rolesChanged'));
}
// Convenience: current snapshot of the role map. Callers that
// need to react to changes should pair this with useRolesTick().
function getRoles() { return readRoles(); }

// Re-render trigger for components that display roles or
// permission chips. Bumps local state whenever the role store
// mutates in this tab OR another.
function useRolesTick() {
  const [, setTick] = React.useState(0);
  React.useEffect(() => {
    const refresh = () => setTick(t => t + 1);
    const onStorage = (e) => { if (e.key === IR_ROLES_KEY) refresh(); };
    window.addEventListener('ir:rolesChanged', refresh);
    window.addEventListener('storage', onStorage);
    return () => {
      window.removeEventListener('ir:rolesChanged', refresh);
      window.removeEventListener('storage', onStorage);
    };
  }, []);
}

// ─── Role CRUD · R2b1 ──────────────────────────────────────────
// Guards baked in so the editor surface (R2b2-4) doesn't have to
// repeat them: kebab-safe id, no id collisions, no deleting
// system roles, no deleting roles still assigned to users.

function irUsersInRole(roleId) {
  try { return readUsers().filter(u => u.role === roleId); }
  catch { return []; }
}

function irCreateRole({ id, label, glyph, color, description, permissions }) {
  const roles = readRoles();
  const cleanId = (id || '').trim().toLowerCase().replace(/[^a-z0-9-]+/g, '-').slice(0, 32);
  if (!cleanId)        return { ok: false, reason: 'role id required' };
  if (roles[cleanId])  return { ok: false, reason: 'a role with that id already exists' };
  const rec = {
    label: (label || cleanId).trim(),
    glyph: (glyph || '◆').slice(0, 2),
    color: color || 'var(--accent)',
    description: (description || '').trim(),
    system: false,
    permissions: Array.isArray(permissions) ? permissions.slice() : [],
  };
  writeRoles({ ...roles, [cleanId]: rec });
  return { ok: true, id: cleanId, role: rec };
}

function irUpdateRole(id, patch) {
  const roles = readRoles();
  const existing = roles[id];
  if (!existing) return { ok: false, reason: 'no such role' };
  // System roles can have their label / description / permissions
  // / colour / glyph edited (so tenants can adjust the defaults
  // for their environment), but their id + system flag are locked.
  const { id: _ignoredId, system: _ignoredSystem, ...safe } = (patch || {});
  const next = { ...existing, ...safe };
  if (Array.isArray(next.permissions)) {
    next.permissions = [...new Set(next.permissions)];
  }
  writeRoles({ ...roles, [id]: next });
  return { ok: true, role: next };
}

function irDeleteRole(id) {
  const roles = readRoles();
  const existing = roles[id];
  if (!existing)       return { ok: false, reason: 'no such role' };
  if (existing.system) return { ok: false, reason: 'system roles are permanent' };
  const inUse = irUsersInRole(id);
  if (inUse.length)    return { ok: false, reason: 'role still assigned to ' + inUse.length + ' user(s)' };
  const next = { ...roles };
  delete next[id];
  writeRoles(next);
  return { ok: true };
}
function irRoleMeta(id) {
  const roles = getRoles();
  return roles[id] || { label: id, glyph: '?', color: 'var(--ink-soft)', description: '', permissions: [] };
}

// ─── Permission helpers · U2 ───────────────────────────────────
// canDo(user | role, action) is the single entry point surfaces
// use to gate UI. All checks route through it so a future move to
// server-backed decisions only needs to replace this function.
//
// Accepts either:
//   · a user record (reads .role + any per-user .extra_permissions)
//   · a role id string ('admin' / 'analyst' / 'viewer' / 'engineer')
//   · null (treated as no permissions)
//
// Permission strings are verb.resource, e.g. 'findings.dispose',
// 'users.invite'. Unknown actions always return false — surfaces
// should prefer tight action names over catch-all wildcards so
// new permissions are explicitly added to each role.
function canDo(userOrRole, action) {
  if (!userOrRole || !action) return false;
  let role;
  let extras = [];
  if (typeof userOrRole === 'string') {
    role = userOrRole;
  } else {
    role = userOrRole.role;
    if (Array.isArray(userOrRole.extra_permissions)) {
      extras = userOrRole.extra_permissions;
    }
  }
  const meta = getRoles()[role];
  if (!meta) return false;
  return meta.permissions.includes(action) || extras.includes(action);
}

// Full enumeration across the live role store plus IR_SYSTEM_ROLES
// (so newly-added actions that the system seed knows about still
// show up in the matrix even before they're attached to a role).
function irAllPermissions() {
  const s = new Set();
  Object.values(IR_SYSTEM_ROLES).forEach(r => r.permissions.forEach(p => s.add(p)));
  Object.values(getRoles()).forEach(r => r.permissions.forEach(p => s.add(p)));
  return [...s].sort();
}

// Hook variant for components that gate on the CURRENT signed-in
// user. Re-renders on ir:currentUserChanged / ir:usersChanged
// (impersonation, role edit, etc.) so surfaces don't cache a
// stale role.
function useCan(action) {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const refresh = () => setTick(t => t + 1);
    window.addEventListener('ir:currentUserChanged', refresh);
    window.addEventListener('ir:usersChanged',       refresh);
    return () => {
      window.removeEventListener('ir:currentUserChanged', refresh);
      window.removeEventListener('ir:usersChanged',       refresh);
    };
  }, []);
  return canDo(getCurrentUser(), action);
}

  } catch {

function writeUsers(list) {

}

function getCurrentUser() {
  let users;

  try { id = localStorage.getItem(IR_CURRENT_USER_KEY); } catch { id = null; }
  // Default to the admin seed when nothing's been picked yet —
  // matches what the topbar showed before RBAC landed.
  if (!id) id = 'u-admin';
  return users.find(u => u.id === id) || users[0] || null;
}
function setCurrentUser(id) {
  try { localStorage.setItem(IR_CURRENT_USER_KEY, id); } catch {}
  window.dispatchEvent(new CustomEvent('ir:currentUserChanged'));
}

// CRUD helpers — surface code uses these so nobody reaches into
// the raw array.
function createUser({ name, email, role, timezone, default_password }) {
  const users = readUsers();
  const id = 'u-' + (email || name || Math.random().toString(36)).toLowerCase()
    .replace(/[^a-z0-9]+/g, '-').slice(0, 40) + '-' + Math.random().toString(36).slice(2, 6);
  const u = {
    id,
    name: name || email || '(unnamed)',
    email: email || '',
    role: role || 'analyst',
    status: 'invited',
    invited_at: new Date().toISOString(),
    joined_at: null,
    last_active: null,
    avatar: (name || email || '?').trim().slice(0, 2).toUpperCase(),
    invite_token: 'tok_' + Math.random().toString(36).slice(2, 10),
    settings: { ...defaultUserSettings(), timezone: timezone || 'browser' },
  };
  // Admin-set initial password (optional). When present, the
  // new user logs in with it directly and is forced to change
  // on first login. When absent, they must use the invite_token
  // (magic link) to set their first password.
  if (default_password) {
    u.default_password = default_password;
    u.must_change_password = true;
  }
  writeUsers([...users, u]);
  return u;
}
function updateUser(id, patch) {
  const users = readUsers();
  const next = users.map(u => u.id === id ? { ...u, ...patch } : u);
  writeUsers(next);
  return next.find(u => u.id === id) || null;
}
function deleteUser(id) {
  const users = readUsers();
  writeUsers(users.filter(u => u.id !== id));
}
function updateCurrentUserSettings(patch) {
  const cur = getCurrentUser();
  if (!cur) return null;
  return updateUser(cur.id, {
    settings: { ...cur.settings, ...patch },
  });
}

// ─── Timezone formatter · U8 ───────────────────────────────────
// Reads the current user's settings.timezone and formats any ISO
// timestamp accordingly. Uses Intl.DateTimeFormat so DST is
// handled correctly; falls back to browser default on 'browser'
// or on invalid IANA ids.
function irGetCurrentUserTz() {
  try {
    const u = getCurrentUser();
    const tz = u && u.settings && u.settings.timezone;
    return tz && tz !== 'browser' ? tz : null;
  } catch { return null; }
}
function irFormatTimestamp(iso, opts) {
  if (!iso) return '—';
  const d = iso instanceof Date ? iso : new Date(iso);
  if (Number.isNaN(d.getTime())) return '—';
  const style = (opts && opts.style) || 'datetime';
  const tz    = (opts && 'tz' in opts) ? opts.tz : irGetCurrentUserTz();
  try {
    const fmtOpts = style === 'date'
      ? { year: 'numeric', month: '2-digit', day: '2-digit' }
      : { year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    if (tz) fmtOpts.timeZone = tz;
    // en-CA gives YYYY-MM-DD and 24 h time — canonical and
    // parse-able, which is what analysts want when comparing
    // across pods.
    return new Intl.DateTimeFormat('en-CA', fmtOpts).format(d).replace(', ', ' ');
  } catch {
    return (typeof iso === 'string' ? iso : d.toISOString())
      .replace('T', ' ').replace('Z', '').slice(0, 19);
  }
}

// Re-render trigger for surfaces that want their timestamps to
// follow the user's current TZ setting without a manual refresh.
// Components call this once (discard the return value); the tick
// bumps whenever ir:currentUserChanged / ir:usersChanged fires,
// forcing a re-render where irFormatTimestamp runs again.
function useUserTzTick() {
  const [, setTick] = React.useState(0);
  React.useEffect(() => {
    const refresh = () => setTick(t => t + 1);
    window.addEventListener('ir:currentUserChanged', refresh);
    window.addEventListener('ir:usersChanged',       refresh);
    return () => {
      window.removeEventListener('ir:currentUserChanged', refresh);
      window.removeEventListener('ir:usersChanged',       refresh);
    };
  }, []);
}

// Small chip component surfaces can drop into their box-title
// kicker. Tells the analyst which TZ the shown timestamps sit in
// so a quick glance distinguishes "stored in UTC" from "shown in
// my Asia/Singapore profile".
function TzLabel() {
  useUserTzTick();
  const tz = irGetCurrentUserTz();
  return (
    <span className="mono" style={{fontSize:10, color:'var(--ink-dim)'}}>
      times · {tz || 'browser'}
    </span>
  );
}

// ─── Password primitives · A1 ──────────────────────────────────
// PBKDF2-SHA256 via WebCrypto. 100k iterations is what the demo
// uses — slow enough to resist casual brute-force, fast enough
// that login feels instant (~60 ms on a laptop). Seeded users
// carry a plain `default_password` that the login flow accepts
// on first login before swapping it out for a real hash on
// forced change (wired in A4).
const IR_PBKDF2_ITERS = 100000;

function __b64(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function __unb64(s) {
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function irPasswordHash(password, saltBytes, iters) {
  const salt = saltBytes || crypto.getRandomValues(new Uint8Array(16));
  const i = iters || IR_PBKDF2_ITERS;
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveBits'],
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: i, hash: 'SHA-256' },
    keyMat, 256,
  );
  return {
    algo: 'PBKDF2-SHA256',
    iters: i,
    salt: __b64(salt),
    hash: __b64(new Uint8Array(bits)),
    last_changed: new Date().toISOString(),
  };
}

// Timing-safe-ish byte compare. JS can't do this truly constant-
// time without heroics, but the OR-accumulator at least won't
// short-circuit on the first mismatch.
function __bytesEqual(a, b) {
  if (a.length !== b.length) return false;
  let diff = 0;
  for (let i = 0; i < a.length; i++) diff |= a[i] ^ b[i];
  return diff === 0;
}

async function irVerifyPassword(password, rec) {
  if (!rec || !rec.salt || !rec.hash) return false;
  const salt  = __unb64(rec.salt);
  const want  = __unb64(rec.hash);
  const check = await irPasswordHash(password, salt, rec.iters || IR_PBKDF2_ITERS);
  return __bytesEqual(__unb64(check.hash), want);
}

// Every seeded user starts with this default password; the login
// page surfaces it in a "demo credentials" hint. A4 forces a
// change on first login which replaces default_password with a
// real PBKDF2 hash.
const IR_SEED_DEFAULT_PASSWORD = 'ChangeMe!2026';

// Login check used by the login page (A2). Returns one of:
//   { ok: true, user }
//   { ok: false, reason: 'no-such-user' | 'wrong-password' | 'disabled' | 'invited' }
// If the user logs in with their seed default password, the
// caller should send them through the forced-change flow (A4).
async function irAuthenticate(emailOrId, password) {
  const users = readUsers();
  const needle = (emailOrId || '').trim().toLowerCase();
  const user = users.find(u =>
       (u.email || '').toLowerCase() === needle
    || (u.id    || '').toLowerCase() === needle
    || (u.name  || '').toLowerCase() === needle,
  );
  if (!user) return { ok: false, reason: 'no-such-user' };
  if (user.status === 'disabled') return { ok: false, reason: 'disabled', user };
  if (user.status === 'invited' && !user.auth && !user.default_password) {
    return { ok: false, reason: 'invited', user };
  }
  if (user.auth) {
    const ok = await irVerifyPassword(password, user.auth);
    return ok ? { ok: true, user } : { ok: false, reason: 'wrong-password', user };
  }
  if (user.default_password && password === user.default_password) {
    return { ok: true, user, default_password_used: true };
  }
  return { ok: false, reason: 'wrong-password', user };
}

// Password-policy check. Deliberately loose for a wireframe — the
// actual floor for a production deployment would be enforced by
// the server. Returns { ok: true } or { ok: false, reason }.
function irValidatePassword(pw, confirm) {
  if (typeof pw !== 'string' || pw.length < 10) {
    return { ok: false, reason: 'password must be at least 10 characters' };
  }
  if (!/[A-Za-z]/.test(pw) || !/[0-9]/.test(pw)) {
    return { ok: false, reason: 'password must include at least one letter and one digit' };
  }
  if (pw === IR_SEED_DEFAULT_PASSWORD) {
    return { ok: false, reason: "can't reuse the seeded default password" };
  }
  if (confirm != null && pw !== confirm) {
    return { ok: false, reason: "the two passwords don't match" };
  }
  return { ok: true };
}

// Invite token parsed from the URL's hash (#invite=TOKEN). Used
// to gate the InviteAcceptPage before the normal LoginPage gate.
// Reading from hash (not query string) keeps the token out of
// server-access logs if this ever ships behind a real web server.
function irReadInviteTokenFromUrl() {
  try {
    const h = (typeof location !== 'undefined' && location.hash) || '';
    const m = h.match(/(?:^|[#&])invite=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  } catch { return null; }
}
function irClearInviteTokenFromUrl() {
  try {
    const h = (typeof location !== 'undefined' && location.hash) || '';
    const cleaned = h.replace(/(?:^#?|&)invite=[^&]+/, '');
    const next = cleaned && cleaned !== '#' ? cleaned : '';
    history.replaceState(null, '', location.pathname + location.search + next);
  } catch {}
}

// Accept an invite by swapping the token for a real password.
// Returns { ok: true, user } or { ok: false, reason }. Clears
// invite_token on success so the link can't be replayed.
async function irAcceptInvite(token, newPassword) {
  if (!token) return { ok: false, reason: 'missing token' };
  const users = readUsers();
  const user = users.find(u => u.invite_token === token);
  if (!user) return { ok: false, reason: 'no such invite · already accepted or expired' };
  if (user.status === 'disabled') return { ok: false, reason: 'invite is for a disabled account' };
  const v = irValidatePassword(newPassword);
  if (!v.ok) return { ok: false, reason: v.reason };
  await irSetPassword(user.id, newPassword);
  // Re-read since irSetPassword writes through readUsers/writeUsers.
  const fresh = readUsers().map(u => u.id === user.id
    ? { ...u, invite_token: undefined, status: 'active',
        joined_at: u.joined_at || new Date().toISOString() }
    : u);
  writeUsers(fresh);
  return { ok: true, user: fresh.find(u => u.id === user.id) };
}

// Replace a user's password with a fresh PBKDF2 hash. Clears
// default_password and must_change_password so re-login doesn't
// keep nagging. Async because hashing is async.
async function irSetPassword(userId, newPassword) {
  const rec = await irPasswordHash(newPassword);
  const users = readUsers();
  const next = users.map(u => u.id === userId
    ? { ...u, auth: rec, default_password: undefined, must_change_password: false,
        joined_at: u.joined_at || new Date().toISOString(),
        status: u.status === 'invited' ? 'active' : u.status }
    : u);
  writeUsers(next);
  return next.find(u => u.id === userId) || null;
}

// ─── Session helpers · A3 ──────────────────────────────────────
// Minimal session model — just enough to gate the app behind
// login. Real deployments would back this with an HttpOnly cookie
// from siphon-api, but since this file is the wireframe we keep
// it in localStorage so the whole flow is inspectable.
const IR_SESSION_KEY = 'ir:session';
const IR_SESSION_TTL_MS = 12 * 3600 * 1000; // 12 hours

function readSession() {
  try {
    const raw = localStorage.getItem(IR_SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || !s.userId || !s.expiresAt) return null;
    if (Date.now() > new Date(s.expiresAt).getTime()) {
      localStorage.removeItem(IR_SESSION_KEY);
      return null;
    }
    return s;
  } catch { return null; }
}
function writeSession(userId, ttlMs) {
  const ttl = ttlMs || IR_SESSION_TTL_MS;
  const now = Date.now();
  const s = {
    userId,
    issuedAt:  new Date(now).toISOString(),
    expiresAt: new Date(now + ttl).toISOString(),
  };
  try { localStorage.setItem(IR_SESSION_KEY, JSON.stringify(s)); } catch {}
  window.dispatchEvent(new CustomEvent('ir:sessionChanged'));
  return s;
}
function clearSession() {
  try { localStorage.removeItem(IR_SESSION_KEY); } catch {}
  window.dispatchEvent(new CustomEvent('ir:sessionChanged'));
}

// Hook: returns the session record + listener so the app re-
// renders when a login / logout happens in this tab OR another.
function useSession() {
  const [session, setSession] = React.useState(() => readSession());
  React.useEffect(() => {
    const refresh = () => setSession(readSession());
    window.addEventListener('ir:sessionChanged', refresh);
    window.addEventListener('storage', (e) => {
      if (e.key === IR_SESSION_KEY) refresh();
    });
    return () => {
      window.removeEventListener('ir:sessionChanged', refresh);
    };
  }, []);
  return session;
}

// Minimal markdown renderer — handles the subset the playbooks use:
// headings (# / ## / ###), unordered lists (- / *), inline **bold**
// and `code`, plus plain paragraphs. No raw HTML passthrough so
// operator-authored markdown can't inject script tags.
function renderIrMarkdown(src) {
  if (!src) return '';
  const lines = src.split('\n');
  const out = [];
  let para = [];
  let list = null;

  // Inline transformations: code spans first (so ** inside `code`
  // stays literal), then bold, then paragraph-internal escapes.
  const renderInline = (s) => {
    // Escape first so innerHTML is safe for the spans we emit
    // below. Every non-escaped substitution knows it's operating
    // on already-escaped content.
    const esc = s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    return esc
      .replace(/`([^`]+)`/g, '<code style="background:var(--bg-3);color:var(--accent);padding:1px 5px;border-radius:2px;font-size:0.92em;font-family:\'JetBrains Mono\',monospace">$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<b style="color:var(--ink-bright)">$1</b>');
  };
  const flushPara = () => {
    if (para.length) {
      out.push('<p style="margin:8px 0;line-height:1.6;color:var(--ink)">' + renderInline(para.join(' ')) + '</p>');
      para = [];
    }
  };
  const flushList = () => {
    if (list) {
      out.push('<ul style="margin:8px 0;padding-left:22px;line-height:1.7;color:var(--ink)">' +
        list.map(i => '<li style="margin:3px 0">' + renderInline(i) + '</li>').join('') +
        '</ul>');
      list = null;
    }
  };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, '');
    if (!line.trim()) {
      flushPara();
      flushList();
      continue;
    }
    const h = /^(#{1,3})\s+(.*)$/.exec(line);
    if (h) {
      flushPara();
      flushList();
      const level = h[1].length;
      const sizes = { 1: 18, 2: 15, 3: 13 };
      const margins = { 1: '16px 0 10px', 2: '14px 0 8px', 3: '10px 0 6px' };
      out.push(`<h${level} style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--ink-bright);font-size:${sizes[level]}px;margin:${margins[level]};letter-spacing:${level === 1 ? '-0.01em' : '0'}">${renderInline(h[2])}</h${level}>`);
      continue;
    }
    const li = /^\s*[-*]\s+(.*)$/.exec(line);
    if (li) {
      flushPara();
      if (!list) list = [];
      list.push(li[1]);
      continue;
    }
    flushList();
    para.push(line.trim());
  }
  flushPara();
  flushList();
  return out.join('');
}

// Lookup helper used by the drawer in a later commit: given a

  return IR_PLAYBOOKS.find(p => p.categories && p.categories.includes(cat))
      || IR_PLAYBOOKS.find(p => p.id === 'pb-external')
      || null;

// ─── PlaybookDrawer ─────────────────────────────────────────────
// Right-side slide-in drawer that shows the playbook list + the
// selected body. No wiring in this commit — App renders this in
// the next (C3) commit so it can ship in a self-contained diff.
//
// Props:
//   open              boolean — renders nothing when false
//   onClose           fn — invoked on × / backdrop click / Escape
//   initialPlaybookId string — pre-selects a playbook (C5 passes
//                     the match for the current finding's category)
function PlaybookDrawer({ open, onClose, initialPlaybookId }) {
  const [selectedId, setSelectedId] = React.useState(
    initialPlaybookId || (IR_PLAYBOOKS[0] && IR_PLAYBOOKS[0].id)
  );
  const [search, setSearch] = React.useState('');

  // When the drawer opens with a new initial pick, follow it.
  React.useEffect(() => {
    if (open && initialPlaybookId) setSelectedId(initialPlaybookId);
  }, [open, initialPlaybookId]);

  // Escape closes.
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const filtered = IR_PLAYBOOKS.filter(p => {
    if (!search) return true;
    const q = search.toLowerCase();
    return p.title.toLowerCase().includes(q)
        || (p.tags || []).some(t => t.includes(q))
        || (p.categories || []).some(c => c.toLowerCase().includes(q));
  });

  const selected = IR_PLAYBOOKS.find(p => p.id === selectedId) || filtered[0] || IR_PLAYBOOKS[0];
  const bodyHtml = selected ? renderIrMarkdown(selected.markdown) : '';

  return (
    <div onClick={onClose}
         style={{
           position:'fixed', inset:0,
           background:'rgba(0,0,0,0.55)',
           zIndex:1000, display:'flex', justifyContent:'flex-end',
         }}>
      <div onClick={(e) => e.stopPropagation()}
           style={{
             width:'min(960px, 92vw)', height:'100%',
             background:'var(--bg-1)',
             borderLeft:'1px solid var(--line-strong)',
             display:'grid', gridTemplateColumns:'280px 1fr',
             boxShadow:'-12px 0 40px rgba(0,0,0,0.6)',
             overflow:'hidden',
           }}>
        {/* Left pane · list */}
        <div style={{
          borderRight:'1px solid var(--line-soft)', background:'var(--bg-2)',
          display:'flex', flexDirection:'column', minHeight:0,
        }}>
          <div style={{
            padding:'14px 14px 10px', borderBottom:'1px solid var(--line-soft)',
          }}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
              <span style={{fontFamily:"'Space Grotesk', sans-serif", fontWeight:700, fontSize:14, color:'var(--ink-bright)'}}>
                ❖ Playbooks
              </span>
              <button onClick={onClose}
                      title="close (esc)"
                      style={{
                        background:'transparent', border:'1px solid var(--line-strong)',
                        color:'var(--ink)', width:26, height:26,
                        borderRadius:'var(--radius)', cursor:'pointer',
                        fontFamily:"'JetBrains Mono', monospace", fontSize:14, lineHeight:1,
                      }}>×</button>
            </div>
            <input type="text"
                   value={search}
                   onChange={e => setSearch(e.target.value)}
                   placeholder="filter · title / tag / category"
                   className="mono"
                   style={{
                     width:'100%', boxSizing:'border-box',
                     padding:'6px 10px', fontSize:11,
                     background:'var(--bg-1)', color:'var(--ink)',
                     border:'1px solid var(--line-strong)',
                     borderRadius:'var(--radius)',
                   }}/>
          </div>
          <div style={{flex:1, overflowY:'auto'}}>
            {filtered.length === 0 && (
              <div className="muted mono" style={{padding:14, fontSize:11, textAlign:'center'}}>
                — no playbooks match —
              </div>
            )}
            {filtered.map(p => {
              const active = selected && selected.id === p.id;
              return (
                <button key={p.id}
                        onClick={() => setSelectedId(p.id)}
                        style={{
                          display:'block', width:'100%', textAlign:'left',
                          padding:'10px 14px',
                          background: active ? 'var(--accent-wash)' : 'transparent',
                          border:'none',
                          borderLeft: active ? '3px solid var(--accent)' : '3px solid transparent',
                          borderBottom:'1px solid var(--line-soft)',
                          color:'var(--ink)', cursor:'pointer',
                          fontFamily:'inherit',
                        }}>
                  <div style={{
                    fontWeight:600, fontSize:12.5,
                    color: active ? 'var(--ink-bright)' : 'var(--ink)',
                    fontFamily:"'Space Grotesk', sans-serif",
                    marginBottom:4,
                  }}>
                    {p.title}
                  </div>
                  {p.categories && p.categories.length > 0 && (
                    <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
                      {p.categories.slice(0, 2).map(c => (
                        <span key={c} className="chip chip--ghost"
                              style={{fontSize:9, padding:'2px 6px'}}>{c}</span>
                      ))}
                      {p.categories.length > 2 && (
                        <span className="muted mono" style={{fontSize:10, alignSelf:'center'}}>
                          +{p.categories.length - 2}
                        </span>
                      )}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        {/* Right pane · content */}
        <div style={{display:'flex', flexDirection:'column', minHeight:0}}>
          <div style={{
            padding:'14px 20px', borderBottom:'1px solid var(--line-soft)',
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background:'var(--bg-2)',
          }}>
            <div>
              <div style={{
                fontFamily:"'Space Grotesk', sans-serif", fontWeight:700,
                fontSize:17, color:'var(--ink-bright)',
              }}>
                {selected ? selected.title : 'Select a playbook'}
              </div>
              {selected && selected.tags && selected.tags.length > 0 && (
                <div style={{marginTop:6, display:'flex', gap:4, flexWrap:'wrap'}}>
                  {selected.tags.map(t => (
                    <span key={t} className="mono"
                          style={{fontSize:10, color:'var(--ink-soft)',
                                  padding:'1px 6px', border:'1px solid var(--line-soft)',
                                  borderRadius:2}}>#{t}</span>
                  ))}
                </div>
              )}
            </div>
            {selected && (
              <button
                onClick={() => {
                  try { navigator.clipboard.writeText(selected.markdown); } catch {}
                }}
                title="copy the markdown body to clipboard"
                style={{
                  padding:'5px 10px', fontSize:11,
                  background:'transparent', color:'var(--ink)',
                  border:'1px solid var(--line-strong)',
                  borderRadius:'var(--radius)', cursor:'pointer',
                  fontFamily:"'JetBrains Mono', monospace",
                }}>
                ⎘ Copy
              </button>
            )}
          </div>
          <div style={{
            flex:1, overflowY:'auto', padding:'16px 24px 40px',
            fontFamily:"'IBM Plex Sans', sans-serif", fontSize:13,
          }}
          // renderIrMarkdown escapes + emits a tightly-controlled
          // subset; safe to inject as HTML.
          dangerouslySetInnerHTML={{ __html: bodyHtml }}/>
        </div>
      </div>
    </div>
  );
}

// ─── LoginPage · A2 ────────────────────────────────────────────
// Full-page gate shown when no valid session is present. Takes an
// `onLogin(user)` callback the App wires up to write the session
// + redirect the user into the console. PBKDF2 hashing is async,
// so the form shows a loading state during verification.
function LoginPage({ onLogin }) {
  const [email,    setEmail]    = React.useState('');
  const [password, setPassword] = React.useState('');
  const [err,      setErr]      = React.useState(null);
  const [busy,     setBusy]     = React.useState(false);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(null);
    if (!email.trim())    return setErr('email required');
    if (!password)        return setErr('password required');
    setBusy(true);
    const res = await irAuthenticate(email, password);
    setBusy(false);
    if (!res.ok) {
      if (res.reason === 'no-such-user')   return setErr('No user with that email / id');
      if (res.reason === 'wrong-password') return setErr('Wrong password');
      if (res.reason === 'disabled')       return setErr('This account is disabled · contact an administrator');
      if (res.reason === 'invited')        return setErr('This account is pending · use the invite link to set a password');
      return setErr('Login failed');
    }
    onLogin(res.user, { default_password_used: !!res.default_password_used });
  };

  return (
    <div style={{
      minHeight: '100vh',
      background: 'var(--bg-0)',
      display: 'grid', placeItems: 'center',
      padding: '32px',
    }}>
      <form onSubmit={submit}
            style={{
              width: '100%', maxWidth: 420,
              background: 'var(--bg-1)',
              border: '1px solid var(--line-strong)',
              borderRadius: 'var(--radius)',
              boxShadow: '0 10px 40px rgba(0,0,0,0.35)',
              padding: '28px 28px 22px',
              fontFamily: "'Space Grotesk', sans-serif",
            }}>
        <AuthBrandHeader
          kicker="POLYGON"
          title="siphon · IR"
          subtitle="Incident-response console · sign in with your corporate account" />

        {/* Email */}
        <label style={{display:'block', marginBottom:12}}>
          <div className="label" style={{marginBottom:4}}>Email</div>
          <input type="text"
                 value={email}
                 onChange={(e) => setEmail(e.target.value)}
                 autoComplete="username"
                 autoFocus
                 placeholder="you@corp.example"
                 style={{
                   width:'100%', boxSizing:'border-box',
                   padding:'10px 12px', fontSize: 13,
                   background:'var(--bg-0)', color:'var(--ink)',
                   border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                   fontFamily:"'JetBrains Mono', monospace",
                 }}/>
        </label>

        {/* Password */}
        <label style={{display:'block', marginBottom:14}}>
          <div className="label" style={{marginBottom:4}}>Password</div>
          <input type="password"
                 value={password}
                 onChange={(e) => setPassword(e.target.value)}
                 autoComplete="current-password"
                 placeholder="••••••••••"
                 style={{
                   width:'100%', boxSizing:'border-box',
                   padding:'10px 12px', fontSize: 13,
                   background:'var(--bg-0)', color:'var(--ink)',
                   border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                   fontFamily:"'JetBrains Mono', monospace",
                 }}/>
        </label>

        {err && (
          <div style={{
            padding:'8px 10px', marginBottom:12,
            background:'var(--red-wash)',
            border:'1px solid var(--threat)',
            color:'var(--threat)',
            borderRadius:'var(--radius)',
            fontSize:12,
          }}>{err}</div>
        )}

        <button type="submit"
                className="btn primary"
                disabled={busy}
                style={{width:'100%', padding:'10px 0', fontSize:13, fontWeight:600}}>
          {busy ? 'signing in…' : 'Sign in'}
        </button>

        {/* Future-auth stubs — wired in A5 */}
        <div style={{
          marginTop:16, paddingTop:16,
          borderTop:'1px dashed var(--line-soft)',
          display:'flex', gap:8, flexDirection:'column',
        }}>
          <button type="button"
                  className="btn ghost"
                  disabled
                  title="Entra ID (SAML) — backlog · not wired yet"
                  style={{width:'100%', padding:'9px 0', fontSize:12, opacity:0.55}}>
            Sign in with Entra ID (SAML) · soon
          </button>
          <button type="button"
                  className="btn ghost"
                  disabled
                  title="Passkeys (WebAuthn) — backlog · not wired yet"
                  style={{width:'100%', padding:'9px 0', fontSize:12, opacity:0.55}}>
            Sign in with a passkey · soon
          </button>
        </div>

        {/* Demo hint — only while the user roster still has seeded
            default passwords. Reads readUsers() once on mount so
            a user who's changed their password doesn't see the
            stale "ChangeMe!2026" hint stuck on screen. */}
        <LoginDemoHint />

        <div style={{
          marginTop:14, fontSize:10.5, color:'var(--ink-dim)',
          textAlign:'center', lineHeight:1.6,
        }}>
          Sessions expire after 12 h · all auth state is local to this browser
        </div>
      </form>
    </div>
  );
}

// ─── InviteAcceptPage · U5 ─────────────────────────────────────
// Full-page form shown when the URL carries #invite=TOKEN and the
// visitor isn't already signed in. Resolves the token to a User
// record on mount (displays name + role so the acceptor can tell
// they've been sent to the right place), then swaps the token
// for a real password + immediately logs them in.
function InviteAcceptPage({ token, onAccepted }) {
  const [matchedUser, setMatchedUser] = React.useState(() => {
    try { return readUsers().find(u => u.invite_token === token) || null; }
    catch { return null; }
  });
  const [pw1, setPw1] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [err, setErr] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(null);
    const v = irValidatePassword(pw1, pw2);
    if (!v.ok) return setErr(v.reason);
    setBusy(true);
    const res = await irAcceptInvite(token, pw1);
    setBusy(false);
    if (!res.ok) return setErr(res.reason);
    onAccepted(res.user);
  };

  const role = matchedUser ? irRoleMeta(matchedUser.role) : null;

  return (
    <div style={{
      minHeight: '100vh',
      background: 'var(--bg-0)',
      display: 'grid', placeItems: 'center',
      padding: '32px',
    }}>
      <form onSubmit={submit}
            style={{
              width: '100%', maxWidth: 460,
              background: 'var(--bg-1)',
              border: '1px solid var(--line-strong)',
              borderRadius: 'var(--radius)',
              boxShadow: '0 10px 40px rgba(0,0,0,0.35)',
              padding: '28px 28px 22px',
              fontFamily: "'Space Grotesk', sans-serif",
            }}>
        <AuthBrandHeader
          kicker="ACCEPT INVITE"
          title="Set your password"
          subtitle={matchedUser ? <>
            This invite provisions{' '}
            <span className="mono" style={{color:'var(--ink)'}}>{matchedUser.email || matchedUser.name}</span>
            {' '}as{' '}
            <span className="chip"
                  style={{
                    fontSize:10, padding:'2px 8px',
                    borderColor: role.color, color: role.color,
                    background:'var(--bg-1)',
                    whiteSpace:'nowrap',
                  }}>{role.glyph} {role.label}</span>.
            Pick a password to activate the account.
          </> : null}/>

        {/* Invalid-token banner lives outside the brand header —
            it's a full-width warning card, not subtitle text. */}
        {!matchedUser && (
          <div style={{
            fontSize:12, color:'var(--threat)',
            marginTop:-6, marginBottom:18,
            padding:'10px 12px',
            background:'var(--red-wash)',
            border:'1px solid var(--threat)',
            borderRadius:'var(--radius)',
          }}>
            This invite link isn't valid — it's been accepted already, or the
            token was revoked. Ask an administrator for a new invite.
          </div>
        )}

        {matchedUser && (
          <>
            <label style={{display:'block', marginBottom:12}}>
              <div className="label" style={{marginBottom:4}}>New password</div>
              <input type="password" value={pw1} autoFocus
                     onChange={(e) => setPw1(e.target.value)}
                     autoComplete="new-password"
                     placeholder="≥ 10 chars · letters + digits"
                     style={{
                       width:'100%', boxSizing:'border-box',
                       padding:'10px 12px', fontSize:13,
                       background:'var(--bg-0)', color:'var(--ink)',
                       border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                       fontFamily:"'JetBrains Mono', monospace",
                     }}/>
            </label>
            <label style={{display:'block', marginBottom:14}}>
              <div className="label" style={{marginBottom:4}}>Confirm password</div>
              <input type="password" value={pw2}
                     onChange={(e) => setPw2(e.target.value)}
                     autoComplete="new-password"
                     placeholder="re-enter the same password"
                     style={{
                       width:'100%', boxSizing:'border-box',
                       padding:'10px 12px', fontSize:13,
                       background:'var(--bg-0)', color:'var(--ink)',
                       border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                       fontFamily:"'JetBrains Mono', monospace",
                     }}/>
            </label>

            {err && (
              <div style={{
                padding:'8px 10px', marginBottom:12,
                background:'var(--red-wash)',

                color:'var(--threat)',

// ─── ForceChangePassword · A4 ──────────────────────────────────
// Shown immediately after a successful login when the user record
// still carries must_change_password=true — i.e. the seeded
// default, an admin-set initial password, or an admin-forced
// rotation. Same full-page layout as LoginPage so the flow feels
// continuous. Submission calls irSetPassword, which replaces the
// default_password fallback with a real PBKDF2 hash and flips
// must_change_password off.
function ForceChangePassword({ user, onDone }) {
  const [pw1, setPw1] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [err, setErr] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(null);
    const v = irValidatePassword(pw1, pw2);
    if (!v.ok) return setErr(v.reason);
    setBusy(true);
    try {
      await irSetPassword(user.id, pw1);
      onDone();
    } catch (ex) {
      setErr('could not save password · ' + (ex.message || ex));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{
      minHeight: '100vh',
      background: 'var(--bg-0)',
      display: 'grid', placeItems: 'center',
      padding: '32px',
    }}>
      <form onSubmit={submit}
            style={{
              width: '100%', maxWidth: 460,
              background: 'var(--bg-1)',
              border: '1px solid var(--line-strong)',
              borderRadius: 'var(--radius)',
              boxShadow: '0 10px 40px rgba(0,0,0,0.35)',
              padding: '28px 28px 22px',
              fontFamily: "'Space Grotesk', sans-serif",
            }}>
        <AuthBrandHeader
          kicker="FORCED · FIRST LOGIN"
          kickerColor="var(--amber)"
          title="Set a new password"
          subtitle={<>
            Signed in as <span className="mono" style={{color:'var(--ink)'}}>{user.email || user.id}</span>.
            You need to replace the default/initial password before the console
            is accessible.
          </>}/>

        <label style={{display:'block', marginBottom:12}}>
          <div className="label" style={{marginBottom:4}}>New password</div>
          <input type="password"
                 value={pw1}
                 onChange={(e) => setPw1(e.target.value)}
                 autoComplete="new-password"
                 autoFocus
                 placeholder="at least 10 characters · letters + digits"
                 style={{
                   width:'100%', boxSizing:'border-box',
                   padding:'10px 12px', fontSize:13,
                   background:'var(--bg-0)', color:'var(--ink)',
                   border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                   fontFamily:"'JetBrains Mono', monospace",
                 }}/>
        </label>

        <label style={{display:'block', marginBottom:14}}>
          <div className="label" style={{marginBottom:4}}>Confirm password</div>
          <input type="password"
                 value={pw2}
                 onChange={(e) => setPw2(e.target.value)}
                 autoComplete="new-password"
                 placeholder="re-enter the same password"
                 style={{
                   width:'100%', boxSizing:'border-box',
                   padding:'10px 12px', fontSize:13,
                   background:'var(--bg-0)', color:'var(--ink)',
                   border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                   fontFamily:"'JetBrains Mono', monospace",
                 }}/>
        </label>

        {err && (
          <div style={{
            padding:'8px 10px', marginBottom:12,
            background:'var(--red-wash)',
            border:'1px solid var(--threat)',
            color:'var(--threat)',
            borderRadius:'var(--radius)',
            fontSize:12,
          }}>{err}</div>
        )}

        <button type="submit"
                className="btn primary"
                disabled={busy}
                style={{width:'100%', padding:'10px 0', fontSize:13, fontWeight:600}}>
          {busy ? 'saving…' : 'Set password & continue'}
        </button>

        <div style={{
          marginTop:14, padding:'8px 10px',
          background:'var(--bg-2)',
          border:'1px dashed var(--line-soft)',
          borderRadius:'var(--radius)',
          fontSize:11, color:'var(--ink-soft)',
          lineHeight:1.6,
        }}>
          <b style={{color:'var(--ink)'}}>Policy</b> · ≥ 10 characters, at least one
          letter and one digit, can't reuse the seeded default. Production would
          layer on server-side checks (breach-corpus, HIBP, etc.).
        </div>
      </form>
    </div>
  );
}

function LoginDemoHint() {
  // Only surface the hint while at least one seeded user still
  // carries the default password. Once everyone's rotated, the
  // hint disappears silently.
  const anyDefault = React.useMemo(() => {
    try { return readUsers().some(u => u.default_password === IR_SEED_DEFAULT_PASSWORD); }
    catch { return false; }
  }, []);
  if (!anyDefault) return null;
  return (
    <div style={{
      marginTop:14, padding:'10px 12px',
      background:'var(--bg-2)',
      border:'1px dashed var(--line-soft)',
      borderRadius:'var(--radius)',
      fontSize:11, color:'var(--ink-soft)',
      lineHeight:1.6,
    }}>
      <b style={{color:'var(--ink)'}}>Demo mode · seeded credentials</b><br/>
      Any seeded user · e.g. <span className="mono">r.solanki@corp.example</span>
      {' '}· password{' '}
      <span className="mono" style={{color:'var(--ink-bright)'}}>
        {IR_SEED_DEFAULT_PASSWORD}
      </span>
      <br/>
      You'll be asked to set a new password on first sign-in.
    </div>
  );
}

function App() {
  // Session gate. When no valid session exists, the LoginPage
  // takes over the viewport and every other piece of state below
  // still initialises (cheap, and avoids re-wiring on login).
  const session = useSession();
  const handleLogin = React.useCallback((user) => {
    writeSession(user.id);
    setCurrentUser(user.id);
  }, []);
  const handleLogout = React.useCallback(() => {
    clearSession();
    // Leave ir:currentUserId in place so re-logins land on the
    // same impersonation slot; tests can clear it explicitly.
  }, []);
  // Expose logout for the Topbar menu without threading props
  // through the whole tree.
  window.__ir_logout = handleLogout;

  const [surface, setSurface] = React.useState(() => {
    try { return localStorage.getItem('ir:surface') || 'dashboard'; } catch { return 'dashboard'; }
  });
  // Sub-route for detail pages. Shape: "finding:<id>" opens the
  // FindingDetail view under the 'findings' surface. Persisted so a
  // refresh doesn't drop you back to the queue mid-investigation.
  const [sub, setSub] = React.useState(() => {
    try { return localStorage.getItem('ir:sub') || ''; } catch { return ''; }
  });
  const [tweaks, setTweaks] = React.useState(() => {
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem('c2:tweaks') || '{}'); } catch {}
    return { ...TWEAK_DEFAULTS, ...stored };
  });

  React.useEffect(() => {
    try { localStorage.setItem('ir:surface', surface); } catch {}
  }, [surface]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:sub', sub); } catch {}
  }, [sub]);
  React.useEffect(() => {
    try { localStorage.setItem('c2:tweaks', JSON.stringify(tweaks)); } catch {}
  }, [tweaks]);
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme || 'phosphor');
  }, [tweaks.theme]);

  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== 'c2:tweaks') return;
      try {
        const parsed = JSON.parse(e.newValue || '{}');
        setTweaks(t => ({ ...t, ...parsed }));
      } catch {}
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  const setTweak = (k, v) => setTweaks(t => ({ ...t, [k]: v }));
  const go = (id, s) => { setSurface(id); setSub(s || ''); };
  window.__ir_go = go;
  // Convenience helper the FindingsQueue + FindingDetail use to
  // navigate between rows and detail view without rebuilding the
  // (surface, sub) tuple each time.
  window.__ir_goFinding = (fid) => go('findings', fid ? 'finding:' + fid : '');

  // Dispatch: if we're on findings with a finding:<id> sub, render
  // the detail view; otherwise fall back to the surface registry.
  let body;
  if (surface === 'findings' && sub && sub.startsWith('finding:')) {
    body = <FindingDetail id={sub.slice('finding:'.length)}
                           back={() => setSub('')} />;
  } else {
    const renderSurface = SURFACE_COMPONENTS[surface] || SURFACE_COMPONENTS.findings;
    body = renderSurface();
  }

  // ── Playbooks drawer wiring (Phase C · C3) ─────────────────
  // State lives in App so the drawer survives surface + sub
  // navigation. openPlaybooks threads through Topbar so the
  // always-visible ❖ Playbooks button has a real handler.
  const [playbooksOpen, setPlaybooksOpen] = React.useState(false);
  // initialPlaybookId seeds PlaybookDrawer with a pre-selected
  // playbook. Recomputed each time the drawer opens so the
  // analyst always lands on the playbook matched to the finding
  // currently in view.
  const [playbooksInitial, setPlaybooksInitial] = React.useState(null);
  const openPlaybooks = React.useCallback(() => {
    // FindingDetail stashes window.__ir_currentFindingCategory
    // while it's mounted. When absent (dashboard / queue / any
    // non-detail surface) auto-select falls through to the
    // drawer's default (first playbook in the list).
    const cat = typeof window !== 'undefined' ? window.__ir_currentFindingCategory : null;
    const match = cat ? matchPlaybookForCategory(cat) : null;
    setPlaybooksInitial(match ? match.id : null);
    setPlaybooksOpen(true);
  }, []);
  const closePlaybooks = React.useCallback(() => setPlaybooksOpen(false), []);

  // Keyboard shortcut · 'p' toggles the drawer. Ignored when the
  // focus is in an input / textarea / select / contenteditable so
  // the analyst can type 'p' in the Findings-Queue search without
  // hijacking it. Escape-to-close already lives inside the drawer.
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key !== 'p' && e.key !== 'P') return;
      const t = e.target;
      if (t && (
        /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName) || t.isContentEditable
      )) return;
      e.preventDefault();
      // Route through openPlaybooks on open so the shortcut also
      // picks up the current finding's auto-selected playbook;
      // close is a direct setState.
      setPlaybooksOpen(currentlyOpen => {
        if (currentlyOpen) return false;
        const cat = typeof window !== 'undefined' ? window.__ir_currentFindingCategory : null;
        const match = cat ? matchPlaybookForCategory(cat) : null;
        setPlaybooksInitial(match ? match.id : null);
        return true;
      });
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Invite-accept gate · U5. Checked before the login gate so
  // clicking a magic link in a signed-out browser always lands
  // the visitor on the accept-invite form regardless of any
  // stale session. After the link is consumed we drop the token
  // from the URL + write the session so subsequent visits from
  // the same browser skip the accept form.
  const inviteToken = irReadInviteTokenFromUrl();
  if (!session && inviteToken) {
    return <InviteAcceptPage
             token={inviteToken}
             onAccepted={(user) => {
               irClearInviteTokenFromUrl();
               handleLogin(user);
             }}/>;
  }

  // Gate: without a session the console is invisible. LoginPage
  // carries its own theme-agnostic styling so it renders cleanly
  // regardless of data-theme.
  if (!session) {
    return <LoginPage onLogin={handleLogin} />;
  }

  // Second gate: if the signed-in user still carries a forced-
  // change flag (seeded default, admin-set initial password, or
  // admin-forced rotation), trap them on the change form until
  // they set a real password. useChangeTick re-reads the user
  // record on ir:usersChanged so the gate releases the moment
  // irSetPassword writes.
  return <GatedShell session={session}
                     tweaks={tweaks} setTweak={setTweak}
                     surface={surface} setSurface={setSurface}
                     sub={sub} setSub={setSub}
                     go={go}
                     playbooksOpen={playbooksOpen}
                     closePlaybooks={closePlaybooks}
                     openPlaybooks={openPlaybooks}
                     playbooksInitial={playbooksInitial}
                     body={body} />;
}

// Splits the mandatory-change gate out so GatedShell can subscribe
// to user updates and re-evaluate without rebuilding the rest of
// App's state. It consumes the pre-computed `body` + nav wiring
// and just decides between "change password first" and the full
// console shell.
function GatedShell(props) {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const refresh = () => setTick(t => t + 1);
    window.addEventListener('ir:usersChanged',       refresh);
    window.addEventListener('ir:currentUserChanged', refresh);
    return () => {
      window.removeEventListener('ir:usersChanged',       refresh);
      window.removeEventListener('ir:currentUserChanged', refresh);
    };
  }, []);
  const user = getCurrentUser();
  if (user && user.must_change_password) {
    return <ForceChangePassword user={user}
                                onDone={() => setTick(t => t + 1)} />;
  }
  return (
    <div className="shell" data-density={props.tweaks.density} data-theme={props.tweaks.theme}>
      <Topbar tweaks={props.tweaks} setTweak={props.setTweak}
              openPlaybooks={props.openPlaybooks} />
      <WorkspaceBar current={props.surface} go={props.go} />
      <SurfaceBar current={props.surface} go={props.go} />
      <main className="page">{props.body}</main>
      <PlaybookDrawer open={props.playbooksOpen}
                      onClose={props.closePlaybooks}
                      initialPlaybookId={props.playbooksInitial} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
