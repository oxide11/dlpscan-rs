<div id="root"></div>
<script>
// ResizeObserver benign-loop shim (same as siphon-c2). Swallows the
// "ResizeObserver loop completed with undelivered notifications"
// warning that browsers surface as an uncaught error in dev.
window.addEventListener('error', (e) => {
  if (e.message && e.message.includes('ResizeObserver')) { e.stopImmediatePropagation(); e.preventDefault(); return false; }
});
const _RO = window.ResizeObserver;
if (_RO) {
  window.ResizeObserver = class extends _RO {
    constructor(cb) { super((entries, o) => { requestAnimationFrame(() => { try { cb(entries, o); } catch {} }); }); }
  };
}
</script>

<!-- React + Babel from CDN (same versions siphon-c2 uses). -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Shared JS primitives (URLs, auth, pod registry hooks, LivePill).
     Source of truth at docs/wireframes/siphon-shared.js — inlined
     here for the same file:// reason as the CSS above. -->
<script>
// ─── siphon-shared.js ───────────────────────────────────────────
// Primitives used by every siphon console (siphon-c2 admin console,
// siphon-ir responder console). Loaded as a plain <script> tag
// AFTER react + react-dom + babel-standalone. Exposes everything on
// `window.` so both Babel-transpiled and plain-JS consumers pick it
// up without an import.
//
// Layered on purpose — keep this file limited to primitives that
// don't depend on console-specific UI. Adding surface-level
// components (Topbar, Sidenav, etc.) is a separate step once both
// consoles agree on their shape.
// ─────────────────────────────────────────────────────────────────

(function () {
  'use strict';

  // ─── Endpoint config ────────────────────────────────────────────
  // localStorage keys keep the admin console and the responder
  // console pointed at the same pods without either needing to
  // duplicate state. The same `c2:*` prefix is reused so a user who
  // configured the admin console before the IR console existed has
  // zero migration work.

  window.SIPHON_API_URL = function () {
    try { return localStorage.getItem('c2:apiUrl') || 'http://127.0.0.1:8080'; }
    catch { return 'http://127.0.0.1:8080'; }
  };

  window.SIPHON_FS_URL = function () {
    try {
      const explicit = localStorage.getItem('c2:fsUrl');
      if (explicit) return explicit;
    } catch {}
    const api = window.SIPHON_API_URL();
    if (/\/api\/?$/.test(api)) return api.replace(/\/api\/?$/, '/fs');
    try {
      const u = new URL(api);
      if (u.port === '8080') { u.port = '8081'; return u.origin; }
    } catch {}
    return 'http://127.0.0.1:8081';
  };

  window.SIPHON_LAUNCHER_URL = function () {
    try {
      const v = localStorage.getItem('c2:launcherUrl');
      if (v) return v;
    } catch {}
    return 'http://127.0.0.1:8090';
  };

  window.SIPHON_API_KEY = function () {
    try { return localStorage.getItem('c2:apiKey') || null; }
    catch { return null; }
  };

  window.siphonAuthHeaders = function () {
    const k = window.SIPHON_API_KEY();
    return k ? { 'Authorization': 'Bearer ' + k } : {};
  };

  // Thin fetch wrapper — attaches Authorization when a key is saved.
  // Safe against any URL; pods ignore the header when SIPHON_API_KEY
  // isn't set. LocalLauncherPanel / direct-to-launcher code paths
  // deliberately stick with plain fetch (no auth on loopback).
  window.siphonFetch = function (url, options) {
    const opts = options || {};
    opts.headers = { ...(opts.headers || {}), ...window.siphonAuthHeaders() };
    return fetch(url, opts);
  };

  // ─── Pod registry ───────────────────────────────────────────────
  // Flat list of {url, label, role?, disabled?} persisted in
  // localStorage[c2:pods]. Both consoles fan out across this list.
  // Seeded on first read from SIPHON_API_URL + SIPHON_FS_URL so
  // existing users keep working.
  const POD_REGISTRY_KEY = 'c2:pods';
  window.__pod_registry_listeners = window.__pod_registry_listeners || new Set();

  function __podReadRaw() {
    try { return JSON.parse(localStorage.getItem(POD_REGISTRY_KEY) || '[]'); }
    catch { return []; }
  }
  function __podWriteRaw(list) {
    try { localStorage.setItem(POD_REGISTRY_KEY, JSON.stringify(list)); } catch {}
    window.__pod_registry_listeners.forEach(fn => { try { fn(); } catch {} });
  }
  function __podNormalise(url) {
    try {
      const u = new URL((url || '').trim());
      const path = u.pathname.replace(/\/$/, '');
      return u.origin + path;
    } catch {
      return (url || '').trim().replace(/\/$/, '');
    }
  }
  function __podSeedIfEmpty() {
    const list = __podReadRaw();
    if (list.length) return;
    const seed = [
      { url: __podNormalise(window.SIPHON_API_URL()), role: 'api', label: 'primary-api', added_at: new Date().toISOString() },
      { url: __podNormalise(window.SIPHON_FS_URL()),  role: 'fs',  label: 'primary-fs',  added_at: new Date().toISOString() },
    ].filter((p, i, arr) => p.url && arr.findIndex(q => q.url === p.url) === i);
    if (seed.length) __podWriteRaw(seed);
  }

  window.c2PodAdd = function (entry) {
    const list = __podReadRaw();
    const url = __podNormalise(entry.url);
    if (!url) return false;
    if (list.some(p => p.url === url)) return false;
    list.push({
      url,
      role: entry.role || 'auto',
      label: entry.label || '',
      disabled: !!entry.disabled,
      added_at: new Date().toISOString(),
    });
    __podWriteRaw(list);
    return true;
  };
  window.c2PodRemove = function (url) {
    const norm = __podNormalise(url);
    __podWriteRaw(__podReadRaw().filter(p => p.url !== norm));
  };
  window.c2PodUpdate = function (url, patch) {
    const norm = __podNormalise(url);
    const list = __podReadRaw().map(p => p.url === norm ? { ...p, ...patch } : p);
    __podWriteRaw(list);
  };

  // ─── React hooks ────────────────────────────────────────────────
  // Wired as window.* rather than ES exports so Babel-transpiled
  // scripts in either console can just reference them as globals.

  window.usePodRegistry = function () {
    const [, setTick] = React.useState(0);
    React.useEffect(() => {
      __podSeedIfEmpty();
      const fn = () => setTick(t => t + 1);
      window.__pod_registry_listeners.add(fn);
      const onStorage = (e) => { if (e.key === POD_REGISTRY_KEY) fn(); };
      window.addEventListener('storage', onStorage);
      return () => {
        window.__pod_registry_listeners.delete(fn);
        window.removeEventListener('storage', onStorage);
      };
    }, []);
    return __podReadRaw();
  };

  // GET /<path> against the primary siphon-api (SIPHON_API_URL).
  // Returns { loading, data, error, refetch, source }.
  window.useSiphonApi = function (path, deps) {
    const [tick, setTick] = React.useState(0);
    const [state, setState] = React.useState({ loading: true, data: null, error: null });
    React.useEffect(() => {
      let cancelled = false;
      setState(s => ({ ...s, loading: true, error: null }));
      const url = window.SIPHON_API_URL().replace(/\/$/, '') + path;
      window.siphonFetch(url, { method: 'GET' })
        .then(async r => {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0, 200));
          return r.json();
        })
        .then(data => { if (!cancelled) setState({ loading: false, data, error: null }); })
        .catch(e => { if (!cancelled) setState({ loading: false, data: null, error: String(e.message || e) }); });
      return () => { cancelled = true; };
    }, [...(deps || []), tick]);
    const source = state.loading ? 'loading' : state.error ? 'offline' : 'live';
    return { ...state, source, refetch: () => setTick(t => t + 1) };
  };

  // Fan-out across every enabled pod in the registry → union findings.
  // Same shape both consoles consume.
  window.useFindingsUnion = function (qs, deps) {
    const [tick, setTick] = React.useState(0);
    const [state, setState] = React.useState({
      loading: true, data: null, error: null, perPod: [],
    });
    const rawPods = window.usePodRegistry ? window.usePodRegistry() : null;
    const pods = rawPods ? rawPods.filter(p => !p.disabled) : null;
    const effectivePods = pods !== null
      ? pods
      : [
          { url: window.SIPHON_API_URL(), role: 'api', label: 'api' },
          { url: window.SIPHON_FS_URL(),  role: 'fs',  label: 'fs'  },
        ];
    const podsKey = effectivePods.map(p => p.url).join('|');

    React.useEffect(() => {
      let cancelled = false;
      setState(s => ({ ...s, loading: true, error: null }));

      const fetchFrom = (pod) => {
        const url = pod.url.replace(/\/$/, '') + '/v1/findings' + (qs || '');
        return window.siphonFetch(url, { method: 'GET' })
          .then(async r => {
            if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0, 200));
            return r.json();
          })
          .then(data => ({ pod, ok: true, data, error: null }))
          .catch(e => ({ pod, ok: false, data: null, error: String(e.message || e) }));
      };

      Promise.all(effectivePods.map(fetchFrom)).then((results) => {
        if (cancelled) return;

        const findings = results
          .flatMap(r => (r.data && r.data.findings) || [])
          .sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));

        const m = (qs || '').match(/[?&]limit=(\d+)/);
        const limit = m ? parseInt(m[1], 10) : findings.length;
        const trimmed = findings.slice(0, limit);

        const total    = results.reduce((a, r) => a + ((r.data && r.data.total)    || 0), 0);
        const capacity = results.reduce((a, r) => a + ((r.data && r.data.capacity) || 0), 0);

        const perPod = results.map(r => ({
          url: r.pod.url, label: r.pod.label || '', role: r.pod.role || 'auto',
          ok: r.ok, error: r.error, data: r.data,
        }));
        let source;
        if (perPod.length === 0) source = 'offline';
        else if (perPod.every(p => p.ok)) source = 'live';
        else if (perPod.some(p => p.ok)) source = 'partial';
        else source = 'offline';

        setState({
          loading: false,
          data: { total, returned: trimmed.length, capacity, findings: trimmed },
          error: source === 'offline'
            ? (perPod.length === 0 ? 'no pods in registry' : (perPod[0] && perPod[0].error) || 'no pods reachable')
            : null,
          perPod,
          source,
        });
      });

      return () => { cancelled = true; };
    }, [...(deps || []), qs, tick, podsKey]);

    const source = state.loading
      ? 'loading'
      : state.source || (state.data ? 'live' : 'offline');
    return { ...state, source, refetch: () => setTick(t => t + 1) };
  };

  // ─── LivePill ────────────────────────────────────────────────────
  // Status chip rendered in page-head actions. Written with
  // React.createElement rather than JSX so this file stays loadable
  // as a plain <script> without Babel re-parsing.
  window.LivePill = function LivePill({ source, onClick, title }) {
    const map = { live:'safe', offline:'red', loading:'warn', fixture:'ghost', partial:'warn' };
    const label = { live:'LIVE', offline:'OFFLINE', loading:'LOADING…', fixture:'FIXTURE', partial:'PARTIAL' }[source] || source;
    return React.createElement(
      'span',
      {
        className: 'chip chip--' + (map[source] || 'ghost'),
        onClick: onClick,
        title: title || '',
        style: { cursor: onClick ? 'pointer' : 'default' },
      },
      label,
    );
  };
})();
</script>

// ─── Seeded RNG + demo data generator ───────────────────────────
// mulberry32 — small, good-enough, deterministic from a uint32 seed.
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = seed;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function wpick(rng, items) {
  const total = items.reduce((a, i) => a + (i.weight || 1), 0);
  let r = rng() * total;
  for (const i of items) {
    r -= (i.weight || 1);
    if (r <= 0) return i;
  }
  return items[items.length - 1];
}

function generateDemoFindings(seed) {
  const rng = mulberry32(seed);
  const n = 120; // enough for meaningful dashboard charts
  const now = Date.now();

    const confidence = 0.55 + rng() * 0.44;

               + ((rng() * 0xFFFFFFFF) >>> 0).toString(16).padStart(8, '0')

      id: 'f-demo-' + i.toString().padStart(4, '0'),
      ts,
      category: cat.cat,
      sub_category: cat.sub,
      text: cat.ex,
      confidence,
      has_context: hasContext,
      span: [rng() * 2000 | 0, 0].map((v, j) => j === 0 ? v : v + cat.ex.length),
      severity: cat.sev,
      source_pod: channel.pod,
      source_ip: channel.pod === 'siphon-fs'
        ? `report_q${(rng() * 4 | 0) + 1}_${user.id.split('@')[0]}.xlsx`
        : ip,
      request_id: 'r-' + ((rng() * 0xFFFFFF) | 0).toString(16).padStart(6, '0'),
      metadata: {
        user: user.id,
        region: user.region,
        department: user.dept,
        channel: channel.label,
        src_ip: ip,
        ...(destUrl ? { dest_url: destUrl } : {}),
        ...(channel.id.startsWith('email') ? {
          sender: user.id,
          recipient: wpick(rng, [
            { w: 'partner.vendor@external.example', weight: 2 },
            { w: 'personal@gmail.example', weight: 2 },
            { w: 'competitor.contact@rival.example', weight: 1 },
          ]).w,
        } : {}),
        content_hash: 'sha256:' + hash,
      },
    });
  }
  return findings;
}

// Seed dispositions for ~65% of findings so the dashboard has real
// numbers for MTTR / totals. Analyst pick is weighted by the analyst
// table; the analyst's 'style' nudges disposition probabilities.
function generateDemoDispositions(findings, seed) {
  const rng = mulberry32(seed ^ 0xABCDEF);
  const map = {};
  for (const f of findings) {
    if (rng() > 0.65) continue; // 35% stay open
    const analyst = wpick(rng, DEMO_ANALYSTS);
    let kindRoll = rng();
    // Style bias.
    if (analyst.style === 'escalator')   kindRoll *= 0.7;
    if (analyst.style === 'fp-heavy')    kindRoll = 0.2 + kindRoll * 0.8;
    if (analyst.style === 'event-heavy') kindRoll = 0.6 + kindRoll * 0.4;
    let kind;
    if (kindRoll < 0.35) kind = 'escalate';
    else if (kindRoll < 0.7) kind = 'event';
    else kind = 'fp';
    // Respond-time = minutes between finding.ts and triage.
    const respondMins = 2 + Math.pow(rng(), 1.5) * 240; // 2-240 min, skewed fast
    const triagedAt = new Date(new Date(f.ts).getTime() + respondMins * 60e3).toISOString();
    const record = {
      kind,
      at: triagedAt,
      by: analyst.name,
      by_id: analyst.id,
      respond_min: respondMins,
      notes: ({
        event: 'Verified with user — legitimate business activity per policy.',
        fp: 'Pattern false-fired on a public-record identifier. Submitted to detection engineering.',
        escalate: 'Confirmed TP — data exfiltration candidate. Handed off to XSOAR for remediation.',
      })[kind],
    };
    if (kind === 'escalate') {
      record.xsoar_status = 'POST 202';
      // Remediate-time = extra minutes after escalation before
      // XSOAR closes the incident (not all are closed yet).
      if (rng() > 0.3) {
        const remediateMins = 30 + Math.pow(rng(), 1.8) * 720; // 30-720 min
        record.remediated_at = new Date(new Date(triagedAt).getTime() + remediateMins * 60e3).toISOString();
        record.remediate_min = remediateMins;
      }
    }
    map[f.id] = record;
  }
  return map;
}

// React hook — findings source of truth for every IR surface. Honors
// demo mode; returns the same { loading, data, error, source,
// perPod, refetch } contract as window.useFindingsUnion so surfaces
// don't care which backend is live.
window.useIrFindings = function (qs) {
  const [mode, setMode] = React.useState(isDemoMode);
  const [seed, setSeed] = React.useState(readDemoSeed);
  const [tick, setTick] = React.useState(0);

  React.useEffect(() => {
    const sync = () => { setMode(isDemoMode()); setSeed(readDemoSeed()); };
    window.addEventListener('ir:demoChanged', sync);
    const onStorage = (e) => {
      if (e.key === IR_DEMO_MODE_KEY || e.key === IR_DEMO_SEED_KEY) sync();
    };
    window.addEventListener('storage', onStorage);
    return () => {
      window.removeEventListener('ir:demoChanged', sync);
      window.removeEventListener('storage', onStorage);
    };
  }, []);

  const live = window.useFindingsUnion(qs, [mode, seed, tick]);

  if (!mode) return live;

  const demoFindings = generateDemoFindings(seed);
  const m = (qs || '').match(/[?&]limit=(\d+)/);
  const limit = m ? parseInt(m[1], 10) : demoFindings.length;
  const findings = demoFindings
    .slice()
    .sort((a, b) => (b.ts || '').localeCompare(a.ts || ''))
    .slice(0, limit);
  return {
    loading: false,
    data: { total: demoFindings.length, returned: findings.length, capacity: 1000, findings },
    error: null,
    source: 'fixture',
    perPod: [{ url: 'demo://seeded', label: 'demo', role: 'demo', ok: true, data: null, error: null }],
    refetch: () => setTick(t => t + 1),
  };
};

const SEVERITY_RANK = { critical: 4, high: 3, medium: 2, low: 1, info: 0 };
function severityChip(sev) {
  const cls = {
    critical: 'red', high: 'red', medium: 'amber',
    low: 'warn', info: 'ghost',
  }[sev] || 'ghost';
  return <span className={`chip chip--${cls}`} style={{fontSize:10}}>{sev || 'info'}</span>;
}

// Derive Who / What / Where / When / Why from whatever the finding
// carries. siphon-fs findings smuggle the filename through
// `source_ip`; siphon-api findings carry the real caller IP. Channel
// can be inferred from pod kind. Rich metadata (actor, email subject,
// etc.) isn't captured today — left as 'unknown' so the analyst
// annotates in the notes field.
function deriveContext(f) {
  const md = f.metadata || {};
  const pod = f.source_pod || '';
  const isFile = pod === 'siphon-fs' || md.filename;
  const who =
    md.actor || md.user || md.sender ||
    (isFile
      ? (f.source_ip && f.source_ip !== '<anon-upload>' ? `uploader of ${f.source_ip}` : 'anonymous upload')
      : (f.source_ip || 'unknown'));
  const what = `${f.category || '—'}${f.sub_category ? ' / ' + f.sub_category : ''}`;
  const where =
    md.channel || md.source_type ||
    (isFile ? 'file upload (siphon-fs)'
            : pod === 'siphon-api' ? 'API submission (siphon-api)'
            : pod ? `pod: ${pod}` : 'unknown channel');
  const when = f.ts || 'unknown';
  const why =
    (f.confidence != null ? `confidence ${f.confidence.toFixed(2)}` : 'no confidence')
    + (f.has_context ? ' · keyword-context confirmed'
                     : f.confidence != null ? ' · no context keyword nearby' : '')
    + (md.list_matched ? ` · match-list "${md.list_matched}" (${md.list_action || '—'})` : '')
    + (md.unique_count_breach ? ` · unique-count breach` : '');
  return { who, what, where, when, why, isFile, filename: md.filename || (isFile ? f.source_ip : null) };
}

function FindingsQueue() {
  const [filters, setFilters] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ir:queueFilters') || '{}') || {}; }
    catch { return {}; }
  });
  const [limit, setLimit] = React.useState(() => {
    try { return parseInt(localStorage.getItem('ir:queueLimit') || '100', 10); }
    catch { return 100; }
  });
  const [expanded, setExpanded] = React.useState(null);
  const [dispo, setDispo] = React.useState(readDispo);
  const [notesDraft, setNotesDraft] = React.useState({});
  const [xsoarFor, setXsoarFor] = React.useState(null); // finding being escalated
  const [flash, setFlash] = React.useState(null);

  React.useEffect(() => {
    try { localStorage.setItem('ir:queueFilters', JSON.stringify(filters)); } catch {}
  }, [filters]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:queueLimit', String(limit)); } catch {}
  }, [limit]);
  // Re-read dispositions when demo mode flips so the row chips flip
  // between the real and seeded stores without a reload.
  React.useEffect(() => {
    const resync = () => setDispo(readDispo());
    window.addEventListener('ir:demoChanged', resync);
    window.addEventListener('storage', resync);
    return () => {
      window.removeEventListener('ir:demoChanged', resync);
      window.removeEventListener('storage', resync);
    };
  }, []);

  const findings = window.useIrFindings('?limit=' + limit);
  const all = (findings.data && findings.data.findings) || [];

  const categories = React.useMemo(
    () => Array.from(new Set(all.map(f => f.category).filter(Boolean))).sort(),
    [all]
  );
  const pods = React.useMemo(
    () => Array.from(new Set(all.map(f => f.source_pod).filter(Boolean))).sort(),
    [all]
  );

  const filtered = React.useMemo(() => {
    const s = (filters.search || '').toLowerCase();
    return all.filter(f => {
      if (filters.severity && filters.severity !== 'all' && f.severity !== filters.severity) return false;
      if (filters.category && filters.category !== 'all' && f.category !== filters.category) return false;
      if (filters.pod && filters.pod !== 'all' && f.source_pod !== filters.pod) return false;
      if (s && !(f.text || '').toLowerCase().includes(s)
          && !(f.category || '').toLowerCase().includes(s)
          && !(f.sub_category || '').toLowerCase().includes(s)) return false;
      const d = dispo[f.id];
      if (filters.state === 'open' && d) return false;
      if (filters.state === 'hide-event' && d && d.kind === 'event') return false;
      if (filters.state === 'hide-fp' && d && d.kind === 'fp') return false;
      if (filters.state === 'only-escalated' && (!d || d.kind !== 'escalate')) return false;
      return true;
    }).sort((a, b) => {
      const sa = SEVERITY_RANK[a.severity] || 0;
      const sb = SEVERITY_RANK[b.severity] || 0;
      if (sa !== sb) return sb - sa;
      return (b.ts || '').localeCompare(a.ts || '');
    });
  }, [all, filters, dispo]);

  // Record a disposition. Always stamps who/when + carries the
  // analyst's note (pulled from notesDraft[id]). FP dispositions also
  // fan out to the shared FP queue the admin console watches.
  const dispose = (finding, kind, extra) => {
    const note = (notesDraft[finding.id] || '').trim();
    const record = {
      kind,
      at: new Date().toISOString(),
      by: 'local-analyst',
      notes: note || null,
      ...extra,
    };
    const next = { ...dispo, [finding.id]: record };
    setDispo(next);
    writeDispo(next);

    if (kind === 'fp' && !isDemoMode()) {
      // Append to the cross-console FP queue so detection engineering
      // (admin console → Engineering → FP Queue) can triage. Skipped
      // in demo mode so seeded data doesn't contaminate the real
      // admin-side queue.
      const queue = readFpQueue();
      // Dedup by finding id — re-submitting overwrites the note + ts
      // rather than stacking duplicates.
      const existing = queue.findIndex(x => x.finding_id === finding.id);
      const entry = {
        finding_id: finding.id,
        category: finding.category,
        sub_category: finding.sub_category,
        text: finding.text,
        confidence: finding.confidence,
        severity: finding.severity,
        source_pod: finding.source_pod,
        submitted_at: record.at,
        submitted_by: record.by,
        notes: note,
        // Full finding for future rescanning / pattern-tuning context.
        finding,
      };
      if (existing >= 0) queue[existing] = entry;
      else queue.push(entry);
      writeFpQueue(queue);
    }

    setFlash({ id: finding.id, label: DISPO[kind].label });
    setTimeout(() => setFlash(null), 1800);
    setNotesDraft(d => { const c = { ...d }; delete c[finding.id]; return c; });
  };

  const clearDispo = (finding) => {
    const next = { ...dispo };
    delete next[finding.id];
    setDispo(next);
    writeDispo(next);
    // If this was an FP, remove from the cross-console queue too.
    const q = readFpQueue().filter(x => x.finding_id !== finding.id);
    writeFpQueue(q);
  };

  const counts = React.useMemo(() => {
    const c = { open: 0, event: 0, fp: 0, escalate: 0 };
    for (const f of all) {
      const d = dispo[f.id];
      if (!d) c.open += 1;
      else if (c[d.kind] != null) c[d.kind] += 1;
    }
    return c;
  }, [all, dispo]);

  const fmtTs = (ts) => ts ? ts.replace('T', ' ').replace('Z', '').slice(0, 19) : '—';

  return (
    <div style={{padding:'var(--gap)'}}>
      <div className="box">
        <div className="box-title">
          <span className="t">Findings Queue</span>
          <span className="k" style={{display:'flex', alignItems:'center', gap:8}}>
            <window.LivePill source={findings.source} onClick={findings.refetch}
                             title="click to refetch across all pods" />
            <span className="mono" style={{fontSize:11}}>
              {filtered.length} shown · {all.length} loaded
              {findings.data && findings.data.total > all.length ? ` · ${findings.data.total} in ring` : ''}
            </span>
          </span>
        </div>

        {/* triage summary chips */}
        <div style={{padding:'10px 14px', display:'flex', gap:8, flexWrap:'wrap', borderBottom:'1px solid var(--line-soft)', alignItems:'center'}}>
          <span className="muted mono" style={{fontSize:11, marginRight:4}}>queue:</span>
          <span className="chip chip--red" style={{fontSize:10, cursor:'pointer'}}
                onClick={() => setFilters({...filters, state: filters.state === 'open' ? 'all' : 'open'})}
                title="show only not-yet-triaged findings">
            {counts.open} open
          </span>
          <span className="chip chip--warn" style={{fontSize:10, cursor:'pointer'}}
                onClick={() => setFilters({...filters, state: filters.state === 'only-escalated' ? 'all' : 'only-escalated'})}
                title="show only findings escalated to XSOAR">
            {counts.escalate} escalated
          </span>
          <span className="chip chip--safe" style={{fontSize:10}}>{counts.event} closed-events</span>
          <span className="chip chip--ghost" style={{fontSize:10}}>{counts.fp} fp-submitted</span>
          {findings.perPod && findings.perPod.length > 0 && (
            <span className="muted mono" style={{fontSize:10.5, marginLeft:'auto'}}>
              {findings.perPod.filter(p => p.ok).length}/{findings.perPod.length} pods reachable
            </span>
          )}
        </div>

        {/* filter controls */}
        <div style={{padding:'10px 14px', display:'flex', gap:8, flexWrap:'wrap', alignItems:'center', borderBottom:'1px solid var(--line-soft)'}}>
          <input
            value={filters.search || ''}
            onChange={e => setFilters({...filters, search: e.target.value})}
            placeholder="search text · category · sub-category"
            className="mono"
            style={{
              flex:'1 1 240px', fontSize:12,
              padding:'6px 10px', background:'var(--bg-1)', color:'var(--ink)',
              border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
            }}
          />
          <select value={filters.severity || 'all'}
                  onChange={e => setFilters({...filters, severity: e.target.value})}
                  style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}>
            <option value="all">any severity</option>
            <option value="critical">critical</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
            <option value="info">info</option>
          </select>
          <select value={filters.category || 'all'}
                  onChange={e => setFilters({...filters, category: e.target.value})}
                  style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', maxWidth:180}}>
            <option value="all">any category</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          {pods.length > 1 && (
            <select value={filters.pod || 'all'}
                    onChange={e => setFilters({...filters, pod: e.target.value})}
                    style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}>
              <option value="all">any pod</option>
              {pods.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          )}
          <select value={filters.state || 'all'}
                  onChange={e => setFilters({...filters, state: e.target.value})}
                  style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}>
            <option value="all">all triage states</option>
            <option value="open">only open</option>
            <option value="only-escalated">only escalated</option>
            <option value="hide-event">hide closed-events</option>
            <option value="hide-fp">hide fp-submitted</option>
          </select>
          <select value={limit}
                  onChange={e => setLimit(parseInt(e.target.value, 10))}
                  style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}
                  title="how many findings to pull from each pod">
            <option value={50}>50 per pod</option>
            <option value={100}>100 per pod</option>
            <option value={500}>500 per pod</option>
            <option value={1000}>1000 per pod</option>
          </select>
          <button className="btn ghost" onClick={() => setFilters({})}

        {/* table */}

            <b>Error:</b> {findings.error}

        {!findings.loading && !findings.error && filtered.length === 0 && (
          <div className="muted mono" style={{padding:30, textAlign:'center', fontSize:12}}>
            — no findings match the current filter —
            {all.length > 0 && (
              <><br/><br/>
              <a style={{color:'var(--accent)', cursor:'pointer'}}

                </span>
                <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--accent)'}}

                </span>
                <span style={{color: f.confidence >= 0.9 ? 'var(--safe)'
                                    : f.confidence >= 0.7 ? 'var(--amber)'
                                    : 'var(--ink-soft)'}}>
                  {f.confidence != null ? f.confidence.toFixed(2) : '—'}
                </span>

                    <>
                      <span className={`chip chip--${DISPO[d.kind].chip}`}
                            title={`${DISPO[d.kind].label}${d.notes ? '\n\n' + d.notes : ''}`}
                            style={{fontSize:9}}>{DISPO[d.kind].short}</span>
                      <button className="btn ghost" onClick={(e) => { e.stopPropagation(); clearDispo(f); }}
                              title="undo disposition"

                    </>
                  )}
                  {flash && flash.id === f.id && (
                    <span className="mono" style={{fontSize:10, color:'var(--safe)'}}>
                      ✓
                    </span>
                  )}
                </span>
              </div>

          );
        })}
      </div>
    </div>
  );
}

function FindingDetail({ id, back }) {
  // All hooks up front — React requires consistent hook order across
  // renders, and the "finding not found" early return below comes
  // AFTER them.
  const findings = window.useIrFindings('?limit=500');
  const [dispo, setDispo] = React.useState(readDispo);
  const [notesDraft, setNotesDraft] = React.useState('');
  const [xsoarFor, setXsoarFor] = React.useState(null);
  const [flash, setFlash] = React.useState(null);

  const all = (findings.data && findings.data.findings) || [];
  const f = all.find(x => x.id === id);

  // Prev / next. Must compute before the keyboard useEffect so the
  // closure captures the right neighbours; guarded on `f` being
  // loaded.
  const idx = f ? all.findIndex(x => x.id === id) : -1;
  const prev = idx > 0 ? all[idx - 1] : null;
  const next = idx >= 0 && idx < all.length - 1 ? all[idx + 1] : null;

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if ((e.key === 'j' || e.key === 'ArrowDown' || e.key === 'ArrowRight') && next) {
        window.__ir_goFinding && window.__ir_goFinding(next.id);
      } else if ((e.key === 'k' || e.key === 'ArrowUp' || e.key === 'ArrowLeft') && prev) {
        window.__ir_goFinding && window.__ir_goFinding(prev.id);
      } else if (e.key === 'Escape') {
        back && back();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [prev, next, back]);

  React.useEffect(() => {
    const resync = () => setDispo(readDispo());
    window.addEventListener('ir:demoChanged', resync);
    window.addEventListener('storage', resync);
    return () => {
      window.removeEventListener('ir:demoChanged', resync);
      window.removeEventListener('storage', resync);
    };
  }, []);

  // Reset the notes textarea when the analyst jumps to a different
  // finding — otherwise the draft leaks across investigations.
  React.useEffect(() => { setNotesDraft(''); }, [id]);

  if (!findings.loading && !f) {
    return (
      <div>
        <IrPageBar
          crumbs={['Respond', 'Findings', id]}
          title="Finding not found"
          subtitle="Not in the live ring or the demo seed."
          actions={<button className="btn ghost" onClick={back}>‹ Back to queue</button>}
        />
        <div className="note" style={{borderColor:'var(--amber)', color:'var(--amber)', background:'var(--amber-wash)', margin:'var(--gap)'}}>
          Ring size is bounded ({findings.data ? findings.data.capacity : '—'}).
          Older findings fall off as new ones arrive. Toggle demo data under
          Settings → Engineering to populate a stable set.
        </div>
      </div>
    );
  }
  if (!f) {
    return <div className="muted" style={{padding:30, textAlign:'center'}}>loading…</div>;
  }

  const ctx = deriveContext(f);
  const d = dispo[f.id];

  const fmtTs = (ts) => ts ? ts.replace('T', ' ').replace('Z', '').slice(0, 19) : '—';

  const dispose = (kind, extra) => {
    const note = notesDraft.trim() || (d && d.notes) || '';
    const record = {
      kind, at: new Date().toISOString(), by: 'local-analyst',
      notes: note || null, ...extra,
    };
    const nextMap = { ...dispo, [f.id]: record };
    setDispo(nextMap);
    writeDispo(nextMap);
    if (kind === 'fp' && !isDemoMode()) {
      const queue = readFpQueue();
      const existing = queue.findIndex(x => x.finding_id === f.id);
      const entry = {
        finding_id: f.id,
        category: f.category,
        sub_category: f.sub_category,
        text: f.text,
        confidence: f.confidence,
        severity: f.severity,
        source_pod: f.source_pod,
        submitted_at: record.at,
        submitted_by: record.by,
        notes: note,
        finding: f,
      };
      if (existing >= 0) queue[existing] = entry;
      else queue.push(entry);
      writeFpQueue(queue);
    }
    setFlash(DISPO[kind].label);
    setTimeout(() => setFlash(null), 1500);
  };

  const undoDispose = () => {
    const nextMap = { ...dispo };
    delete nextMap[f.id];
    setDispo(nextMap);
    writeDispo(nextMap);
    writeFpQueue(readFpQueue().filter(x => x.finding_id !== f.id));
  };

  return (
    <div>
      <IrPageBar
        crumbs={['Respond', 'Findings', f.id]}
        title={<>
          <span className="mono" style={{color:'var(--ink-bright)'}}>{f.id}</span>
          <span className="muted" style={{margin:'0 8px', fontSize:14}}>·</span>
          <span style={{fontFamily:"'Space Grotesk', sans-serif"}}>{f.category}</span>
          {f.sub_category && <span className="muted" style={{marginLeft:6, fontSize:14}}>/ {f.sub_category}</span>}
          <span style={{marginLeft:10}}>{severityChip(f.severity)}</span>
        </>}
        subtitle={<>
          <span className="mono">source {f.source_ip || '—'}</span>
          <span className="muted"> · req </span>
          <span className="mono">{(f.request_id || '').split('-')[0] || '—'}</span>
          <span className="muted"> · </span>
          <span className="mono">{fmtTs(f.ts)}</span>
          {idx >= 0 && (<>
            <span className="muted"> · </span>
            <span className="mono">{idx + 1} of {all.length}</span>
          </>)}
          <span className="muted"> · keyboard </span>
          <span className="mono" style={{color:'var(--ink-bright)'}}>j</span><span className="muted">/</span><span className="mono" style={{color:'var(--ink-bright)'}}>k</span>
          <span className="muted"> to jump · </span>
          <span className="mono" style={{color:'var(--ink-bright)'}}>esc</span>
          <span className="muted"> to close</span>
        </>}
        actions={<>
          <window.LivePill source={findings.source} onClick={findings.refetch} />
          <div style={{display:'flex', gap:2, border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', overflow:'hidden'}}>
            <button className="btn ghost" disabled={!prev}
                    onClick={() => prev && window.__ir_goFinding(prev.id)}
                    title={prev ? `prev · ${prev.id}` : 'no newer finding'}
                    style={{border:'none', borderRight:'1px solid var(--line-strong)', padding:'5px 10px', opacity: prev ? 1 : 0.4, cursor: prev ? 'pointer' : 'not-allowed'}}>
              ‹ Prev
            </button>
            <button className="btn ghost" disabled={!next}
                    onClick={() => next && window.__ir_goFinding(next.id)}
                    title={next ? `next · ${next.id}` : 'no older finding'}
                    style={{border:'none', padding:'5px 10px', opacity: next ? 1 : 0.4, cursor: next ? 'pointer' : 'not-allowed'}}>
              Next ›
            </button>
          </div>
          <button className="btn ghost" onClick={back} title="esc">‹ Back</button>
          {/* Three dispositions as primary actions — the whole reason
              this surface exists. */}
          <button className="btn" onClick={() => dispose('event')}
                  title="benign activity · close the event">
            ✓ Close event
          </button>
          <button className="btn ghost" onClick={() => dispose('fp')}
                  title="submit to the admin-console FP queue"
                  style={{color:'var(--ink-soft)'}}>
            ⚑ False positive
          </button>
          <button className="btn primary" onClick={() => setXsoarFor(f)}
                  title="escalate to XSOAR (configure webhook in Settings → Integrations)"
                  style={{background:'var(--amber)', borderColor:'var(--amber)', color:'#000'}}>
            ↗ Escalate
          </button>
        </>}
      />

      {/* Disposition banner — reflects whatever's already on this
          finding, including history across reloads. */}
      {d && (
        <div className="note" style={{
          margin:'var(--gap) var(--gap) 0 var(--gap)', fontSize:12,
          borderColor: d.kind === 'escalate' ? 'var(--amber)' : 'var(--line-strong)',
          background: 'var(--bg-2)', color: 'var(--ink)',
        }}>
          <b>{DISPO[d.kind].label}</b>
          <span className="muted"> · {d.at.slice(0, 19).replace('T',' ')} · {d.by || 'analyst'}</span>
          {d.kind === 'escalate' && d.xsoar_status && <> · <span className="mono">{d.xsoar_status}</span></>}
          {d.notes && <div style={{marginTop:4, whiteSpace:'pre-wrap', fontSize:11.5}}>{d.notes}</div>}
          <button className="btn ghost" onClick={undoDispose}
                  style={{marginLeft:12, fontSize:10, padding:'3px 8px'}}>↶ undo</button>
        </div>
      )}
      {flash && (
        <div className="note" style={{
          margin:'var(--gap) var(--gap) 0 var(--gap)', fontSize:12,
          borderColor:'var(--safe)', background:'var(--accent-wash)', color:'var(--ink)',
        }}>
          ✓ {flash}
        </div>
      )}

      {/* 5W+H grid — 2 cols × 3 rows. Each panel is a stub this
          commit; subsequent commits replace them one pair at a
          time with real panels (lifted from c2 or built here). */}
      <div style={{
        display:'grid',
        gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)',
        gap:'var(--gap)',
        padding:'var(--gap)',
        alignItems:'stretch',
      }}>
        <PanelStub title="Who" question="Who triggered this?">
          <div className="muted" style={{fontSize:11.5}}>From metadata + source fields:</div>
          <div style={{marginTop:6, fontSize:13, color:'var(--ink-bright)'}}>{ctx.who}</div>
          <div className="muted" style={{fontSize:11, marginTop:14, lineHeight:1.7}}>
            Full panel (next commit): user / sender / recipient rows, region + department chips,
            same-user findings pivot (count + jump), same-source-IP neighbours.
          </div>
        </PanelStub>

        <PanelStub title="What" question="What data was exposed?">
          <div className="muted" style={{fontSize:11.5}}>Matched value:</div>
          <div className="mono" style={{
            marginTop:6, fontSize:13, padding:'8px 10px',
            background:'var(--amber-wash)', border:'1.5px solid var(--amber)',
            borderRadius:2, wordBreak:'break-all',
          }}>{f.text || '—'}</div>
          <div className="muted" style={{fontSize:11, marginTop:14, lineHeight:1.7}}>
            Full panel (next commit): category tree + link to Patterns, confidence bar, has-context
            chip, span offset visualisation, raw-metadata mini table.
          </div>
        </PanelStub>

        <PanelStub title="Where" question="Where did this happen?">
          <div className="muted" style={{fontSize:11.5}}>Channel:</div>
          <div style={{marginTop:6, fontSize:13}}>{ctx.where}</div>
          {ctx.filename && <div style={{fontSize:12, marginTop:4}}>File: <span className="mono">{ctx.filename}</span></div>}
          <div className="muted" style={{fontSize:11, marginTop:14, lineHeight:1.7}}>
            Full panel (commit 3): source → destination diagram (IP + URL for network channels,
            sender → recipient for email), pod the detection came from, full filesystem path.
          </div>
        </PanelStub>

        <PanelStub title="When" question="When? And what else was happening?">
          <div className="muted" style={{fontSize:11.5}}>Detection time:</div>
          <div className="mono" style={{marginTop:6, fontSize:13}}>{fmtTs(f.ts)}</div>
          <div className="muted" style={{fontSize:11, marginTop:14, lineHeight:1.7}}>
            Full panel (commit 3): same-request neighbours with severity + preview text,
            same-user 24-hour timeline, detection-to-triage latency if already triaged.
          </div>
        </PanelStub>

        <PanelStub title="Why" question="Why did detection fire?">
          <div className="muted" style={{fontSize:11.5}}>Signal summary:</div>
          <div style={{marginTop:6, fontSize:12, lineHeight:1.6}}>{ctx.why}</div>
          <div className="muted" style={{fontSize:11, marginTop:14, lineHeight:1.7}}>
            Full panel (commit 4): pattern (category/sub) with link to Patterns browser, policy that
            fired, detection-pipeline narrative (regex → validation → context → emit),
            list-binding match if applicable, runtime overrides that were applied.
          </div>
        </PanelStub>

        <PanelStub title="How" question="How should we respond?">
          <div className="muted" style={{fontSize:11.5}}>Options:</div>
          <ul style={{marginTop:6, fontSize:12, lineHeight:1.7, paddingLeft:18}}>
            <li><b>Close event</b> — benign business activity handled per policy</li>
            <li><b>False positive</b> — submit to admin FP queue for pattern tuning</li>
            <li><b>Escalate</b> — hand off to XSOAR for remediation playbooks</li>
          </ul>
          <div className="muted" style={{fontSize:11, marginTop:14, lineHeight:1.7}}>
            Full panel (commit 4): suggested playbook (Phase C), related-user incident history,
            prior disposition stats, quick-ack + quick-escalate shortcuts.
          </div>
        </PanelStub>
      </div>

      {/* Investigator notes — writes on the next disposition click. */}
      <div style={{padding:'0 var(--gap) var(--gap) var(--gap)'}}>
        <div className="box">
          <div className="box-title">
            <span className="t">Investigator notes</span>
            <span className="k muted">saved with the disposition record</span>
          </div>
          <div style={{padding:14}}>
            <textarea
              value={notesDraft || (d && d.notes) || ''}
              onChange={e => setNotesDraft(e.target.value)}
              placeholder="TP or FP? What did you verify? Who did you contact? What was the business context?"
              rows={4}
              className="mono"
              style={{
                width:'100%', boxSizing:'border-box', fontSize:12,
                padding:'8px 10px', background:'var(--bg-2)', color:'var(--ink)',
                border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                resize:'vertical',
              }}
            />
            <div className="muted" style={{fontSize:10.5, marginTop:6}}>
              Notes are persisted when you pick a disposition (Close event / False positive / Escalate).
              Current draft stays local to this finding — switching to another row clears it.
            </div>
          </div>
        </div>
      </div>

      {/* Raw record — collapsed by default so it doesn't compete with
          the 5W+H view, but one click away for analysts who want the
          unpretty view. */}
      <div style={{padding:'0 var(--gap) var(--gap) var(--gap)'}}>
        <details className="box">
          <summary style={{padding:'10px 14px', cursor:'pointer', fontFamily:"'Space Grotesk', sans-serif", fontWeight:600, fontSize:13, color:'var(--ink-bright)'}}>
            Raw finding record
          </summary>
          <div style={{padding:'0 14px 14px 14px'}}>
            <div className="kv" style={{marginTop:4}}>
              <span className="k">Finding id</span>   <span className="v mono">{f.id}</span>
              <span className="k">Request id</span>   <span className="v mono">{f.request_id || '—'}</span>
              <span className="k">Timestamp</span>    <span className="v mono">{f.ts}</span>
              <span className="k">Source IP</span>    <span className="v mono">{f.source_ip || '—'}</span>
              <span className="k">Source pod</span>   <span className="v mono">{f.source_pod || '—'}</span>
              <span className="k">Category</span>     <span className="v">{f.category}</span>
              <span className="k">Sub-category</span> <span className="v">{f.sub_category || '—'}</span>
              <span className="k">Confidence</span>   <span className="v mono">{f.confidence != null ? f.confidence.toFixed(3) : '—'}</span>
              <span className="k">Has context</span>  <span className="v">{f.has_context ? 'yes' : 'no'}</span>
              <span className="k">Span</span>         <span className="v mono">{f.span ? f.span.join('..') : '—'}</span>
              <span className="k">Severity</span>     <span className="v">{f.severity}</span>
            </div>
            {f.metadata && Object.keys(f.metadata).length > 0 && (
              <>
                <div className="label" style={{marginTop:14, marginBottom:6}}>Metadata</div>
                <div className="mono" style={{fontSize:11, lineHeight:1.8, background:'var(--bg-1)', padding:10, border:'1px dashed var(--line-soft)'}}>
                  {Object.entries(f.metadata).map(([k, v]) => (
                    <div key={k}><span style={{color:'var(--accent)'}}>{k}</span> = <span style={{color:'var(--ink-bright)'}}>{String(v)}</span></div>
                  ))}
                </div>
              </>
            )}
            <div style={{marginTop:12, display:'flex', gap:8, flexWrap:'wrap'}}>
              <button className="btn ghost" onClick={() => {
                navigator.clipboard?.writeText(JSON.stringify(f, null, 2));
                setFlash('Copied JSON');
                setTimeout(() => setFlash(null), 1200);
              }} style={{fontSize:11}}>⎘ Copy JSON</button>
              <a className="btn ghost"
                 href={`siphon-c2.html#patterns/${encodeURIComponent(f.category)}/${encodeURIComponent(f.sub_category || '')}`}
                 target="_blank" rel="noopener"
                 title="jump to the admin console to tune this pattern"
                 style={{fontSize:11, textDecoration:'none'}}>
                ↗ Tune detection
              </a>
            </div>
          </div>
        </details>
      </div>

      {/* XSOAR escalate modal — consumes notesDraft so the payload
          carries whatever the analyst typed. */}
      {xsoarFor && (
        <XsoarEscalateModal
          finding={xsoarFor}
          note={notesDraft || (d && d.notes) || ''}
          onClose={() => setXsoarFor(null)}
          onDone={(statusText) => {
            dispose('escalate', { xsoar_status: statusText });
            setXsoarFor(null);
          }}
        />
      )}
    </div>
  );
}

// ─── XSOAR escalate modal ───────────────────────────────────────
// Builds a JSON payload from the finding + investigator notes and
// lets the analyst send it to the XSOAR webhook configured under
// Settings → Integrations, or copy it for manual submission. Send
// failures annotate the disposition but don't block it — the
// analyst may have already handed off by other means.
function XsoarEscalateModal({ finding, note, onClose, onDone }) {
  const [cfg] = React.useState(readXsoarCfg);
  const [sending, setSending] = React.useState(false);
  const [sendErr, setSendErr] = React.useState(null);
  const [sendOk, setSendOk] = React.useState(null);

  const payload = React.useMemo(() => ({
    source: 'siphon-ir',
    submitted_at: new Date().toISOString(),
    submitted_by: 'local-analyst',
    investigator_notes: note || null,
    finding: {
      id: finding.id,
      ts: finding.ts,
      category: finding.category,
      sub_category: finding.sub_category,
      text: finding.text,
      confidence: finding.confidence,
      has_context: finding.has_context,
      severity: finding.severity,
      source_ip: finding.source_ip,
      source_pod: finding.source_pod,
      request_id: finding.request_id,
      span: finding.span,
      metadata: finding.metadata || {},
    },
    context: deriveContext(finding),
  }), [finding, note]);

  const copyPayload = async () => {
    try {
      await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
      setSendOk('Copied to clipboard');
      setTimeout(() => setSendOk(null), 1500);
    } catch (e) { setSendErr(String(e.message || e)); }
  };

  const sendWebhook = async () => {
    if (!cfg.webhook) return;
    setSending(true); setSendErr(null); setSendOk(null);
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (cfg.apiKey) headers['Authorization'] = cfg.authHeader === 'api-key'
        ? cfg.apiKey
        : 'Bearer ' + cfg.apiKey;
      const r = await fetch(cfg.webhook, {
        method: 'POST', headers, body: JSON.stringify(payload),
      });
      if (!r.ok) {
        const body = await r.text();
        throw new Error('HTTP ' + r.status + (body ? ': ' + body.slice(0, 200) : ''));
      }
      setSendOk('POST ' + r.status);
      setTimeout(() => onDone('POST ' + r.status), 600);
    } catch (e) {
      setSendErr(String(e.message || e));
    } finally {
      setSending(false);
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.7)',
      display:'flex', alignItems:'center', justifyContent:'center',
      zIndex:100,
    }} onClick={onClose}>
      <div className="box" style={{width:'min(820px, 90vw)', maxHeight:'90vh', overflow:'auto', margin:0}}
           onClick={e => e.stopPropagation()}>
        <div className="box-title">
          <span className="t">Escalate to XSOAR</span>
          <span className="k">
            {cfg.webhook
              ? <span className="mono" style={{fontSize:10, color:'var(--ink-soft)'}}>target: {(new URL(cfg.webhook)).host}</span>
              : <span className="chip chip--warn" style={{fontSize:9}}>no webhook configured</span>}
          </span>
        </div>
        <div style={{padding:14}}>
          {!cfg.webhook && (
            <div className="note" style={{borderColor:'var(--amber)', background:'var(--amber-wash)', color:'var(--ink)', marginBottom:12, fontSize:12}}>
              <b>XSOAR webhook not configured.</b> Set the URL + credentials under{' '}
              <a onClick={() => { onClose(); window.__ir_go && window.__ir_go('integrations'); }}
                 style={{color:'var(--accent)', cursor:'pointer'}}>Settings → Integrations</a>.
              In the meantime, copy the payload and submit via another channel.
            </div>
          )}
          <div className="label" style={{marginBottom:4}}>
            Finding · <span className="mono">{finding.id}</span>{' '}
            <span className="muted">· {finding.category}/{finding.sub_category}</span>
          </div>
          <pre style={{
            background:'var(--bg-1)', padding:10, border:'1px solid var(--line-soft)',
            borderRadius:'var(--radius)', fontSize:11, maxHeight:320, overflow:'auto',
            fontFamily:"'JetBrains Mono', monospace", whiteSpace:'pre', margin:0,
          }}>{JSON.stringify(payload, null, 2)}</pre>

          {sendErr && (
            <div className="note" style={{borderColor:'var(--red)', background:'var(--red-wash)', color:'var(--red)', fontSize:12, marginTop:10}}>
              <b>Send failed:</b> {sendErr} · disposition not recorded
            </div>
          )}
          {sendOk && (
            <div className="note" style={{borderColor:'var(--safe)', background:'var(--accent-wash)', color:'var(--ink)', fontSize:12, marginTop:10}}>
              <b>{sendOk}</b>
            </div>
          )}

          <div style={{marginTop:14, display:'flex', gap:8, flexWrap:'wrap', justifyContent:'flex-end'}}>
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            <button className="btn ghost" onClick={copyPayload}>⎘ Copy JSON</button>
            <button className="btn ghost" onClick={() => onDone('handed off manually')}
                    title="record disposition without POSTing (analyst will submit via another channel)">
              Record as escalated
            </button>
            <button className="btn primary" onClick={sendWebhook}
                    disabled={!cfg.webhook || sending}
                    style={{background:'var(--amber)', borderColor:'var(--amber)', color:'#000'}}>
              {sending ? 'Sending…' : '↗ POST to XSOAR'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Settings → Integrations ────────────────────────────────────
// Centralises the XSOAR + Splunk HEC configuration. Other IR
// surfaces read these from localStorage (ir:xsoar, ir:splunk). The
// 'Test' buttons validate the endpoint is reachable before a real
// escalation tries.
function IntegrationsSurface() {
  const [xsoar, setXsoar] = React.useState(() => ({
    webhook: '', apiKey: '', authHeader: 'bearer', ...readXsoarCfg(),
  }));
  const [splunk, setSplunk] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ir:splunk') || '{}') || { hec: '', token: '', index: 'dlp_ir' }; }
    catch { return { hec: '', token: '', index: 'dlp_ir' }; }
  });
  const [xsoarSaved, setXsoarSaved] = React.useState(false);
  const [splunkSaved, setSplunkSaved] = React.useState(false);
  const [xsoarTest, setXsoarTest] = React.useState(null);
  const [splunkTest, setSplunkTest] = React.useState(null);

  const saveXsoar = () => {
    writeXsoarCfg(xsoar);
    setXsoarSaved(true);
    setTimeout(() => setXsoarSaved(false), 1500);
  };
  const saveSplunk = () => {
    try { localStorage.setItem('ir:splunk', JSON.stringify(splunk)); } catch {}
    setSplunkSaved(true);
    setTimeout(() => setSplunkSaved(false), 1500);
  };

  const testXsoar = async () => {
    setXsoarTest({ state: 'running' });
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (xsoar.apiKey) headers['Authorization'] = xsoar.authHeader === 'api-key'
        ? xsoar.apiKey
        : 'Bearer ' + xsoar.apiKey;
      const r = await fetch(xsoar.webhook, {
        method: 'POST', headers,
        body: JSON.stringify({ source: 'siphon-ir', kind: 'test', submitted_at: new Date().toISOString() }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setXsoarTest({ state: 'ok', status: r.status });
    } catch (e) {
      setXsoarTest({ state: 'fail', error: String(e.message || e) });
    }
  };
  const testSplunk = async () => {
    setSplunkTest({ state: 'running' });
    try {
      const r = await fetch(splunk.hec, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Splunk ' + (splunk.token || ''),
        },
        body: JSON.stringify({
          event: { source: 'siphon-ir', kind: 'test', ts: new Date().toISOString() },
          sourcetype: 'siphon:ir:test',
          index: splunk.index || 'main',
        }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setSplunkTest({ state: 'ok', status: r.status });
    } catch (e) {
      setSplunkTest({ state: 'fail', error: String(e.message || e) });
    }
  };

  const fieldStyle = {
    flex:1, minWidth:280, fontFamily:"'JetBrains Mono', monospace", fontSize:12,
    padding:'6px 10px', background:'var(--bg-1)', color:'var(--ink)',
    border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
  };

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      {/* ── XSOAR ───────────────────────────────────────────────── */}
      <div className="box">
        <div className="box-title">
          <span className="t">XSOAR · SOAR / remediation pipeline</span>
          <span className="k">
            {xsoar.webhook ? <span className="chip chip--safe" style={{fontSize:9}}>configured</span>
                           : <span className="chip chip--ghost" style={{fontSize:9}}>not configured</span>}
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:10, fontSize:12}}>
          <div className="muted" style={{fontSize:11.5, lineHeight:1.6}}>
            Webhook endpoint XSOAR listens on (Cortex XSOAR playbook trigger, or a generic webhook
            that feeds into your playbook engine). Escalate actions POST the finding + 5W context +
            investigator notes as JSON.
          </div>
          <div>
            <div className="label" style={{marginBottom:4}}>Webhook URL</div>
            <input type="text" value={xsoar.webhook}
                   onChange={e => setXsoar({ ...xsoar, webhook: e.target.value })}
                   placeholder="https://xsoar.example.com/instance/execute/siphon_ir_webhook"
                   style={fieldStyle} />
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <div style={{flex:2, minWidth:280}}>
              <div className="label" style={{marginBottom:4}}>API key / token</div>
              <input type="password" value={xsoar.apiKey}
                     onChange={e => setXsoar({ ...xsoar, apiKey: e.target.value })}
                     placeholder="bearer token or raw api-key"
                     style={fieldStyle} autoComplete="off" />
            </div>
            <div style={{flex:1, minWidth:160}}>
              <div className="label" style={{marginBottom:4}}>Auth header</div>
              <select value={xsoar.authHeader}
                      onChange={e => setXsoar({ ...xsoar, authHeader: e.target.value })}
                      style={{...fieldStyle, width:'100%'}}>
                <option value="bearer">Authorization: Bearer …</option>
                <option value="api-key">Authorization: &lt;key&gt;</option>
              </select>
            </div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
            <button className="btn" onClick={saveXsoar}>{xsoarSaved ? 'Saved' : 'Save'}</button>
            <button className="btn ghost" onClick={testXsoar}
                    disabled={!xsoar.webhook || (xsoarTest && xsoarTest.state === 'running')}>
              {xsoarTest && xsoarTest.state === 'running' ? 'Testing…' : 'Send test event'}
            </button>
            {xsoarTest && xsoarTest.state === 'ok' && (
              <span className="chip chip--safe" style={{fontSize:10}}>test OK · {xsoarTest.status}</span>
            )}
            {xsoarTest && xsoarTest.state === 'fail' && (
              <span className="chip chip--red" style={{fontSize:10}} title={xsoarTest.error}>
                test failed: {xsoarTest.error.slice(0, 80)}
              </span>
            )}
          </div>
        </div>
      </div>

      {/* ── Splunk HEC ──────────────────────────────────────────── */}
      <div className="box">
        <div className="box-title">
          <span className="t">Splunk HEC · event forwarder</span>
          <span className="k">
            {splunk.hec ? <span className="chip chip--safe" style={{fontSize:9}}>configured</span>
                        : <span className="chip chip--ghost" style={{fontSize:9}}>not configured</span>}
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:10, fontSize:12}}>
          <div className="muted" style={{fontSize:11.5, lineHeight:1.6}}>
            When configured, every analyst disposition (Close Event / Mark FP / Escalate) mirrors
            into Splunk via HEC for reporting + long-term audit. Complements the admin console's
            SIEM forwarders (which stream detections); this stream carries the triage outcomes.
          </div>
          <div>
            <div className="label" style={{marginBottom:4}}>HEC URL</div>
            <input type="text" value={splunk.hec}
                   onChange={e => setSplunk({ ...splunk, hec: e.target.value })}
                   placeholder="https://splunk.example.com:8088/services/collector"
                   style={fieldStyle} />
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <div style={{flex:2, minWidth:280}}>
              <div className="label" style={{marginBottom:4}}>HEC token</div>
              <input type="password" value={splunk.token}
                     onChange={e => setSplunk({ ...splunk, token: e.target.value })}
                     placeholder="e.g. B5A79AAD-D822-46CC-80D1-…"
                     style={fieldStyle} autoComplete="off" />
            </div>
            <div style={{flex:1, minWidth:140}}>
              <div className="label" style={{marginBottom:4}}>Index</div>
              <input type="text" value={splunk.index}
                     onChange={e => setSplunk({ ...splunk, index: e.target.value })}
                     placeholder="dlp_ir"
                     style={fieldStyle} />
            </div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
            <button className="btn" onClick={saveSplunk}>{splunkSaved ? 'Saved' : 'Save'}</button>
            <button className="btn ghost" onClick={testSplunk}
                    disabled={!splunk.hec || (splunkTest && splunkTest.state === 'running')}>
              {splunkTest && splunkTest.state === 'running' ? 'Testing…' : 'Send test event'}
            </button>
            {splunkTest && splunkTest.state === 'ok' && (
              <span className="chip chip--safe" style={{fontSize:10}}>test OK · {splunkTest.status}</span>
            )}
            {splunkTest && splunkTest.state === 'fail' && (
              <span className="chip chip--red" style={{fontSize:10}} title={splunkTest.error}>
                test failed: {splunkTest.error.slice(0, 80)}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="muted" style={{fontSize:11, lineHeight:1.7, padding:'0 2px'}}>
        Both configurations live in this browser's localStorage only. Clear them with the browser's
        site-data panel. For a shared multi-analyst setup, back these with a server-side secret store
        and a /v1/integrations endpoint on siphon-api — Phase 7 of the IR roadmap.
      </div>
    </div>
  );
}

// ─── Surface registry ───────────────────────────────────────────
// Each surface is its own function below. MVP phases fill them in
// one at a time; this dispatcher lets us ship the shell and the
// first real surface (Findings Queue) without touching the rest.
const SURFACE_COMPONENTS = {
  findings:       () => <FindingsQueue />,
  alerts:         () => <Stub title="Alerts"
                              description="Threshold-breach signals routed from siphon-api's audit ring." />,
  investigations: () => <Stub title="Investigations"
                              description="Case view — group findings, annotate, assign." />,
  handoffs:       () => <Stub title="Handoffs"
                              description="Tickets and escalations to downstream tools (Jira, ServiceNow, email)." />,
  crypto:         () => <Stub title="Crypto Workbench"
                              description="Forensic tools for encrypted archives and documents: zip password attack, PDF/Office decrypt, hash compute, entropy + magic-byte inspection. Phase 3-5 of the IR MVP." />,
  extractor:      () => <Stub title="File Extractor"
                              description="Point-and-shoot at any file siphon-fs recognises (PDF, DOCX, XLSX, PPTX, ZIP/RAR/7z, Parquet, SQLite, EML, MSG, QR)." />,
  timeline:       () => <Stub title="Timeline"
                              description="Reconstruct a finding sequence by timestamp + document span." />,
  pivots:         () => <Stub title="Pivots"
                              description="Jump from a finding to every other finding in the same document, same source, same pod, same category." />,
  ioc:            () => <Stub title="IOC Lookup"
                              description="Cross-reference matched values against known indicator sets (URLhaus, MISP, custom)." />,
  custody:        () => <Stub title="Chain of Custody"
                              description="Per-finding history: who acted, when, what action (acknowledge, escalate, mark FP, export)." />,
  exhibits:       () => <Stub title="Exhibits"
                              description="Attached artifacts: original file, extracted text, finding metadata, investigator notes." />,
  export:         () => <Stub title="Export Bundle"
                              description="Package a case into a zip for handoff (findings JSON, extracted text, exhibits, custody log, signed manifest)." />,
  integrations:   () => <IntegrationsSurface />,
  'ir-settings':  () => <Stub title="Responder Preferences"
                              description="Default queue filters, notification channels, team membership, theme." />,
  'ir-deployment':() => <Stub title="Pod Registry"
                              description="Shared with the admin console — registered pods appear in both. Edits under Settings → Deployment on siphon-c2.html." />,
  'ir-engineering': () => <EngineeringSurface />,
};

// ─── Settings → Engineering ─────────────────────────────────────
// Developer-facing toggles. Primary MVP tenant: the demo-data
// switch, which backs every IR surface with seeded fixtures when
// on. Live pod data resumes the moment the toggle flips off; the
// two datasets never mix (separate disposition stores).
function EngineeringSurface() {
  const [mode, setMode] = React.useState(isDemoMode);
  const [seed, setSeed] = React.useState(readDemoSeed);
  const [demoDispoCount, setDemoDispoCount] = React.useState(() => Object.keys(JSON.parse(localStorage.getItem(IR_DEMO_DISPO_KEY) || '{}')).length);

  // Seed demo dispositions the first time demo mode is turned on so
  // the dashboard has MTTR data to chart. Re-seed happens only when
  // the analyst explicitly clicks Regenerate.
  React.useEffect(() => {
    if (!mode) return;
    const existing = localStorage.getItem(IR_DEMO_DISPO_KEY);
    if (existing && existing !== '{}') return;
    const findings = generateDemoFindings(seed);
    const dispo = generateDemoDispositions(findings, seed);
    localStorage.setItem(IR_DEMO_DISPO_KEY, JSON.stringify(dispo));
    setDemoDispoCount(Object.keys(dispo).length);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'seeded' } }));
  }, [mode, seed]);

  const toggle = () => {
    const next = !mode;
    setMode(next);
    setDemoMode(next);
  };

  const regenerate = () => {
    if (!confirm('Regenerate demo data? Any triage actions you made in demo mode will be overwritten.')) return;
    const newSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
    writeDemoSeed(newSeed);
    setSeed(newSeed);
    const findings = generateDemoFindings(newSeed);
    const dispo = generateDemoDispositions(findings, newSeed);
    localStorage.setItem(IR_DEMO_DISPO_KEY, JSON.stringify(dispo));
    setDemoDispoCount(Object.keys(dispo).length);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'regenerate' } }));
  };

  const clearDemoOnly = () => {
    if (!confirm('Clear demo dispositions? Your real (live-mode) triage state is NOT touched.')) return;
    localStorage.removeItem(IR_DEMO_DISPO_KEY);
    setDemoDispoCount(0);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'cleared' } }));
  };

  const findingsPreview = React.useMemo(() => generateDemoFindings(seed).length, [seed]);

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      <div className="box">
        <div className="box-title">
          <span className="t">Demo data</span>
          <span className="k">
            {mode ? <span className="chip chip--warn" style={{fontSize:9}}>DEMO MODE ACTIVE</span>
                  : <span className="chip chip--safe" style={{fontSize:9}}>LIVE</span>}
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:12, fontSize:12, lineHeight:1.7}}>
          <div className="muted">
            Swaps the Findings Queue + Dashboard data source from live pod unions to
            a deterministic seeded set ({findingsPreview} findings across {DEMO_ANALYSTS.length} analysts
            and {DEMO_USERS.length} end-users, with pre-triaged dispositions).
            Useful for demos, screenshots, and dashboard tuning without
            needing a real pod scanning real traffic.
          </div>
          <div className="muted" style={{fontSize:11.5, padding:'8px 10px', background:'var(--bg-1)', border:'1px dashed var(--line-soft)', borderRadius:'var(--radius)'}}>
            <b>Isolation:</b> demo dispositions are stored under{' '}
            <span className="mono">localStorage[ir:demoDispositions]</span>, separate from your
            live triage state at <span className="mono">ir:dispositions</span>. They never mix.
            The FP Queue handoff to the admin console also suppresses demo entries so you don't
            pollute the real engineering queue.
          </div>
          <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
            <label style={{display:'inline-flex', alignItems:'center', gap:8, cursor:'pointer'}}>
              <input type="checkbox" checked={mode} onChange={toggle} />
              <span style={{fontWeight:600}}>Use demo data</span>
            </label>
            <span className="muted mono" style={{fontSize:11}}>
              seed <span className="mono" style={{color:'var(--ink)'}}>{(seed >>> 0).toString(16).padStart(8, '0')}</span>
              {' · '}{demoDispoCount} demo dispositions
            </span>
          </div>
          <div style={{display:'flex', gap:8, flexWrap:'wrap', paddingTop:4}}>
            <button className="btn ghost" onClick={regenerate}
                    title="reshuffle the seed and re-seed dispositions">
              ↻ Regenerate seed
            </button>
            <button className="btn ghost" onClick={clearDemoOnly}
                    title="wipe demo dispositions · live state not touched"
                    style={{color:'var(--red)'}}>
              ✕ Clear demo dispositions
            </button>
          </div>
        </div>
      </div>

      <div className="muted" style={{fontSize:11, lineHeight:1.7, padding:'0 2px'}}>
        More developer toggles will live here: mock XSOAR/Splunk responses, synthetic webhook
        replay, fast-forward clock for MTTR testing.
      </div>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = {
  theme: 'phosphor',
  density: 'cozy',
  nav: 'split',
};

function App() {
  const [surface, setSurface] = React.useState(() => {
    try { return localStorage.getItem('ir:surface') || 'findings'; } catch { return 'findings'; }
  });
  // Sub-route for detail pages. Shape: "finding:<id>" opens the
  // FindingDetail view under the 'findings' surface. Persisted so a
  // refresh doesn't drop you back to the queue mid-investigation.
  const [sub, setSub] = React.useState(() => {
    try { return localStorage.getItem('ir:sub') || ''; } catch { return ''; }
  });
  const [tweaks, setTweaks] = React.useState(() => {
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem('c2:tweaks') || '{}'); } catch {}
    return { ...TWEAK_DEFAULTS, ...stored };
  });

  React.useEffect(() => {
    try { localStorage.setItem('ir:surface', surface); } catch {}
  }, [surface]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:sub', sub); } catch {}
  }, [sub]);
  React.useEffect(() => {
    try { localStorage.setItem('c2:tweaks', JSON.stringify(tweaks)); } catch {}
  }, [tweaks]);
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme || 'phosphor');
  }, [tweaks.theme]);

  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== 'c2:tweaks') return;
      try {
        const parsed = JSON.parse(e.newValue || '{}');
        setTweaks(t => ({ ...t, ...parsed }));
      } catch {}
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  const setTweak = (k, v) => setTweaks(t => ({ ...t, [k]: v }));
  const go = (id, s) => { setSurface(id); setSub(s || ''); };
  window.__ir_go = go;
  // Convenience helper the FindingsQueue + FindingDetail use to
  // navigate between rows and detail view without rebuilding the
  // (surface, sub) tuple each time.
  window.__ir_goFinding = (fid) => go('findings', fid ? 'finding:' + fid : '');

  // Dispatch: if we're on findings with a finding:<id> sub, render
  // the detail view; otherwise fall back to the surface registry.
  let body;
  if (surface === 'findings' && sub && sub.startsWith('finding:')) {
    body = <FindingDetail id={sub.slice('finding:'.length)}
                           back={() => setSub('')} />;
  } else {
    const renderSurface = SURFACE_COMPONENTS[surface] || SURFACE_COMPONENTS.findings;
    body = renderSurface();
  }

  return (
    <div className="shell" data-density={tweaks.density} data-theme={tweaks.theme}>
      <Topbar tweaks={tweaks} setTweak={setTweak} />
      <WorkspaceBar current={surface} go={go} />
      <SurfaceBar current={surface} go={go} />
      <main className="page">{body}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
