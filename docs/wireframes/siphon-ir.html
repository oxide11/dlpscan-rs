<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1360" />
<title>Siphon · IR console</title>
<!-- Theme + layout primitives. Source of truth lives at
     docs/wireframes/siphon-shared.css — inlined here so the
     console works from file:// (Safari/Chrome both block cross-
     origin <link href> loads from file://). Re-inline from the
     shared file on every change; a follow-up can serve the
     consoles over HTTP and go back to external <link>. -->
<style>
/* ==========================================================================
   SIPHON-C2 · hacker / infosec aesthetic
   Three themes: phosphor (green CRT) · amber (CRT amber) · ice (modern cyber)
   Fonts: JetBrains Mono everywhere, Space Grotesk for display, IBM Plex Sans
   for UI body. No hand-scribble fonts.
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

/* ============ PHOSPHOR (default) — green-on-black terminal ============ */
:root, [data-theme="phosphor"] {
  --bg-0:        #05080a;           /* deepest — outside chrome */
  --bg-1:        #0a1013;           /* canvas */
  --bg-2:        #0f1619;           /* raised surface */
  --bg-3:        #141c20;           /* table rows / hover */
  --bg-4:        #1a2328;           /* input / selected */
  --bg-topbar:   #030506;
  --bg-panel:    #0d1417;

  --ink:         #c8d6c2;           /* phosphor body text */
  --ink-bright:  #d7ffd0;           /* highlights */
  --ink-soft:    #8ba58a;
  --ink-faint:   #5a7360;
  --ink-dim:     #3a4c3f;

  --line:        #1f3027;
  --line-soft:   #17231c;
  --line-strong: #2d4638;

  --accent:      #5ef38c;           /* phosphor green — the signature */
  --accent-dim:  #2fa85d;
  --accent-glow: rgba(94, 243, 140, 0.25);
  --accent-wash: rgba(94, 243, 140, 0.08);

  --amber:       #ffb454;
  --amber-wash:  rgba(255, 180, 84, 0.10);
  --red:         #ff5c6c;
  --red-wash:    rgba(255, 92, 108, 0.10);
  --cyan:        #7bdff2;
  --cyan-wash:   rgba(123, 223, 242, 0.10);
  --magenta:     #ff79c6;
  --violet:      #b48cff;

  --safe:        var(--accent);
  --warn:        var(--amber);
  --threat:      var(--red);

  --env-bg:      #3a2910;
  --env-fg:      var(--amber);

  --pad: 16px;
  --gap: 16px;
  --radius: 2px;
  --radius-md: 3px;

  /* scanline overlay opacity */
  --scan-opacity: 0.035;
  color-scheme: dark;
}

/* ============ AMBER — CRT amber variant ============ */
[data-theme="amber"] {
  --bg-0:        #0a0603;
  --bg-1:        #0f0804;
  --bg-2:        #150d06;
  --bg-3:        #1c1208;
  --bg-4:        #24190c;
  --bg-topbar:   #050301;
  --bg-panel:    #110a05;

  --ink:         #ffc98c;
  --ink-bright:  #ffe4b8;
  --ink-soft:    #c49566;
  --ink-faint:   #7a5b3e;
  --ink-dim:     #4a3726;

  --line:        #3a2711;
  --line-soft:   #241808;
  --line-strong: #55391b;

  --accent:      #ffae48;
  --accent-dim:  #c07e22;
  --accent-glow: rgba(255, 174, 72, 0.25);
  --accent-wash: rgba(255, 174, 72, 0.08);

  --amber:       #ffae48;
  --amber-wash:  rgba(255, 174, 72, 0.10);
  --red:         #ff6b5c;
  --red-wash:    rgba(255, 107, 92, 0.10);
  --cyan:        #f5c27a;
  --cyan-wash:   rgba(245, 194, 122, 0.10);
  --magenta:     #ff9c4a;
  --violet:      #ffb378;

  --safe:        #a8d97a;
  --warn:        var(--amber);
  --threat:      var(--red);
}

/* ============ ICE — modern cyber (cyan on graphite) ============ */
[data-theme="ice"] {
  --bg-0:        #070a0e;
  --bg-1:        #0c1117;
  --bg-2:        #121821;
  --bg-3:        #171f2a;
  --bg-4:        #1e2836;
  --bg-topbar:   #040609;
  --bg-panel:    #0f1520;

  --ink:         #d7e3ef;
  --ink-bright:  #f5fbff;
  --ink-soft:    #8aa0b8;
  --ink-faint:   #5a6e85;
  --ink-dim:     #36475c;

  --line:        #1f2b3c;
  --line-soft:   #141d2a;
  --line-strong: #2f3f54;

  --accent:      #5ee8ff;           /* electric cyan */
  --accent-dim:  #2999b8;
  --accent-glow: rgba(94, 232, 255, 0.25);
  --accent-wash: rgba(94, 232, 255, 0.08);

  --amber:       #ffb454;
  --amber-wash:  rgba(255, 180, 84, 0.10);
  --red:         #ff5c6c;
  --red-wash:    rgba(255, 92, 108, 0.10);
  --cyan:        #5ee8ff;
  --cyan-wash:   rgba(94, 232, 255, 0.10);
  --magenta:     #ff6ad5;
  --violet:      #a78bfa;

  --safe:        #4ade80;
  --warn:        var(--amber);
  --threat:      var(--red);
}

/* ============ LIGHT — high-contrast day mode ============ */
[data-theme="light"] {
  --bg-0:        #f3f5f2;
  --bg-1:        #ffffff;
  --bg-2:        #fafbf9;
  --bg-3:        #f2f4f0;
  --bg-4:        #e8ebe6;
  --bg-topbar:   #ffffff;           /* light topbar matches page */
  --bg-panel:    #ffffff;

  --ink:         #1a2420;
  --ink-bright:  #05090a;
  --ink-soft:    #49574f;
  --ink-faint:   #6b7970;
  --ink-dim:     #9aa69f;

  --line:        #d7dcd3;
  --line-soft:   #e7eae3;
  --line-strong: #b7c0b5;

  --accent:      #0b7a3e;           /* deep emerald — WCAG-friendly */
  --accent-dim:  #085a2d;
  --accent-glow: rgba(11, 122, 62, 0.22);
  --accent-wash: rgba(11, 122, 62, 0.08);

  --amber:       #b4660d;
  --amber-wash:  rgba(180, 102, 13, 0.10);
  --red:         #b4161c;
  --red-wash:    rgba(180, 22, 28, 0.08);
  --cyan:        #0f6b80;
  --cyan-wash:   rgba(15, 107, 128, 0.08);
  --magenta:     #a4166b;
  --violet:      #5b3ea8;

  --safe:        var(--accent);
  --warn:        var(--amber);
  --threat:      var(--red);

  --env-bg:      #3a2910;
  --env-fg:      #ffc56b;

  --scan-opacity: 0;                /* no scanlines in light mode */
  color-scheme: light;
}

[data-density="compact"] { --pad: 10px; --gap: 10px; }

/* ==========================================================================
   GLOBAL
   ========================================================================== */
* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg-1);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  line-height: 1.5;
}

/* subtle scanline texture on the whole app — hints at CRT without screaming */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0 2px,
    rgba(0,0,0,var(--scan-opacity,0.035)) 2px 3px
  );
  z-index: 1000;
  mix-blend-mode: multiply;
  opacity: var(--scan-opacity, 0.035) == 0 ? 0 : 1;
}
[data-theme="light"] body::before { display: none; }

::selection { background: var(--accent); color: var(--bg-0); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-1); }
::-webkit-scrollbar-thumb { background: var(--line-strong); border: 2px solid var(--bg-1); }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* ==========================================================================
   TYPE UTILITIES
   ========================================================================== */
.hand,
.hand-b,
.scribble {
  /* backward compat — all legacy hand classes now render as display mono */
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-weight: 500;
  color: var(--ink);
}
.hand-b { font-weight: 700; color: var(--ink-bright); }
.scribble { color: var(--accent); font-weight: 500; }

.label {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink);
}
.muted { color: var(--ink-faint); }
.right { margin-left: auto; }

/* ==========================================================================
   BOXES / PANELS
   ========================================================================== */
.box {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  position: relative;
  padding: var(--pad);
}
.box::before {
  /* corner crosshair — subtle tech detail */
  content: '';
  position: absolute; top: -1px; left: -1px;
  width: 6px; height: 6px;
  border-top: 1px solid var(--accent);
  border-left: 1px solid var(--accent);
  opacity: 0.5;
}
.box--dashed { border-style: dashed; }
.box--tight { padding: 10px 12px; }

.box-title {
  display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.box-title .t {
  font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink-bright);
  letter-spacing: 0.01em;
}
.box-title .t::before {
  content: '▸ ';
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.box-title .k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.note {
  background: var(--amber-wash);
  border: 1px solid var(--amber);
  border-left: 3px solid var(--amber);
  font-family: 'JetBrains Mono', monospace;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink);
  border-radius: var(--radius);
}
.note::before {
  content: '// ';
  color: var(--amber);
  font-weight: 600;
}

.arrow { font-family: 'JetBrains Mono', monospace; color: var(--ink-soft); font-size: 14px; }
.arrow::before { content: '→'; }

.tick::before  { content: '[✓]'; color: var(--safe); font-weight: 700; margin-right: 6px; font-family: 'JetBrains Mono', monospace; }
.cross::before { content: '[✗]'; color: var(--threat); font-weight: 700; margin-right: 6px; font-family: 'JetBrains Mono', monospace; }
.dot::before   { content: '·'; margin-right: 6px; color: var(--accent); font-weight: 700; }

/* ==========================================================================
   CHIPS
   ========================================================================== */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: var(--bg-3);
  color: var(--ink-soft);
}
.chip--safe  { border-color: var(--safe);   color: var(--safe);   background: var(--accent-wash); }
.chip--warn  { border-color: var(--warn);   color: var(--warn);   background: var(--amber-wash); }
.chip--red   { border-color: var(--threat); color: var(--threat); background: var(--red-wash); }
.chip--teal  { border-color: var(--cyan);   color: var(--cyan);   background: var(--cyan-wash); }
.chip--ghost { border-style: dashed; color: var(--ink-faint); background: transparent; }

/* ==========================================================================
   HATCHES
   ========================================================================== */
.hatch       { background: repeating-linear-gradient(135deg, transparent 0 6px, rgba(94,243,140,0.06) 6px 7px); }
.hatch--sage { background: repeating-linear-gradient(135deg, transparent 0 6px, rgba(94,243,140,0.14) 6px 7px); }
.hatch--teal { background: repeating-linear-gradient(135deg, transparent 0 6px, rgba(123,223,242,0.14) 6px 7px); }
.hatch--red  { background: repeating-linear-gradient(135deg, transparent 0 6px, rgba(255,92,108,0.14) 6px 7px); }

.line-ph { display: block; height: 7px; background: var(--line-strong); opacity: 0.5; border-radius: 1px; margin: 6px 0; }
.line-ph.s { height: 5px; opacity: 0.35; }
.line-ph.w1 { width: 70%; } .line-ph.w2 { width: 45%; } .line-ph.w3 { width: 90%; } .line-ph.w4 { width: 30%; }

/* ==========================================================================
   SHELL
   ========================================================================== */
.shell { display: grid; min-height: 100vh; grid-template-rows: auto auto auto 1fr; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 8px 16px;
  background: var(--bg-topbar);
  color: var(--ink);
  border-bottom: 1px solid var(--line-strong);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.topbar .brand {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 13px;
  color: var(--ink-bright);
}
.topbar .brand-logo {
  width: 28px; height: 28px;
  display: block;
  filter: drop-shadow(0 0 6px var(--accent-glow));
}
[data-theme="light"] .topbar .brand-logo { filter: none; }
.topbar .brand .c2 { color: var(--accent); font-weight: 700; }
.topbar .spacer { flex: 1; }
.topbar .tb-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding: 3px 8px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--bg-2);
}
.topbar .tb-theme {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase;
  background: transparent; color: var(--ink-soft);
  border: 1px solid var(--line); border-radius: var(--radius);
  padding: 3px 10px; cursor: pointer;
}
.topbar .tb-theme:hover { border-color: var(--accent); color: var(--accent); }
.topbar .tb-user { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink); }
.topbar .env {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  background: var(--env-bg);
  color: var(--env-fg);
  padding: 2px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--env-fg);
}

.body-grid { display: grid; grid-template-columns: 1fr; }

/* ── Workspace tabs — BIG primary nav, sits under topbar ── */
.wsbar {
  display: flex;
  align-items: stretch;
  background: var(--bg-topbar);
  border-bottom: 1px solid var(--line-strong);
  padding: 0 16px;
  gap: 2px;
  font-family: 'JetBrains Mono', monospace;
  position: sticky; top: 0; z-index: 40;
  min-height: 64px;
}
.wsbar-btn {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 3px;
  padding: 10px 22px 10px 18px;
  background: transparent;
  border: 0;
  border-bottom: 3px solid transparent;
  color: var(--ink-soft);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  white-space: nowrap;
  line-height: 1.15;
  position: relative;
}
.wsbar-btn + .wsbar-btn::before {
  content: ''; position: absolute; left: -1px; top: 16px; bottom: 16px;
  border-left: 1px solid var(--line-soft);
}
.wsbar-btn:hover { background: var(--bg-2); color: var(--ink); }
.wsbar-btn.active {
  background: var(--bg-1);
  color: var(--ink-bright);
  border-bottom-color: var(--accent);
  box-shadow: inset 0 1px 0 var(--accent-wash);
}
.wsbar-topline {
  display: flex; align-items: baseline; gap: 10px;
}
.wsbar-glyph {
  font-size: 16px;
  color: var(--ink-faint);
  line-height: 1;
}
.wsbar-btn.active .wsbar-glyph { color: var(--accent); }
.wsbar-label {
  font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.wsbar-hint {
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.wsbar-btn.active .wsbar-hint { color: var(--ink-soft); }

/* ── Surface bar — secondary nav for the active workspace ── */
.surfacebar {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: var(--bg-1);
  border-bottom: 1px solid var(--line);
  padding: 0 16px;
  font-family: 'JetBrains Mono', monospace;
  position: sticky; top: 64px; z-index: 39;
  height: 38px;
  overflow-x: auto;
  white-space: nowrap;
}
.surfacebar a {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 14px;
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  letter-spacing: 0.03em;
}
.surfacebar a:hover { color: var(--ink); background: var(--bg-2); }
.surfacebar a.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.surfacebar a .icn {
  color: var(--ink-faint);
  font-size: 11px;
}
.surfacebar a.active .icn { color: var(--accent); }
.surfacebar a .sub {
  color: var(--ink-dim);
  font-size: 10px;
  margin-left: 4px;
}
.surfacebar .utility {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 2px;
}
.surfacebar .utility a {
  padding: 0 10px;
  font-size: 11px;
  color: var(--ink-faint);
}

.sidenav {
  background: var(--bg-0);
  border-right: 1px solid var(--line);
  padding: 14px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  position: sticky; top: 37px;
  align-self: start;
  max-height: calc(100vh - 37px);
  overflow-y: auto;
}
.sidenav .section-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-dim); margin: 14px 6px 6px;
}
.sidenav .section-l::before { content: '── '; color: var(--ink-dim); }
.sidenav a {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 8px; color: var(--ink-soft); text-decoration: none;
  font-size: 12px; border-radius: var(--radius);
  border-left: 2px solid transparent;
  cursor: pointer; line-height: 1.3;
}
.sidenav a:hover { background: var(--bg-2); color: var(--ink); }
.sidenav a.active {
  background: var(--bg-2);
  border-left-color: var(--accent);
  color: var(--accent);
}
.sidenav a.active::before { content: '›'; color: var(--accent); position: absolute; }
.sidenav .icn {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; width: 16px; text-align: center;
  color: var(--ink-faint); font-size: 11px;
}
.sidenav a.active .icn { color: var(--accent); }

.topnav {
  display: none;
  background: var(--bg-0);
  border-bottom: 1px solid var(--line);
  padding: 4px 14px; gap: 2px;
  overflow-x: auto; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  align-items: center;
}
[data-nav="top"] .topnav { display: flex; }
[data-nav="top"] .sidenav { display: none; }
.topnav a {
  display: inline-block; padding: 4px 12px;
  color: var(--ink-soft); text-decoration: none; font-size: 11px;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  letter-spacing: 0.04em;
}
.topnav a:hover { color: var(--ink); }
.topnav a.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--bg-2);
}

[data-nav="rail"] .sidenav { padding: 10px 4px; }
[data-nav="rail"] .sidenav .section-l { display: none; }
[data-nav="rail"] .sidenav a .t { display: none; }
[data-nav="rail"] .sidenav a { justify-content: center; padding: 10px 4px; }
[data-nav="rail"] .sidenav a .icn { font-size: 14px; width: auto; }

[data-nav="split"] .sidenav { padding: 10px 4px; }
[data-nav="split"] .sidenav .section-l { display: none; }
[data-nav="split"] .sidenav a .t { display: none; }
[data-nav="split"] .sidenav a { justify-content: center; padding: 10px 4px; }
.subnav {
  display: none; background: var(--bg-0);
  border-right: 1px solid var(--line);
  padding: 14px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
[data-nav="split"] .subnav { display: block; }
.subnav .sn-t {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-dim); margin-bottom: 8px;
}
.subnav a { display: block; padding: 4px 8px; font-size: 12px; color: var(--ink-soft); text-decoration: none; border-radius: var(--radius); }
.subnav a:hover { background: var(--bg-2); color: var(--ink); }
.subnav a.active { background: var(--bg-2); color: var(--accent); border-left: 2px solid var(--accent); }

.page { padding: 20px 24px 64px; max-width: 1500px; margin: 0 auto; width: 100%; }

/* ==========================================================================
   PAGE BAR
   ========================================================================== */
.pagebar {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-left: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 18px;
}
.pagebar-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.pagebar-head { justify-content: space-between; align-items: flex-start; }
.pagebar-tools { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
.pagebar .crumbs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint);
}
.pagebar .crumbs::before { content: '$ '; color: var(--accent); }
.pagebar .page-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 24px; margin: 3px 0 0; color: var(--ink-bright);
  line-height: 1.1; letter-spacing: -0.01em;
}
.pagebar .page-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--ink-soft);
  margin-top: 6px;
}
.pagebar .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.tb-search {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg-1);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  padding: 4px 8px;
  min-width: 260px; flex: 1 1 280px; max-width: 420px;
}
.tb-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-wash); }
.tb-search .mag { color: var(--accent); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
.tb-search .mag::before { content: '⌕'; }
.tb-search input {
  border: none; outline: none; background: transparent;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink);
  flex: 1;
}
.tb-search input::placeholder { color: var(--ink-faint); }
.tb-search .kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--ink-faint);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius); padding: 1px 5px;
  background: var(--bg-2);
}

.tb-filter {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg-1);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  padding: 4px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  color: var(--ink);
}
.tb-filter:hover { border-color: var(--accent); }
.tb-filter .l { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
.tb-filter .v { color: var(--ink-bright); font-weight: 600; }
.tb-filter .chev { color: var(--ink-soft); font-size: 9px; }

/* legacy page-head */
.page-head {
  display: flex; align-items: flex-end; gap: 16px; justify-content: space-between;
  margin-bottom: 18px; padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}
.page-head h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; font-size: 24px; margin: 0; color: var(--ink-bright);
  letter-spacing: -0.01em;
}
.page-head .crumbs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 3px;
}
.page-head .crumbs::before { content: '$ '; color: var(--accent); }
.page-head .actions { display: flex; gap: 8px; align-items: center; }

/* ==========================================================================
   BUTTONS
   ========================================================================== */
.btn {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--line-strong);
  background: var(--bg-2);
  color: var(--ink);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 80ms;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary {
  background: var(--accent);
  color: var(--bg-0);
  border-color: var(--accent);
  font-weight: 700;
}
.btn.primary:hover { background: var(--ink-bright); border-color: var(--ink-bright); color: var(--bg-0); }
.btn.ghost { background: transparent; border-color: var(--line); }

/* ==========================================================================
   GRID
   ========================================================================== */
.grid { display: grid; gap: var(--gap); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-6 { grid-template-columns: repeat(6, 1fr); }
.row { display: flex; gap: var(--gap); }

/* ==========================================================================
   VARIANT TABS
   ========================================================================== */
.variant-tabs { display: flex; gap: 2px; margin-bottom: 16px; flex-wrap: wrap; border-bottom: 1px solid var(--line); }
.variant-tabs button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; padding: 7px 16px;
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  cursor: pointer;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  margin-bottom: -1px;
}
.variant-tabs button.active {
  background: var(--bg-2);
  color: var(--accent);
  border-color: var(--line);
  border-bottom: 1px solid var(--bg-2);
  font-weight: 600;
}
.variant-tabs + .variant-body { padding-top: 12px; }

/* ==========================================================================
   STAT
   ========================================================================== */
.stat { display: flex; flex-direction: column; gap: 4px; }
.stat .s-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink-faint);
}
.stat .s-val {
  font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
  font-weight: 600; font-size: 28px;
  color: var(--ink-bright);
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat .s-delta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-soft);
}
.stat .s-delta.up { color: var(--safe); }
.stat .s-delta.down { color: var(--threat); }

.spark {
  height: 36px;
  background: linear-gradient(0deg, var(--accent-wash), transparent 70%);
  position: relative;
  border-bottom: 1px dashed var(--line);
}

/* ==========================================================================
   POD ROW
   ========================================================================== */
.pod-row {
  display: grid;
  grid-template-columns: 16px 1fr 120px 80px 80px 80px 60px;
  align-items: center; gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--line-soft);
  font-size: 12px;
}
.pod-row .dot-k {
  width: 8px; height: 8px; border-radius: 50%;
  box-shadow: 0 0 0 2px var(--bg-2);
}
.pod-row .dot-k.ok   { background: var(--safe);   box-shadow: 0 0 0 2px var(--bg-2), 0 0 8px var(--safe); }
.pod-row .dot-k.warn { background: var(--warn);   box-shadow: 0 0 0 2px var(--bg-2), 0 0 8px var(--warn); }
.pod-row .dot-k.bad  { background: var(--threat); box-shadow: 0 0 0 2px var(--bg-2), 0 0 8px var(--threat); }
.pod-row .name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600; font-size: 12px;
  color: var(--ink-bright);
}
.pod-row .name .v {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  font-weight: 400; margin-left: 6px;
}

.bar-row {
  display: grid; grid-template-columns: 140px 1fr 50px;
  gap: 8px; align-items: center;
  margin-bottom: 4px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink);
}
.bar-row .b {
  height: 10px; border: 1px solid var(--line);
  background: var(--bg-1); position: relative;
  border-radius: 1px;
}
.bar-row .b i {
  display: block; height: 100%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
}
.bar-row .n {
  font-family: 'JetBrains Mono', monospace;
  text-align: right; font-size: 10px; color: var(--ink-soft);
}

/* ==========================================================================
   FINDINGS
   ========================================================================== */
.find-row {
  display: grid;
  grid-template-columns: 70px 90px 1fr 70px 60px 70px 20px;
  gap: 10px; padding: 6px 4px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 11.5px;
  align-items: center;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
}
.find-row:hover { background: var(--bg-3); }
.find-row .ts { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); }
.find-row .src {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600; font-size: 11px;
  color: var(--cyan);
}
.find-row .tx {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink);
}

.find-group {
  margin-top: 12px;
  padding: 5px 10px;
  background: var(--bg-2);
  border-left: 2px solid var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600; font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-bright);
  display: flex; gap: 10px; align-items: center;
}
.find-group .gc {
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 400;
  text-transform: none;
}

/* dark stream = same as everything now; keep class for compat */
.stream-dark { background: var(--bg-0); color: var(--ink); border-color: var(--line-strong); padding: 14px; }
.stream-dark .find-row:hover { background: var(--bg-3); }

/* ==========================================================================
   TERMINAL (Pod Logs)
   ========================================================================== */
.term {
  background: #000;
  color: var(--ink);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.55;
  padding: 12px 14px;
  overflow: auto;
  min-height: 480px;
  position: relative;
}
.term::after {
  /* phosphor glow overlay */
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
}
.term-line { display: grid; grid-template-columns: 72px 88px 48px 1fr; gap: 10px; padding: 1px 0; }
.term-line .ts { color: var(--ink-faint); }
.term-line .pod { color: var(--cyan); }
.term-line .lvl { text-align: center; font-weight: 700; font-size: 10px; }
.term-line .lvl.info  { color: var(--cyan); }
.term-line .lvl.warn  { color: var(--warn); }
.term-line .lvl.error { color: var(--threat); }
.term-line .lvl.debug { color: var(--ink-faint); }
.term-line .msg { color: var(--ink); }
.term-line .msg .k { color: var(--cyan); }
.term-line .msg .v { color: var(--accent); }
.term-line .msg .s { color: var(--violet); }
.term-line:hover { background: rgba(94,243,140,0.04); }

.term-head {
  display: flex; gap: 10px; align-items: center;
  padding: 6px 10px; margin: -12px -14px 10px;
  background: var(--bg-0); color: var(--ink);
  border-bottom: 1px solid var(--line-strong);
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.term-head .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.term-head .dot.ok { background: var(--safe); box-shadow: 0 0 6px var(--safe); }
.term-head .dot.r  { background: var(--threat); box-shadow: 0 0 6px var(--threat); }
.term-head .dot.y  { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
.term-head .t { color: var(--ink-soft); }
.term-head .right { margin-left: auto; color: var(--ink-faint); }

/* ==========================================================================
   POLICY CANVAS
   ========================================================================== */
.canvas {
  background:
    linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0 / 24px 24px,
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg-1);
  min-height: 480px; position: relative;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
}
.node {
  position: absolute;
  background: var(--bg-2);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  padding: 8px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink);
  min-width: 120px;
  box-shadow: 0 0 0 0 var(--accent-glow);
  transition: box-shadow 180ms;
}
.node:hover { box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow); }
.node .nt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink-faint);
  display: block; margin-bottom: 3px;
}
.node.start     { border-color: var(--accent); color: var(--accent); }
.node.start .nt { color: var(--accent-dim); }
.node.cond      { border-color: var(--cyan); }
.node.cond .nt  { color: var(--cyan); }
.node.act-redact { border-color: var(--warn); background: var(--amber-wash); }
.node.act-block  { border-color: var(--threat); background: var(--red-wash); color: var(--threat); }
.node.act-ok     { border-color: var(--safe); background: var(--accent-wash); color: var(--safe); }

/* ==========================================================================
   PATTERNS
   ========================================================================== */
.pat-row {
  display: grid; grid-template-columns: 24px 1fr 100px 60px 50px 60px;
  padding: 6px 0; gap: 8px; align-items: center;
  border-bottom: 1px solid var(--line-soft);
  font-size: 11.5px;
  font-family: 'JetBrains Mono', monospace;
}
.pat-row .pn {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600; font-size: 12px; color: var(--ink-bright);
}
.pat-row .pr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--accent-dim);
}

.spike { display: flex; align-items: flex-end; gap: 2px; height: 50px; }
.spike i {
  display: block; width: 6px;
  background: var(--accent);
  box-shadow: 0 0 4px var(--accent-glow);
}

.worldmap {
  height: 180px;
  border: 1px dashed var(--line-strong);
  background:
    radial-gradient(circle at 22% 42%, rgba(255,92,108,0.45) 0 10px, transparent 12px),
    radial-gradient(circle at 48% 38%, rgba(94,243,140,0.45) 0 8px, transparent 10px),
    radial-gradient(circle at 72% 48%, rgba(255,180,84,0.5) 0 12px, transparent 14px),
    radial-gradient(circle at 81% 62%, rgba(123,223,242,0.4) 0 6px, transparent 8px),
    repeating-linear-gradient(135deg, transparent 0 8px, rgba(94,243,140,0.03) 8px 9px);
  position: relative; display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink-faint); font-size: 11px;
}

.surface-variants { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
.surface-variants span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink-faint);
  align-self: center; margin-right: 4px;
}
.surface-variants button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--line-strong);
  background: var(--bg-2);
  color: var(--ink-soft);
  border-radius: var(--radius);
  cursor: pointer;
}
.surface-variants button:hover { color: var(--ink); border-color: var(--accent); }
.surface-variants button.active {
  background: var(--accent); color: var(--bg-0);
  border-color: var(--accent); font-weight: 700;
}

.hidden { display: none !important; }

/* ==========================================================================
   TWEAKS PANEL
   ========================================================================== */
.tweaks {
  position: fixed; right: 16px; bottom: 16px; width: 280px;
  background: var(--bg-2);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 12px 14px;
  box-shadow: 0 0 0 1px var(--accent-wash), 0 8px 32px rgba(0,0,0,0.6);
  z-index: 100;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink);
  display: none;
}
.tweaks.on { display: block; }
.tweaks h4 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; margin: 0 0 8px;
  font-size: 13px; color: var(--ink-bright);
  letter-spacing: 0.02em;
}
.tweaks h4::before { content: '▸ '; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.tweaks .tw-row {
  display: flex; justify-content: space-between; align-items: center;
  margin: 8px 0; font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
}
.tweaks .tw-row > span:first-child {
  color: var(--ink-soft);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 10px;
}
.tweaks .tw-opts { display: flex; gap: 2px; flex-wrap: wrap; }
.tweaks .tw-opts button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid var(--line-strong);
  background: var(--bg-1);
  color: var(--ink-soft);
  border-radius: var(--radius);
  cursor: pointer;
}
.tweaks .tw-opts button:hover { color: var(--ink); border-color: var(--accent); }
.tweaks .tw-opts button.on {
  background: var(--accent); color: var(--bg-0);
  border-color: var(--accent); font-weight: 700;
}
.tweaks hr { border: none; border-top: 1px dashed var(--line); margin: 8px 0; }

.margin-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
  padding: 4px 6px;
  letter-spacing: 0.04em;
}
.margin-note::before { content: '// '; color: var(--accent-dim); }
.margin-note.red { color: var(--threat); }
.margin-note.red::before { color: var(--threat); }

.legend {
  display: flex; gap: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-soft);
  flex-wrap: wrap;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.legend span { display: inline-flex; align-items: center; gap: 4px; }
.legend i {
  display: inline-block; width: 8px; height: 8px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
}

.v-gap { height: var(--gap); }
.sep { border: none; border-top: 1px dashed var(--line); margin: 16px 0; }

/* ==========================================================================
   SETTINGS
   ========================================================================== */
.settings-wrap { display: grid; grid-template-columns: 200px 1fr; gap: var(--gap); }
.settings-tabs { font-family: 'JetBrains Mono', monospace; }
.settings-tabs a {
  display: block; padding: 5px 10px;
  border-radius: var(--radius); font-size: 12px;
  color: var(--ink-soft); cursor: pointer;
  border-left: 2px solid transparent;
}
.settings-tabs a:hover { background: var(--bg-2); color: var(--ink); }
.settings-tabs a.active {
  background: var(--bg-2);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.settings-tabs .section-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-dim);
  margin: 10px 6px 4px;
}

/* ==========================================================================
   FINDING DETAIL
   ========================================================================== */
.finding-hero { display: grid; grid-template-columns: 2fr 1fr; gap: var(--gap); }
.kv { display: grid; grid-template-columns: 120px 1fr; gap: 6px 12px; font-size: 12px; }
.kv .k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint);
  align-self: center;
}
.kv .v {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--ink);
}
.kv .v.mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
}

/* ==========================================================================
   Keep some legacy selectors alive
   ========================================================================== */
input[type="checkbox"] { accent-color: var(--accent); }
mark { background: var(--accent-wash); color: var(--ink-bright); padding: 0 3px; border-radius: 1px; }
hr.sep { border: none; border-top: 1px dashed var(--line); margin: 16px 0; }

/* ==========================================================================
   HI-FI OPERATE SURFACE (Dashboard · Stream · Finding Detail)
   ========================================================================== */
.hf-dash, .hf-stream, .hf-detail {
  padding: 20px 24px 40px;
  background: var(--bg-1);
  min-height: 100%;
  font-family: 'Inter', 'Space Grotesk', system-ui, sans-serif;
}
.crumbs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 6px;
}
.crumbs a { color: var(--accent); cursor: pointer; text-decoration: none; }
.crumbs a:hover { text-decoration: underline; }

.hf-h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px; font-weight: 600; letter-spacing: -0.01em;
  color: var(--ink-bright); margin: 0 0 4px;
  display: flex; align-items: center; gap: 12px;
}
.hf-h1-env {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
  color: var(--env-fg); background: var(--env-bg);
  padding: 3px 8px; border-radius: 2px; letter-spacing: 1.5px;
}
.hf-sub { color: var(--ink-soft); font-size: 13px; }
.hf-sub b { color: var(--ink); font-weight: 600; }

.hf-dash-head, .hf-stream-head, .hf-detail-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px; margin-bottom: 20px;
  padding-bottom: 16px; border-bottom: 1px solid var(--line);
}
.hf-dash-actions { display: flex; gap: 8px; align-items: center; }

.hf-timerange {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 4px 4px 10px; background: var(--bg-panel);
  border: 1px solid var(--line-strong); border-radius: 3px;
}
.hf-timerange .l {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint); letter-spacing: 1px; text-transform: uppercase;
}
.hf-timerange select {
  background: transparent; border: none; color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  padding: 2px 4px; cursor: pointer; outline: none;
}

/* ───────── Assure · Overview ───────── */
.as-hero {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  align-items: stretch;
}
.as-card {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 4px; padding: 20px; display: flex; flex-direction: column;
  min-width: 0;
}
.as-h {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 18px;
}
.as-num-wrap { min-width: 0; }
.as-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 2px;
}
.as-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 42px; font-weight: 600; letter-spacing: -0.02em;
  line-height: 1; margin: 6px 0 6px;
}
.as-unit { font-size: 24px; margin-left: 2px; color: inherit; opacity: 0.8; }
.as-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); }
.as-meta b { color: var(--ink); font-weight: 600; }
.as-status {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  font-weight: 700; letter-spacing: 1.5px; padding: 4px 8px;
  border-radius: 2px; white-space: nowrap;
}
.as-status--ok   { color: var(--accent); border: 1px solid var(--accent-dim); background: var(--accent-wash); }
.as-status--warn { color: var(--amber);  border: 1px solid var(--amber);      background: var(--amber-wash); }
.as-status--bad  { color: var(--threat); border: 1px solid var(--threat);     background: var(--red-wash); }

.as-spark-wrap { margin-bottom: 16px; }

.as-breakdown { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--line); }
.as-inc {
  list-style: none; margin: 0; padding: 0;
  display: flex; flex-direction: column; gap: 6px;
}
.as-inc li {
  display: grid; grid-template-columns: 82px 50px 44px 1fr; gap: 8px;
  font-size: 11px; align-items: center;
}
.as-inc-sev {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  padding: 2px 5px; border-radius: 2px; text-align: center;
}
.as-inc-sev--major { color: var(--threat); background: var(--red-wash); }
.as-inc-sev--minor { color: var(--amber); background: var(--amber-wash); }

.as-foot {
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line);
  font-size: 11px;
}
.as-link {
  color: var(--accent); cursor: pointer; font-family: 'JetBrains Mono', monospace;
}
.as-link:hover { text-decoration: underline; }

/* coverage bars */
.as-cov { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
.as-cov-row {
  display: grid; grid-template-columns: 90px 1fr 40px 55px 1fr;
  gap: 10px; align-items: center;
  font-size: 11px;
}
.as-cov-tenant { color: var(--ink); font-size: 11px; }
.as-cov-bar {
  height: 6px; background: var(--bg-3); border-radius: 1px; overflow: hidden;
  border: 1px solid var(--line);
}
.as-cov-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--cyan), var(--accent));
  transition: width 0.3s;
}
.as-cov-pct { color: var(--ink-bright); font-weight: 600; }
.as-cov-count { color: var(--ink-soft); }
.as-cov-note { font-size: 10.5px; }

/* efficacy */
.as-eff-confmat {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
  margin-bottom: 18px; padding: 12px; background: var(--bg-2);
  border: 1px solid var(--line); border-radius: 3px;
}
.as-eff-col { text-align: center; }
.as-eff-big {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px; font-weight: 600; line-height: 1.1; margin: 4px 0;
}
.as-eff-sub { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.3px; }

.as-eff-breakdown { margin-top: auto; }
.as-eff-tbl {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.as-eff-tbl thead th {
  font-family: 'JetBrains Mono', monospace; font-weight: 500;
  font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--ink-faint); text-align: left;
  padding: 6px 4px; border-bottom: 1px solid var(--line);
}
.as-eff-tbl tbody td {
  padding: 5px 4px; border-bottom: 1px solid var(--line);
}
.as-eff-tbl .right { text-align: right; }
.as-eff-tbl tbody tr:last-child td { border-bottom: none; }

/* why-these-three */
.as-why {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  padding: 8px 4px; font-size: 12.5px; line-height: 1.55; color: var(--ink);
}
.as-why-h {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 6px;
}

/* compact SLO strip on Operate Dashboard */
.op-slo-strip {
  display: grid; grid-template-columns: repeat(3, 1fr) auto; gap: 18px;
  align-items: center;
  background: var(--bg-panel); border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 3px; padding: 10px 16px; margin-bottom: 18px;
}
.op-slo-cell { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
.op-slo-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint); letter-spacing: 1.5px; text-transform: uppercase;
  min-width: 78px;
}
.op-slo-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
}
.op-slo-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-soft);
}
.op-slo-open {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--accent); cursor: pointer; letter-spacing: 0.5px;
  padding: 6px 10px; border: 1px solid var(--accent-dim);
  background: var(--accent-wash); border-radius: 2px;
}
.op-slo-open:hover { background: var(--accent); color: var(--bg-0); }

/* ───────── Detect · Overview ───────── */
.dt-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0; margin-bottom: 18px;
  border: 1px solid var(--line); border-radius: 4px;
  background: var(--bg-panel);
  overflow: hidden;
}
.dt-strip-cell {
  padding: 14px 18px; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 6px;
  position: relative; cursor: pointer; transition: background 0.15s;
}
.dt-strip-cell:last-child { border-right: 0; }
.dt-strip-cell:hover { background: var(--bg-3); }
.dt-strip-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1.6px; text-transform: uppercase; color: var(--ink-faint);
}
.dt-strip-row {
  display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
}
.dt-strip-val {
  font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 600;
  letter-spacing: -0.01em; line-height: 1;
}
.dt-strip-delta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-soft);
}
.dt-strip-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-soft);
}

.dt-hero { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

.dt-card {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 4px; padding: 20px; display: flex; flex-direction: column;
  min-width: 0; position: relative;
}
.dt-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
}
.dt-card.dt-card--models::before     { background: var(--violet); }
.dt-card.dt-card--fingerprints::before { background: var(--cyan); }

.dt-card-h {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 14px;
}
.dt-card-eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--ink-faint);
  margin-bottom: 4px;
}
.dt-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600;
  color: var(--ink-bright); letter-spacing: -0.01em;
  margin-bottom: 2px;
}
.dt-card-tagline {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-soft);
}
.dt-card-count {
  font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 600;
  letter-spacing: -0.02em; line-height: 1; text-align: right;
}
.dt-card-count-u {
  display: block; font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink-faint); margin-top: 4px; font-weight: 400;
}

.dt-card-kv {
  display: grid; grid-template-columns: 1fr auto; gap: 4px 14px;
  padding: 10px 0; border-top: 1px dashed var(--line);
  margin-top: 12px;
}
.dt-card-kv .k {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-soft); letter-spacing: 0.3px;
}
.dt-card-kv .v {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  color: var(--ink); font-weight: 600; text-align: right;
}
.dt-card-kv .v.ok    { color: var(--accent); }
.dt-card-kv .v.warn  { color: var(--amber); }
.dt-card-kv .v.bad   { color: var(--threat); }

.dt-card-list {
  list-style: none; padding: 0; margin: 12px 0 0 0;
  display: flex; flex-direction: column; gap: 6px;
}
.dt-card-list li {
  display: grid; grid-template-columns: 16px 1fr auto auto; gap: 10px; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  padding: 4px 0;
}
.dt-card-list .dt-rank {
  color: var(--ink-faint); font-size: 10px;
}
.dt-card-list .dt-name { color: var(--ink); font-weight: 600; }
.dt-card-list .dt-meta { color: var(--ink-soft); font-size: 10.5px; }
.dt-card-list .dt-bar {
  display: inline-block; width: 46px; height: 4px;
  background: var(--bg-3); border-radius: 1px; overflow: hidden;
}
.dt-card-list .dt-bar-fill { display: block; height: 100%; background: var(--accent); }

.dt-card-foot {
  margin-top: auto; padding-top: 12px; border-top: 1px dashed var(--line);
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-faint);
}
.dt-card-foot a {
  color: var(--accent); text-decoration: none; cursor: pointer;
}
.dt-card-foot a:hover { text-decoration: underline; }

/* routing map */
.dt-routes {
  display: flex; flex-direction: column; gap: 8px;
}
.dt-route {
  display: grid; grid-template-columns: 220px 16px 1fr auto; gap: 14px; align-items: center;
  padding: 10px 12px; border: 1px solid var(--line); border-radius: 3px;
  background: var(--bg-2);
}
.dt-route-policy {
  display: flex; flex-direction: column; gap: 2px; min-width: 0;
}
.dt-route-policy .pn {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--ink-bright);
}
.dt-route-policy .pt {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-soft);
}
.dt-route-arrow {
  font-family: 'JetBrains Mono', monospace; color: var(--ink-faint); font-size: 13px;
}
.dt-route-stack {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.dt-route-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px; border: 1px solid var(--line-strong); border-radius: 2px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  background: var(--bg-panel);
}
.dt-route-chip-kind {
  font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase;
  padding: 1px 4px; border-radius: 1px;
}
.dt-route-chip-kind.pat  { color: var(--accent); background: var(--accent-wash); }
.dt-route-chip-kind.mdl  { color: var(--violet);  background: rgba(180,140,255,0.08); }
.dt-route-chip-kind.fpr  { color: var(--cyan);   background: var(--cyan-wash); }
.dt-route-chip .n { color: var(--ink); }
.dt-route-action {
  display: inline-flex; gap: 4px; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1.2px; text-transform: uppercase; font-weight: 700;
  padding: 3px 8px; border: 1px solid; border-radius: 2px;
  white-space: nowrap;
}
.dt-route-action.flag     { color: var(--cyan);   border-color: var(--cyan);   background: var(--cyan-wash); }
.dt-route-action.redact   { color: var(--amber);  border-color: var(--amber);  background: var(--amber-wash); }
.dt-route-action.tokenize { color: var(--violet); border-color: rgba(180,140,255,0.4); background: rgba(180,140,255,0.08); }
.dt-route-action.block    { color: var(--threat); border-color: var(--threat); background: var(--red-wash); }

/* live detector load */
.dt-load-grid {
  display: grid; grid-template-columns: 120px 1fr auto; gap: 10px 16px;
  align-items: center;
}
.dt-load-name {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  color: var(--ink); font-weight: 600;
}
.dt-load-kind {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 1.3px; text-transform: uppercase;
  color: var(--ink-faint);
}
.dt-load-bar {
  height: 14px; background: var(--bg-3); border-radius: 2px;
  position: relative; overflow: hidden;
}
.dt-load-bar-fill {
  position: absolute; inset: 0 auto 0 0; transition: width 0.5s;
}
.dt-load-bar-label {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-bright); font-weight: 600;
  text-shadow: 0 0 4px var(--bg-panel);
}
.dt-load-rate {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--ink-soft); white-space: nowrap; min-width: 60px; text-align: right;
}

/* why section */
.dt-why {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
  font-family: 'Inter', 'Space Grotesk', sans-serif;
  font-size: 13px; line-height: 1.55; color: var(--ink-soft);
}
.dt-why-h {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px;
  font-weight: 600; margin-bottom: 8px;
}

@media (max-width: 1100px) {
  .as-hero { grid-template-columns: 1fr; }
  .as-why { grid-template-columns: 1fr; }
  .op-slo-strip { grid-template-columns: 1fr; gap: 8px; }
  .dt-hero { grid-template-columns: 1fr; }
  .dt-strip { grid-template-columns: 1fr 1fr; }
  .dt-why { grid-template-columns: 1fr; }
  .dt-route { grid-template-columns: 1fr; }
}

.hf-pulse {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
  letter-spacing: 2px; color: var(--accent);
  padding: 4px 9px; border: 1px solid var(--accent); border-radius: 2px;
  background: var(--accent-wash);
}
.hf-pulse[data-on="0"] { color: var(--ink-faint); border-color: var(--line-strong); background: transparent; }
.hf-pulse .dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  animation: hfPulse 1.4s ease-in-out infinite;
}
.hf-pulse[data-on="0"] .dot { animation: none; }
@keyframes hfPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.7); } }

/* ===== KPI row ===== */
.hf-kpi-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
}
.hf-kpi {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 4px; padding: 14px 16px;
  position: relative;
}
.hf-kpi-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px;
}
.hf-kpi-row2 { display: flex; justify-content: space-between; align-items: flex-end; gap: 8px; }
.hf-kpi-value {
  font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 600;
  letter-spacing: -0.02em; line-height: 1;
}
.hf-kpi-delta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  margin-top: 6px;
}
.hf-kpi-delta[data-up="1"] { color: var(--accent); }
.hf-kpi-delta[data-up="0"] { color: var(--ink-soft); }

/* ===== panels ===== */
.hf-grid-main {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.hf-panel {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 4px; padding: 14px 16px;
  min-width: 0;
}
.hf-panel--span2 { grid-column: span 2; }
.hf-panel-h {
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  padding-bottom: 10px; margin-bottom: 12px;
  border-bottom: 1px dashed var(--line);
}
.hf-panel-h .t {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
  color: var(--ink-bright);
}
.hf-panel-h .k {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint); letter-spacing: 1.2px; text-transform: uppercase;
}
.hf-panel-chips { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
.hf-legend {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-soft); display: inline-flex; align-items: center; gap: 5px;
}
.hf-swatch { width: 8px; height: 8px; border-radius: 1px; }

/* ===== pod fleet table ===== */
.hf-pods {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
.hf-pods thead th {
  text-align: left; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--ink-faint); font-weight: 600;
  padding: 4px 8px; border-bottom: 1px solid var(--line);
}
.hf-pods td {
  padding: 7px 8px; border-bottom: 1px solid var(--line-soft);
  color: var(--ink); vertical-align: middle;
}
.hf-pods td.right, .hf-pods th[style*="right"] { text-align: right; }
.hf-pods tr.hf-pod-row:hover td { background: var(--bg-3); }
.hf-pods tr.hf-pod-row--warn td:first-child,
.hf-pods tr.hf-pod-row--drift td:first-child { position: relative; }

.hf-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent-glow);
}
.hf-dot--warn  { background: var(--amber); box-shadow: 0 0 8px rgba(255,180,84,0.5); }
.hf-dot--drift { background: var(--threat); box-shadow: 0 0 8px rgba(255,92,108,0.5); }

.hf-meter { display: inline-flex; align-items: center; gap: 6px; justify-content: flex-end; }
.hf-meter-val { color: var(--ink-soft); font-size: 11px; min-width: 22px; text-align: right; }
.hf-meter-bar {
  display: inline-block; width: 54px; height: 6px;
  background: var(--bg-3); border-radius: 3px; overflow: hidden;
}
.hf-meter-bar span { display: block; height: 100%; border-radius: 3px; transition: width 0.4s; }

/* ===== heatmap ===== */
.hf-heat { display: flex; flex-direction: column; gap: 4px; }
.hf-heat-row {
  display: grid; grid-template-columns: 48px 1fr 44px; gap: 10px;
  align-items: center;
}
.hf-heat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: 1.2px; color: var(--ink-soft);
}
.hf-heat-total { font-size: 11px; color: var(--ink-soft); text-align: right; }
.hf-heat-axis {
  grid-column: 2 / 3; display: grid; grid-template-columns: repeat(24, 1fr);
  margin: 6px 0 0 58px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-faint);
}
.hf-heat-axis span { text-align: left; }

/* ===== tenants list ===== */
.hf-tenants { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.hf-tenants li { display: grid; grid-template-columns: 100px 1fr 52px 44px; gap: 8px; align-items: center; font-size: 12px; }
.hf-ten-bar { height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
.hf-ten-bar span { display: block; height: 100%; background: var(--accent); border-radius: 3px; }

/* ===== findings stream ===== */
.hf-stream-filters {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 10px 12px; margin-bottom: 10px;
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 4px;
}
.hf-search {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg-3); border: 1px solid var(--line);
  border-radius: 3px; padding: 5px 9px; min-width: 280px;
}
.hf-search span { color: var(--ink-faint); font-size: 12px; }
.hf-search input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 12px;
}
.hf-search .kbd {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint);
  border: 1px solid var(--line-strong); padding: 1px 5px; border-radius: 2px;
}

.hf-picker { display: inline-flex; align-items: center; gap: 6px; }
.hf-picker .l {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--ink-faint);
}
.hf-picker select {
  background: var(--bg-3); border: 1px solid var(--line); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  padding: 4px 6px; border-radius: 2px; outline: none;
}
.hf-stream-hist { display: inline-flex; align-items: center; margin-left: auto; }
.hf-stream-count {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft);
  padding-left: 10px; border-left: 1px solid var(--line);
}
.hf-stream-count b { color: var(--accent); font-size: 13px; }

/* multi-row filter bar */
.hf-stream-filters--multi {
  flex-direction: column; align-items: stretch; gap: 8px;
}
.hf-filter-row {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.hf-filter-row--primary { padding-bottom: 8px; border-bottom: 1px dashed var(--line); }
.hf-tf-group {
  display: inline-flex; align-items: center; gap: 2px;
  border: 1px solid var(--line); border-radius: 3px; background: var(--bg-3);
  padding: 2px;
}
.hf-tf-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.5px; padding: 3px 8px; border: 0; background: transparent;
  color: var(--ink-soft); cursor: pointer; border-radius: 2px;
}
.hf-tf-btn:hover { color: var(--ink); }
.hf-tf-btn.active {
  background: var(--accent-wash); color: var(--accent); font-weight: 600;
}
.hf-tf-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-faint);
  margin-right: 4px;
}
.hf-tf-custom {
  display: inline-flex; gap: 4px; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.hf-tf-custom input[type=date] {
  background: var(--bg-3); border: 1px solid var(--line); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  padding: 3px 5px; border-radius: 2px; outline: none;
  color-scheme: var(--color-scheme, light);
}

.hf-adv-toggle {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 1px; color: var(--ink-soft);
  background: transparent; border: 1px dashed var(--line-strong);
  padding: 4px 10px; border-radius: 2px; cursor: pointer;
}
.hf-adv-toggle:hover { color: var(--accent); border-color: var(--accent-dim); }
.hf-adv-toggle.active { color: var(--accent); border-color: var(--accent); border-style: solid; }

.hf-adv-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px 12px;
  padding: 8px 0;
}
.hf-adv-field { display: flex; flex-direction: column; gap: 3px; }
.hf-adv-field label {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-faint);
}
.hf-adv-field input {
  background: var(--bg-3); border: 1px solid var(--line); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  padding: 4px 7px; border-radius: 2px; outline: none;
}
.hf-adv-field input:focus { border-color: var(--accent-dim); }

.hf-active-chips {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  padding: 4px 0;
}
.hf-active-chips .l {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-faint);
}
.hf-active-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  padding: 3px 4px 3px 8px; border: 1px solid var(--accent-dim);
  background: var(--accent-wash); color: var(--accent);
  border-radius: 2px;
}
.hf-active-chip .k { color: var(--ink-faint); margin-right: 4px; font-size: 9.5px; letter-spacing: 1px; }
.hf-active-chip .v { color: var(--ink); }
.hf-active-chip button {
  background: transparent; border: 0; color: var(--ink-faint); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 0 4px;
}
.hf-active-chip button:hover { color: var(--threat); }
.hf-active-chip--clear {
  background: transparent; color: var(--ink-soft); border-color: var(--line-strong);
  cursor: pointer;
}
.hf-active-chip--clear:hover { color: var(--threat); border-color: var(--threat); }

.hf-stream-table td.hf-ch {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-soft); letter-spacing: 1px; text-transform: uppercase;
}

@media (max-width: 1200px) {
  .hf-adv-grid { grid-template-columns: repeat(2, 1fr); }
}

.hf-stream-split {
  display: block;
  min-height: 0;
}
.hf-stream-table-wrap {
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 4px;
  overflow: auto; max-height: calc(100vh - 320px);
}
.hf-stream-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.hf-stream-table thead th {
  position: sticky; top: 0; z-index: 2;
  background: var(--bg-panel);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-faint);
  text-align: left; font-weight: 600;
  padding: 8px 10px; border-bottom: 1px solid var(--line);
}
.hf-stream-row td {
  padding: 6px 10px; border-bottom: 1px solid var(--line-soft);
  color: var(--ink);
}
.hf-stream-row { cursor: pointer; }
.hf-stream-row:hover td { background: var(--bg-3); }
.hf-stream-row.is-selected td { background: var(--accent-wash); box-shadow: inset 2px 0 0 var(--accent); }
.hf-stream-row.is-selected td:first-child { box-shadow: inset 2px 0 0 var(--accent); }
.hf-stream-row--red td:first-child    { box-shadow: inset 2px 0 0 var(--threat); }
.hf-stream-row--warn td:first-child   { box-shadow: inset 2px 0 0 var(--amber); }
.hf-stream-row--safe td:first-child   { box-shadow: inset 2px 0 0 var(--accent-dim); }
/* new-row flash: only applied to the first row once */
.hf-stream-row--new { animation: hfSlideIn 600ms ease-out; animation-fill-mode: both; }
@keyframes hfSlideIn {
  0%   { opacity: 0.4; background: var(--accent-wash); }
  100% { opacity: 1;   background: transparent; }
}

.hf-t { color: var(--ink-soft); white-space: nowrap; }
.hf-match { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); }
.right { text-align: right; }

.hf-sev {
  display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px;
}
.hf-sev--red  { background: var(--red-wash);    color: var(--threat); border: 1px solid var(--threat); }
.hf-sev--warn { background: var(--amber-wash);  color: var(--amber);  border: 1px solid var(--amber); }
.hf-sev--safe { background: var(--accent-wash); color: var(--accent); border: 1px solid var(--accent-dim); }

.hf-cat-tag {
  display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  padding: 1px 6px; border: 1px solid currentColor; border-radius: 2px;
  background: transparent;
}

.hf-act {
  display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  padding: 2px 7px; border-radius: 2px;
}
.hf-act--block    { background: var(--red-wash);    color: var(--threat); }
.hf-act--redact   { background: var(--amber-wash);  color: var(--amber); }
.hf-act--flag     { background: var(--cyan-wash);   color: var(--cyan); }
.hf-act--tokenize { background: rgba(180,140,255,0.1); color: var(--violet); }
.hf-act--allow    { background: var(--bg-3);        color: var(--ink-soft); }

/* status strip on finding detail */
.hf-status-strip {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin: 4px 0 10px;
}
.hf-status-sep { color: var(--ink-faint); }
.hf-status-badge {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase;
  padding: 5px 10px 4px; border-radius: 2px; border: 1px solid;
}
.hf-status-badge--red  { color: var(--threat); border-color: var(--threat); background: var(--red-wash); }
.hf-status-badge--warn { color: var(--amber);  border-color: var(--amber);  background: var(--amber-wash); }
.hf-status-badge--safe { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-wash); }
.hf-status-dot {
  width: 7px; height: 7px; border-radius: 50%; background: currentColor;
  box-shadow: 0 0 8px currentColor;
}
.hf-status-badge--safe .hf-status-dot { box-shadow: 0 0 6px currentColor; }

.hf-action-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase;
  padding: 5px 10px 4px; border-radius: 2px; border: 1px solid transparent;
}
.hf-action-badge--block    { color: var(--threat); border-color: var(--threat); background: var(--red-wash); }
.hf-action-badge--redact   { color: var(--amber);  border-color: var(--amber);  background: var(--amber-wash); }
.hf-action-badge--flag     { color: var(--cyan);   border-color: var(--cyan);   background: var(--cyan-wash); }
.hf-action-badge--tokenize { color: var(--violet); border-color: rgba(180,140,255,0.4); background: rgba(180,140,255,0.08); }
.hf-action-badge--allow    { color: var(--ink-soft); border-color: var(--line-strong); background: var(--bg-3); }

.hf-status-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--ink-soft); letter-spacing: 0.3px;
}

.hf-h1--detail { margin-top: 2px; }
.hf-match-mono { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--ink-bright); }

/* stream row chevron + full-row click affordance */
.hf-stream-chev {
  color: var(--ink-faint); text-align: right; padding-right: 10px !important;
  font-size: 16px; line-height: 1; width: 18px;
  transition: color 0.12s, transform 0.12s;
}
.hf-stream-row:hover .hf-stream-chev { color: var(--accent); transform: translateX(2px); }

/* peek panel (legacy — retained in case other surfaces reuse) */
.hf-stream-peek {
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 4px;
  padding: 14px; height: fit-content; position: sticky; top: 12px;
}
.hf-stream-peek--empty { padding: 20px; }
.hf-peek-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hf-peek-id { font-size: 11px; color: var(--accent); letter-spacing: 1px; }
.hf-peek-close {
  background: transparent; border: none; color: var(--ink-faint); cursor: pointer;
  font-size: 14px; padding: 0; line-height: 1;
}
.hf-peek-close:hover { color: var(--ink); }
.hf-peek-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-bright); margin-bottom: 12px; }
.hf-peek-dl {
  display: grid; grid-template-columns: 80px 1fr; gap: 6px 12px;
  margin: 0; font-size: 11px;
}
.hf-peek-dl dt {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--ink-faint);
}
.hf-peek-dl dd { margin: 0; color: var(--ink); }

/* ===== finding detail ===== */
.hf-detail-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.hf-evidence { background: var(--bg-3); padding: 14px; border-radius: 3px; border: 1px dashed var(--line); }
.hf-ev-doc .label { margin-bottom: 8px; color: var(--ink-faint); font-size: 10px; }
.hf-ev-body {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.8;
  color: var(--ink);
}
.hf-mark {
  background: var(--amber-wash); color: var(--amber);
  padding: 1px 4px; border-radius: 2px; font-weight: 700;
  border-bottom: 2px solid var(--amber);
}

.hf-code {
  background: var(--bg-0); border: 1px solid var(--line);
  border-radius: 3px; padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6;
  color: var(--ink); margin: 0; overflow-x: auto;
}

.hf-related { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
.hf-related li {
  display: flex; align-items: center; gap: 10px; padding: 6px 8px;
  border-bottom: 1px solid var(--line-soft); font-size: 11px;
}
.hf-related li:hover { background: var(--bg-3); }

.hf-timeline { list-style: none; padding: 0; margin: 0; position: relative; }
.hf-timeline::before {
  content: ''; position: absolute; left: 90px; top: 6px; bottom: 6px;
  width: 1px; background: var(--line);
}
.hf-timeline li {
  display: grid; grid-template-columns: 80px 16px 1fr; gap: 10px;
  align-items: center; padding: 8px 0;
  font-size: 13px; color: var(--ink);
}
.hf-tl-t { font-size: 11px; color: var(--ink-soft); text-align: right; }
.hf-tl-marker {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--bg-1); border: 2px solid var(--line-strong);
  margin: 0 auto; position: relative; z-index: 1;
}
.hf-tl-marker--accent { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash); }
.hf-tl-marker--live   { border-color: var(--accent); background: var(--bg-1);
  animation: hfPulseRing 1.6s ease-in-out infinite; }
@keyframes hfPulseRing {
  0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50%     { box-shadow: 0 0 0 8px transparent; }
}

/* light-theme nudges — evidence readability */
[data-theme="light"] .hf-evidence { background: #fafaf6; }
[data-theme="light"] .hf-code { background: #f7f9f5; }

@media (max-width: 1280px) {
  .hf-kpi-row { grid-template-columns: repeat(2, 1fr); }
  .hf-grid-main { grid-template-columns: 1fr; }
  .hf-panel--span2 { grid-column: auto; }
  .hf-stream-split { grid-template-columns: 1fr; }
  .hf-detail-grid { grid-template-columns: 1fr; }
}
