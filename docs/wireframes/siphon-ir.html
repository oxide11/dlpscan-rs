// ── Finding Density heatmap (ported from siphon-c2) ─────────
// 24h × 1h bucket heatmap per category group. Each row is a
// category family (PCI · PII · CRED · PHI · SECRET · CLASSIFIED
// · OTHER + regional groups) — opacity scales by density so the
// analyst reads a time-of-day pattern at a glance.
const IR_REGION_GROUPS = ['North America', 'Europe', 'Asia-Pacific', 'Latin America', 'Middle East', 'Africa'];
const IR_CAT_GROUPS = [...IR_REGION_GROUPS, 'PCI', 'PII', 'CRED', 'PHI', 'SECRET', 'CLASSIFIED', 'OTHER'];
const IR_CAT_GROUP_COLOR = {
  'North America':  '#94d0ff',
  'Europe':         '#ba91ff',
  'Asia-Pacific':   '#ffb432',
  'Latin America':  '#ff9cce',
  'Middle East':    '#5ef38c',
  'Africa':         '#d7ffd0',
  PCI:        '#ff5c6c',
  PII:        '#94d0ff',
  CRED:       '#ffb432',
  PHI:        '#ba91ff',
  SECRET:     '#ff9cce',
  CLASSIFIED: '#d7ffd0',
  OTHER:      '#8ba58a',
};
function catGroup(category) {
  const dash = (category || '').indexOf(' - ');
  if (dash > 0) {
    const region = category.slice(0, dash);
    if (IR_REGION_GROUPS.includes(region)) return region;
  }
  const c = (category || '').toLowerCase();
  if (c.includes('credit card') || c.includes('iban') || c.includes('bank')) return 'PCI';
  if (c.includes('medical') || c.includes('health') || c.includes('phi')) return 'PHI';
  if (c.includes('cloud provider secret') || c.includes('code platform secret')) return 'CRED';
  if (c.includes('credential') || c.includes('auth token') || c.includes('aws')) return 'CRED';
  if (c.includes('private key') || c.includes('session') || c.includes('encryption')) return 'SECRET';
  if (c.includes('classif') || c.includes('marking') || c.includes('traffic light')) return 'CLASSIFIED';
  if (c.includes('personal') || c.includes('contact') || c.includes('email')) return 'PII';
  return 'OTHER';
}

function FindingsDensity({ findings }) {
  const BUCKETS = 24;
  const WINDOW_MIN = 24 * 60;

  const rows = React.useMemo(() => {
    const zeros = () => Array.from({ length: BUCKETS }, () => 0);
    const matrix = {};
    IR_CAT_GROUPS.forEach(g => { matrix[g] = zeros(); });

    const now = Date.now();
    const bucketMs = (WINDOW_MIN * 60 * 1000) / BUCKETS;
    (findings || []).forEach(f => {
      const t = new Date(f.ts).getTime();
      if (isNaN(t)) return;
      const delta = now - t;
      if (delta < 0 || delta > WINDOW_MIN * 60 * 1000) return;
      const idx = BUCKETS - 1 - Math.floor(delta / bucketMs);
      if (idx < 0 || idx >= BUCKETS) return;
      const g = catGroup(f.category);
      matrix[g][idx]++;
    });
    return IR_CAT_GROUPS
      .map(g => ({
        group: g,
        buckets: matrix[g],
        total: matrix[g].reduce((a, b) => a + b, 0),
      }))
      .filter(r => r.total > 0);
  }, [findings]);

  const maxCell = Math.max(1, ...rows.flatMap(r => r.buckets));

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Finding density</span>
        <span className="k">by category · last 24h · 1h buckets</span>
      </div>
      <div style={{padding:14}}>
        {rows.length === 0 ? (
          <div className="muted mono" style={{padding:20, textAlign:'center', fontSize:12}}>
            — no findings in the last 24h —
          </div>
        ) : (<>
          {rows.map(row => (
            <div key={row.group} style={{display:'grid', gridTemplateColumns:'130px 1fr 50px', alignItems:'center', gap:10, marginBottom:4}}>
              <div style={{
                fontFamily:"'JetBrains Mono', monospace",
                fontSize:11, fontWeight:600,
                color: IR_CAT_GROUP_COLOR[row.group] || 'var(--ink)',
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
              }} title={row.group}>
                {row.group}
              </div>
              <div style={{display:'flex', gap:1, height:14}}>
                {row.buckets.map((v, i) => {
                  const opacity = v === 0 ? 0.06 : Math.max(0.18, v / maxCell);
                  return (
                    <div key={i}
                         title={`${v} finding${v === 1 ? '' : 's'} in hour bucket ${i}`}
                         style={{
                           flex: 1,
                           background: IR_CAT_GROUP_COLOR[row.group] || 'var(--accent)',
                           opacity,
                           borderRadius: 1,
                         }}/>
                  );
                })}
              </div>
              <div className="mono" style={{textAlign:'right', fontSize:11.5, color:'var(--ink)'}}>{row.total}</div>
            </div>
          ))}
          <div style={{display:'grid', gridTemplateColumns:'130px 1fr 50px', alignItems:'center', gap:10, marginTop:8}}>
            <div />
            <div style={{display:'flex', gap:1, fontFamily:"'JetBrains Mono', monospace", fontSize:9, color:'var(--ink-dim)'}}>
              {Array.from({length: BUCKETS}).map((_, i) => (
                <span key={i} style={{flex:1, textAlign:'center'}}>
                  {i % 6 === 0 ? i + ':00' : '·'}
                </span>
              ))}
            </div>
            <div />
          </div>
        </>)}
      </div>
    </div>
  );
}

// ── Trending graph with YoY / QoQ / MoM comparison ────────────
// Bucket counts by day (short windows) or by week/month (long).
// When a comparison mode is set, overlay a dashed series for the
// prior equivalent period + show a delta chip in the panel header.
const IR_COMPARISONS = [
  { id: 'none',  label: 'Current',     days: null },
  { id: 'mom',   label: 'MoM',         days: 30,  pretty: '30 days vs prior 30' },
  { id: 'qoq',   label: 'QoQ',         days: 90,  pretty: '90 days vs prior 90' },
  { id: 'yoy',   label: 'YoY',         days: 365, pretty: '365 days vs prior 365' },
];

function bucketByDay(findings, fromMs, toMs) {
  const dayMs = 86400000;
  const spanMs = toMs - fromMs;
  // Pick bucket width: daily for ≤45 days, weekly ≤180, monthly beyond.
  let bucketMs, bucketCount;
  if (spanMs <= 45 * dayMs)       { bucketMs = dayMs;         bucketCount = Math.ceil(spanMs / bucketMs); }
  else if (spanMs <= 180 * dayMs) { bucketMs = 7 * dayMs;     bucketCount = Math.ceil(spanMs / bucketMs); }
  else                            { bucketMs = 30 * dayMs;    bucketCount = Math.ceil(spanMs / bucketMs); }
  const buckets = Array.from({length: bucketCount}, (_, i) => ({
    t0: fromMs + i * bucketMs,
    t1: fromMs + (i + 1) * bucketMs,
    count: 0,
  }));
  for (const f of findings) {
    const t = new Date(f.ts || 0).getTime();
    if (t < fromMs || t > toMs) continue;
    const idx = Math.min(bucketCount - 1, Math.floor((t - fromMs) / bucketMs));
    if (idx >= 0) buckets[idx].count += 1;
  }
  return { buckets, bucketMs };
}

function TrendingGraph({ findings, comparison }) {
  const now = Date.now();
  const cmp = IR_COMPARISONS.find(c => c.id === comparison) || IR_COMPARISONS[0];
  // If no comparison: default to last 90d trend. Otherwise use the
  // comparison window.
  const rangeDays = cmp.days || 90;
  const fromCurrent = now - rangeDays * 86400000;
  const currentBuckets = bucketByDay(findings, fromCurrent, now).buckets;

  let priorBuckets = null;
  let currentTotal = 0, priorTotal = 0;
  currentBuckets.forEach(b => { currentTotal += b.count; });
  if (cmp.id !== 'none') {
    const priorFrom = fromCurrent - rangeDays * 86400000;
    const priorTo = fromCurrent;
    priorBuckets = bucketByDay(findings, priorFrom, priorTo).buckets;
    priorBuckets.forEach(b => { priorTotal += b.count; });
  }
  const delta = priorBuckets && priorTotal > 0
    ? ((currentTotal - priorTotal) / priorTotal) * 100
    : null;

  // SVG geometry — fixed viewBox, scales with container.
  const W = 800, H = 190;
  const pad = { top: 18, right: 18, bottom: 32, left: 44 };
  const series = [
    { name: 'current', color: '#5ef38c', buckets: currentBuckets, dashed: false },
    ...(priorBuckets ? [{ name: 'prior',   color: '#8ba58a', buckets: priorBuckets, dashed: true }] : []),
  ];
  const allCounts = series.flatMap(s => s.buckets.map(b => b.count));
  const maxVal = Math.max(1, ...allCounts);
  const xStep = (W - pad.left - pad.right) / Math.max(1, Math.max(...series.map(s => s.buckets.length - 1)));
  const yForCount = (c) => H - pad.bottom - (c / maxVal) * (H - pad.top - pad.bottom);
  const pointsFor = (buckets) => buckets.map((b, i) => {
    const x = pad.left + i * xStep;
    return `${x},${yForCount(b.count)}`;
  }).join(' ');
  const areaFor = (buckets) => {
    if (buckets.length === 0) return '';
    const points = buckets.map((b, i) => `${pad.left + i * xStep},${yForCount(b.count)}`);
    return `M ${pad.left},${H - pad.bottom} L ${points.join(' L ')} L ${pad.left + (buckets.length - 1) * xStep},${H - pad.bottom} Z`;
  };

  // Axis ticks: 4 x-ticks evenly spaced, 4 y-ticks.
  const xTickCount = 4;
  const xTicks = Array.from({length: xTickCount + 1}, (_, i) => {
    const b = currentBuckets[Math.round(i * (currentBuckets.length - 1) / xTickCount)];
    return b ? { x: pad.left + (b === currentBuckets[currentBuckets.length - 1] ? currentBuckets.length - 1 : currentBuckets.indexOf(b)) * xStep, label: new Date(b.t0).toISOString().slice(5, 10) } : null;
  }).filter(Boolean);
  const yTickCount = 4;
  const yTicks = Array.from({length: yTickCount + 1}, (_, i) => {
    const v = Math.round(maxVal * (i / yTickCount));
    return { y: yForCount(v), label: v };
  });

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Trending</span>
        <span className="k" style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <span className="mono" style={{fontSize:11}}>{cmp.pretty || `last ${rangeDays} days`}</span>
          {delta != null && (
            <span className={`chip chip--${delta >= 0 ? 'warn' : 'safe'}`}
                  style={{fontSize:10, fontFamily:"'JetBrains Mono', monospace"}}
                  title={`current ${currentTotal} · prior ${priorTotal}`}>
              {delta >= 0 ? '▲' : '▼'} {Math.abs(delta).toFixed(1)}%
            </span>
          )}
          <span className="mono" style={{fontSize:11, color:'var(--ink-soft)'}}>
            <span style={{color:'#5ef38c'}}>●</span> current {currentTotal}
            {priorBuckets && <> · <span style={{color:'#8ba58a'}}>●</span> prior {priorTotal}</>}
          </span>
        </span>
      </div>
      <div style={{padding:14}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:200, display:'block'}}>
          {/* grid */}
          {yTicks.map((t, i) => (
            <g key={'y'+i}>
              <line x1={pad.left} y1={t.y} x2={W - pad.right} y2={t.y}
                    stroke="var(--line-soft)" strokeWidth="0.5"/>
              <text x={pad.left - 6} y={t.y + 3} textAnchor="end"
                    fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-dim)">
                {t.label}
              </text>
            </g>
          ))}
          {/* x-axis labels */}
          {xTicks.map((t, i) => (
            <text key={'x'+i} x={t.x} y={H - pad.bottom + 16} textAnchor="middle"
                  fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-dim)">
              {t.label}
            </text>
          ))}
          {/* x-axis line */}
          <line x1={pad.left} y1={H - pad.bottom} x2={W - pad.right} y2={H - pad.bottom}
                stroke="var(--line)" strokeWidth="1"/>

          {/* area fills (subtle) */}
          {series.map((s, i) => (
            <path key={'area'+i} d={areaFor(s.buckets)}
                  fill={s.color} opacity={s.dashed ? 0.06 : 0.12}/>
          ))}
          {/* polylines */}
          {series.map((s, i) => (
            <polyline key={'line'+i}
                      fill="none" stroke={s.color} strokeWidth="1.6"
                      strokeDasharray={s.dashed ? '5 4' : 'none'}
                      points={pointsFor(s.buckets)}/>
          ))}
          {/* data points */}
          {currentBuckets.map((b, i) => (
            <circle key={'pt'+i}
                    cx={pad.left + i * xStep} cy={yForCount(b.count)}
                    r="2" fill="#5ef38c"
                    title={`${new Date(b.t0).toISOString().slice(0,10)} · ${b.count} findings`}/>
          ))}
        </svg>
      </div>
    </div>
  );
}

// ── Region map — stylised continent blocks by count ───────────
// Real world map would balloon the file; this uses five positioned
// rectangles laid out roughly geographically so the analyst reads
// 'where in the world' at a glance. Fill opacity tracks count.
const IR_REGION_LAYOUT = [
  { id: 'NA',    label: 'North America',         left:  3, top:  8, w: 28, h: 40 },
  { id: 'EU',    label: 'Europe',                left: 40, top:  8, w: 16, h: 28 },
  { id: 'APAC',  label: 'Asia-Pacific',          left: 60, top:  4, w: 37, h: 54 },
  { id: 'LATAM', label: 'Latin America',         left: 10, top: 52, w: 22, h: 42 },
  { id: 'MEA',   label: 'Middle East · Africa',  left: 40, top: 40, w: 22, h: 54 },
];
function RegionMap({ regions, onFilter }) {
  const byId = {};
  regions.forEach(r => { byId[r.region] = r.count; });
  const maxCount = Math.max(1, ...regions.map(r => r.count));
  const intensity = (n) => !n ? 0 : Math.max(0.18, 0.2 + (n / maxCount) * 0.6);

  return (
    <div style={{
      position:'relative', width:'100%', aspectRatio:'2 / 1',
      minHeight: 240,
      background:'var(--bg-1)',
      border:'1px solid var(--line-soft)',
      borderRadius:'var(--radius)',
      overflow:'hidden',
    }}>
      {/* Grid backdrop for map aesthetic */}
      <svg viewBox="0 0 100 100" preserveAspectRatio="none"
           style={{position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.18, pointerEvents:'none'}}>
        {Array.from({length: 11}).map((_, i) => (
          <line key={'h'+i} x1="0" y1={i*10} x2="100" y2={i*10}
                stroke="var(--line-strong)" strokeWidth="0.08"/>
        ))}
        {Array.from({length: 21}).map((_, i) => (
          <line key={'v'+i} x1={i*5} y1="0" x2={i*5} y2="100"
                stroke="var(--line-strong)" strokeWidth="0.04"/>
        ))}
      </svg>
      {IR_REGION_LAYOUT.map(r => {
        const count = byId[r.id] || 0;
        const alpha = intensity(count);
        const border = count > 0 ? 'var(--accent)' : 'var(--line-strong)';
        const labelColor = count >= maxCount * 0.66 ? '#ffb432'
                         : count >= maxCount * 0.33 ? '#5ef38c'
                         : 'var(--ink-bright)';
        return (
          <div key={r.id}
               onClick={() => count > 0 && onFilter && onFilter(r.id)}
               title={`${r.label} · ${count} findings in range`}
               style={{
                 position:'absolute',
                 left: r.left + '%', top: r.top + '%',
                 width: r.w + '%', height: r.h + '%',
                 background: `rgba(94, 243, 140, ${alpha})`,
                 border: '1px solid ' + border,
                 borderRadius: 4,
                 cursor: count > 0 ? 'pointer' : 'default',
                 display:'flex', flexDirection:'column',
                 alignItems:'center', justifyContent:'center',
                 padding: 6,
                 transition: 'background 200ms ease-out',
               }}>
            <span style={{
              fontFamily:"'Space Grotesk', sans-serif",
              fontWeight:700, fontSize: Math.max(18, Math.min(40, r.w * 1.2)),
              lineHeight:1, color: labelColor,
            }}>{count || '—'}</span>
            <span className="muted mono" style={{
              fontSize:10, marginTop:5,
              textTransform:'uppercase', letterSpacing:'0.1em',
              textAlign:'center',
            }}>
              {r.label}
            </span>
          </div>
        );
      })}
    </div>
  );
}

function DashboardSurface() {
  const [range, setRange] = React.useState(() => {
    try { return localStorage.getItem('ir:dashRange') || '7d'; } catch { return '7d'; }
  });
  const [comparison, setComparison] = React.useState(() => {
    try { return localStorage.getItem('ir:dashCmp') || 'none'; } catch { return 'none'; }
  });
  // Custom date range. Defaults to the last 30 days so a fresh
  // 'custom' click lands on a sensible window the analyst can then
  // adjust with the date inputs.
  const todayIso = new Date().toISOString().slice(0, 10);
  const daysAgoIso = (d) => new Date(Date.now() - d * 86400000).toISOString().slice(0, 10);
  const [customFrom, setCustomFrom] = React.useState(() => {
    try { return localStorage.getItem('ir:dashCustomFrom') || daysAgoIso(30); }
    catch { return daysAgoIso(30); }
  });
  const [customTo, setCustomTo] = React.useState(() => {
    try { return localStorage.getItem('ir:dashCustomTo') || todayIso; }
    catch { return todayIso; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('ir:dashRange', range); } catch {}
  }, [range]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:dashCmp', comparison); } catch {}
  }, [comparison]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:dashCustomFrom', customFrom); } catch {}
  }, [customFrom]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:dashCustomTo', customTo); } catch {}
  }, [customTo]);

  const findings = window.useIrFindings('?limit=1000');
  const [dispo, setDispo] = React.useState(readDispo);
  React.useEffect(() => {
    const resync = () => setDispo(readDispo());
    window.addEventListener('ir:demoChanged', resync);
    window.addEventListener('storage', resync);
    return () => {
      window.removeEventListener('ir:demoChanged', resync);
      window.removeEventListener('storage', resync);
    };
  }, []);

  // Compute the lower / upper bounds of the active window. Preset
  // ranges run from (now - days) to now. Custom range pulls its
  // bounds from the date inputs; to-date is inclusive of the full
  // day (end of day UTC).
  const [lowerMs, upperMs, effectiveDays] = React.useMemo(() => {
    if (range === 'custom') {
      const from = new Date(customFrom + 'T00:00:00').getTime();
      const to   = new Date(customTo   + 'T23:59:59').getTime();
      const lo = Math.min(from, to);
      const hi = Math.max(from, to);
      return [lo, hi, Math.max(1, Math.round((hi - lo) / 86400e3))];
    }
    const def = IR_TIME_RANGES.find(r => r.id === range && r.days != null) || IR_TIME_RANGES[1];
    return [Date.now() - def.days * 86400e3, Date.now(), def.days];
  }, [range, customFrom, customTo]);

  const all = (findings.data && findings.data.findings) || [];
  const windowed = React.useMemo(
    () => all.filter(f => {
      const t = new Date(f.ts || 0).getTime();
      return t >= lowerMs && t <= upperMs;
    }),
    [all, lowerMs, upperMs]
  );

  const stats = React.useMemo(() => {
    let open = 0, events = 0, fps = 0, escalated = 0;
    const respondTimes = [];
    const remediateTimes = [];
    const byAnalyst = new Map();
    const byCategory = new Map();
    const byRegion = new Map();
    const byUser = new Map();

    for (const f of windowed) {
      const d = dispo[f.id];
      if (!d) open += 1;
      else if (d.kind === 'event')   events += 1;
      else if (d.kind === 'fp')      fps += 1;
      else if (d.kind === 'escalate') escalated += 1;

      if (d) {
        if (typeof d.respond_min === 'number')   respondTimes.push(d.respond_min);
        if (typeof d.remediate_min === 'number') remediateTimes.push(d.remediate_min);
        const who = d.by || d.by_id || 'unknown';
        if (!byAnalyst.has(who)) byAnalyst.set(who, { name: who, event: 0, fp: 0, escalate: 0 });
        if (byAnalyst.get(who)[d.kind] != null) byAnalyst.get(who)[d.kind] += 1;
      }

      if (f.category) byCategory.set(f.category, (byCategory.get(f.category) || 0) + 1);
      const md = f.metadata || {};
      if (md.region) byRegion.set(md.region, (byRegion.get(md.region) || 0) + 1);
      const user = md.user || md.sender;
      if (user) {
        if (!byUser.has(user)) {
          byUser.set(user, {
            user, count: 0, region: md.region, dept: md.department,
            sev: { critical: 0, high: 0, medium: 0, low: 0, info: 0 },
            escalated: 0,
          });
        }
        const e = byUser.get(user);
        e.count += 1;
        if (e.sev[f.severity] != null) e.sev[f.severity] += 1;
        if (d && d.kind === 'escalate') e.escalated += 1;
      }
    }

    const analysts = Array.from(byAnalyst.values())
      .map(a => ({ ...a, total: a.event + a.fp + a.escalate }))
      .sort((a, b) => b.total - a.total);
    const categories = Array.from(byCategory.entries())
      .map(([cat, count]) => ({ cat, count }))
      .sort((a, b) => b.count - a.count);
    const regions = Array.from(byRegion.entries())
      .map(([region, count]) => ({ region, count }))
      .sort((a, b) => b.count - a.count);
    const repeats = Array.from(byUser.values())
      .filter(u => u.count >= 3)
      .sort((a, b) => b.count - a.count);

    return {
      total: windowed.length, open, events, fps, escalated,
      investigations: open + escalated,
      medianRespond: irMedian(respondTimes),
      p90Respond: irPercentile(respondTimes, 0.9),
      medianRemediate: irMedian(remediateTimes),
      p90Remediate: irPercentile(remediateTimes, 0.9),
      analysts, categories, regions, repeats,
      respondCount: respondTimes.length,
      remediateCount: remediateTimes.length,
    };
  }, [windowed, dispo]);

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      {/* Time range + comparison + live source chip */}
      <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
        <span className="label" style={{marginRight:6}}>Range</span>
        {IR_TIME_RANGES.map(r => (
          <button key={r.id}
                  className={`btn ${range === r.id ? 'primary' : 'ghost'}`}
                  onClick={() => setRange(r.id)}
                  style={{fontSize:11, padding:'5px 12px'}}>
            {r.label}
          </button>
        ))}
        {range === 'custom' && (
          <span style={{display:'inline-flex', alignItems:'center', gap:6, marginLeft:4, padding:'3px 8px', background:'var(--bg-2)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}>
            <input type="date"
                   value={customFrom}
                   max={customTo}
                   onChange={e => setCustomFrom(e.target.value)}
                   style={{
                     background:'var(--bg-1)', color:'var(--ink-bright)',
                     border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
                     padding:'3px 6px', fontSize:11,
                     fontFamily:"'JetBrains Mono', monospace",
                     colorScheme: 'dark',
                   }}/>
            <span className="muted mono" style={{fontSize:10}}>→</span>
            <input type="date"
                   value={customTo}
                   min={customFrom}
                   max={todayIso}
                   onChange={e => setCustomTo(e.target.value)}
                   style={{
                     background:'var(--bg-1)', color:'var(--ink-bright)',
                     border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
                     padding:'3px 6px', fontSize:11,
                     fontFamily:"'JetBrains Mono', monospace",
                     colorScheme: 'dark',
                   }}/>
            <span className="muted mono" style={{fontSize:10.5}}>· {effectiveDays}d</span>
          </span>
        )}
        <span style={{borderLeft:'1px solid var(--line)', height:22, margin:'0 6px'}}/>
        <span className="label" style={{marginRight:6}}>Compare</span>
        {IR_COMPARISONS.map(c => (
          <button key={c.id}
                  className={`btn ${comparison === c.id ? 'primary' : 'ghost'}`}
                  onClick={() => setComparison(c.id)}
                  title={c.pretty || 'current range only'}
                  style={{fontSize:11, padding:'5px 12px'}}>
            {c.label}
          </button>
        ))}
        <span className="muted mono" style={{fontSize:11, marginLeft:10}}>
          {stats.total} in range
        </span>
        <span style={{flex:1}}/>
        {isDemoMode() && (
          <span className="chip chip--warn" style={{fontSize:10}}>
            DEMO DATA · seeded fixtures
          </span>
        )}
        <window.LivePill source={findings.source} onClick={findings.refetch}
                         title="refetch across pods"/>
      </div>

      {/* KPI row */}
      <div style={{display:'flex', gap:'var(--gap)', flexWrap:'wrap'}}>
        <KpiTile label="Open queue"
                 value={stats.open}
                 hint={`of ${stats.total} total`}
                 tint="var(--red)" />
        <KpiTile label="Incidents · escalated"
                 value={stats.escalated}
                 hint="handed off to XSOAR"
                 tint="var(--amber)" />
        <KpiTile label="Investigations · active"
                 value={stats.investigations}
                 hint="open + escalated" />
        <KpiTile label="MTTR · respond"
                 value={fmtMinutes(stats.medianRespond)}
                 hint={`median · p90 ${fmtMinutes(stats.p90Respond)} · n=${stats.respondCount}`}
                 tint="var(--accent)" />
        <KpiTile label="MTTR · remediate"
                 value={fmtMinutes(stats.medianRemediate)}
                 hint={`median · p90 ${fmtMinutes(stats.p90Remediate)} · n=${stats.remediateCount}`}
                 tint="var(--accent)" />
      </div>

      {/* Findings density — last 24h heatmap (full width) */}
      <FindingsDensity findings={all} />

      {/* Trending — current vs prior (full width) */}
      <TrendingGraph findings={all} comparison={comparison} />

      {/* Breakdowns grid */}
      <div style={{display:'grid', gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)', gap:'var(--gap)'}}>

        {/* By analyst — stacked bar per analyst */}
        <div className="box">
          <div className="box-title">
            <span className="t">By analyst</span>
            <span className="k">dispositions in range · {stats.analysts.length} active</span>
          </div>
          <div style={{padding:14}}>
            {stats.analysts.length === 0 && (
              <div className="muted mono" style={{fontSize:11, padding:10, textAlign:'center'}}>
                — no dispositions recorded in this range —
              </div>
            )}
            {stats.analysts.map(a => {
              const max = stats.analysts[0].total || 1;
              const part = (n) => max ? (n / max * 100) : 0;
              return (
                <div key={a.name} style={{
                  display:'grid', gridTemplateColumns:'160px 1fr 56px',
                  gap:10, alignItems:'center', padding:'6px 0',
                  borderBottom:'1px solid var(--line-soft)',
                  fontSize:11.5, fontFamily:"'JetBrains Mono', monospace",
                }}>
                  <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--ink-bright)'}} title={a.name}>
                    {a.name}
                  </span>

function CryptoFileDrop({ file, onFile, label }) {

// Magic-byte signature table. Each entry tests a fixed prefix at a
// fixed offset; the first match wins. Not exhaustive — targeted at
// the file kinds IR analysts actually see (Office docs, archives,
// executables, images, OLE2). Add entries as needed; order matters
// because earlier entries take precedence on ambiguous prefixes.
const MAGIC_SIGNATURES = [
  { name: 'PDF',            bytes: [0x25,0x50,0x44,0x46,0x2D], offset: 0, mime: 'application/pdf',
    note: 'Adobe PDF — may be password-protected; use the decrypt tool if the body renders as cipher.' },
  { name: 'ZIP / Office (docx/xlsx/pptx)', bytes: [0x50,0x4B,0x03,0x04], offset: 0, mime: 'application/zip',
    note: 'PK archive · OOXML Office docs are ZIPs — extract to see internals.' },
  { name: 'ZIP (empty archive)', bytes: [0x50,0x4B,0x05,0x06], offset: 0, mime: 'application/zip' },
  { name: 'ZIP (spanned archive)', bytes: [0x50,0x4B,0x07,0x08], offset: 0, mime: 'application/zip' },
  { name: '7z',             bytes: [0x37,0x7A,0xBC,0xAF,0x27,0x1C], offset: 0, mime: 'application/x-7z-compressed' },
  { name: 'RAR 4',          bytes: [0x52,0x61,0x72,0x21,0x1A,0x07,0x00], offset: 0, mime: 'application/vnd.rar' },
  { name: 'RAR 5',          bytes: [0x52,0x61,0x72,0x21,0x1A,0x07,0x01,0x00], offset: 0, mime: 'application/vnd.rar' },
  { name: 'gzip',           bytes: [0x1F,0x8B], offset: 0, mime: 'application/gzip' },
  { name: 'bzip2',          bytes: [0x42,0x5A,0x68], offset: 0, mime: 'application/x-bzip2' },
  { name: 'xz',             bytes: [0xFD,0x37,0x7A,0x58,0x5A,0x00], offset: 0, mime: 'application/x-xz' },
  { name: 'PNG',            bytes: [0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A], offset: 0, mime: 'image/png' },
  { name: 'JPEG',           bytes: [0xFF,0xD8,0xFF], offset: 0, mime: 'image/jpeg' },
  { name: 'GIF 87a',        bytes: [0x47,0x49,0x46,0x38,0x37,0x61], offset: 0, mime: 'image/gif' },
  { name: 'GIF 89a',        bytes: [0x47,0x49,0x46,0x38,0x39,0x61], offset: 0, mime: 'image/gif' },
  { name: 'BMP',            bytes: [0x42,0x4D], offset: 0, mime: 'image/bmp' },
  { name: 'WebP',           bytes: [0x52,0x49,0x46,0x46], offset: 0, mime: 'image/webp',
    note: 'RIFF container — also WAV / AVI; check bytes 8-11 for format tag.' },
  { name: 'PE (Windows EXE/DLL)', bytes: [0x4D,0x5A], offset: 0, mime: 'application/vnd.microsoft.portable-executable',
    note: 'MS-DOS stub · PE header at offset in bytes 60-63.' },
  { name: 'ELF (Linux/Unix binary)', bytes: [0x7F,0x45,0x4C,0x46], offset: 0, mime: 'application/x-executable' },
  { name: 'Mach-O (32)',    bytes: [0xFE,0xED,0xFA,0xCE], offset: 0, mime: 'application/x-mach-binary' },
  { name: 'Mach-O (64)',    bytes: [0xFE,0xED,0xFA,0xCF], offset: 0, mime: 'application/x-mach-binary' },
  { name: 'Mach-O (universal)', bytes: [0xCA,0xFE,0xBA,0xBE], offset: 0, mime: 'application/x-mach-binary' },
  { name: 'OLE2 (legacy Office · doc/xls/msg)', bytes: [0xD0,0xCF,0x11,0xE0,0xA1,0xB1,0x1A,0xE1], offset: 0, mime: 'application/x-ole-storage',
    note: 'Legacy Office compound file · Outlook MSG, DOC, XLS all use this.' },
  { name: 'SQLite 3',       bytes: [0x53,0x51,0x4C,0x69,0x74,0x65,0x20,0x66,0x6F,0x72,0x6D,0x61,0x74,0x20,0x33,0x00], offset: 0, mime: 'application/x-sqlite3' },
  { name: 'Parquet',        bytes: [0x50,0x41,0x52,0x31], offset: 0, mime: 'application/vnd.apache.parquet' },
  { name: 'Java class',     bytes: [0xCA,0xFE,0xBA,0xBE], offset: 0, mime: 'application/java-vm' },
  { name: 'MP3',            bytes: [0x49,0x44,0x33], offset: 0, mime: 'audio/mpeg' },
  { name: 'MP4',            bytes: [0x66,0x74,0x79,0x70], offset: 4, mime: 'video/mp4' },
  { name: 'MKV / WebM',     bytes: [0x1A,0x45,0xDF,0xA3], offset: 0, mime: 'video/x-matroska' },
  { name: 'Plain text (UTF-8 BOM)', bytes: [0xEF,0xBB,0xBF], offset: 0, mime: 'text/plain' },
];

function identifyMagic(bytes) {
  if (!bytes || !bytes.length) return null;
  for (const sig of MAGIC_SIGNATURES) {
    if (bytes.length < sig.offset + sig.bytes.length) continue;
    let hit = true;
    for (let i = 0; i < sig.bytes.length; i++) {
      if (bytes[sig.offset + i] !== sig.bytes[i]) { hit = false; break; }
    }
    if (hit) return sig;
  }
  return null;
}

// Heuristic guess for plain text when no magic matched. Samples the
// first 512 bytes and checks that >= 95% are printable ASCII +
// common whitespace. Skips BOM-prefixed UTF-8 (handled by the
// signature table).
function looksLikeText(bytes) {
  if (!bytes || !bytes.length) return false;
  const sample = bytes.slice(0, Math.min(512, bytes.length));
  let printable = 0;
  for (const b of sample) {
    if (b === 0x09 || b === 0x0A || b === 0x0D) printable++;
    else if (b >= 0x20 && b <= 0x7E) printable++;
  }
  return printable / sample.length >= 0.95;
}

// Shannon entropy over 8-bit bytes. 0–8 range. Each byte is one of
// 256 values so max entropy = log2(256) = 8. Tier map is opinionated
// for forensic triage rather than theoretically precise.
function shannonEntropy(bytes) {
  if (!bytes || bytes.length === 0) return 0;
  const counts = new Uint32Array(256);
  for (let i = 0; i < bytes.length; i++) counts[bytes[i]]++;
  let H = 0;
  const n = bytes.length;
  for (let i = 0; i < 256; i++) {
    if (!counts[i]) continue;
    const p = counts[i] / n;
    H -= p * Math.log2(p);
  }
  return H;
}
function entropyTier(H) {
  if (H < 2.5) return { label: 'very redundant', hint: 'lots of repeating bytes — text with long runs, empty-ish padding, or fixed-value binary', color: 'var(--ink-soft)' };
  if (H < 5.5) return { label: 'text · structured', hint: 'typical of plain text, JSON, XML, CSV, HTML, source code', color: '#94d0ff' };
  if (H < 7.0) return { label: 'mixed · lightly compressed', hint: 'document formats (PDF, Office), light compression, or native binaries', color: 'var(--accent)' };
  if (H < 7.8) return { label: 'compressed · binary', hint: 'archives (zip / gzip / 7z / rar), media (jpeg / mp3 / mp4), packed binaries', color: 'var(--amber)' };
  return { label: 'high entropy · likely encrypted', hint: 'random or near-random bytes — true encryption, compressed+encrypted, or cryptographic keys', color: 'var(--red)' };
}

// ── File Inspector tab — picker + metadata + magic-byte
//    identification + Shannon entropy + hex dump.
function CryptoFileInspector() {
  const [file, setFile] = React.useState(null);
  const [firstBytes, setFirstBytes] = React.useState(null);
  const [entropy, setEntropy] = React.useState(null);
  const [computing, setComputing] = React.useState(false);
  const [readError, setReadError] = React.useState(null);

  // Read up to 512 bytes for the hex-dump preview + magic check,
  // plus up to 4 MiB for entropy. Both runs share a cancellation
  // flag so switching files mid-load doesn't stamp stale state.
  React.useEffect(() => {
    if (!file) {
      setFirstBytes(null); setEntropy(null); setComputing(false); setReadError(null);
      return;
    }
    let cancelled = false;
    setReadError(null);
    setEntropy(null);
    setComputing(true);

    const dumpSize    = Math.min(512, file.size);
    const entropySize = Math.min(4 * 1024 * 1024, file.size);

    Promise.all([
      file.slice(0, dumpSize).arrayBuffer().then(buf => new Uint8Array(buf)),
      file.slice(0, entropySize).arrayBuffer().then(buf => new Uint8Array(buf)),
    ]).then(([dump, full]) => {
      if (cancelled) return;
      setFirstBytes(dump);
      setEntropy({
        value: shannonEntropy(full),
        sampled: entropySize < file.size,
        sampleSize: entropySize,
        fileSize: file.size,
      });
      setComputing(false);
    }).catch(e => {
      if (cancelled) return;
      setReadError(String(e && e.message || e));
      setComputing(false);
    });

    return () => { cancelled = true; };
  }, [file]);

  const magic = firstBytes ? identifyMagic(firstBytes) : null;
  const extension = file
    ? (() => {
        const i = file.name.lastIndexOf('.');
        return i >= 0 && i < file.name.length - 1 ? file.name.slice(i + 1).toLowerCase() : null;

    : null;
  const mimeMatches = magic && file && file.type
    ? (magic.mime === file.type
       || (magic.mime === 'application/zip' && /vnd\.openxmlformats/.test(file.type)))
    : null;

  const hexByte = (b) => b.toString(16).padStart(2, '0').toUpperCase();

  return (

          next commit (3d).
        </div>
      )}

      {readError && (
        <div className="note" style={{borderColor:'var(--red)', background:'var(--red-wash)', color:'var(--red)', fontSize:12}}>

      )}

      {file && (

            <div style={{padding:14}}>

                    (file.size / 1073741824).toFixed(2) + ' GiB'

                          {magic.name}
                        </span>
                        {magic.mime && (
                          <span className="muted mono" style={{fontSize:11}}>
                            → <span style={{color:'var(--ink-bright)'}}>{magic.mime}</span>
                          </span>
                        )}
                        {mimeMatches === false && (
                          <span className="chip chip--red" style={{fontSize:10}}
                                title={`browser reports ${file.type} but magic bytes say ${magic.mime}`}>
                            ⚠ MIME / content mismatch
                          </span>
                        )}
                      </>
                    ) : looksLikeText(firstBytes) ? (
                      <>
                        <span className="chip chip--ghost" style={{fontSize:11, padding:'4px 10px', fontFamily:"'Space Grotesk', sans-serif", fontWeight:600}}>
                          Plain text (heuristic)
                        </span>
                        <span className="muted" style={{fontSize:11}}>
                          no magic matched; ≥95% of the first 512 bytes are printable ASCII
                        </span>
                      </>
                    ) : (
                      <>
                        <span className="chip chip--warn" style={{fontSize:11, padding:'4px 10px', fontFamily:"'Space Grotesk', sans-serif", fontWeight:600}}>
                          Unknown / possibly encrypted
                        </span>
                        <span className="muted" style={{fontSize:11}}>
                          no matching signature · high-entropy files produce this
                        </span>
                      </>
                    )}
                  </div>

                  {/* Matched bytes visualisation */}
                  {magic && (
                    <div style={{
                      padding:10, background:'var(--bg-1)',
                      border:'1px dashed var(--line-soft)', borderRadius:'var(--radius)',

                    }}>
                      <span className="muted" style={{fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.1em'}}>matched</span>
                      <span>
                        {magic.bytes.map((b, i) => (
                          <span key={i} style={{
                            color:'var(--safe, var(--accent))',
                            background:'var(--accent-wash)',
                            padding:'2px 4px', margin:'0 2px',
                            borderRadius:2, fontWeight:600,
                          }}>{hexByte(b)}</span>
                        ))}
                      </span>
                      {magic.offset > 0 && (
                        <span className="muted" style={{fontSize:10.5}}>at offset +{magic.offset}</span>
                      )}
                    </div>
                  )}

                  {magic && magic.note && (
                    <div className="muted" style={{fontSize:11, lineHeight:1.6, marginTop:10, padding:'8px 10px', background:'var(--bg-1)', borderLeft:'2px solid var(--accent)', borderRadius:2}}>
                      {magic.note}
                    </div>
                  )}

                  {/* Extension vs magic sanity check */}
                  {magic && extension && (() => {
                    const extHints = {
                      'pdf': 'PDF', 'zip': 'ZIP', '7z': '7z', 'rar': 'RAR',
                      'gz': 'gzip', 'xz': 'xz', 'bz2': 'bzip2',
                      'png': 'PNG', 'jpg': 'JPEG', 'jpeg': 'JPEG', 'gif': 'GIF',
                      'docx': 'ZIP / Office', 'xlsx': 'ZIP / Office', 'pptx': 'ZIP / Office',
                      'doc': 'OLE2', 'xls': 'OLE2', 'msg': 'OLE2', 'ppt': 'OLE2',
                      'exe': 'PE', 'dll': 'PE',
                      'sqlite': 'SQLite 3', 'db': 'SQLite 3',
                    };
                    const expected = extHints[extension];
                    if (!expected) return null;
                    const agrees = magic.name.startsWith(expected);
                    return (
                      <div className="muted" style={{fontSize:11, lineHeight:1.6, marginTop:10}}>
                        extension <span className="mono" style={{color:'var(--ink-bright)'}}>.{extension}</span>{' '}
                        {agrees
                          ? <span className="chip chip--safe" style={{fontSize:9, marginLeft:4}}>matches magic</span>
                          : <span className="chip chip--red" style={{fontSize:9, marginLeft:4}}>disagrees with magic (possible spoofing)</span>}
                      </div>
                    );
                  })()}
                </>
              )}
            </div>
          </div>

          {/* Shannon entropy */}
          <div className="box">
            <div className="box-title">
              <span className="t">Shannon entropy</span>
              <span className="k">
                8-bit bytes · 0–8 range · high values suggest encryption / compression
              </span>
            </div>
            <div style={{padding:14}}>
              {computing && (
                <div className="muted mono" style={{fontSize:11, textAlign:'center', padding:10}}>
                  computing…
                </div>
              )}
              {!computing && entropy && (() => {
                const H = entropy.value;
                const tier = entropyTier(H);
                return (
                  <>
                    <div style={{display:'flex', alignItems:'center', gap:14, flexWrap:'wrap', marginBottom:12}}>
                      <span style={{
                        fontFamily:"'Space Grotesk', sans-serif",
                        fontSize:28, fontWeight:700, lineHeight:1,
                        color: tier.color,
                      }}>
                        {H.toFixed(3)}
                      </span>
                      <span className="muted mono" style={{fontSize:11}}>bits/byte</span>
                      <span className="chip" style={{
                        fontSize:10, padding:'4px 10px',
                        color: tier.color,
                        border: '1px solid ' + tier.color,
                        background: 'transparent',
                        fontFamily:"'Space Grotesk', sans-serif",
                        fontWeight: 600, textTransform: 'uppercase',
                        letterSpacing: '0.08em',
                      }}>
                        {tier.label}
                      </span>
                    </div>

                    {/* Entropy bar with tier markers */}
                    <div style={{position:'relative', height: 20, background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)', overflow:'hidden'}}>
                      <div style={{
                        position:'absolute', inset:0,
                        background: `linear-gradient(to right,
                          var(--ink-soft) 0%,
                          var(--ink-soft) 31%,
                          #94d0ff 31%,
                          #94d0ff 68%,
                          var(--accent) 68%,
                          var(--accent) 87%,
                          var(--amber) 87%,
                          var(--amber) 97%,
                          var(--red) 97%,
                          var(--red) 100%)`,
                        opacity: 0.2,
                      }}/>
                      <div style={{
                        position:'absolute', top: 0, left: 0, bottom: 0,
                        width: Math.max(0, Math.min(100, (H / 8) * 100)) + '%',
                        background: tier.color, opacity: 0.6,
                        transition: 'width 200ms ease-out',
                      }}/>
                      {/* Ticks */}
                      {[2.5, 5.5, 7.0, 7.8].map(t => (
                        <div key={t} style={{
                          position:'absolute', top: 0, bottom: 0,
                          left: (t / 8 * 100) + '%',
                          width: 1, background: 'var(--line-strong)',
                        }}/>
                      ))}
                      {/* Current-value arrow */}
                      <div style={{
                        position:'absolute', top:'50%', transform:'translateY(-50%)',
                        left: Math.max(0, Math.min(100, (H / 8) * 100)) + '%',
                        width: 2, height: '100%',
                        background: 'var(--ink-bright)', marginLeft: -1,
                      }}/>
                    </div>
                    <div style={{display:'flex', justifyContent:'space-between', fontFamily:"'JetBrains Mono', monospace", fontSize:9.5, color:'var(--ink-dim)', marginTop:4, letterSpacing:'0.08em'}}>
                      <span>0</span>
                      <span>2.5 · text</span>
                      <span>5.5 · structured</span>
                      <span>7.0 · mixed</span>
                      <span>7.8 · compressed</span>
                      <span>8 · encrypted</span>
                    </div>

                    <div className="muted" style={{fontSize:11, lineHeight:1.6, marginTop:12, padding:'8px 10px', background:'var(--bg-1)', borderLeft:'2px solid ' + tier.color, borderRadius:2}}>
                      {tier.hint}
                    </div>

                    {entropy.sampled && (
                      <div className="muted mono" style={{fontSize:10.5, marginTop:8, textAlign:'right'}}>
                        computed on first <span style={{color:'var(--ink)'}}>{(entropy.sampleSize / 1048576).toFixed(1)} MiB</span>
                        {' of '}<span style={{color:'var(--ink)'}}>{(entropy.fileSize / 1048576).toFixed(1)} MiB</span>
                        {' · large-file sampling'}
                      </div>
                    )}
                  </>
                );
              })()}
            </div>
          </div>

          {/* Hex dump — first 512 bytes */}
          <div className="box">
            <div className="box-title">
              <span className="t">Hex dump</span>
              <span className="k">
                first {firstBytes ? firstBytes.length : 0} bytes · offset · hex · ASCII
              </span>
            </div>
            <div style={{padding:14}}>
              {firstBytes && firstBytes.length > 0 && (
                <div style={{
                  fontFamily:"'JetBrains Mono', monospace",
                  fontSize: 11, lineHeight: 1.55,
                  background:'var(--bg-1)',
                  border:'1px solid var(--line-soft)',
                  borderRadius: 'var(--radius)',
                  padding: 10,
                  overflowX: 'auto',
                  whiteSpace: 'nowrap',
                }}>
                  {(() => {
                    const rows = [];
                    const bytes = firstBytes;
                    // 16 bytes per row, magic highlight inside the
                    // matched prefix.
                    const magicLen = magic ? magic.offset + magic.bytes.length : 0;
                    for (let off = 0; off < bytes.length; off += 16) {
                      const rowBytes = bytes.slice(off, Math.min(off + 16, bytes.length));
                      rows.push({ off, rowBytes });
                    }
                    return rows.map(({ off, rowBytes }) => {
                      return (
                        <div key={off} style={{display:'grid', gridTemplateColumns:'70px 1fr 170px', gap:16}}>
                          <span style={{color:'var(--ink-dim)'}}>
                            {off.toString(16).padStart(8, '0').toUpperCase()}
                          </span>
                          <span>
                            {Array.from(rowBytes).map((b, i) => {
                              const absPos = off + i;
                              const inMagic = magic && absPos >= magic.offset && absPos < magic.offset + magic.bytes.length;
                              return (
                                <span key={i} style={{
                                  color: inMagic ? '#5ef38c' : 'var(--ink)',
                                  fontWeight: inMagic ? 600 : 400,
                                  background: inMagic ? 'rgba(94,243,140,0.18)' : 'transparent',
                                  padding: '0 2px',
                                  marginRight: i === 7 ? 8 : 1,
                                }}>
                                  {b.toString(16).padStart(2, '0').toUpperCase()}
                                </span>
                              );
                            })}
                          </span>
                          <span style={{
                            color: 'var(--ink-soft)',
                            borderLeft: '1px solid var(--line-soft)',
                            paddingLeft: 10,
                          }}>
                            {Array.from(rowBytes).map((b, i) => {
                              const ch = (b >= 0x20 && b <= 0x7E) ? String.fromCharCode(b) : '·';
                              const absPos = off + i;
                              const inMagic = magic && absPos >= magic.offset && absPos < magic.offset + magic.bytes.length;
                              return (
                                <span key={i} style={{
                                  color: inMagic ? '#5ef38c' : 'inherit',
                                  fontWeight: inMagic ? 600 : 400,
                                }}>
                                  {ch}
                                </span>
                              );
                            })}
                          </span>
                        </div>
                      );
                    });
                  })()}
                </div>
              )}
              {firstBytes && file.size > firstBytes.length && (
                <div className="muted mono" style={{fontSize:10.5, marginTop:8, textAlign:'right'}}>
                  … {(file.size - firstBytes.length).toLocaleString()} more bytes not shown
                </div>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// Convert an ArrayBuffer / Uint8Array to a lowercase hex string.
function bytesToHex(buf) {
  const b = buf instanceof Uint8Array ? buf : new Uint8Array(buf);
  const out = new Array(b.length);
  for (let i = 0; i < b.length; i++) out[i] = b[i].toString(16).padStart(2, '0');
  return out.join('');
}

// MD5 — RFC 1321, ~2 KiB of bundled code because WebCrypto
// deliberately doesn't ship it. Operates on a Uint8Array input
// and returns a 16-byte Uint8Array digest. Correctness spot-
// checked against the RFC test vectors:
//   md5("")    = d41d8cd98f00b204e9800998ecf8427e
//   md5("a")   = 0cc175b9c0f1b6a831c399e269772661
//   md5("abc") = 900150983cd24fb0d6963f7d28e17f72
const MD5_K = (() => {
  const k = new Uint32Array(64);
  for (let i = 0; i < 64; i++) {
    k[i] = Math.floor(Math.abs(Math.sin(i + 1)) * 0x100000000) >>> 0;
  }
  return k;
})();
const MD5_S = [
  7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22,
  5,  9, 14, 20, 5,  9, 14, 20, 5,  9, 14, 20, 5,  9, 14, 20,
  4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23,
  6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21,
];
function md5(bytes) {
  const msgLen = bytes.length;
  // Padded length: msg + 0x80 + zeros + 8-byte length, rounded up
  // to a multiple of 64.
  const padLen = ((msgLen + 9 + 63) >>> 6) << 6;
  const msg = new Uint8Array(padLen);
  msg.set(bytes);
  msg[msgLen] = 0x80;
  // 64-bit little-endian bit length. Upper 32 bits stay zero for
  // inputs below 2^29 bytes (~512 MiB) — well above any file the
  // browser will hash in one pass anyway.
  const bitLen = msgLen * 8;
  msg[padLen - 8] = bitLen         & 0xff;
  msg[padLen - 7] = (bitLen >>>  8) & 0xff;
  msg[padLen - 6] = (bitLen >>> 16) & 0xff;
  msg[padLen - 5] = (bitLen >>> 24) & 0xff;

  let a = 0x67452301, b = 0xefcdab89, c = 0x98badcfe, d = 0x10325476;
  const rotl = (x, n) => ((x << n) | (x >>> (32 - n))) >>> 0;

  const M = new Uint32Array(16);
  for (let off = 0; off < padLen; off += 64) {
    for (let i = 0; i < 16; i++) {
      M[i] = (msg[off + i*4])
           | (msg[off + i*4 + 1] << 8)
           | (msg[off + i*4 + 2] << 16)
           | (msg[off + i*4 + 3] << 24);
    }
    let A = a, B = b, C = c, D = d;
    for (let i = 0; i < 64; i++) {
      let F, g;
      if (i < 16)      { F = (B & C) | (~B & D);        g = i; }
      else if (i < 32) { F = (D & B) | (~D & C);        g = (5*i + 1) % 16; }
      else if (i < 48) { F = B ^ C ^ D;                 g = (3*i + 5) % 16; }
      else             { F = C ^ (B | ~D);              g = (7*i) % 16; }
      F = (F + A + MD5_K[i] + M[g]) >>> 0;
      A = D; D = C; C = B;
      B = (B + rotl(F, MD5_S[i])) >>> 0;
    }
    a = (a + A) >>> 0;
    b = (b + B) >>> 0;
    c = (c + C) >>> 0;
    d = (d + D) >>> 0;
  }

  const out = new Uint8Array(16);
  const w = (v, off) => {
    out[off]   =  v         & 0xff;
    out[off+1] = (v >>>  8) & 0xff;
    out[off+2] = (v >>> 16) & 0xff;
    out[off+3] = (v >>> 24) & 0xff;
  };
  w(a, 0); w(b, 4); w(c, 8); w(d, 12);
  return out;
}

// Algorithms surfaced in the Hash Computer tab. SHA-family delegate
// to WebCrypto; MD5 uses the bundled impl above (WebCrypto
// deliberately omits it).
const HASH_ALGOS = [
  { id: 'MD5',     label: 'MD5',     md5: true,             note: 'legacy · fast malware-catalogue lookup (VirusTotal, MalwareBazaar)' },
  { id: 'SHA-1',   label: 'SHA-1',   webcrypto: 'SHA-1',    note: 'legacy · broken for collisions · fine for malware catalogues' },
  { id: 'SHA-256', label: 'SHA-256', webcrypto: 'SHA-256',  note: 'industry standard · 64 hex chars' },
  { id: 'SHA-384', label: 'SHA-384', webcrypto: 'SHA-384',  note: 'SHA-2 truncated · 96 hex chars' },
  { id: 'SHA-512', label: 'SHA-512', webcrypto: 'SHA-512',  note: '128 hex chars' },
];

// ── Hash Computer tab ─────────────────────────────────────────
// Picks a file, streams it into WebCrypto.subtle.digest for each
// algorithm, renders each hash with a copy-to-clipboard button.
// Future 4b will add MD5 via a bundled impl; 4c adds a 'compare
// against known hash' input for malware-catalogue checks.
function CryptoHashComputer() {
  const [file, setFile] = React.useState(null);
  const [hashes, setHashes] = React.useState({});
  const [computing, setComputing] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [flash, setFlash] = React.useState(null);
  const [compareInput, setCompareInput] = React.useState('');
  const ping = (m) => { setFlash(m); setTimeout(() => setFlash(null), 1100); };

  // Auto-detect the algorithm from hex-string length. Normalises
  // whitespace + strips common prefixes ("sha256:" / "md5=") so
  // paste-from-VirusTotal-style hashes just work.
  const compareResult = React.useMemo(() => {
    const raw = (compareInput || '').trim();
    if (!raw) return null;
    const cleaned = raw
      .replace(/^[A-Za-z0-9-]+\s*[:=]\s*/, '') // strip "sha256:" / "md5 = "
      .replace(/\s+/g, '')                     // strip internal whitespace
      .toLowerCase();
    if (!/^[0-9a-f]+$/.test(cleaned)) {
      return { state: 'invalid', reason: 'hash must be hex only (0-9, a-f)' };
    }
    const byLen = {
      32:  'MD5',
      40:  'SHA-1',
      64:  'SHA-256',
      96:  'SHA-384',
      128: 'SHA-512',
    };
    const algo = byLen[cleaned.length];
    if (!algo) {
      return { state: 'invalid', reason: cleaned.length + ' hex chars doesn\'t match any known algorithm (32/40/64/96/128)' };
    }
    const h = hashes[algo];
    if (!h || !h.hex) {
      return { state: 'pending', algo, input: cleaned };
    }
    return {
      state: cleaned === h.hex ? 'match' : 'mismatch',
      algo, input: cleaned, computed: h.hex,
    };
  }, [compareInput, hashes]);

  // Compute every hash in parallel when the file changes. WebCrypto
  // accepts an ArrayBuffer — we read the file once and reuse for
  // every algorithm, so the file's only pulled off disk once.
  React.useEffect(() => {
    if (!file) {
      setHashes({}); setComputing(false); setError(null);
      return;
    }
    let cancelled = false;
    setHashes({}); setError(null); setComputing(true);

    file.arrayBuffer()
      .then(buf => Promise.all(HASH_ALGOS.map(a => {
        // MD5 goes through the bundled impl (WebCrypto doesn't
        // support it); SHA-family go through crypto.subtle. Both
        // paths return Uint8Array — bytesToHex handles either.
        if (a.md5) {
          try {
            return Promise.resolve({ id: a.id, hex: bytesToHex(md5(new Uint8Array(buf))) });
          } catch (e) {
            return Promise.resolve({ id: a.id, error: String(e && e.message || e) });
          }
        }
        return crypto.subtle.digest(a.webcrypto, buf)
          .then(d => ({ id: a.id, hex: bytesToHex(d) }))
          .catch(e => ({ id: a.id, error: String(e && e.message || e) }));
      })))
      .then(results => {
        if (cancelled) return;
        const map = {};
        for (const r of results) map[r.id] = r;
        setHashes(map);
        setComputing(false);
      })
      .catch(e => {
        if (cancelled) return;
        setError(String(e && e.message || e));
        setComputing(false);
      });

    return () => { cancelled = true; };
  }, [file]);

  const copyHash = (id, hex) => {
    try {
      navigator.clipboard.writeText(hex);
      ping('Copied ' + id);
    } catch {
      ping('Copy failed');
    }
  };

  return (
    <div style={{padding:16, display:'grid', gap:14}}>
      <CryptoFileDrop file={file} onFile={setFile}
                      label="or click to pick · file streamed to WebCrypto · no network upload"/>

      {!file && (
        <div className="muted" style={{fontSize:11.5, lineHeight:1.7, padding:'0 4px'}}>
          Pick any file. SHA-1 / SHA-256 / SHA-384 / SHA-512 compute in the browser
          via WebCrypto. MD5 lands next (phase 4b) via a bundled implementation —
          WebCrypto doesn't include it. 'Compare against known hash' input for
          malware-catalogue checks lands in 4c.
        </div>
      )}

      {error && (
        <div className="note" style={{borderColor:'var(--red)', background:'var(--red-wash)', color:'var(--red)', fontSize:12}}>
          <b>Hash failed:</b> {error}
        </div>
      )}

      {file && (
        <div className="box">
          <div className="box-title">
            <span className="t">Compare against known hash</span>
            <span className="k">paste a hash · algorithm auto-detected by length</span>
          </div>
          <div style={{padding:14}}>
            <input type="text"
                   value={compareInput}
                   onChange={(e) => setCompareInput(e.target.value)}
                   placeholder="e.g. d41d8cd98f00b204e9800998ecf8427e · or sha256:… · or MD5 = …"
                   className="mono"
                   style={{
                     width:'100%', boxSizing:'border-box',
                     padding:'8px 10px', fontSize:12,
                     background:'var(--bg-1)', color:'var(--ink-bright)',
                     border:'1px solid ' + (
                       !compareResult ? 'var(--line-strong)' :
                       compareResult.state === 'match' ? 'var(--safe)' :
                       compareResult.state === 'mismatch' ? 'var(--red)' :
                       compareResult.state === 'invalid' ? 'var(--amber)' :
                       'var(--line-strong)'
                     ),
                     borderRadius:'var(--radius)',
                   }}/>
            {compareResult && (
              <div style={{marginTop:10, fontSize:12, lineHeight:1.6, fontFamily:"'JetBrains Mono', monospace"}}>
                {compareResult.state === 'match' && (
                  <div style={{padding:'10px 12px', background:'var(--accent-wash)', border:'1px solid var(--safe)', borderRadius:'var(--radius)'}}>
                    <div>
                      <span className="chip chip--safe" style={{fontSize:10, marginRight:8}}>MATCH</span>
                      <b style={{color:'var(--ink-bright)'}}>{compareResult.algo}</b>
                      <span className="muted"> · this file matches the given hash</span>
                    </div>
                    <div className="muted" style={{fontSize:10.5, marginTop:6}}>
                      Useful for verifying a downloaded sample, confirming evidence integrity,
                      or matching against a known-indicator feed.
                    </div>
                  </div>
                )}
                {compareResult.state === 'mismatch' && (
                  <div style={{padding:'10px 12px', background:'var(--red-wash)', border:'1px solid var(--red)', borderRadius:'var(--radius)'}}>
                    <div>
                      <span className="chip chip--red" style={{fontSize:10, marginRight:8}}>NO MATCH</span>
                      <b style={{color:'var(--ink-bright)'}}>{compareResult.algo}</b>
                      <span className="muted"> · this file's {compareResult.algo} differs</span>
                    </div>
                    <div style={{marginTop:8, fontSize:10.5, color:'var(--ink-soft)', display:'grid', gridTemplateColumns:'80px 1fr', gap:'2px 10px'}}>
                      <span>given</span>    <span style={{color:'var(--red)', wordBreak:'break-all'}}>{compareResult.input}</span>
                      <span>computed</span> <span style={{color:'var(--accent)', wordBreak:'break-all'}}>{compareResult.computed}</span>
                    </div>
                  </div>
                )}
                {compareResult.state === 'invalid' && (
                  <div className="muted" style={{padding:'8px 10px', fontSize:11}}>
                    <span className="chip chip--amber" style={{fontSize:9, marginRight:8}}>CHECK</span>
                    {compareResult.reason}
                  </div>
                )}
                {compareResult.state === 'pending' && (
                  <div className="muted" style={{padding:'8px 10px', fontSize:11}}>
                    detected <b style={{color:'var(--ink-bright)'}}>{compareResult.algo}</b> · waiting for that hash to finish computing…
                  </div>
                )}
              </div>
            )}
            {!compareResult && (
              <div className="muted" style={{fontSize:11, marginTop:8, lineHeight:1.6}}>
                Paste a hash from VirusTotal / MalwareBazaar / a reference checksum — the
                algorithm is inferred from its length. Common prefixes
                (<span className="mono">sha256:</span>, <span className="mono">md5=</span>,
                etc.) are stripped automatically.
              </div>
            )}
          </div>
        </div>
      )}

      {file && (
        <div className="box">
          <div className="box-title">
            <span className="t">Content hashes</span>
            <span className="k">
              {computing
                ? <span className="mono" style={{fontSize:11}}>computing…</span>
                : <>
                    <span className="mono" style={{fontSize:11}}>{Object.keys(hashes).length} of {HASH_ALGOS.length} ready</span>
                    {flash && <span className="mono" style={{fontSize:10.5, color:'var(--safe)', marginLeft:8}}>✓ {flash}</span>}
                  </>}
            </span>
          </div>
          <div style={{padding:14, display:'grid', gap:10}}>
            {HASH_ALGOS.map(a => {
              const h = hashes[a.id];
              return (
                <div key={a.id} style={{
                  padding: '10px 12px',
                  background: 'var(--bg-1)',
                  border: '1px solid var(--line-soft)',
                  borderRadius: 'var(--radius)',
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6}}>
                    <span className="chip chip--ghost"
                          style={{fontSize:10, padding:'3px 8px',
                                  fontFamily:"'Space Grotesk', sans-serif", fontWeight:600,
                                  letterSpacing:'0.06em'}}>
                      {a.label}
                    </span>
                    <span className="muted" style={{fontSize:11, flex:1, lineHeight:1.4}}>{a.note}</span>
                    {h && h.hex && (
                      <button onClick={() => copyHash(a.id, h.hex)}
                              title="copy to clipboard"
                              style={{
                                background:'transparent',
                                border:'1px solid var(--line-strong)',
                                color:'var(--ink)',
                                padding:'4px 10px', fontSize:11,
                                fontFamily:"'JetBrains Mono', monospace",
                                borderRadius:'var(--radius)', cursor:'pointer',
                              }}>
                        ⎘ Copy
                      </button>
                    )}
                  </div>
                  <div style={{
                    fontFamily:"'JetBrains Mono', monospace",
                    fontSize: 11, lineHeight: 1.5,
                    color: h && h.hex ? 'var(--ink-bright)' : 'var(--ink-dim)',
                    wordBreak: 'break-all',
                    userSelect: 'all',
                  }}>
                    {h && h.error
                      ? <span style={{color:'var(--red)'}}>error: {h.error}</span>
                      : h && h.hex
                        ? h.hex
                        : <span className="muted">computing…</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}
