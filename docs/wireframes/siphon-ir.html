// ── Finding Density heatmap (ported from siphon-c2) ─────────
// 24h × 1h bucket heatmap per category group. Each row is a
// category family (PCI · PII · CRED · PHI · SECRET · CLASSIFIED
// · OTHER + regional groups) — opacity scales by density so the
// analyst reads a time-of-day pattern at a glance.
const IR_REGION_GROUPS = ['North America', 'Europe', 'Asia-Pacific', 'Latin America', 'Middle East', 'Africa'];
const IR_CAT_GROUPS = [...IR_REGION_GROUPS, 'PCI', 'PII', 'CRED', 'PHI', 'SECRET', 'CLASSIFIED', 'OTHER'];
const IR_CAT_GROUP_COLOR = {
  'North America':  '#94d0ff',
  'Europe':         '#ba91ff',
  'Asia-Pacific':   '#ffb432',
  'Latin America':  '#ff9cce',
  'Middle East':    '#5ef38c',
  'Africa':         '#d7ffd0',
  PCI:        '#ff5c6c',
  PII:        '#94d0ff',
  CRED:       '#ffb432',
  PHI:        '#ba91ff',
  SECRET:     '#ff9cce',
  CLASSIFIED: '#d7ffd0',
  OTHER:      '#8ba58a',
};
function catGroup(category) {
  const dash = (category || '').indexOf(' - ');
  if (dash > 0) {
    const region = category.slice(0, dash);
    if (IR_REGION_GROUPS.includes(region)) return region;
  }
  const c = (category || '').toLowerCase();
  if (c.includes('credit card') || c.includes('iban') || c.includes('bank')) return 'PCI';
  if (c.includes('medical') || c.includes('health') || c.includes('phi')) return 'PHI';
  if (c.includes('cloud provider secret') || c.includes('code platform secret')) return 'CRED';
  if (c.includes('credential') || c.includes('auth token') || c.includes('aws')) return 'CRED';
  if (c.includes('private key') || c.includes('session') || c.includes('encryption')) return 'SECRET';
  if (c.includes('classif') || c.includes('marking') || c.includes('traffic light')) return 'CLASSIFIED';
  if (c.includes('personal') || c.includes('contact') || c.includes('email')) return 'PII';
  return 'OTHER';
}

function FindingsDensity({ findings }) {
  const BUCKETS = 24;
  const WINDOW_MIN = 24 * 60;

  const rows = React.useMemo(() => {
    const zeros = () => Array.from({ length: BUCKETS }, () => 0);
    const matrix = {};
    IR_CAT_GROUPS.forEach(g => { matrix[g] = zeros(); });

    const now = Date.now();
    const bucketMs = (WINDOW_MIN * 60 * 1000) / BUCKETS;
    (findings || []).forEach(f => {
      const t = new Date(f.ts).getTime();
      if (isNaN(t)) return;
      const delta = now - t;
      if (delta < 0 || delta > WINDOW_MIN * 60 * 1000) return;
      const idx = BUCKETS - 1 - Math.floor(delta / bucketMs);
      if (idx < 0 || idx >= BUCKETS) return;
      const g = catGroup(f.category);
      matrix[g][idx]++;
    });
    return IR_CAT_GROUPS
      .map(g => ({
        group: g,
        buckets: matrix[g],
        total: matrix[g].reduce((a, b) => a + b, 0),
      }))
      .filter(r => r.total > 0);
  }, [findings]);

  const maxCell = Math.max(1, ...rows.flatMap(r => r.buckets));

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Finding density</span>
        <span className="k">by category · last 24h · 1h buckets</span>
      </div>
      <div style={{padding:14}}>
        {rows.length === 0 ? (
          <div className="muted mono" style={{padding:20, textAlign:'center', fontSize:12}}>
            — no findings in the last 24h —
          </div>
        ) : (<>
          {rows.map(row => (
            <div key={row.group} style={{display:'grid', gridTemplateColumns:'130px 1fr 50px', alignItems:'center', gap:10, marginBottom:4}}>
              <div style={{
                fontFamily:"'JetBrains Mono', monospace",
                fontSize:11, fontWeight:600,
                color: IR_CAT_GROUP_COLOR[row.group] || 'var(--ink)',
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
              }} title={row.group}>
                {row.group}
              </div>
              <div style={{display:'flex', gap:1, height:14}}>
                {row.buckets.map((v, i) => {
                  const opacity = v === 0 ? 0.06 : Math.max(0.18, v / maxCell);
                  return (
                    <div key={i}
                         title={`${v} finding${v === 1 ? '' : 's'} in hour bucket ${i}`}
                         style={{
                           flex: 1,
                           background: IR_CAT_GROUP_COLOR[row.group] || 'var(--accent)',
                           opacity,
                           borderRadius: 1,
                         }}/>
                  );
                })}
              </div>
              <div className="mono" style={{textAlign:'right', fontSize:11.5, color:'var(--ink)'}}>{row.total}</div>
            </div>
          ))}
          <div style={{display:'grid', gridTemplateColumns:'130px 1fr 50px', alignItems:'center', gap:10, marginTop:8}}>
            <div />
            <div style={{display:'flex', gap:1, fontFamily:"'JetBrains Mono', monospace", fontSize:9, color:'var(--ink-dim)'}}>
              {Array.from({length: BUCKETS}).map((_, i) => (
                <span key={i} style={{flex:1, textAlign:'center'}}>
                  {i % 6 === 0 ? i + ':00' : '·'}
                </span>
              ))}
            </div>
            <div />
          </div>
        </>)}
      </div>
    </div>
  );
}

// ── Trending graph with YoY / QoQ / MoM comparison ────────────
// Bucket counts by day (short windows) or by week/month (long).
// When a comparison mode is set, overlay a dashed series for the
// prior equivalent period + show a delta chip in the panel header.
const IR_COMPARISONS = [
  { id: 'none',  label: 'Current',     days: null },
  { id: 'mom',   label: 'MoM',         days: 30,  pretty: '30 days vs prior 30' },
  { id: 'qoq',   label: 'QoQ',         days: 90,  pretty: '90 days vs prior 90' },
  { id: 'yoy',   label: 'YoY',         days: 365, pretty: '365 days vs prior 365' },
];

function bucketByDay(findings, fromMs, toMs) {
  const dayMs = 86400000;
  const spanMs = toMs - fromMs;
  // Pick bucket width: daily for ≤45 days, weekly ≤180, monthly beyond.
  let bucketMs, bucketCount;
  if (spanMs <= 45 * dayMs)       { bucketMs = dayMs;         bucketCount = Math.ceil(spanMs / bucketMs); }
  else if (spanMs <= 180 * dayMs) { bucketMs = 7 * dayMs;     bucketCount = Math.ceil(spanMs / bucketMs); }
  else                            { bucketMs = 30 * dayMs;    bucketCount = Math.ceil(spanMs / bucketMs); }
  const buckets = Array.from({length: bucketCount}, (_, i) => ({
    t0: fromMs + i * bucketMs,
    t1: fromMs + (i + 1) * bucketMs,
    count: 0,
  }));
  for (const f of findings) {
    const t = new Date(f.ts || 0).getTime();
    if (t < fromMs || t > toMs) continue;
    const idx = Math.min(bucketCount - 1, Math.floor((t - fromMs) / bucketMs));
    if (idx >= 0) buckets[idx].count += 1;
  }
  return { buckets, bucketMs };
}

function TrendingGraph({ findings, comparison }) {
  const now = Date.now();
  const cmp = IR_COMPARISONS.find(c => c.id === comparison) || IR_COMPARISONS[0];
  // If no comparison: default to last 90d trend. Otherwise use the
  // comparison window.
  const rangeDays = cmp.days || 90;
  const fromCurrent = now - rangeDays * 86400000;
  const currentBuckets = bucketByDay(findings, fromCurrent, now).buckets;

  let priorBuckets = null;
  let currentTotal = 0, priorTotal = 0;
  currentBuckets.forEach(b => { currentTotal += b.count; });
  if (cmp.id !== 'none') {
    const priorFrom = fromCurrent - rangeDays * 86400000;
    const priorTo = fromCurrent;
    priorBuckets = bucketByDay(findings, priorFrom, priorTo).buckets;
    priorBuckets.forEach(b => { priorTotal += b.count; });
  }
  const delta = priorBuckets && priorTotal > 0
    ? ((currentTotal - priorTotal) / priorTotal) * 100
    : null;

  // SVG geometry — fixed viewBox, scales with container.
  const W = 800, H = 190;
  const pad = { top: 18, right: 18, bottom: 32, left: 44 };
  const series = [
    { name: 'current', color: '#5ef38c', buckets: currentBuckets, dashed: false },
    ...(priorBuckets ? [{ name: 'prior',   color: '#8ba58a', buckets: priorBuckets, dashed: true }] : []),
  ];
  const allCounts = series.flatMap(s => s.buckets.map(b => b.count));
  const maxVal = Math.max(1, ...allCounts);
  const xStep = (W - pad.left - pad.right) / Math.max(1, Math.max(...series.map(s => s.buckets.length - 1)));
  const yForCount = (c) => H - pad.bottom - (c / maxVal) * (H - pad.top - pad.bottom);
  const pointsFor = (buckets) => buckets.map((b, i) => {
    const x = pad.left + i * xStep;
    return `${x},${yForCount(b.count)}`;
  }).join(' ');
  const areaFor = (buckets) => {
    if (buckets.length === 0) return '';
    const points = buckets.map((b, i) => `${pad.left + i * xStep},${yForCount(b.count)}`);
    return `M ${pad.left},${H - pad.bottom} L ${points.join(' L ')} L ${pad.left + (buckets.length - 1) * xStep},${H - pad.bottom} Z`;
  };

  // Axis ticks: 4 x-ticks evenly spaced, 4 y-ticks.
  const xTickCount = 4;
  const xTicks = Array.from({length: xTickCount + 1}, (_, i) => {
    const b = currentBuckets[Math.round(i * (currentBuckets.length - 1) / xTickCount)];
    return b ? { x: pad.left + (b === currentBuckets[currentBuckets.length - 1] ? currentBuckets.length - 1 : currentBuckets.indexOf(b)) * xStep, label: new Date(b.t0).toISOString().slice(5, 10) } : null;
  }).filter(Boolean);
  const yTickCount = 4;
  const yTicks = Array.from({length: yTickCount + 1}, (_, i) => {
    const v = Math.round(maxVal * (i / yTickCount));
    return { y: yForCount(v), label: v };
  });

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Trending</span>
        <span className="k" style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <span className="mono" style={{fontSize:11}}>{cmp.pretty || `last ${rangeDays} days`}</span>
          {delta != null && (
            <span className={`chip chip--${delta >= 0 ? 'warn' : 'safe'}`}
                  style={{fontSize:10, fontFamily:"'JetBrains Mono', monospace"}}
                  title={`current ${currentTotal} · prior ${priorTotal}`}>
              {delta >= 0 ? '▲' : '▼'} {Math.abs(delta).toFixed(1)}%
            </span>
          )}
          <span className="mono" style={{fontSize:11, color:'var(--ink-soft)'}}>
            <span style={{color:'#5ef38c'}}>●</span> current {currentTotal}
            {priorBuckets && <> · <span style={{color:'#8ba58a'}}>●</span> prior {priorTotal}</>}
          </span>
        </span>
      </div>
      <div style={{padding:14}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:200, display:'block'}}>
          {/* grid */}
          {yTicks.map((t, i) => (
            <g key={'y'+i}>
              <line x1={pad.left} y1={t.y} x2={W - pad.right} y2={t.y}
                    stroke="var(--line-soft)" strokeWidth="0.5"/>
              <text x={pad.left - 6} y={t.y + 3} textAnchor="end"
                    fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-dim)">
                {t.label}
              </text>
            </g>
          ))}
          {/* x-axis labels */}
          {xTicks.map((t, i) => (
            <text key={'x'+i} x={t.x} y={H - pad.bottom + 16} textAnchor="middle"
                  fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-dim)">
              {t.label}
            </text>
          ))}
          {/* x-axis line */}
          <line x1={pad.left} y1={H - pad.bottom} x2={W - pad.right} y2={H - pad.bottom}
                stroke="var(--line)" strokeWidth="1"/>

          {/* area fills (subtle) */}
          {series.map((s, i) => (
            <path key={'area'+i} d={areaFor(s.buckets)}
                  fill={s.color} opacity={s.dashed ? 0.06 : 0.12}/>
          ))}
          {/* polylines */}
          {series.map((s, i) => (
            <polyline key={'line'+i}
                      fill="none" stroke={s.color} strokeWidth="1.6"
                      strokeDasharray={s.dashed ? '5 4' : 'none'}
                      points={pointsFor(s.buckets)}/>
          ))}
          {/* data points */}
          {currentBuckets.map((b, i) => (
            <circle key={'pt'+i}
                    cx={pad.left + i * xStep} cy={yForCount(b.count)}
                    r="2" fill="#5ef38c"
                    title={`${new Date(b.t0).toISOString().slice(0,10)} · ${b.count} findings`}/>
          ))}
        </svg>
      </div>
    </div>
  );
}

// ── Region map — stylised continent blocks by count ───────────
// Real world map would balloon the file; this uses five positioned
// rectangles laid out roughly geographically so the analyst reads
// 'where in the world' at a glance. Fill opacity tracks count.
const IR_REGION_LAYOUT = [
  { id: 'NA',    label: 'North America',         left:  3, top:  8, w: 28, h: 40 },
  { id: 'EU',    label: 'Europe',                left: 40, top:  8, w: 16, h: 28 },
  { id: 'APAC',  label: 'Asia-Pacific',          left: 60, top:  4, w: 37, h: 54 },
  { id: 'LATAM', label: 'Latin America',         left: 10, top: 52, w: 22, h: 42 },
  { id: 'MEA',   label: 'Middle East · Africa',  left: 40, top: 40, w: 22, h: 54 },
];
function RegionMap({ regions, onFilter }) {
  const byId = {};
  regions.forEach(r => { byId[r.region] = r.count; });
  const maxCount = Math.max(1, ...regions.map(r => r.count));
  const intensity = (n) => !n ? 0 : Math.max(0.18, 0.2 + (n / maxCount) * 0.6);

  return (
    <div style={{
      position:'relative', width:'100%', aspectRatio:'2 / 1',
      minHeight: 240,
      background:'var(--bg-1)',
      border:'1px solid var(--line-soft)',
      borderRadius:'var(--radius)',
      overflow:'hidden',
    }}>
      {/* Grid backdrop for map aesthetic */}
      <svg viewBox="0 0 100 100" preserveAspectRatio="none"
           style={{position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.18, pointerEvents:'none'}}>
        {Array.from({length: 11}).map((_, i) => (
          <line key={'h'+i} x1="0" y1={i*10} x2="100" y2={i*10}
                stroke="var(--line-strong)" strokeWidth="0.08"/>
        ))}
        {Array.from({length: 21}).map((_, i) => (
          <line key={'v'+i} x1={i*5} y1="0" x2={i*5} y2="100"
                stroke="var(--line-strong)" strokeWidth="0.04"/>
        ))}
      </svg>
      {IR_REGION_LAYOUT.map(r => {
        const count = byId[r.id] || 0;
        const alpha = intensity(count);
        const border = count > 0 ? 'var(--accent)' : 'var(--line-strong)';
        const labelColor = count >= maxCount * 0.66 ? '#ffb432'
                         : count >= maxCount * 0.33 ? '#5ef38c'
                         : 'var(--ink-bright)';
        return (
          <div key={r.id}
               onClick={() => count > 0 && onFilter && onFilter(r.id)}
               title={`${r.label} · ${count} findings in range`}
               style={{
                 position:'absolute',
                 left: r.left + '%', top: r.top + '%',
                 width: r.w + '%', height: r.h + '%',
                 background: `rgba(94, 243, 140, ${alpha})`,
                 border: '1px solid ' + border,
                 borderRadius: 4,
                 cursor: count > 0 ? 'pointer' : 'default',
                 display:'flex', flexDirection:'column',
                 alignItems:'center', justifyContent:'center',
                 padding: 6,
                 transition: 'background 200ms ease-out',
               }}>
            <span style={{
              fontFamily:"'Space Grotesk', sans-serif",
              fontWeight:700, fontSize: Math.max(18, Math.min(40, r.w * 1.2)),
              lineHeight:1, color: labelColor,
            }}>{count || '—'}</span>
            <span className="muted mono" style={{
              fontSize:10, marginTop:5,
              textTransform:'uppercase', letterSpacing:'0.1em',
              textAlign:'center',
            }}>
              {r.label}
            </span>
          </div>
        );
      })}
    </div>
  );
}

function DashboardSurface() {
  const [range, setRange] = React.useState(() => {
    try { return localStorage.getItem('ir:dashRange') || '7d'; } catch { return '7d'; }
  });
  const [comparison, setComparison] = React.useState(() => {
    try { return localStorage.getItem('ir:dashCmp') || 'none'; } catch { return 'none'; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('ir:dashRange', range); } catch {}
  }, [range]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:dashCmp', comparison); } catch {}
  }, [comparison]);

  const findings = window.useIrFindings('?limit=1000');
  const [dispo, setDispo] = React.useState(readDispo);
  React.useEffect(() => {
    const resync = () => setDispo(readDispo());
    window.addEventListener('ir:demoChanged', resync);
    window.addEventListener('storage', resync);
    return () => {
      window.removeEventListener('ir:demoChanged', resync);
      window.removeEventListener('storage', resync);
    };
  }, []);

  const cutoff = React.useMemo(() => {
    const def = IR_TIME_RANGES.find(r => r.id === range) || IR_TIME_RANGES[1];
    return Date.now() - def.days * 86400e3;
  }, [range]);

  const all = (findings.data && findings.data.findings) || [];
  const windowed = React.useMemo(
    () => all.filter(f => new Date(f.ts || 0).getTime() >= cutoff),
    [all, cutoff]
  );

  const stats = React.useMemo(() => {
    let open = 0, events = 0, fps = 0, escalated = 0;
    const respondTimes = [];
    const remediateTimes = [];
    const byAnalyst = new Map();
    const byCategory = new Map();
    const byRegion = new Map();
    const byUser = new Map();

    for (const f of windowed) {
      const d = dispo[f.id];
      if (!d) open += 1;
      else if (d.kind === 'event')   events += 1;
      else if (d.kind === 'fp')      fps += 1;
      else if (d.kind === 'escalate') escalated += 1;

      if (d) {
        if (typeof d.respond_min === 'number')   respondTimes.push(d.respond_min);
        if (typeof d.remediate_min === 'number') remediateTimes.push(d.remediate_min);
        const who = d.by || d.by_id || 'unknown';
        if (!byAnalyst.has(who)) byAnalyst.set(who, { name: who, event: 0, fp: 0, escalate: 0 });
        if (byAnalyst.get(who)[d.kind] != null) byAnalyst.get(who)[d.kind] += 1;
      }

      if (f.category) byCategory.set(f.category, (byCategory.get(f.category) || 0) + 1);
      const md = f.metadata || {};
      if (md.region) byRegion.set(md.region, (byRegion.get(md.region) || 0) + 1);
      const user = md.user || md.sender;
      if (user) {
        if (!byUser.has(user)) {
          byUser.set(user, {
            user, count: 0, region: md.region, dept: md.department,
            sev: { critical: 0, high: 0, medium: 0, low: 0, info: 0 },
            escalated: 0,
          });
        }
        const e = byUser.get(user);
        e.count += 1;
        if (e.sev[f.severity] != null) e.sev[f.severity] += 1;
        if (d && d.kind === 'escalate') e.escalated += 1;
      }
    }

    const analysts = Array.from(byAnalyst.values())
      .map(a => ({ ...a, total: a.event + a.fp + a.escalate }))
      .sort((a, b) => b.total - a.total);
    const categories = Array.from(byCategory.entries())
      .map(([cat, count]) => ({ cat, count }))
      .sort((a, b) => b.count - a.count);
    const regions = Array.from(byRegion.entries())
      .map(([region, count]) => ({ region, count }))
      .sort((a, b) => b.count - a.count);
    const repeats = Array.from(byUser.values())
      .filter(u => u.count >= 3)
      .sort((a, b) => b.count - a.count);

    return {
      total: windowed.length, open, events, fps, escalated,
      investigations: open + escalated,
      medianRespond: irMedian(respondTimes),
      p90Respond: irPercentile(respondTimes, 0.9),
      medianRemediate: irMedian(remediateTimes),
      p90Remediate: irPercentile(remediateTimes, 0.9),
      analysts, categories, regions, repeats,
      respondCount: respondTimes.length,
      remediateCount: remediateTimes.length,
    };
  }, [windowed, dispo]);

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      {/* Time range + comparison + live source chip */}
      <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
        <span className="label" style={{marginRight:6}}>Range</span>
        {IR_TIME_RANGES.map(r => (
          <button key={r.id}
                  className={`btn ${range === r.id ? 'primary' : 'ghost'}`}
                  onClick={() => setRange(r.id)}
                  style={{fontSize:11, padding:'5px 12px'}}>
            {r.label}
          </button>
        ))}
        <span style={{borderLeft:'1px solid var(--line)', height:22, margin:'0 6px'}}/>
        <span className="label" style={{marginRight:6}}>Compare</span>
        {IR_COMPARISONS.map(c => (
          <button key={c.id}
                  className={`btn ${comparison === c.id ? 'primary' : 'ghost'}`}
                  onClick={() => setComparison(c.id)}
                  title={c.pretty || 'current range only'}
                  style={{fontSize:11, padding:'5px 12px'}}>
            {c.label}
          </button>
        ))}
        <span className="muted mono" style={{fontSize:11, marginLeft:10}}>
          {stats.total} in range
        </span>
        <span style={{flex:1}}/>
        {isDemoMode() && (
          <span className="chip chip--warn" style={{fontSize:10}}>
            DEMO DATA · seeded fixtures
          </span>
        )}
        <window.LivePill source={findings.source} onClick={findings.refetch}
                         title="refetch across pods"/>
      </div>

      {/* KPI row */}
      <div style={{display:'flex', gap:'var(--gap)', flexWrap:'wrap'}}>
        <KpiTile label="Open queue"
                 value={stats.open}
                 hint={`of ${stats.total} total`}
                 tint="var(--red)" />
        <KpiTile label="Incidents · escalated"
                 value={stats.escalated}
                 hint="handed off to XSOAR"
                 tint="var(--amber)" />
        <KpiTile label="Investigations · active"
                 value={stats.investigations}
                 hint="open + escalated" />
        <KpiTile label="MTTR · respond"
                 value={fmtMinutes(stats.medianRespond)}
                 hint={`median · p90 ${fmtMinutes(stats.p90Respond)} · n=${stats.respondCount}`}
                 tint="var(--accent)" />
        <KpiTile label="MTTR · remediate"
                 value={fmtMinutes(stats.medianRemediate)}
                 hint={`median · p90 ${fmtMinutes(stats.p90Remediate)} · n=${stats.remediateCount}`}
                 tint="var(--accent)" />
      </div>

      {/* Findings density — last 24h heatmap (full width) */}
      <FindingsDensity findings={all} />

      {/* Trending — current vs prior (full width) */}
      <TrendingGraph findings={all} comparison={comparison} />

      {/* Breakdowns grid */}
      <div style={{display:'grid', gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)', gap:'var(--gap)'}}>

        {/* By analyst — stacked bar per analyst */}
        <div className="box">
          <div className="box-title">
            <span className="t">By analyst</span>
            <span className="k">dispositions in range · {stats.analysts.length} active</span>
          </div>
          <div style={{padding:14}}>
            {stats.analysts.length === 0 && (
              <div className="muted mono" style={{fontSize:11, padding:10, textAlign:'center'}}>
                — no dispositions recorded in this range —
              </div>
            )}
            {stats.analysts.map(a => {
              const max = stats.analysts[0].total || 1;
              const part = (n) => max ? (n / max * 100) : 0;
              return (
                <div key={a.name} style={{
                  display:'grid', gridTemplateColumns:'160px 1fr 56px',
                  gap:10, alignItems:'center', padding:'6px 0',
                  borderBottom:'1px solid var(--line-soft)',
                  fontSize:11.5, fontFamily:"'JetBrains Mono', monospace",
                }}>
                  <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--ink-bright)'}} title={a.name}>
                    {a.name}
                  </span>
                  <div style={{display:'flex', height:14, borderRadius:2, overflow:'hidden', border:'1px solid var(--line-soft)', background:'var(--bg-3)'}}>
                    <div title={`${a.escalate} escalated`} style={{background:'var(--amber)', width: part(a.escalate) + '%'}}/>
                    <div title={`${a.event} events closed`} style={{background:'var(--safe)', width: part(a.event) + '%'}}/>
                    <div title={`${a.fp} false positives`} style={{background:'var(--ink-soft)', width: part(a.fp) + '%'}}/>
                  </div>
                  <span className="mono" style={{textAlign:'right', color:'var(--ink-soft)'}}>{a.total}</span>
                </div>
              );
            })}
            <div style={{marginTop:10, display:'flex', gap:12, fontSize:10, color:'var(--ink-soft)', fontFamily:"'JetBrains Mono', monospace"}}>
              <span><span style={{display:'inline-block', width:10, height:10, background:'var(--amber)', verticalAlign:'middle', marginRight:4, borderRadius:1}}/>escalate</span>
              <span><span style={{display:'inline-block', width:10, height:10, background:'var(--safe)', verticalAlign:'middle', marginRight:4, borderRadius:1}}/>event</span>
              <span><span style={{display:'inline-block', width:10, height:10, background:'var(--ink-soft)', verticalAlign:'middle', marginRight:4, borderRadius:1}}/>fp</span>
            </div>
          </div>
        </div>

        {/* By incident type — horizontal bars, palette from preview */}
        <div className="box">
          <div className="box-title">
            <span className="t">By incident type</span>
            <span className="k">{stats.categories.length} distinct categories</span>
          </div>
          <div style={{padding:14, maxHeight:400, overflowY:'auto'}}>
            {stats.categories.length === 0 && (
              <div className="muted mono" style={{fontSize:11, padding:10, textAlign:'center'}}>
                — no findings in range —
              </div>
            )}
            {stats.categories.slice(0, 14).map(c => {
              const palette = CATEGORY_COLORS[c.cat] || MATCH_COLOR_DEFAULT;
              const max = stats.categories[0].count;
              return (
                <IrHBar key={c.cat} label={c.cat} value={c.count} max={max}
                        color={palette.border}
                        onClick={() => irPivotToQueue({ category: c.cat })} />
              );
            })}
            {stats.categories.length > 14 && (
              <div className="muted" style={{fontSize:10.5, marginTop:8, textAlign:'center'}}>
                + {stats.categories.length - 14} more categories
              </div>
            )}
          </div>
        </div>

        {/* By region — stylised world map */}
        <div className="box">
          <div className="box-title">
            <span className="t">By region</span>
            <span className="k">click a region to filter the queue</span>
          </div>
          <div style={{padding:14}}>
            {stats.regions.length === 0 && (
              <div className="muted mono" style={{fontSize:11, padding:10, textAlign:'center'}}>
                — no region metadata in range · upstream emitter should set metadata.region —
              </div>
            )}
            {stats.regions.length > 0 && (
              <RegionMap regions={stats.regions}
                         onFilter={(region) => irPivotToQueue({ search: region })} />
            )}
            {/* Small legend row for the regions not in the map (if any) */}
            {stats.regions.filter(r => !IR_REGION_LAYOUT.find(l => l.id === r.region)).length > 0 && (
              <div style={{marginTop:10, display:'flex', gap:6, flexWrap:'wrap', fontSize:10.5}}>
                <span className="muted mono" style={{marginRight:4}}>other:</span>
                {stats.regions.filter(r => !IR_REGION_LAYOUT.find(l => l.id === r.region)).map(r => (
                  <span key={r.region} className="chip chip--ghost" style={{fontSize:9}}>
                    {r.region} · {r.count}
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Repeat Occurrences */}
        <div className="box">
          <div className="box-title">
            <span className="t">Repeat Occurrences</span>
            <span className="k">
              {stats.repeats.length} user{stats.repeats.length === 1 ? '' : 's'} with ≥3 findings
            </span>
          </div>
          <div style={{padding:14, maxHeight:400, overflowY:'auto'}}>
            {stats.repeats.length === 0 && (
              <div className="muted mono" style={{fontSize:11, padding:10, textAlign:'center'}}>
                — no repeat occurrences in this range —
              </div>
            )}
            {stats.repeats.map(u => (
              <div key={u.user}
                   onClick={() => irPivotToQueue({ search: u.user })}
                   style={{
                     padding:'8px 0', borderBottom:'1px solid var(--line-soft)',
                     fontSize:11.5, fontFamily:"'JetBrains Mono', monospace",
                     cursor:'pointer',
                   }}
                   title="click to filter queue to this user">
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <span style={{color:'var(--accent)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                    {u.user}
                  </span>
                  <span className={`chip chip--${u.count >= 8 ? 'red' : 'warn'}`} style={{fontSize:9.5}}>
                    {u.count} findings
                  </span>
                  {u.escalated > 0 && (
                    <span className="chip chip--amber" style={{fontSize:9.5}}
                          title={`${u.escalated} escalated to XSOAR`}>
                      ↗ {u.escalated}
                    </span>
                  )}
                </div>
                <div style={{display:'flex', gap:10, marginTop:4, fontSize:10, color:'var(--ink-soft)', flexWrap:'wrap'}}>
                  {u.region && (
                    <span>
                      <span style={{textTransform:'uppercase', letterSpacing:'0.08em', marginRight:3}}>region</span>
                      <span style={{color:'var(--ink)'}}>{u.region}</span>
                    </span>
                  )}
                  {u.dept && (
                    <span>
                      <span style={{textTransform:'uppercase', letterSpacing:'0.08em', marginRight:3}}>dept</span>
                      <span style={{color:'var(--ink)'}}>{u.dept}</span>
                    </span>
                  )}
                  <span style={{display:'inline-flex', gap:4, alignItems:'center'}}>
                    {Object.entries(u.sev)
                      .filter(([,n]) => n > 0)
                      .sort(([a], [b]) => (SEVERITY_RANK[b] || 0) - (SEVERITY_RANK[a] || 0))
                      .map(([sev, n]) => (
                        <span key={sev} style={{display:'inline-flex', alignItems:'center', gap:3}}>
                          {severityChip(sev)}
                          <span className="mono" style={{fontSize:10}}>×{n}</span>
                        </span>
                      ))}
                  </span>
                </div>
              </div>
            ))}
          </div>
        </div>

      </div>

      {stats.total === 0 && (
        <div className="note" style={{
          borderColor:'var(--amber)', background:'var(--amber-wash)', color:'var(--ink)',
          fontSize:12, lineHeight:1.6,
        }}>
          <b>No findings in range.</b> Pick a longer window above, or turn on demo data under
          Settings → Engineering to populate the dashboard with a seeded set (120 findings,
          8 analysts, 5 regions, 3 repeat offenders).
        </div>
      )}
    </div>
  );
}

// ─── Surface registry ───────────────────────────────────────────
// Each surface is its own function below. MVP phases fill them in
// one at a time; this dispatcher lets us ship the shell and the
// first real surface (Findings Queue) without touching the rest.
const SURFACE_COMPONENTS = {
  dashboard:      () => <DashboardSurface />,
  findings:       () => <FindingsQueue />,
  alerts:         () => <Stub title="Alerts"
                              description="Threshold-breach signals routed from siphon-api's audit ring." />,
  investigations: () => <Stub title="Investigations"
                              description="Case view — group findings, annotate, assign." />,
  handoffs:       () => <Stub title="Handoffs"
                              description="Tickets and escalations to downstream tools (Jira, ServiceNow, email)." />,
  crypto:         () => <Stub title="Crypto Workbench"
                              description="Forensic tools for encrypted archives and documents: zip password attack, PDF/Office decrypt, hash compute, entropy + magic-byte inspection. Phase 3-5 of the IR MVP." />,
  extractor:      () => <Stub title="File Extractor"
                              description="Point-and-shoot at any file siphon-fs recognises (PDF, DOCX, XLSX, PPTX, ZIP/RAR/7z, Parquet, SQLite, EML, MSG, QR)." />,
  timeline:       () => <Stub title="Timeline"
                              description="Reconstruct a finding sequence by timestamp + document span." />,
  pivots:         () => <Stub title="Pivots"
                              description="Jump from a finding to every other finding in the same document, same source, same pod, same category." />,
  ioc:            () => <Stub title="IOC Lookup"
                              description="Cross-reference matched values against known indicator sets (URLhaus, MISP, custom)." />,
  custody:        () => <Stub title="Chain of Custody"
                              description="Per-finding history: who acted, when, what action (acknowledge, escalate, mark FP, export)." />,
  exhibits:       () => <Stub title="Exhibits"
                              description="Attached artifacts: original file, extracted text, finding metadata, investigator notes." />,
  export:         () => <Stub title="Export Bundle"
                              description="Package a case into a zip for handoff (findings JSON, extracted text, exhibits, custody log, signed manifest)." />,
  integrations:   () => <IntegrationsSurface />,
  'ir-settings':  () => <Stub title="Responder Preferences"
                              description="Default queue filters, notification channels, team membership, theme." />,
  'ir-deployment':() => <Stub title="Pod Registry"
                              description="Shared with the admin console — registered pods appear in both. Edits under Settings → Deployment on siphon-c2.html." />,
  'ir-engineering': () => <EngineeringSurface />,
};

// ─── Settings → Engineering ─────────────────────────────────────
// Developer-facing toggles. Primary MVP tenant: the demo-data
// switch, which backs every IR surface with seeded fixtures when
// on. Live pod data resumes the moment the toggle flips off; the
// two datasets never mix (separate disposition stores).
function EngineeringSurface() {
  const [mode, setMode] = React.useState(isDemoMode);
  const [seed, setSeed] = React.useState(readDemoSeed);
  const [demoDispoCount, setDemoDispoCount] = React.useState(() => Object.keys(JSON.parse(localStorage.getItem(IR_DEMO_DISPO_KEY) || '{}')).length);

  // Seed demo dispositions the first time demo mode is turned on so
  // the dashboard has MTTR data to chart. Re-seed happens only when
  // the analyst explicitly clicks Regenerate.
  React.useEffect(() => {
    if (!mode) return;
    const existing = localStorage.getItem(IR_DEMO_DISPO_KEY);
    if (existing && existing !== '{}') return;
    const findings = generateDemoFindings(seed);
    const dispo = generateDemoDispositions(findings, seed);
    localStorage.setItem(IR_DEMO_DISPO_KEY, JSON.stringify(dispo));
    setDemoDispoCount(Object.keys(dispo).length);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'seeded' } }));
  }, [mode, seed]);

  const toggle = () => {
    const next = !mode;
    setMode(next);
    setDemoMode(next);
  };

  const regenerate = () => {
    if (!confirm('Regenerate demo data? Any triage actions you made in demo mode will be overwritten.')) return;
    const newSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
    writeDemoSeed(newSeed);
    setSeed(newSeed);
    const findings = generateDemoFindings(newSeed);
    const dispo = generateDemoDispositions(findings, newSeed);
    localStorage.setItem(IR_DEMO_DISPO_KEY, JSON.stringify(dispo));
    setDemoDispoCount(Object.keys(dispo).length);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'regenerate' } }));
  };

  const clearDemoOnly = () => {
    if (!confirm('Clear demo dispositions? Your real (live-mode) triage state is NOT touched.')) return;
    localStorage.removeItem(IR_DEMO_DISPO_KEY);
    setDemoDispoCount(0);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'cleared' } }));
  };

  const findingsPreview = React.useMemo(() => generateDemoFindings(seed).length, [seed]);

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      <div className="box">
        <div className="box-title">
          <span className="t">Demo data</span>
          <span className="k">
            {mode ? <span className="chip chip--warn" style={{fontSize:9}}>DEMO MODE ACTIVE</span>
                  : <span className="chip chip--safe" style={{fontSize:9}}>LIVE</span>}
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:12, fontSize:12, lineHeight:1.7}}>
          <div className="muted">
            Swaps the Findings Queue + Dashboard data source from live pod unions to
            a deterministic seeded set ({findingsPreview} findings across {DEMO_ANALYSTS.length} analysts
            and {DEMO_USERS.length} end-users, with pre-triaged dispositions).
            Useful for demos, screenshots, and dashboard tuning without
            needing a real pod scanning real traffic.
          </div>
          <div className="muted" style={{fontSize:11.5, padding:'8px 10px', background:'var(--bg-1)', border:'1px dashed var(--line-soft)', borderRadius:'var(--radius)'}}>
            <b>Isolation:</b> demo dispositions are stored under{' '}
            <span className="mono">localStorage[ir:demoDispositions]</span>, separate from your
            live triage state at <span className="mono">ir:dispositions</span>. They never mix.
            The FP Queue handoff to the admin console also suppresses demo entries so you don't
            pollute the real engineering queue.
          </div>
          <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
            <label style={{display:'inline-flex', alignItems:'center', gap:8, cursor:'pointer'}}>
              <input type="checkbox" checked={mode} onChange={toggle} />
              <span style={{fontWeight:600}}>Use demo data</span>
            </label>
            <span className="muted mono" style={{fontSize:11}}>
              seed <span className="mono" style={{color:'var(--ink)'}}>{(seed >>> 0).toString(16).padStart(8, '0')}</span>
              {' · '}{demoDispoCount} demo dispositions
            </span>
          </div>
          <div style={{display:'flex', gap:8, flexWrap:'wrap', paddingTop:4}}>
            <button className="btn ghost" onClick={regenerate}
                    title="reshuffle the seed and re-seed dispositions">
              ↻ Regenerate seed
            </button>
            <button className="btn ghost" onClick={clearDemoOnly}
                    title="wipe demo dispositions · live state not touched"
                    style={{color:'var(--red)'}}>
              ✕ Clear demo dispositions
            </button>
          </div>
        </div>
      </div>

      <div className="muted" style={{fontSize:11, lineHeight:1.7, padding:'0 2px'}}>
        More developer toggles will live here: mock XSOAR/Splunk responses, synthetic webhook
        replay, fast-forward clock for MTTR testing.
      </div>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = {
  theme: 'phosphor',
  density: 'cozy',
  nav: 'split',
};

function App() {
  const [surface, setSurface] = React.useState(() => {
    try { return localStorage.getItem('ir:surface') || 'dashboard'; } catch { return 'dashboard'; }
  });
  // Sub-route for detail pages. Shape: "finding:<id>" opens the
  // FindingDetail view under the 'findings' surface. Persisted so a
  // refresh doesn't drop you back to the queue mid-investigation.
  const [sub, setSub] = React.useState(() => {
    try { return localStorage.getItem('ir:sub') || ''; } catch { return ''; }
  });
  const [tweaks, setTweaks] = React.useState(() => {
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem('c2:tweaks') || '{}'); } catch {}
    return { ...TWEAK_DEFAULTS, ...stored };
  });

  React.useEffect(() => {
    try { localStorage.setItem('ir:surface', surface); } catch {}
  }, [surface]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:sub', sub); } catch {}
  }, [sub]);
  React.useEffect(() => {
    try { localStorage.setItem('c2:tweaks', JSON.stringify(tweaks)); } catch {}
  }, [tweaks]);
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme || 'phosphor');
  }, [tweaks.theme]);

  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== 'c2:tweaks') return;
      try {
        const parsed = JSON.parse(e.newValue || '{}');
        setTweaks(t => ({ ...t, ...parsed }));
      } catch {}
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  const setTweak = (k, v) => setTweaks(t => ({ ...t, [k]: v }));
  const go = (id, s) => { setSurface(id); setSub(s || ''); };
  window.__ir_go = go;
  // Convenience helper the FindingsQueue + FindingDetail use to
  // navigate between rows and detail view without rebuilding the
  // (surface, sub) tuple each time.
  window.__ir_goFinding = (fid) => go('findings', fid ? 'finding:' + fid : '');

  // Dispatch: if we're on findings with a finding:<id> sub, render
  // the detail view; otherwise fall back to the surface registry.
  let body;
  if (surface === 'findings' && sub && sub.startsWith('finding:')) {
    body = <FindingDetail id={sub.slice('finding:'.length)}
                           back={() => setSub('')} />;
  } else {
    const renderSurface = SURFACE_COMPONENTS[surface] || SURFACE_COMPONENTS.findings;
    body = renderSurface();
  }

  return (
    <div className="shell" data-density={tweaks.density} data-theme={tweaks.theme}>
      <Topbar tweaks={tweaks} setTweak={setTweak} />
      <WorkspaceBar current={surface} go={go} />
      <SurfaceBar current={surface} go={go} />
      <main className="page">{body}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
