// Synthesise a fake-but-plausible document preview per channel.
// Body contains every finding.text from `sameReq` embedded in a
// realistic surrounding so the analyst can read the matched value
// in context.
function generatePreviewText(finding, sameReq) {
  const md = finding.metadata || {};
  const channel = (md.channel || '').toLowerCase();
  const all = [finding, ...(sameReq || [])];
  const matched = all.map(f => f.text).filter(Boolean);
  const ts = finding.ts || new Date().toISOString();
  const tsDisp = ts.replace('T', ' ').replace('Z', '').slice(0, 19);

  const joinedMatches = matched.length
    ? matched.map(m => `  · ${m}`).join('\n')
    : '  · [no matched slice available]';

  if (channel.includes('email')) {
    const sender = md.sender || 'unknown.sender@corp.example';
    const recipient = md.recipient || 'unknown.recipient@example.com';
    const outbound = channel.includes('outbound');
    const firstName = sender.split('@')[0].split('.')[0];
    const capName = firstName[0].toUpperCase() + firstName.slice(1);
    const cats = Array.from(new Set(all.map(f => f.category))).join(' + ');
    const body =
`Hi,

${outbound
  ? 'Per our earlier discussion, sharing the records you requested. Please store securely and let me know if anything is missing.'
  : 'Forwarding the records we pulled for the quarterly review. Let me know if you need the expanded dataset.'}

Relevant identifiers flagged for follow-up:
${joinedMatches}

Context: ${cats} · generated from our backend on ${tsDisp}.

${outbound ? 'Best regards,\n' + capName : 'Thanks,\n' + capName}
`;
    return {
      kind: 'email',
      direction: outbound ? 'outbound' : 'inbound',
      headers: {
        From: sender,
        To: recipient,
        Date: tsDisp,
        Subject: `${outbound ? 'Fwd: ' : 'Re: '}${cats} records · Q1`,
        'Message-ID': `<${(finding.request_id || 'x').slice(0, 12)}.${ts.slice(0, 10)}@mail.corp.example>`,
      },
      body,
      size: body.length,
    };
  }

  if (channel.includes('slack')) {
    const sender = md.sender || md.user || 'user@corp.example';
    const firstName = sender.split('@')[0].split('.')[0];
    const body =
`[slack · direct message · ${tsDisp}]

${firstName}: hey quick one — i'm prepping the handoff to the vendor and need to confirm a couple of values. can you check these?

${matched.map(m => firstName + ': ' + m).join('\n')}

${firstName}: would it be easier to share via the secure channel or should i paste in chat?
`;
    return {
      kind: 'slack',
      headers: {
        Channel: 'direct message',
        Participant: sender,
        Date: tsDisp,
      },
      body,
      size: body.length,
    };
  }

  if (channel.includes('print')) {
    const who = md.user || finding.source_ip || 'unknown';
    const body =
`[print spool · ${md.channel || 'print'}]
user=${who}  printer=HQ-NE-18-COLOR  pages=4  ts=${tsDisp}

─── page 1 ──────────────────────────────────────────

Quarterly customer review — CONFIDENTIAL

The following records are included in this report:

${joinedMatches}

These should not be printed on shared devices. If you received this
in error, please destroy and notify the compliance team.

─── page 2 ──────────────────────────────────────────
`;
    return {
      kind: 'print',
      headers: {
        User: who,
        Printer: 'HQ-NE-18-COLOR',
        Pages: '4',
        Date: tsDisp,
      },
      body,
      size: body.length,
    };
  }

  if (channel.includes('api')) {
    const body = JSON.stringify({
      ts: tsDisp,
      user: md.user || 'service-account',
      action: 'records.export',
      payload: {
        rows: matched.map((m, i) => ({ id: i + 1, value: m })),
        note: `batch export via api · ${all[0].category}`,
      },
    }, null, 2);
    return {
      kind: 'api',
      headers: {
        Endpoint: 'POST /v1/exports',
        'Content-Type': 'application/json',
        Date: tsDisp,
      },
      body,
      size: body.length,
    };
  }

  // Default — file upload / sharepoint / usb / web-upload / etc.
  const filename = md.filename || (finding.source_pod === 'siphon-fs' ? finding.source_ip : null) || `document-${(finding.request_id || 'x').slice(0, 6)}.txt`;
  const who = md.user || 'unknown';
  const body =
`[file preview · extracted text]
filename=${filename}  uploaded_by=${who}  size≈${8 + Math.round(Math.random() * 40)}kb  ts=${tsDisp}

────────────────────────────────────────────────────

CUSTOMER RECORDS — CONFIDENTIAL

This document contains the customer records requested for review. The
following values appear in the extracted text at the positions siphon-fs
flagged:

${joinedMatches}

End of extracted preview.
`;
  return {
    kind: 'file',
    headers: {
      Filename: filename,
      'Uploaded by': who,
      Date: tsDisp,
      'Channel': md.channel || (finding.source_pod || 'unknown'),
    },
    body,
    size: body.length,
  };
}

// Locate every match + keyword + find range in `body`, merge
// overlaps by priority (find > match > keyword), and emit a flat
// list of render-ready segments. Each segment is either
// `{ kind: 'plain', text }` or a highlight segment with metadata.
function applyHighlights(body, findings, keywords, findText) {
  const ranges = [];

  // Regex matches from the scanner — priority 2.
  for (const f of findings) {
    if (!f.text) continue;
    let from = 0;
    while (true) {
      const at = body.indexOf(f.text, from);
      if (at === -1) break;
      ranges.push({
        start: at, end: at + f.text.length,
        kind: 'match', prio: 2,
        category: f.category, sub_category: f.sub_category,
      });
      from = at + f.text.length;
    }
  }

  // Context keywords — priority 1.
  for (const kw of keywords) {
    const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx = new RegExp('\\b' + escaped + '\\b', 'gi');
    let m;
    while ((m = rx.exec(body)) !== null) {
      ranges.push({
        start: m.index, end: m.index + m[0].length,
        kind: 'keyword', prio: 1, keyword: kw,
      });
    }
  }

  // Find hits — priority 3 (wins over both). Indexed so the UI
  // can wire prev/next jumps.
  let findCounter = 0;
  if (findText) {
    const escaped = findText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx = new RegExp(escaped, 'gi');
    let m;
    while ((m = rx.exec(body)) !== null) {
      ranges.push({
        start: m.index, end: m.index + m[0].length,
        kind: 'find', prio: 3, findIdx: findCounter++,
      });
      if (m.index === rx.lastIndex) rx.lastIndex++; // avoid infinite loop
    }
  }

  // Sort: earlier start first, higher priority on ties.
  ranges.sort((a, b) => a.start - b.start || b.prio - a.prio);

  // Drop any range fully inside a higher-priority prior one.
  const kept = [];
  let furthest = 0;
  for (const r of ranges) {
    if (r.start < furthest) {
      const prev = kept[kept.length - 1];
      if (prev && prev.prio >= r.prio) continue;
    }
    kept.push(r);
    furthest = Math.max(furthest, r.end);
  }

  const segs = [];
  let pos = 0;
  for (const r of kept) {
    if (r.start > pos) segs.push({ kind: 'plain', text: body.slice(pos, r.start) });
    segs.push({ ...r, text: body.slice(r.start, r.end) });
    pos = r.end;
  }
  if (pos < body.length) segs.push({ kind: 'plain', text: body.slice(pos) });
  return segs;
}

// Standardised highlight palette for preview. Regex-hits always
// green, keyword hits always purple, find-in-document hits amber.
// Swaps the previous per-category palette — category chromatics
// live on the dashboard charts where multi-colour semantics help;
// inside the document they were noisy + hard to scan.
const REGEX_HL   = { bg: 'rgba(94,243,140,0.18)',  border: '#5ef38c' };
const KEYWORD_HL = { bg: 'rgba(186,145,255,0.14)', border: '#ba91ff' };
const FIND_HL    = { bg: 'rgba(255,180,50,0.55)',  border: '#ffb432' };

function DocumentPreview({ finding, sameReq }) {
  const preview = React.useMemo(
    () => generatePreviewText(finding, sameReq),
    [finding.id, (sameReq || []).length]
  );
  const allFindings = React.useMemo(
    () => [finding, ...(sameReq || [])],
    [finding.id, (sameReq || []).length]
  );

  const [fontSize, setFontSize] = React.useState(() => {
    try { return parseFloat(localStorage.getItem('ir:preview:font')) || 12; }
    catch { return 12; }
  });
  const [wrap, setWrap] = React.useState(() => {
    try { return localStorage.getItem('ir:preview:wrap') !== 'off'; } catch { return true; }
  });
  const [showHl, setShowHl] = React.useState(() => {
    try { return localStorage.getItem('ir:preview:hl') !== 'off'; } catch { return true; }
  });
  const [height, setHeight] = React.useState(() => {
    try { return parseInt(localStorage.getItem('ir:preview:h'), 10) || 480; }
    catch { return 480; }
  });
  const [findText, setFindText] = React.useState('');
  const [findIdx, setFindIdx] = React.useState(0);
  const [flash, setFlash] = React.useState(null);
  const ping = (m) => { setFlash(m); setTimeout(() => setFlash(null), 1200); };
  React.useEffect(() => { try { localStorage.setItem('ir:preview:font', String(fontSize)); } catch {} }, [fontSize]);
  React.useEffect(() => { try { localStorage.setItem('ir:preview:wrap', wrap ? 'on' : 'off'); } catch {} }, [wrap]);
  React.useEffect(() => { try { localStorage.setItem('ir:preview:hl',   showHl ? 'on' : 'off'); } catch {} }, [showHl]);

  const preRef = React.useRef(null);

  // Custom resize handle — mouse-driven drag below the body.
  // Replaces the CSS `resize: vertical` which was fighting the
  // React render cycle via ResizeObserver.
  const onResizeStart = (e) => {
    e.preventDefault();
    const startY = e.clientY;
    const startH = height;
    let lastH = startH;
    const move = (ev) => {
      const h = Math.max(200, Math.min(2000, startH + (ev.clientY - startY)));
      lastH = h;
      setHeight(h);
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      try { localStorage.setItem('ir:preview:h', String(lastH)); } catch {}
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  };

  const categories = Array.from(new Set(allFindings.map(f => f.category).filter(Boolean)));
  const keywords = React.useMemo(() => {
    const s = new Set();
    for (const c of categories) {
      (CONTEXT_KEYWORDS_MAP[c] || []).forEach(k => s.add(k));
    }
    return Array.from(s);
  }, [categories.join('|')]);

  const segs = React.useMemo(
    () => applyHighlights(preview.body, allFindings, keywords, findText),
    [preview.body, allFindings.length, keywords.length, findText]
  );

  // Find-hit count for the toolbar counter. Resets idx when the
  // query changes.
  const findHitCount = React.useMemo(() => segs.filter(s => s.kind === 'find').length, [segs]);
  React.useEffect(() => { setFindIdx(0); }, [findText]);

  // Scroll the current find-hit into view when idx or query change.
  React.useEffect(() => {
    if (!findHitCount) return;
    const el = preRef.current && preRef.current.querySelector('[data-find-idx="' + findIdx + '"]');
    if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, [findIdx, findHitCount]);

  const download = () => {
    const lines = [];
    if (preview.headers) {
      for (const [k, v] of Object.entries(preview.headers)) lines.push(`${k}: ${v}`);
      lines.push('');
    }
    lines.push(preview.body);
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `finding-${finding.id}-preview.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    ping('Downloaded');
  };

  const copyBody = () => {
    const lines = [];
    if (preview.headers) {
      for (const [k, v] of Object.entries(preview.headers)) lines.push(`${k}: ${v}`);
      lines.push('');
    }
    lines.push(preview.body);
    try {
      navigator.clipboard.writeText(lines.join('\n'));
      ping('Copied to clipboard');
    } catch {
      ping('Copy failed');
    }
  };

  // Copy-as-redacted — replaces every regex-match span with X's of
  // the same length. Handy for pasting into a ticket / handoff
  // without leaking the sensitive value.
  const copyRedacted = () => {
    const redactSpan = (s) => 'X'.repeat(s.length);
    const redacted = segs.map(s => s.kind === 'match' ? redactSpan(s.text) : s.text).join('');
    const lines = [];
    if (preview.headers) {
      for (const [k, v] of Object.entries(preview.headers)) lines.push(`${k}: ${v}`);
      lines.push('');
    }
    lines.push(redacted);
    try {
      navigator.clipboard.writeText(lines.join('\n'));
      ping('Copied redacted');
    } catch {
      ping('Copy failed');
    }
  };

  // Rescan — stuff the raw body into c2:livescan-text and open
  // the admin console. Lets the analyst re-run siphon-api's
  // detection pipeline with trace=on and verify what fires.
  const sendToLiveScan = () => {
    try { localStorage.setItem('c2:livescan-text', preview.body); } catch {}
    window.open('siphon-c2.html', '_blank');
    ping('Opened admin console');
  };

  const kindIcon = {
    email: '✉', slack: '💬', print: '🖨', file: '📄', api: '⟨/⟩', text: '☰',
  }[preview.kind] || '☰';
  const kindLabel = {
    email: preview.direction === 'outbound' ? 'Email · outbound' : 'Email · inbound',
    slack: 'Slack · direct message',
    print: 'Print job',
    file: 'File upload',
    api: 'API payload',
    text: 'Text',
  }[preview.kind] || preview.kind;

  const matchCount = segs.filter(s => s.kind === 'match').length;
  const keywordCount = segs.filter(s => s.kind === 'keyword').length;

  // Larger square toolbar button — 32×32 for icons, keeps the
  // rails legible at a glance.
  const ToolBtn = ({ onClick, title, active, children, danger, wide }) => (
    <button
      onClick={onClick}
      title={title}
      style={{
        background: active ? 'var(--accent-wash)' : 'transparent',
        color: danger ? 'var(--red)' : active ? 'var(--accent)' : 'var(--ink-bright)',
        border: '1px solid ' + (active ? 'var(--accent)' : 'var(--line-strong)'),
        width: wide ? 'auto' : 32, height: 32,
        padding: wide ? '0 10px' : 0,
        fontSize: 14, fontFamily: "'JetBrains Mono', monospace", fontWeight: 500,
        borderRadius: 'var(--radius)',
        cursor: 'pointer', lineHeight: 1,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      }}>
      {children}
    </button>
  );

  return (
    <div className="box" style={{overflow:'hidden'}}>
      <div className="box-title">
        <span className="t">
          Document preview
          <span className="muted" style={{fontWeight:400, marginLeft:10, fontSize:11}}>
            synthesised · future /v1/findings/{'{'}id{'}'}/payload will serve the real capture
          </span>
        </span>
        <span className="k" style={{display:'flex', alignItems:'center', gap:8}}>
          <span className="mono" style={{fontSize:11, color:'var(--ink-soft)'}}>
            {preview.size.toLocaleString()} bytes
          </span>
          {flash && (
            <span className="mono" style={{fontSize:10.5, color:'var(--safe)', marginLeft:4}}>
              ✓ {flash}
            </span>
          )}
        </span>
      </div>

      {/* ── TOP EDGE — metadata strip ──────────────────────────── */}
      <div style={{
        display:'flex', alignItems:'center', gap:14,
        padding:'10px 14px', borderBottom:'1px solid var(--line-soft)',
        background:'var(--bg-2)', flexWrap:'wrap',
      }}>
        <span style={{fontSize:20, lineHeight:1}}>{kindIcon}</span>
        <span className="chip chip--ghost" style={{fontSize:10}}>{kindLabel}</span>
        {preview.headers && Object.entries(preview.headers).map(([k, v]) => (
          <span key={k} style={{display:'inline-flex', alignItems:'baseline', gap:5}}>
            <span className="muted mono" style={{fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.08em'}}>{k}</span>
            <span className="mono" style={{fontSize:11.5, color:'var(--ink-bright)'}}>{String(v)}</span>
          </span>
        ))}
      </div>

      {/* ── SECONDARY TOOLBAR — find + actions ──────────────────
          Brings in-document actions inside the preview window
          itself. Find navigates through matches; the three action
          buttons replace the equivalents that used to live in
          the How panel for preview-scoped work. */}
      <div style={{
        display:'flex', alignItems:'center', gap:10,
        padding:'8px 12px', borderBottom:'1px solid var(--line-soft)',
        background:'var(--bg-2)', flexWrap:'wrap',
      }}>
        {/* Find input */}
        <div style={{
          display:'flex', alignItems:'center', gap:6,
          padding:'3px 8px',
          background:'var(--bg-1)', border:'1px solid var(--line-strong)',
          borderRadius:'var(--radius)', minWidth:240, flex:'0 1 320px',
        }}>
          <span className="muted mono" style={{fontSize:11}}>⌕</span>
          <input type="text" value={findText}
                 onChange={e => setFindText(e.target.value)}
                 placeholder="find in document"
                 className="mono"
                 style={{
                   flex:1, border:'none', outline:'none', background:'transparent',
                   color:'var(--ink-bright)', fontSize:12, padding:'3px 2px',
                   fontFamily:"'JetBrains Mono', monospace",
                 }}/>
          {findText && findHitCount > 0 && (
            <span className="mono" style={{fontSize:10.5, color:'var(--amber)'}}>
              {findIdx + 1}/{findHitCount}
            </span>
          )}
          {findText && findHitCount === 0 && (
            <span className="mono" style={{fontSize:10.5, color:'var(--red)'}}>
              no hits
            </span>
          )}
          {findText && (
            <button onClick={() => setFindText('')}
                    title="clear"
                    style={{background:'transparent', border:'none', cursor:'pointer', color:'var(--ink-soft)', fontSize:13, lineHeight:1, padding:0}}>
              ×
            </button>
          )}
        </div>
        <button onClick={() => findHitCount && setFindIdx((findIdx - 1 + findHitCount) % findHitCount)}
                disabled={!findHitCount}
                title="previous hit"
                style={{width:28, height:28, background:'transparent', color:'var(--ink-bright)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', cursor: findHitCount ? 'pointer' : 'not-allowed', opacity: findHitCount ? 1 : 0.4, fontFamily:"'JetBrains Mono', monospace"}}>↑</button>
        <button onClick={() => findHitCount && setFindIdx((findIdx + 1) % findHitCount)}
                disabled={!findHitCount}
                title="next hit"
                style={{width:28, height:28, background:'transparent', color:'var(--ink-bright)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', cursor: findHitCount ? 'pointer' : 'not-allowed', opacity: findHitCount ? 1 : 0.4, fontFamily:"'JetBrains Mono', monospace"}}>↓</button>

        <span style={{flex:1}}/>

        {/* In-document action buttons */}
        <ToolBtn wide onClick={sendToLiveScan}
                 title="open this body in siphon-c2 Live Scan with trace on — re-runs the detection pipeline so you can verify what fires + at what confidence">
          ▶ Rescan
        </ToolBtn>
        <ToolBtn wide onClick={copyRedacted}
                 title="copy the body to clipboard with every match span replaced by X's of the same length — safe for tickets / handoff">
          ▦ Copy redacted
        </ToolBtn>
        {(preview.kind === 'file' || (preview.headers && preview.headers.Filename)) && (
          <ToolBtn wide
                   onClick={() => { window.__ir_go && window.__ir_go('crypto', ''); ping('Opened Crypto Workbench'); }}
                   title="open Analyze → Crypto Workbench (Phase 3) for encrypted-file forensics">
            ⎔ To Crypto
          </ToolBtn>
        )}
      </div>

      {/* ── BODY ROW: left rail + pre + right rail ─────────────── */}
      <div style={{
        display:'grid',
        gridTemplateColumns:'48px 1fr 48px',
        background:'var(--bg-1)',
      }}>
        {/* LEFT RAIL — primary actions */}
        <div style={{
          display:'flex', flexDirection:'column', alignItems:'center',
          gap:8, padding:'12px 0',
          borderRight:'1px solid var(--line-soft)', background:'var(--bg-2)',
        }}>
          <ToolBtn onClick={download} title="download preview as plain-text file">↓</ToolBtn>
          <ToolBtn onClick={copyBody} title="copy preview body to clipboard">⎘</ToolBtn>
          <ToolBtn onClick={() => setShowHl(!showHl)}
                   title={showHl ? 'turn off highlights' : 'turn on highlights'}
                   active={showHl}>
            {showHl ? '●' : '○'}
          </ToolBtn>
        </div>

        {/* PREVIEW BODY — fixed height driven by custom resize handle */}
        <pre ref={preRef}
             style={{
               margin:0, padding:16,
               fontFamily:"'JetBrains Mono', monospace",
               fontSize: fontSize, lineHeight:1.6,
               color:'var(--ink)',
               whiteSpace: wrap ? 'pre-wrap' : 'pre',
               wordBreak: wrap ? 'break-word' : 'normal',
               height: height,
               minHeight: 200,
               overflow:'auto',
               background:'var(--bg-1)',
             }}>
          {segs.map((s, i) => {
            if (s.kind === 'plain') return <span key={i}>{s.text}</span>;
            if (!showHl && s.kind !== 'find') return <span key={i}>{s.text}</span>;
            if (s.kind === 'match') {
              return (
                <mark key={i}
                      title="regex match · detected by siphon-core"
                      style={{
                        background: REGEX_HL.bg,
                        color: 'inherit',
                        borderBottom: '2.5px solid ' + REGEX_HL.border,
                        padding: '0 1px',
                        borderRadius: 0,
                      }}>{s.text}</mark>
              );
            }
            if (s.kind === 'keyword') {
              return (
                <span key={i}
                      title={`context keyword · "${s.keyword}"`}
                      style={{
                        background: KEYWORD_HL.bg,
                        color: 'inherit',
                        borderBottom: '2px dashed ' + KEYWORD_HL.border,
                        padding: '0 1px',
                      }}>{s.text}</span>
              );
            }
            if (s.kind === 'find') {
              return (
                <mark key={i}
                      data-find-idx={s.findIdx}
                      title={`find · "${findText}"`}
                      style={{
                        background: FIND_HL.bg,
                        color: '#000',
                        border: '1px solid ' + FIND_HL.border,
                        padding: '0 2px',
                        borderRadius: 2,
                        fontWeight: 600,
                        outline: s.findIdx === findIdx ? '2px solid var(--ink-bright)' : 'none',
                      }}>{s.text}</mark>
              );
            }
            return <span key={i}>{s.text}</span>;
          })}
        </pre>

        {/* RIGHT RAIL — view controls */}
        <div style={{
          display:'flex', flexDirection:'column', alignItems:'center',
          gap:8, padding:'12px 0',
          borderLeft:'1px solid var(--line-soft)', background:'var(--bg-2)',
        }}>
          <ToolBtn onClick={() => setFontSize(Math.min(18, fontSize + 1))} title="larger font">A+</ToolBtn>
          <ToolBtn onClick={() => setFontSize(Math.max(9, fontSize - 1))} title="smaller font">A−</ToolBtn>
          <ToolBtn onClick={() => setWrap(!wrap)} title={wrap ? 'disable word-wrap' : 'enable word-wrap'} active={wrap}>
            ⏎
          </ToolBtn>
          <ToolBtn onClick={() => {
                     setHeight(480);
                     try { localStorage.setItem('ir:preview:h', '480'); } catch {}
                   }}
                   title="reset preview height to 480px">
            ⇌
          </ToolBtn>
        </div>
      </div>

      {/* ── CUSTOM RESIZE HANDLE ───────────────────────────────── */}
      <div onMouseDown={onResizeStart}
           title="drag to resize preview"
           style={{
             height: 10, background: 'var(--bg-2)',
             borderTop: '1px solid var(--line-soft)',
             cursor: 'ns-resize',
             display: 'flex', alignItems: 'center', justifyContent: 'center',
             color: 'var(--ink-soft)',
             userSelect: 'none',
           }}>
        <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, letterSpacing:4, lineHeight:1}}>
          ═══
        </span>
      </div>

      {/* ── LEGEND — standard two-colour scheme ─────────────────
          Regex green, keywords purple, find amber. Readable text
          (ink-bright) on a darker chip background so chips don't
          wash out. */}
      {(matchCount > 0 || keywordCount > 0 || (findText && findHitCount > 0)) && (
        <div style={{
          padding:'10px 14px', borderTop:'1px solid var(--line-soft)',
          background:'var(--bg-2)', display:'flex', alignItems:'center',
          gap:10, flexWrap:'wrap', fontSize:11,
        }}>
          <span className="muted mono" style={{textTransform:'uppercase', letterSpacing:'0.12em', fontSize:10}}>
            legend
          </span>
          {matchCount > 0 && (
            <span style={{
              display:'inline-flex', alignItems:'center', gap:6,
              padding:'4px 10px', background:'var(--bg-1)',
              border:'1px solid ' + REGEX_HL.border,
              borderRadius:'var(--radius)',
              fontFamily:"'JetBrains Mono', monospace",
              fontSize: 11, color:'var(--ink-bright)',
            }}>
              <span style={{width:12, height:12, background: REGEX_HL.border, borderRadius:2, display:'inline-block'}}/>
              Regex matches
              <span style={{color:'var(--ink-soft)', marginLeft:2}}>· {matchCount}</span>
            </span>
          )}
          {keywordCount > 0 && (
            <span style={{
              display:'inline-flex', alignItems:'center', gap:6,
              padding:'4px 10px', background:'var(--bg-1)',
              border:'1px solid ' + KEYWORD_HL.border,
              borderRadius:'var(--radius)',
              fontFamily:"'JetBrains Mono', monospace",
              fontSize: 11, color:'var(--ink-bright)',
            }}>
              <span style={{
                width:12, height:12,
                borderBottom: '2px dashed ' + KEYWORD_HL.border,
                background: KEYWORD_HL.bg,
                display:'inline-block',
              }}/>
              Context keywords
              <span style={{color:'var(--ink-soft)', marginLeft:2}}>· {keywordCount}</span>
            </span>
          )}
          {findText && findHitCount > 0 && (
            <span style={{
              display:'inline-flex', alignItems:'center', gap:6,
              padding:'4px 10px', background:'var(--bg-1)',
              border:'1px solid ' + FIND_HL.border,
              borderRadius:'var(--radius)',
              fontFamily:"'JetBrains Mono', monospace",
              fontSize: 11, color:'var(--ink-bright)',
            }}>
              <span style={{width:12, height:12, background: FIND_HL.border, borderRadius:2, display:'inline-block'}}/>
              Find · "{findText}"
              <span style={{color:'var(--ink-soft)', marginLeft:2}}>· {findHitCount}</span>
            </span>
          )}
        </div>
      )}
    </div>
  );
}

// ── Where panel ───────────────────────────────────────────────
// Source → channel → destination flow. Simpler than siphon-c2's
// SVG version — the IR surface cares less about integrations and
// more about 'what path did this take'. External-domain recipients
// flag in amber so exfil shapes surface at a glance.
function WherePanel({ f }) {
  const md = f.metadata || {};
  const sender = md.sender || null;
  const recipient = md.recipient || null;
  const destUrl = md.dest_url || null;
  const filename = md.filename || (f.source_pod === 'siphon-fs' ? f.source_ip : null);
  const channelLabel = md.channel || (f.source_pod === 'siphon-fs'
    ? 'file upload'
    : f.source_pod === 'siphon-api' ? 'http POST /scan' : f.source_pod || 'unknown');
  const srcIp = md.src_ip || (f.source_pod !== 'siphon-fs' ? f.source_ip : null);
  // Heuristic exfil detector. Matches the Who/subtitle logic so the
  // analyst gets the same signal in both places.
  const externalish = (v) => v && /(external|gmail|rival|personal|competitor)\.example/i.test(v);
  const destExt = externalish(recipient) || externalish(destUrl);

  const Node = ({ label, value, accent, small }) => (
    <div style={{
      flex: '1 1 180px', minWidth: 0,
      padding:'10px 12px',
      background: accent ? 'var(--amber-wash)' : 'var(--bg-1)',
      border: '1px solid ' + (accent ? 'var(--amber)' : 'var(--line-soft)'),
      borderRadius: 'var(--radius)',
    }}>
      <div style={{fontSize:10, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--ink-soft)', marginBottom:4}}>
        {label}
      </div>
      <div className="mono" style={{
        fontSize: small ? 11.5 : 13,
        color: accent ? 'var(--amber)' : 'var(--ink-bright)',
        wordBreak: 'break-all',
      }}>{value || '—'}</div>
    </div>
  );

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Where</span>
        <span className="k">source → channel → destination</span>
      </div>
      <div style={{padding:14}}>
        <div style={{display:'flex', gap:8, alignItems:'stretch', flexWrap:'wrap'}}>
          <Node label="Source"
                value={sender || srcIp || filename || '—'}
                small={!sender} />
          <div style={{display:'flex', alignItems:'center', color:'var(--ink-soft)', fontSize:16, padding:'0 2px'}}>→</div>
          <Node label="Channel"
                value={channelLabel} />
          <div style={{display:'flex', alignItems:'center', color:'var(--ink-soft)', fontSize:16, padding:'0 2px'}}>→</div>
          <Node label="Destination"
                value={recipient || destUrl || '(captured)'}
                accent={destExt} />
        </div>

        <div className="kv" style={{marginTop:14, gridTemplateColumns:'140px 1fr', gap:'6px 12px', fontSize:12}}>
          <span className="k">Detection pod</span>
          <span className="v"><span className="chip chip--ghost" style={{fontSize:10}}>{f.source_pod || 'unknown'}</span></span>
          {filename && (<>
            <span className="k">File</span>
            <span className="v mono" style={{fontSize:11.5}}>{filename}</span>
          </>)}
          {md.department && (<>
            <span className="k">Department</span>
            <span className="v">{md.department}</span>
          </>)}
          {md.region && (<>
            <span className="k">Region</span>
            <span className="v"><span className="chip chip--ghost" style={{fontSize:10}}>{md.region}</span></span>
          </>)}
          {destExt && (<>
            <span className="k">Signal</span>
            <span className="v">
              <span className="chip chip--red" style={{fontSize:10}}>external destination</span>
              <span className="muted" style={{marginLeft:8, fontSize:11}}>
                recipient / URL outside the corporate domain — possible exfil
              </span>
            </span>
          </>)}
        </div>
      </div>
    </div>
  );
}

// ── Why panel ─────────────────────────────────────────────────
// The detection rationale. Rather than re-run /scan with trace (as
// siphon-c2's DetectionPipeline does) we render an illustrative
// pipeline statically — in demo mode the trace endpoint has no
// relevant finding, and in live mode the rescan would invalidate
// the audit trail. If we later wire a /v1/findings/{id}/trace
// endpoint this panel consumes it the same way.
const WHY_STAGES = [
  { key: 'regex',          label: 'Regex',          note: 'pattern match on normalised text' },
  { key: 'validation',     label: 'Validate',       note: 'checksum / structural validator' },
  { key: 'context',        label: 'Context',        note: 'Aho-Corasick keyword proximity' },
  { key: 'min_confidence', label: 'Min-confidence', note: 'threshold filter' },
  { key: 'emit',           label: 'Emit',           note: 'finding written to ring + audit' },
];

function WhyPanel({ f }) {
  const md = f.metadata || {};
  const emitted = true; // by definition, this finding was emitted
  const ctx = f.has_context;
  const conf = f.confidence;

  // Status per stage: 'pass' | 'warn' | 'skip' | 'block'. Since the
  // finding was emitted, every stage passed. `context` is 'pass'
  // when has_context, otherwise 'skip' (the pattern wasn't
  // context-gated).
  const stageStatus = {
    regex: 'pass',
    validation: 'pass',
    context: ctx ? 'pass' : 'skip',
    min_confidence: conf != null && conf >= 0 ? 'pass' : 'skip',
    emit: 'pass',
  };

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Why</span>
        <span className="k">pattern · pipeline · policy</span>
      </div>
      <div style={{padding:14}}>
        {/* Verdict + pattern summary row */}
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10, flexWrap:'wrap'}}>
          <span className="chip chip--safe" style={{fontSize:10}}>EMIT</span>
          <a href={`siphon-c2.html#patterns/${encodeURIComponent(f.category)}/${encodeURIComponent(f.sub_category || '')}`}
             target="_blank" rel="noopener"
             style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, color:'var(--accent)', textDecoration:'none'}}>
            {f.category}
            {f.sub_category && <><span className="muted"> / </span>{f.sub_category}</>}
            <span style={{marginLeft:4, fontSize:10}}>↗</span>
          </a>
          {conf != null && (
            <span className="muted mono" style={{fontSize:11}}>conf {conf.toFixed(3)}</span>
          )}
        </div>

        {/* Pipeline strip */}
        <div style={{display:'flex', gap:2, marginBottom:10, flexWrap:'wrap', alignItems:'center'}}>
          {WHY_STAGES.map((s, i) => {
            const st = stageStatus[s.key];
            const color = st === 'pass' ? { bg: 'var(--accent-wash)', fg: 'var(--accent)', border: 'var(--accent)' }
                        : st === 'skip' ? { bg: 'var(--bg-3)', fg: 'var(--ink-soft)', border: 'var(--line)' }
                        : { bg: 'var(--red-wash)', fg: 'var(--red)', border: 'var(--red)' };
            return (
              <React.Fragment key={s.key}>
                <span title={`${s.label} · ${st}\n${s.note}`}
                      style={{
                        padding:'4px 10px',
                        fontFamily:"'JetBrains Mono', monospace",
                        fontSize:10, fontWeight: 600,
                        letterSpacing:'0.06em', textTransform:'uppercase',
                        border:'1px solid ' + color.border,
                        color: color.fg, background: color.bg,
                        borderRadius:'var(--radius)',
                        borderStyle: st === 'skip' ? 'dashed' : 'solid',
                      }}>
                  {s.label}
                </span>
                {i < WHY_STAGES.length - 1 && (
                  <span style={{color: 'var(--ink-soft)', fontSize: 12, padding: '0 1px'}}>→</span>
                )}
              </React.Fragment>
            );
          })}
        </div>

        <div className="muted mono" style={{fontSize:10.5, marginBottom:12}}>
          Pipeline above is illustrative. A future /v1/findings/{'{'}id{'}'}/trace endpoint
          will replace this with the actual per-stage trace that fired this finding.
        </div>

        <div className="kv" style={{gridTemplateColumns:'140px 1fr', gap:'6px 12px', fontSize:12}}>
          <span className="k">Context gate</span>
          <span className="v">
            {ctx ? <span className="chip chip--safe" style={{fontSize:10}}>keyword matched</span>
                 : <span className="chip chip--ghost" style={{fontSize:10}}>no keyword required · always-run pattern</span>}
          </span>
          <span className="k">Specificity</span>
          <span className="v mono">
            {conf != null ? (conf >= 0.9 ? 'high' : conf >= 0.7 ? 'medium' : 'low') : '—'}
          </span>
          {md.list_matched && (<>
            <span className="k">List match</span>
            <span className="v">
              <span className="chip chip--warn" style={{fontSize:10}}>{md.list_matched}</span>
              <span className="muted"> · action <span className="mono">{md.list_action || 'tag'}</span></span>
            </span>
          </>)}
          {md.unique_count_breach === 'true' && (<>
            <span className="k">Unique breach</span>
            <span className="v">
              <span className="chip chip--red" style={{fontSize:10}}>breached</span>
              <span className="muted"> · {md.unique_count || '?'} distinct values in scan</span>
            </span>
          </>)}
          <span className="k">Policy</span>
          <span className="v muted" style={{fontSize:11.5}}>
            No per-finding policy attribution yet · siphon-api's policy engine runs at scan time
            but doesn't tag findings with the policy that fired. Future enhancement.
          </span>
        </div>
      </div>
    </div>
  );
}

// ── Timeline panel ────────────────────────────────────────────
// Ported from siphon-c2's FindingTimeline. Walks the known event
// sequence for this finding: request accepted → match detected →
// any siblings in the same scan → audit event (if available) → now.
// In demo mode we still render the first three + now; audit event
// is live-only since seeded findings aren't carried in /v1/audit.
function FindingTimeline({ finding, sameReq }) {
  const ax = window.useSiphonApi('/v1/audit?limit=200');
  const events = (ax.data && ax.data.events) || [];
  const auditEvt = events.find(e => e.request_id === finding.request_id);
  const demo = isDemoMode();

  const baseMs = auditEvt
    ? new Date(finding.ts).getTime() - ((auditEvt.duration_ms || 0) | 0)
    : new Date(finding.ts).getTime();
  const fmt = (ts) => fmtWallClock(ts) + (ts ? '.' + new Date(ts).getMilliseconds().toString().padStart(3, '0') : '');
  const offset = (ts) => {
    const ms = new Date(ts).getTime() - baseMs;
    const sign = ms >= 0 ? '+' : '-';
    return sign + Math.abs(ms) + 'ms';
  };

  const steps = [];
  steps.push({
    ts: new Date(baseMs).toISOString(),
    label: 'request accepted',
    detail: <>source <span className="mono">{finding.source_ip || '—'}</span> · {finding.source_pod === 'siphon-fs' ? 'POST /scan (multipart)' : 'POST /scan'} · req <span className="mono">{(finding.request_id || '').slice(0, 8)}</span></>,
    marker: 'dim',
  });
  steps.push({
    ts: finding.ts,
    label: 'match detected',
    detail: <>pattern <span className="mono">{finding.sub_category || finding.category}</span> · span {finding.span ? finding.span.join('..') : '—'} · conf <b>{finding.confidence != null ? finding.confidence.toFixed(3) : '—'}</b></>,
    marker: 'accent',
  });
  (sameReq || []).forEach(r => {
    steps.push({
      ts: r.ts,
      label: 'also in same scan',
      detail: <><span className="mono">{r.sub_category || r.category}</span> · <span style={{color:'var(--accent)'}}>{r.text}</span> · conf {r.confidence != null ? r.confidence.toFixed(2) : '—'}</>,
      marker: 'dim',
    });
  });
  if (auditEvt) {
    steps.push({
      ts: auditEvt.timestamp,
      label: 'audit event emitted',
      detail: <>outcome <b>{auditEvt.outcome || '—'}</b> · {auditEvt.finding_count} finding{auditEvt.finding_count === 1 ? '' : 's'} total · duration {auditEvt.duration_ms != null ? Math.round(auditEvt.duration_ms) + 'ms' : '—'}</>,
      marker: 'accent',
    });
  } else if (!demo) {
    steps.push({
      ts: finding.ts,
      label: 'audit event',
      detail: <span className="muted">not found in the last 200 events · older events have rolled off the ring</span>,
      marker: 'dim',
    });
  }
  steps.push({
    ts: new Date().toISOString(),
    label: 'you are here',
    detail: <>awaiting analyst decision · <i>Close event · False positive · Escalate</i></>,
    marker: 'live',
  });

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">When</span>
        <span className="k">detection → audit → you are here</span>
      </div>
      <div style={{padding:14}}>
        <div style={{display:'grid', gridTemplateColumns:'100px 16px 1fr', rowGap:8, fontFamily:"'JetBrains Mono', monospace", fontSize:11.5}}>
          {steps.map((s, i) => {
            const markerColor = s.marker === 'accent' ? 'var(--accent)'
                              : s.marker === 'live'   ? 'var(--red)'
                              : 'var(--ink-faint)';
            return (
              <React.Fragment key={i}>
                <div className="muted mono" style={{fontSize:10.5}} title={s.ts + ' (' + offset(s.ts) + ')'}>
                  {fmt(s.ts)}
                </div>
                <div style={{display:'flex', justifyContent:'center', alignItems:'center', position:'relative'}}>
                  <span style={{
                    display:'inline-block',
                    width: s.marker === 'live' ? 10 : 8,
                    height: s.marker === 'live' ? 10 : 8,
                    borderRadius:'50%', background: markerColor,
                    boxShadow: s.marker === 'live' ? '0 0 0 2px var(--bg-1), 0 0 8px ' + markerColor : 'none',
                  }} />
                  {i < steps.length - 1 && (
                    <span style={{
                      position:'absolute', top:'calc(50% + 6px)', bottom:'-8px',
                      width:1, background:'var(--line)',
                    }} />
                  )}
                </div>
                <div>
                  <div style={{color:'var(--ink-bright)', fontWeight:600}}>{s.label}</div>
                  <div className="muted" style={{fontSize:11, marginTop:2, lineHeight:1.5}}>{s.detail}</div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
        {demo && (
          <div className="muted" style={{fontSize:10.5, marginTop:10, paddingTop:8, borderTop:'1px dashed var(--line-soft)'}}>
            Demo mode: audit event is live-only. Real /v1/audit entries appear here for live-pod findings.
          </div>
        )}
      </div>
    </div>
  );
}

    </div>
  );
}

function FindingDetail({ id, back }) {
  // All hooks up front — React requires consistent hook order across
  // renders, and the "finding not found" early return below comes
  // AFTER them.
  const findings = window.useIrFindings('?limit=500');
  const [dispo, setDispo] = React.useState(readDispo);
  const [notesDraft, setNotesDraft] = React.useState('');
  const [xsoarFor, setXsoarFor] = React.useState(null);
  const [flash, setFlash] = React.useState(null);

  const all = (findings.data && findings.data.findings) || [];
  const f = all.find(x => x.id === id);

  // Prev / next. Must compute before the keyboard useEffect so the
  // closure captures the right neighbours; guarded on `f` being
  // loaded.
  const idx = f ? all.findIndex(x => x.id === id) : -1;
  const prev = idx > 0 ? all[idx - 1] : null;
  const next = idx >= 0 && idx < all.length - 1 ? all[idx + 1] : null;

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if ((e.key === 'j' || e.key === 'ArrowDown' || e.key === 'ArrowRight') && next) {
        window.__ir_goFinding && window.__ir_goFinding(next.id);
      } else if ((e.key === 'k' || e.key === 'ArrowUp' || e.key === 'ArrowLeft') && prev) {
        window.__ir_goFinding && window.__ir_goFinding(prev.id);
      } else if (e.key === 'Escape') {
        back && back();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [prev, next, back]);

  React.useEffect(() => {
    const resync = () => setDispo(readDispo());
    window.addEventListener('ir:demoChanged', resync);
    window.addEventListener('storage', resync);
    return () => {
      window.removeEventListener('ir:demoChanged', resync);
      window.removeEventListener('storage', resync);
    };
  }, []);

  // Reset the notes textarea when the analyst jumps to a different
  // finding — otherwise the draft leaks across investigations.
  React.useEffect(() => { setNotesDraft(''); }, [id]);

  if (!findings.loading && !f) {
    return (
      <div>
        <IrPageBar
          crumbs={['Respond', 'Findings', id]}
          title="Finding not found"
          subtitle="Not in the live ring or the demo seed."
          actions={<button className="btn ghost" onClick={back}>‹ Back to queue</button>}
        />
        <div className="note" style={{borderColor:'var(--amber)', color:'var(--amber)', background:'var(--amber-wash)', margin:'var(--gap)'}}>
          Ring size is bounded ({findings.data ? findings.data.capacity : '—'}).
          Older findings fall off as new ones arrive. Toggle demo data under
          Settings → Engineering to populate a stable set.
        </div>
      </div>
    );
  }
  if (!f) {
    return <div className="muted" style={{padding:30, textAlign:'center'}}>loading…</div>;
  }

  const ctx = deriveContext(f);
  const d = dispo[f.id];

  const fmtTs = (ts) => ts ? ts.replace('T', ' ').replace('Z', '').slice(0, 19) : '—';

  const dispose = (kind, extra) => {
    const note = notesDraft.trim() || (d && d.notes) || '';
    const record = {
      kind, at: new Date().toISOString(), by: 'local-analyst',
      notes: note || null, ...extra,
    };
    const nextMap = { ...dispo, [f.id]: record };
    setDispo(nextMap);
    writeDispo(nextMap);
    if (kind === 'fp' && !isDemoMode()) {
      const queue = readFpQueue();
      const existing = queue.findIndex(x => x.finding_id === f.id);
      const entry = {
        finding_id: f.id,
        category: f.category,
        sub_category: f.sub_category,
        text: f.text,
        confidence: f.confidence,
        severity: f.severity,
        source_pod: f.source_pod,
        submitted_at: record.at,
        submitted_by: record.by,
        notes: note,
        finding: f,
      };
      if (existing >= 0) queue[existing] = entry;
      else queue.push(entry);
      writeFpQueue(queue);
    }
    setFlash(DISPO[kind].label);
    setTimeout(() => setFlash(null), 1500);
  };

  const undoDispose = () => {
    const nextMap = { ...dispo };
    delete nextMap[f.id];
    setDispo(nextMap);
    writeDispo(nextMap);
    writeFpQueue(readFpQueue().filter(x => x.finding_id !== f.id));
  };

  return (
    <div>
      <IrPageBar
        crumbs={['Respond', 'Findings', f.id]}
        title={<div style={{display:'flex', alignItems:'center', gap:14, flexWrap:'wrap'}}>
          {/* Big bold finding id — the single label an analyst refers
              to this case by throughout the review. */}
          <span className="mono" style={{
            fontSize: 28, lineHeight: 1,
            color:'var(--ink-bright)', fontWeight: 700,
            letterSpacing:'-0.02em',
          }}>{f.id}</span>
          {/* Data-type badge — category + sub_category rendered as a
              single prominent pill so the type of data surfaces
              before anything else. */}
          <span style={{
            fontSize: 12, padding:'5px 12px', lineHeight: 1.2,
            fontFamily:"'Space Grotesk', sans-serif", fontWeight: 600,
            letterSpacing:'0.02em',
            background:'var(--amber-wash)',
            border:'1.5px solid var(--amber)',
            color:'var(--ink-bright)',
            borderRadius:'var(--radius)',
          }}>
            {f.category}
            {f.sub_category && <><span style={{opacity:0.55, margin:'0 5px'}}>/</span>{f.sub_category}</>}
          </span>
          {/* Classification label — derived from category (PCI / PHI
              / PII / CREDENTIAL etc.) so the regulatory lens is
              visible at a glance. */}
          {(() => {
            const c = deriveClassification(f);
            return (
              <span style={{
                fontSize: 10.5, padding:'5px 10px', lineHeight: 1.2,
                fontFamily:"'Space Grotesk', sans-serif", fontWeight: 700,
                letterSpacing:'0.12em', textTransform:'uppercase',
                border: `1.5px solid ${c.color}`,
                color: c.color,
                background:'transparent',
                borderRadius:'var(--radius)',
              }} title="regulatory / classification label derived from the pattern category">
                {c.label}
              </span>
            );
          })()}
          {severityChipLarge(f.severity)}
        </div>}
        subtitle={(() => {
          const md = f.metadata || {};
          const sender = md.sender || null;
          const recipient = md.recipient || null;
          // Amber-highlight external-domain recipients as a cheap
          // exfil-shape signal.
          const recipientExt = recipient && /(external|gmail|rival|personal|competitor)\.example/i.test(recipient);
          const labelStyle = {fontSize:10, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--ink-soft)', fontWeight:600};
          return (
            <div style={{display:'flex', gap:16, flexWrap:'wrap', alignItems:'center', marginTop:6, fontSize:13, fontFamily:"'JetBrains Mono', monospace"}}>
              {sender && (
                <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
                  <span style={labelStyle}>From</span>
                  <span style={{color:'var(--ink-bright)', fontSize:13}}>{sender}</span>
                </span>
              )}
              {recipient && (
                <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
                  <span style={labelStyle}>To</span>
                  <span style={{
                    color: recipientExt ? 'var(--amber)' : 'var(--ink-bright)',
                    fontSize: 13, fontWeight: recipientExt ? 600 : 400,
                  }} title={recipientExt ? 'external-domain recipient — possible exfil shape' : undefined}>
                    {recipient}
                    {recipientExt && <span style={{marginLeft:6, fontSize:9, padding:'1px 5px', background:'var(--amber-wash)', border:'1px solid var(--amber)', borderRadius:2}}>external</span>}
                  </span>
                </span>
              )}
              {!sender && !recipient && (
                <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
                  <span style={labelStyle}>Source</span>
                  <span style={{color:'var(--ink-bright)', fontSize:13}}>{f.source_ip || '—'}</span>
                </span>
              )}
              <span style={{color:'var(--ink-dim)'}}>·</span>
              <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
                <span style={labelStyle}>When</span>
                <span style={{color:'var(--ink)', fontSize:12}}>{fmtTs(f.ts)}</span>
              </span>
              <span style={{color:'var(--ink-dim)'}}>·</span>
              <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
                <span style={labelStyle}>Req</span>
                <span style={{color:'var(--ink-soft)', fontSize:12}}>{(f.request_id || '').split('-')[0] || '—'}</span>
              </span>
              {idx >= 0 && (<>
                <span style={{color:'var(--ink-dim)'}}>·</span>
                <span style={{color:'var(--ink-soft)', fontSize:12}}>{idx + 1} of {all.length}</span>
              </>)}
              <span style={{marginLeft:'auto', color:'var(--ink-dim)', fontSize:10.5}}>
                <span className="mono" style={{color:'var(--ink-soft)'}}>j</span><span>/</span><span className="mono" style={{color:'var(--ink-soft)'}}>k</span>
                <span> jump · </span>
                <span className="mono" style={{color:'var(--ink-soft)'}}>esc</span>
                <span> close</span>
              </span>
            </div>
          );
        })()}
        actions={<>
          <window.LivePill source={findings.source} onClick={findings.refetch} />
          <div style={{display:'flex', gap:2, border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', overflow:'hidden'}}>
            <button className="btn ghost" disabled={!prev}
                    onClick={() => prev && window.__ir_goFinding(prev.id)}
                    title={prev ? `prev · ${prev.id}` : 'no newer finding'}
                    style={{border:'none', borderRight:'1px solid var(--line-strong)', padding:'5px 10px', opacity: prev ? 1 : 0.4, cursor: prev ? 'pointer' : 'not-allowed'}}>
              ‹ Prev
            </button>
            <button className="btn ghost" disabled={!next}
                    onClick={() => next && window.__ir_goFinding(next.id)}
                    title={next ? `next · ${next.id}` : 'no older finding'}
                    style={{border:'none', padding:'5px 10px', opacity: next ? 1 : 0.4, cursor: next ? 'pointer' : 'not-allowed'}}>
              Next ›
            </button>
          </div>
          <button className="btn ghost" onClick={back} title="esc">‹ Back</button>
          {/* Three dispositions as primary actions — the whole reason
              this surface exists. */}
          <button className="btn" onClick={() => dispose('event')}
                  title="benign activity · close the event">
            ✓ Close event
          </button>
          <button className="btn ghost" onClick={() => dispose('fp')}
                  title="submit to the admin-console FP queue"
                  style={{color:'var(--ink-soft)'}}>
            ⚑ False positive
          </button>
          <button className="btn primary" onClick={() => setXsoarFor(f)}
                  title="escalate to XSOAR (configure webhook in Settings → Integrations)"
                  style={{background:'var(--amber)', borderColor:'var(--amber)', color:'#000'}}>
            ↗ Escalate
          </button>
        </>}
      />

      {/* Disposition banner — reflects whatever's already on this
          finding, including history across reloads. */}
      {d && (
        <div className="note" style={{
          margin:'var(--gap) var(--gap) 0 var(--gap)', fontSize:12,
          borderColor: d.kind === 'escalate' ? 'var(--amber)' : 'var(--line-strong)',
          background: 'var(--bg-2)', color: 'var(--ink)',
        }}>
          <b>{DISPO[d.kind].label}</b>
          <span className="muted"> · {d.at.slice(0, 19).replace('T',' ')} · {d.by || 'analyst'}</span>
          {d.kind === 'escalate' && d.xsoar_status && <> · <span className="mono">{d.xsoar_status}</span></>}
          {d.notes && <div style={{marginTop:4, whiteSpace:'pre-wrap', fontSize:11.5}}>{d.notes}</div>}
          <button className="btn ghost" onClick={undoDispose}
                  style={{marginLeft:12, fontSize:10, padding:'3px 8px'}}>↶ undo</button>
        </div>
      )}
      {flash && (
        <div className="note" style={{
          margin:'var(--gap) var(--gap) 0 var(--gap)', fontSize:12,
          borderColor:'var(--safe)', background:'var(--accent-wash)', color:'var(--ink)',
        }}>
          ✓ {flash}
        </div>
      )}

      {/* Document preview — full-width, centerpiece of the surface.
          Shows the synthesised email/file/print/slack/api payload
          with matches highlighted in their category colours and
          context keywords underlined. Download button emits a
          plain-text copy for evidence / handoff. */}
      <div style={{padding:'var(--gap) var(--gap) 0 var(--gap)'}}>
        <DocumentPreview
          finding={f}
          sameReq={all.filter(x => x.id !== f.id && x.request_id === f.request_id)} />
      </div>

      {/* 5W+H grid — 2 cols × 3 rows. Provenance on the left
          column (Who / Where / When), classification + response on
          the right (What / Why / How). */}
      <div style={{
        display:'grid',
        gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)',
        gap:'var(--gap)',
        padding:'var(--gap)',
        alignItems:'stretch',
      }}>
        <WhoPanel f={f} all={all} />
        <WhatPanel f={f} />

        <WherePanel f={f} />

        <FindingTimeline finding={f}
                         sameReq={all.filter(x => x.id !== f.id && x.request_id === f.request_id)} />

        <WhyPanel f={f} />

        <QuickActions f={f} />
      </div>

      {/* Investigator notes — writes on the next disposition click. */}
      <div style={{padding:'0 var(--gap) var(--gap) var(--gap)'}}>
        <div className="box">
          <div className="box-title">
            <span className="t">Investigator notes</span>
            <span className="k muted">saved with the disposition record</span>
          </div>
          <div style={{padding:14}}>
            <textarea
              value={notesDraft || (d && d.notes) || ''}
              onChange={e => setNotesDraft(e.target.value)}
              placeholder="TP or FP? What did you verify? Who did you contact? What was the business context?"
              rows={4}
              className="mono"
              style={{
                width:'100%', boxSizing:'border-box', fontSize:12,
                padding:'8px 10px', background:'var(--bg-2)', color:'var(--ink)',
                border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                resize:'vertical',
              }}
            />
            <div className="muted" style={{fontSize:10.5, marginTop:6}}>
              Notes are persisted when you pick a disposition (Close event / False positive / Escalate).
              Current draft stays local to this finding — switching to another row clears it.
            </div>
          </div>
        </div>
      </div>

      {/* Raw record — collapsed by default so it doesn't compete with
          the 5W+H view, but one click away for analysts who want the
          unpretty view. */}
      <div style={{padding:'0 var(--gap) var(--gap) var(--gap)'}}>
        <details className="box">
          <summary style={{padding:'10px 14px', cursor:'pointer', fontFamily:"'Space Grotesk', sans-serif", fontWeight:600, fontSize:13, color:'var(--ink-bright)'}}>
            Raw finding record
          </summary>
          <div style={{padding:'0 14px 14px 14px'}}>
            <div className="kv" style={{marginTop:4}}>
              <span className="k">Finding id</span>   <span className="v mono">{f.id}</span>
              <span className="k">Request id</span>   <span className="v mono">{f.request_id || '—'}</span>
              <span className="k">Timestamp</span>    <span className="v mono">{f.ts}</span>
              <span className="k">Source IP</span>    <span className="v mono">{f.source_ip || '—'}</span>
              <span className="k">Source pod</span>   <span className="v mono">{f.source_pod || '—'}</span>
              <span className="k">Category</span>     <span className="v">{f.category}</span>
              <span className="k">Sub-category</span> <span className="v">{f.sub_category || '—'}</span>
              <span className="k">Confidence</span>   <span className="v mono">{f.confidence != null ? f.confidence.toFixed(3) : '—'}</span>
              <span className="k">Has context</span>  <span className="v">{f.has_context ? 'yes' : 'no'}</span>
              <span className="k">Span</span>         <span className="v mono">{f.span ? f.span.join('..') : '—'}</span>
              <span className="k">Severity</span>     <span className="v">{f.severity}</span>
            </div>
            {f.metadata && Object.keys(f.metadata).length > 0 && (
              <>
                <div className="label" style={{marginTop:14, marginBottom:6}}>Metadata</div>
                <div className="mono" style={{fontSize:11, lineHeight:1.8, background:'var(--bg-1)', padding:10, border:'1px dashed var(--line-soft)'}}>
                  {Object.entries(f.metadata).map(([k, v]) => (
                    <div key={k}><span style={{color:'var(--accent)'}}>{k}</span> = <span style={{color:'var(--ink-bright)'}}>{String(v)}</span></div>
                  ))}
                </div>
              </>
            )}
            <div style={{marginTop:12, display:'flex', gap:8, flexWrap:'wrap'}}>
              <button className="btn ghost" onClick={() => {
                navigator.clipboard?.writeText(JSON.stringify(f, null, 2));
                setFlash('Copied JSON');
                setTimeout(() => setFlash(null), 1200);
              }} style={{fontSize:11}}>⎘ Copy JSON</button>
              <a className="btn ghost"
                 href={`siphon-c2.html#patterns/${encodeURIComponent(f.category)}/${encodeURIComponent(f.sub_category || '')}`}
                 target="_blank" rel="noopener"
                 title="jump to the admin console to tune this pattern"
                 style={{fontSize:11, textDecoration:'none'}}>
                ↗ Tune detection
              </a>
            </div>
          </div>
        </details>
      </div>

      {/* XSOAR escalate modal — consumes notesDraft so the payload
          carries whatever the analyst typed. */}
      {xsoarFor && (
        <XsoarEscalateModal
          finding={xsoarFor}
          note={notesDraft || (d && d.notes) || ''}
          onClose={() => setXsoarFor(null)}
          onDone={(statusText) => {
            dispose('escalate', { xsoar_status: statusText });
            setXsoarFor(null);
          }}
        />
      )}
    </div>
  );
}

// ─── XSOAR escalate modal ───────────────────────────────────────
// Builds a JSON payload from the finding + investigator notes and
// lets the analyst send it to the XSOAR webhook configured under
// Settings → Integrations, or copy it for manual submission. Send
// failures annotate the disposition but don't block it — the
// analyst may have already handed off by other means.
function XsoarEscalateModal({ finding, note, onClose, onDone }) {
  const [cfg] = React.useState(readXsoarCfg);
  const [sending, setSending] = React.useState(false);
  const [sendErr, setSendErr] = React.useState(null);
  const [sendOk, setSendOk] = React.useState(null);

  const payload = React.useMemo(() => ({
    source: 'siphon-ir',
    submitted_at: new Date().toISOString(),
    submitted_by: 'local-analyst',
    investigator_notes: note || null,
    finding: {
      id: finding.id,
      ts: finding.ts,
      category: finding.category,
      sub_category: finding.sub_category,
      text: finding.text,
      confidence: finding.confidence,
      has_context: finding.has_context,
      severity: finding.severity,
      source_ip: finding.source_ip,
      source_pod: finding.source_pod,
      request_id: finding.request_id,
      span: finding.span,
      metadata: finding.metadata || {},
    },
    context: deriveContext(finding),
  }), [finding, note]);

  const copyPayload = async () => {
    try {
      await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
      setSendOk('Copied to clipboard');
      setTimeout(() => setSendOk(null), 1500);
    } catch (e) { setSendErr(String(e.message || e)); }
  };

  const sendWebhook = async () => {
    if (!cfg.webhook) return;
    setSending(true); setSendErr(null); setSendOk(null);
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (cfg.apiKey) headers['Authorization'] = cfg.authHeader === 'api-key'
        ? cfg.apiKey
        : 'Bearer ' + cfg.apiKey;
      const r = await fetch(cfg.webhook, {
        method: 'POST', headers, body: JSON.stringify(payload),
      });
      if (!r.ok) {
        const body = await r.text();
        throw new Error('HTTP ' + r.status + (body ? ': ' + body.slice(0, 200) : ''));
      }
      setSendOk('POST ' + r.status);
      setTimeout(() => onDone('POST ' + r.status), 600);
    } catch (e) {
      setSendErr(String(e.message || e));
    } finally {
      setSending(false);
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.7)',
      display:'flex', alignItems:'center', justifyContent:'center',
      zIndex:100,
    }} onClick={onClose}>
      <div className="box" style={{width:'min(820px, 90vw)', maxHeight:'90vh', overflow:'auto', margin:0}}
           onClick={e => e.stopPropagation()}>
        <div className="box-title">
          <span className="t">Escalate to XSOAR</span>
          <span className="k">
            {cfg.webhook
              ? <span className="mono" style={{fontSize:10, color:'var(--ink-soft)'}}>target: {(new URL(cfg.webhook)).host}</span>
              : <span className="chip chip--warn" style={{fontSize:9}}>no webhook configured</span>}
          </span>
        </div>
        <div style={{padding:14}}>
          {!cfg.webhook && (
            <div className="note" style={{borderColor:'var(--amber)', background:'var(--amber-wash)', color:'var(--ink)', marginBottom:12, fontSize:12}}>
              <b>XSOAR webhook not configured.</b> Set the URL + credentials under{' '}
              <a onClick={() => { onClose(); window.__ir_go && window.__ir_go('integrations'); }}
                 style={{color:'var(--accent)', cursor:'pointer'}}>Settings → Integrations</a>.
              In the meantime, copy the payload and submit via another channel.
            </div>
          )}
          <div className="label" style={{marginBottom:4}}>
            Finding · <span className="mono">{finding.id}</span>{' '}
            <span className="muted">· {finding.category}/{finding.sub_category}</span>
          </div>
          <pre style={{
            background:'var(--bg-1)', padding:10, border:'1px solid var(--line-soft)',
            borderRadius:'var(--radius)', fontSize:11, maxHeight:320, overflow:'auto',
            fontFamily:"'JetBrains Mono', monospace", whiteSpace:'pre', margin:0,
          }}>{JSON.stringify(payload, null, 2)}</pre>

          {sendErr && (
            <div className="note" style={{borderColor:'var(--red)', background:'var(--red-wash)', color:'var(--red)', fontSize:12, marginTop:10}}>
              <b>Send failed:</b> {sendErr} · disposition not recorded
            </div>
          )}
          {sendOk && (
            <div className="note" style={{borderColor:'var(--safe)', background:'var(--accent-wash)', color:'var(--ink)', fontSize:12, marginTop:10}}>
              <b>{sendOk}</b>
            </div>
          )}

          <div style={{marginTop:14, display:'flex', gap:8, flexWrap:'wrap', justifyContent:'flex-end'}}>
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            <button className="btn ghost" onClick={copyPayload}>⎘ Copy JSON</button>
            <button className="btn ghost" onClick={() => onDone('handed off manually')}
                    title="record disposition without POSTing (analyst will submit via another channel)">
              Record as escalated
            </button>
            <button className="btn primary" onClick={sendWebhook}
                    disabled={!cfg.webhook || sending}
                    style={{background:'var(--amber)', borderColor:'var(--amber)', color:'#000'}}>
              {sending ? 'Sending…' : '↗ POST to XSOAR'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Settings → Integrations ────────────────────────────────────
// Centralises the XSOAR + Splunk HEC configuration. Other IR
// surfaces read these from localStorage (ir:xsoar, ir:splunk). The
// 'Test' buttons validate the endpoint is reachable before a real
// escalation tries.
function IntegrationsSurface() {
  const [xsoar, setXsoar] = React.useState(() => ({
    webhook: '', apiKey: '', authHeader: 'bearer', ...readXsoarCfg(),
  }));
  const [splunk, setSplunk] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ir:splunk') || '{}') || { hec: '', token: '', index: 'dlp_ir' }; }
    catch { return { hec: '', token: '', index: 'dlp_ir' }; }
  });
  const [xsoarSaved, setXsoarSaved] = React.useState(false);
  const [splunkSaved, setSplunkSaved] = React.useState(false);
  const [xsoarTest, setXsoarTest] = React.useState(null);
  const [splunkTest, setSplunkTest] = React.useState(null);

  const saveXsoar = () => {
    writeXsoarCfg(xsoar);
    setXsoarSaved(true);
    setTimeout(() => setXsoarSaved(false), 1500);
  };
  const saveSplunk = () => {
    try { localStorage.setItem('ir:splunk', JSON.stringify(splunk)); } catch {}
    setSplunkSaved(true);
    setTimeout(() => setSplunkSaved(false), 1500);
  };

  const testXsoar = async () => {
    setXsoarTest({ state: 'running' });
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (xsoar.apiKey) headers['Authorization'] = xsoar.authHeader === 'api-key'
        ? xsoar.apiKey
        : 'Bearer ' + xsoar.apiKey;
      const r = await fetch(xsoar.webhook, {
        method: 'POST', headers,
        body: JSON.stringify({ source: 'siphon-ir', kind: 'test', submitted_at: new Date().toISOString() }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setXsoarTest({ state: 'ok', status: r.status });
    } catch (e) {
      setXsoarTest({ state: 'fail', error: String(e.message || e) });
    }
  };
  const testSplunk = async () => {
    setSplunkTest({ state: 'running' });
    try {
      const r = await fetch(splunk.hec, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Splunk ' + (splunk.token || ''),
        },
        body: JSON.stringify({
          event: { source: 'siphon-ir', kind: 'test', ts: new Date().toISOString() },
          sourcetype: 'siphon:ir:test',
          index: splunk.index || 'main',
        }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setSplunkTest({ state: 'ok', status: r.status });
    } catch (e) {
      setSplunkTest({ state: 'fail', error: String(e.message || e) });
    }
  };

  const fieldStyle = {
    flex:1, minWidth:280, fontFamily:"'JetBrains Mono', monospace", fontSize:12,
    padding:'6px 10px', background:'var(--bg-1)', color:'var(--ink)',
    border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
  };

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      {/* ── XSOAR ───────────────────────────────────────────────── */}
      <div className="box">
        <div className="box-title">
          <span className="t">XSOAR · SOAR / remediation pipeline</span>
          <span className="k">
            {xsoar.webhook ? <span className="chip chip--safe" style={{fontSize:9}}>configured</span>
                           : <span className="chip chip--ghost" style={{fontSize:9}}>not configured</span>}
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:10, fontSize:12}}>
          <div className="muted" style={{fontSize:11.5, lineHeight:1.6}}>
            Webhook endpoint XSOAR listens on (Cortex XSOAR playbook trigger, or a generic webhook
            that feeds into your playbook engine). Escalate actions POST the finding + 5W context +
            investigator notes as JSON.
          </div>
          <div>
            <div className="label" style={{marginBottom:4}}>Webhook URL</div>
            <input type="text" value={xsoar.webhook}
                   onChange={e => setXsoar({ ...xsoar, webhook: e.target.value })}
                   placeholder="https://xsoar.example.com/instance/execute/siphon_ir_webhook"
                   style={fieldStyle} />
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <div style={{flex:2, minWidth:280}}>
              <div className="label" style={{marginBottom:4}}>API key / token</div>
              <input type="password" value={xsoar.apiKey}
                     onChange={e => setXsoar({ ...xsoar, apiKey: e.target.value })}
                     placeholder="bearer token or raw api-key"
                     style={fieldStyle} autoComplete="off" />
            </div>
            <div style={{flex:1, minWidth:160}}>
              <div className="label" style={{marginBottom:4}}>Auth header</div>
              <select value={xsoar.authHeader}
                      onChange={e => setXsoar({ ...xsoar, authHeader: e.target.value })}
                      style={{...fieldStyle, width:'100%'}}>
                <option value="bearer">Authorization: Bearer …</option>
                <option value="api-key">Authorization: &lt;key&gt;</option>
              </select>
            </div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
            <button className="btn" onClick={saveXsoar}>{xsoarSaved ? 'Saved' : 'Save'}</button>
            <button className="btn ghost" onClick={testXsoar}
                    disabled={!xsoar.webhook || (xsoarTest && xsoarTest.state === 'running')}>
              {xsoarTest && xsoarTest.state === 'running' ? 'Testing…' : 'Send test event'}
            </button>
            {xsoarTest && xsoarTest.state === 'ok' && (
              <span className="chip chip--safe" style={{fontSize:10}}>test OK · {xsoarTest.status}</span>
            )}
            {xsoarTest && xsoarTest.state === 'fail' && (
              <span className="chip chip--red" style={{fontSize:10}} title={xsoarTest.error}>
                test failed: {xsoarTest.error.slice(0, 80)}
              </span>
            )}
          </div>
        </div>
      </div>

      {/* ── Splunk HEC ──────────────────────────────────────────── */}
      <div className="box">
        <div className="box-title">
          <span className="t">Splunk HEC · event forwarder</span>
          <span className="k">
            {splunk.hec ? <span className="chip chip--safe" style={{fontSize:9}}>configured</span>
                        : <span className="chip chip--ghost" style={{fontSize:9}}>not configured</span>}
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:10, fontSize:12}}>
          <div className="muted" style={{fontSize:11.5, lineHeight:1.6}}>
            When configured, every analyst disposition (Close Event / Mark FP / Escalate) mirrors
            into Splunk via HEC for reporting + long-term audit. Complements the admin console's
            SIEM forwarders (which stream detections); this stream carries the triage outcomes.
          </div>
          <div>
            <div className="label" style={{marginBottom:4}}>HEC URL</div>
            <input type="text" value={splunk.hec}
                   onChange={e => setSplunk({ ...splunk, hec: e.target.value })}
                   placeholder="https://splunk.example.com:8088/services/collector"
                   style={fieldStyle} />
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <div style={{flex:2, minWidth:280}}>
              <div className="label" style={{marginBottom:4}}>HEC token</div>
              <input type="password" value={splunk.token}
                     onChange={e => setSplunk({ ...splunk, token: e.target.value })}
                     placeholder="e.g. B5A79AAD-D822-46CC-80D1-…"
                     style={fieldStyle} autoComplete="off" />
            </div>
            <div style={{flex:1, minWidth:140}}>
              <div className="label" style={{marginBottom:4}}>Index</div>
              <input type="text" value={splunk.index}
                     onChange={e => setSplunk({ ...splunk, index: e.target.value })}
                     placeholder="dlp_ir"
                     style={fieldStyle} />
            </div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
            <button className="btn" onClick={saveSplunk}>{splunkSaved ? 'Saved' : 'Save'}</button>
            <button className="btn ghost" onClick={testSplunk}
                    disabled={!splunk.hec || (splunkTest && splunkTest.state === 'running')}>
              {splunkTest && splunkTest.state === 'running' ? 'Testing…' : 'Send test event'}
            </button>
            {splunkTest && splunkTest.state === 'ok' && (
              <span className="chip chip--safe" style={{fontSize:10}}>test OK · {splunkTest.status}</span>
            )}
            {splunkTest && splunkTest.state === 'fail' && (
              <span className="chip chip--red" style={{fontSize:10}} title={splunkTest.error}>
                test failed: {splunkTest.error.slice(0, 80)}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="muted" style={{fontSize:11, lineHeight:1.7, padding:'0 2px'}}>
        Both configurations live in this browser's localStorage only. Clear them with the browser's
        site-data panel. For a shared multi-analyst setup, back these with a server-side secret store
        and a /v1/integrations endpoint on siphon-api — Phase 7 of the IR roadmap.
      </div>
    </div>
  );
}

// ─── Dashboard (Respond → Overview) ─────────────────────────────
// Operational metrics: MTTR-respond / MTTR-remediate, totals by
// disposition, breakdowns by analyst / incident type / region, and
// Repeat Occurrences (users with ≥3 findings in the window).
// Charts are SVG-free, plain CSS horizontal bars; palette reuses
// the preview pane's CATEGORY_COLORS so colour coding is
// consistent across surfaces.

const IR_TIME_RANGES = [
  { id: '24h', label: '24h',     days: 1 },
  { id: '7d',  label: '7 days',  days: 7 },
  { id: '30d', label: '30 days', days: 30 },
  { id: 'all', label: 'all',     days: 36500 },
];

function irMedian(arr) {
  if (!arr.length) return null;
  const s = arr.slice().sort((a, b) => a - b);
  const mid = Math.floor(s.length / 2);
  return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
}
function irPercentile(arr, p) {
  if (!arr.length) return null;
  const s = arr.slice().sort((a, b) => a - b);
  const idx = Math.max(0, Math.min(s.length - 1, Math.floor(p * s.length)));
  return s[idx];
}
function fmtMinutes(m) {
  if (m == null || isNaN(m)) return '—';
  if (m < 1)    return Math.round(m * 60) + 's';
  if (m < 60)   return Math.round(m) + 'm';
  if (m < 1440) return (m / 60).toFixed(1) + 'h';
  return (m / 1440).toFixed(1) + 'd';
}
