// Lazy-load zip.js from CDN. Only pulled when the analyst actually
// runs an attack — keeps the CDN hit off the critical path for
// every other surface. Resolves to window.zip once ready.
function loadZipJs() {
  if (window.zip) return Promise.resolve(window.zip);
  if (window.__irZipJsLoading) return window.__irZipJsLoading;
  window.__irZipJsLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.7.52/dist/zip.min.js';
    s.onload = () => resolve(window.zip);
    s.onerror = () => reject(new Error('Failed to load zip.js from CDN'));
    document.head.appendChild(s);
  });
  return window.__irZipJsLoading;
}

// Lazy-load officecrypto-tool. The library is CommonJS with deep
// Node-builtin deps (cfb → stream, xml2js → sax → stream), so we
// need a CDN that polyfills them at bundle time. esm.sh does;
// jsDelivr's +esm endpoint does not (fails with "Stream=e" when
// cfb tries to subclass Node's Stream). new Function wrapper
// keeps Babel-standalone from touching the dynamic import.
//
// Failures are cached + translated into a user-facing message so
// the analyst sees "browser can't run this library · use
// office2john + hashcat" instead of the raw minified crash text.
const IR_OFFICECRYPTO_FAIL_MSG =
  'In-browser Office decryption unavailable · the officecrypto-tool ' +
  'library failed to load (its Node-stream deps don\'t run in this ' +
  'browser). Export with office2john.py and run hashcat / john instead.';

function loadOfficeCrypto() {
  if (window.__irOfficeCrypto) return Promise.resolve(window.__irOfficeCrypto);
  if (window.__irOfficeCryptoLoading) return window.__irOfficeCryptoLoading;
  const dynImport = new Function('u', 'return import(u)');
  window.__irOfficeCryptoLoading = dynImport('https://esm.sh/officecrypto-tool@0.0.19')
    .then(mod => {
      const lib = mod.default || mod;
      if (typeof lib.decrypt !== 'function') {
        throw new Error('officecrypto-tool: decrypt() missing from module export');
      }
      window.__irOfficeCrypto = lib;
      return lib;
    })
    .catch(err => {
      // Log the raw error for devs + re-throw a human-readable one
      // so the UI's attack.error shows something actionable.
      try { console.warn('[siphon-ir] loadOfficeCrypto failed:', err); } catch {}
      throw new Error(IR_OFFICECRYPTO_FAIL_MSG);
    });
  return window.__irOfficeCryptoLoading;
}

// Lazy-load Mozilla pdf.js (legacy UMD build). Same lazy pattern as
// zip.js — only pulled on first PDF attack. Workers also come from
// jsDelivr so the page doesn't need same-origin copies.
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (window.__irPdfJsLoading) return window.__irPdfJsLoading;
  window.__irPdfJsLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4/legacy/build/pdf.min.js';
    s.onload = () => {
      try {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdn.jsdelivr.net/npm/pdfjs-dist@4/legacy/build/pdf.worker.min.js';
        resolve(window.pdfjsLib);
      } catch (e) { reject(e); }
    };
    s.onerror = () => reject(new Error('Failed to load pdf.js from CDN'));
    document.head.appendChild(s);
  });
  return window.__irPdfJsLoading;
}

// Magic-byte format detect. Reads only the first 8 bytes of the
// file — enough to distinguish the containers we care about.
// Returns: 'zip' | 'pdf' | 'cfb' | 'unknown'.
// 'cfb' (D0 CF 11 E0 …) is the OLE compound file used by legacy
// Office (.doc/.xls/.ppt) and by agile-encrypted modern Office
// wrappers — not wired for attack yet; detected so we can tell
// the analyst why it's rejected.
async function detectCryptoFormat(file) {
  if (!file) return 'unknown';
  try {
    const head = new Uint8Array(await file.slice(0, 8).arrayBuffer());
    if (head.length >= 4 && head[0] === 0x25 && head[1] === 0x50 && head[2] === 0x44 && head[3] === 0x46) return 'pdf';
    if (head.length >= 4 && head[0] === 0x50 && head[1] === 0x4B && head[2] === 0x03 && head[3] === 0x04) return 'zip';
    if (head.length >= 8 && head[0] === 0xD0 && head[1] === 0xCF && head[2] === 0x11 && head[3] === 0xE0
        && head[4] === 0xA1 && head[5] === 0xB1 && head[6] === 0x1A && head[7] === 0xE1) return 'cfb';
  } catch {}
  return 'unknown';
}

// ── Password Attack tab · dictionary engine across zip + pdf ──
// Single surface that auto-detects the container format from the
// first few bytes and routes to a format-specific verifier:
//   · ZIP family → zip.js (AES / PKZIP)
//   · PDF        → pdf.js (RC4-40/128, AES-128/256, rev 2–6)
// CFB (agile-encrypted Office) is detected and flagged but not
// cracked here — that wrapper needs a separate decoder.
function CryptoPasswordAttack() {
  const [file, setFile] = React.useState(null);
  const [format, setFormat] = React.useState('unknown'); // zip | pdf | cfb | unknown
  const [wordlistSource, setWordlistSource] = React.useState('builtin'); // builtin | paste | file
  const [wordlistText, setWordlistText] = React.useState('');
  const [wordlistFile, setWordlistFile] = React.useState(null);
  const [wordlistFileText, setWordlistFileText] = React.useState(null);
  const [attack, setAttack] = React.useState({
    status: 'idle', // idle | loading | running | success | exhausted | error | cancelled
    tried: 0, total: 0, current: null, password: null, error: null, entries: [],
    startedAt: 0, finishedAt: 0,
  });
  const cancelRef = React.useRef(false);

  // Detect the container format whenever a new file is picked.
  // Async because the File API is async; synchronous UI state gets
  // updated once the first 8 bytes come back.
  React.useEffect(() => {
    let cancelled = false;
    if (!file) { setFormat('unknown'); return; }
    detectCryptoFormat(file).then(f => { if (!cancelled) setFormat(f); });
    return () => { cancelled = true; };
  }, [file]);

  // When the analyst picks a wordlist file, read it as text once
  // and cache so the attack loop doesn't re-read per password.
  React.useEffect(() => {
    if (!wordlistFile) { setWordlistFileText(null); return; }
    let cancelled = false;
    wordlistFile.text().then(t => { if (!cancelled) setWordlistFileText(t); });
    return () => { cancelled = true; };
  }, [wordlistFile]);

  // Resolve the active wordlist into an array of candidates. Keeps
  // duplicates out (Set) but preserves order of first appearance.
  const candidates = React.useMemo(() => {
    let text = '';
    if (wordlistSource === 'builtin') {
      return IR_BUILTIN_WORDLIST.slice();
    }
    if (wordlistSource === 'paste') text = wordlistText;
    if (wordlistSource === 'file') text = wordlistFileText || '';
    const seen = new Set();
    const out = [];
    for (const line of text.split(/\r?\n/)) {
      const t = line.trim();
      if (!t) continue;
      if (seen.has(t)) continue;
      seen.add(t);
      out.push(t);
    }
    return out;
  }, [wordlistSource, wordlistText, wordlistFileText]);

  // A supported file is one we have a verifier for. All three
  // format branches below handle it.
  const supported = !!file && (format === 'zip' || format === 'pdf' || format === 'cfb');

  // Reset attack state when the file, format, or wordlist changes.
  React.useEffect(() => {
    setAttack(s => s.status === 'running' ? s : {
      status: 'idle', tried: 0, total: 0, current: null,
      password: null, error: null, entries: [], startedAt: 0, finishedAt: 0,
    });
  }, [file, format, candidates.length, wordlistSource]);

  const stop = () => {
    cancelRef.current = true;
    setAttack(s => ({ ...s, status: 'cancelled', finishedAt: Date.now() }));
  };

  // Build a format-specific verifier. Each shape returns the same
  // interface:
  //   { verify(pw) -> bool, onSuccess() -> entries[], cleanup() }
  // so the attack loop below stays format-agnostic.
  const buildVerifier = async () => {
    if (format === 'zip') {
      const zipLib = await loadZipJs();
      const reader = new zipLib.ZipReader(new zipLib.BlobReader(file));
      const entries = await reader.getEntries();
      const encrypted = entries.filter(e => e.encrypted)
        .sort((a, b) => (a.uncompressedSize || 0) - (b.uncompressedSize || 0));
      if (encrypted.length === 0) {
        try { await reader.close(); } catch {}
        throw new Error("no encrypted entries · the zip doesn't appear to be password-protected");
      }
      const probe = encrypted[0];
      return {
        verify: async (pw) => {
          try {
            // zip.js validates the AES auth header (or PKZIP
            // CRC) at read time, so a wrong password throws
            // quickly — no need to fully inflate the probe.
            await probe.getData(new zipLib.Uint8ArrayWriter(), { password: pw });
            return true;
          } catch { return false; }
        },
        onSuccess: () => entries.map(e => ({
          filename: e.filename,
          size: e.uncompressedSize,
          compressed: e.compressedSize,
          encrypted: e.encrypted,
          date: e.lastModDate ? e.lastModDate.toISOString().slice(0, 19).replace('T', ' ') : null,
        })),
        cleanup: async () => { try { await reader.close(); } catch {} },
      };
    }
    if (format === 'pdf') {
      const pdfjsLib = await loadPdfJs();
      // Cache the raw bytes once; pdf.js consumes the buffer on
      // each getDocument call, so we slice a fresh copy per try.
      const buf = await file.arrayBuffer();
      // Probe: the file must actually be password-protected or
      // every attempt will trivially succeed with the wrong reason.
      // pdf.js raises PasswordException(code=1 NEED_PASSWORD) when
      // opened without a password on an encrypted PDF, or just
      // resolves on an unencrypted one.
      try {
        const probeTask = pdfjsLib.getDocument({ data: buf.slice(0), password: '' });
        const probeDoc = await probeTask.promise;
        try { await probeDoc.destroy(); } catch {}
        throw new Error("this pdf isn't password-protected · opens with empty password");
      } catch (e) {
        if (e.name !== 'PasswordException') throw e;
        // expected — continue into attack loop
      }
      return {
        verify: async (pw) => {
          const loadingTask = pdfjsLib.getDocument({
            data: buf.slice(0), password: pw, stopAtErrors: true,
          });
          try {
            const doc = await loadingTask.promise;
            try { await doc.destroy(); } catch {}
            return true;
          } catch (e) {
            if (e.name === 'PasswordException') return false;
            throw e;
          }
        },
        onSuccess: () => [], // PDFs don't have a per-entry manifest
        cleanup: () => {},
      };
    }
    if (format === 'cfb') {
      const officeCrypto = await loadOfficeCrypto();
      const buf = await file.arrayBuffer();
      // Fresh copy per call. officecrypto-tool walks the CFB
      // structure in-place (its cfb dep mutates the underlying
      // Uint8Array as it parses), so reusing a single buffer
      // means every attempt after the first sees corrupt data
      // and "fails" regardless of password. buf.slice(0) gives
      // us a fresh ArrayBuffer copy — small cost (~50 ms for a
      // typical doc) next to the 100k-iter PBKDF2 per attempt.
      const cloneInput = () => new Uint8Array(buf.slice(0));

      // isEncrypted tells us whether this CFB file is actually
      // password-protected (vs. a plain legacy .doc without
      // encryption). Without this check, every password would
      // "succeed" on an unencrypted file and leave the analyst
      // confused. Some builds of the library don't export it —
      // fall back to just running decrypt().
      if (typeof officeCrypto.isEncrypted === 'function') {
        try {
          if (!officeCrypto.isEncrypted(cloneInput())) {
            throw new Error("this office document isn't password-protected");
          }
        } catch (e) {
          // Re-throw our own error; swallow any false positive from
          // isEncrypted throwing on unfamiliar CFB variants.
          if (/not password-protected/.test(e.message || '')) throw e;
        }
      }
      return {
        verify: async (pw) => {
          try {
            // decrypt() resolves with a decrypted buffer on the
            // right password, throws on the wrong one. Agile
            // Encryption uses PBKDF2 with ~100k iterations, so
            // each attempt is much slower than zip/pdf — that's
            // surfaced in the UI warning below.
            await officeCrypto.decrypt(cloneInput(), { password: pw });
            return true;
          } catch (e) {
            // Discriminate wrong-password (expected, keep going)
            // from everything else (library failure, unsupported
            // cipher, etc. — abort so the user sees a real error
            // instead of a false "exhausted" result).
            const msg = String((e && e.message) || e || '');
            if (/password.*(incorrect|invalid|wrong)/i.test(msg)
                || /incorrect.*password/i.test(msg)
                || /wrong.*password/i.test(msg)
                || /bad.*decrypt/i.test(msg)) {
              return false;
            }
            // Surface unexpected errors once to the console then
            // re-throw so the attack loop's catch aborts.
            try { console.warn('[siphon-ir] CFB verify error:', e); } catch {}
            throw e;
          }
        },
        onSuccess: () => [], // No per-entry manifest for CFB
        cleanup: () => {},
      };
    }
    throw new Error('unsupported format');
  };

  const start = async () => {
    if (!supported || candidates.length === 0) return;
    cancelRef.current = false;
    setAttack({
      status: 'loading', tried: 0, total: candidates.length,
      current: null, password: null, error: null, entries: [],
      startedAt: Date.now(), finishedAt: 0,
    });
    let verifier;
    try {
      verifier = await buildVerifier();
    } catch (e) {
      setAttack(s => ({ ...s, status: 'error', error: String(e.message || e), finishedAt: Date.now() }));
      return;
    }

    setAttack(s => ({ ...s, status: 'running' }));

    let found = null;
    for (let i = 0; i < candidates.length; i++) {
      if (cancelRef.current) break;
      const pw = candidates[i];
      // Yield to the event loop every 10 attempts so the UI
      // stays responsive and the Stop button can land its state
      // update. The verifier is async anyway but the tight loop
      // can still starve renders on long wordlists.
      if (i % 10 === 0) {
        setAttack(s => ({ ...s, tried: i, current: pw }));
        await new Promise(r => setTimeout(r, 0));
      }
      try {
        if (await verifier.verify(pw)) { found = pw; break; }
      } catch (e) {
        setAttack(s => ({ ...s, status: 'error', error: 'verify failed: ' + (e.message || e), finishedAt: Date.now() }));
        try { await verifier.cleanup(); } catch {}
        return;
      }
    }

    if (cancelRef.current) {
      try { await verifier.cleanup(); } catch {}
      return;
    }

    if (!found) {
      setAttack(s => ({
        ...s, status: 'exhausted', tried: candidates.length, current: null,
        finishedAt: Date.now(),
      }));
      try { await verifier.cleanup(); } catch {}
      return;
    }

    setAttack(s => ({
      ...s, status: 'success', password: found, tried: s.tried + 1,
      current: null, entries: verifier.onSuccess(),
      finishedAt: Date.now(),
    }));
    try { await verifier.cleanup(); } catch {}
  };

  return (
    <div style={{padding:16, display:'grid', gap:14}}>
      <CryptoFileDrop file={file} onFile={setFile}
                      label="drop an encrypted file · .zip / .pdf / .docx / .xlsx / .pptx / .doc / .xls / .ppt / .jar"/>

      {/* Format badge — only renders once a file's magic bytes
          have been read. Gives the analyst an at-a-glance reason
          for the Start button's enable/disable state. */}
      {file && (
        <div style={{display:'flex', alignItems:'center', gap:10, fontSize:12}}>
          <span className="muted">detected format</span>
          <span className={'chip chip--' + (
            format === 'pdf' ? 'teal'
            : format === 'zip' ? 'safe'
            : format === 'cfb' ? 'teal'
            : 'ghost')}>
            {format === 'pdf' ? 'PDF'
             : format === 'zip' ? 'ZIP / OOXML'
             : format === 'cfb' ? 'OLE / CFB · Office'
             : 'UNKNOWN'}
          </span>
          <span className="muted mono" style={{fontSize:11}}>{file.name}</span>
        </div>
      )}

      {file && format === 'cfb' && (
        <div className="note" style={{borderColor:'var(--amber)', background:'var(--amber-wash)', color:'var(--ink)', fontSize:12}}>
          <b>Agile / Standard Encryption uses PBKDF2.</b> Each attempt is 10–100×
          slower than ZIP or PDF (~50–200 ms per password vs. sub-millisecond
          elsewhere). The built-in wordlist will take a minute or two; real
          wordlists should be routed to <span className="mono">office2john.py</span>{' '}
          + hashcat for real throughput.
          <br/>
          <span style={{color:'var(--ink-soft)', fontSize:11}}>
            In-browser support depends on the library loading via esm.sh; some
            browsers block the Node-builtin polyfills it needs. If Start throws
            a load error, fall back to office2john + hashcat.
          </span>
        </div>
      )}
      {file && format === 'unknown' && (
        <div className="note" style={{borderColor:'var(--amber)', background:'var(--amber-wash)', color:'var(--ink)', fontSize:12}}>
          <b>Unrecognised container.</b> Magic bytes don't match any format we can attack
          (ZIP / PDF / OLE). 7z, RAR, and encrypted archives wrapped in other
          containers aren't wired yet.
        </div>
      )}

      {/* Wordlist source picker */}
      <div className="box">
        <div className="box-title">
          <span className="t">Wordlist</span>
          <span className="k">
            <span className="mono" style={{fontSize:11}}>{candidates.length} candidates loaded</span>
          </span>
        </div>
        <div style={{padding:14, display:'grid', gap:12}}>
          {/* Source tabs */}
          <div style={{display:'flex', gap:2, borderBottom:'1px solid var(--line-soft)'}}>
            {[
              ['builtin', 'Built-in',    IR_BUILTIN_WORDLIST.length + ' common passwords'],
              ['paste',   'Paste list',  'one password per line'],
              ['file',    'Upload file', 'text file · rockyou-style wordlists'],
            ].map(([id, label, hint]) => {
              const active = wordlistSource === id;
              return (
                <button key={id}
                        onClick={() => setWordlistSource(id)}
                        title={hint}
                        style={{
                          background:'transparent', border:'none',
                          padding:'8px 14px', cursor:'pointer',
                          color: active ? 'var(--ink-bright)' : 'var(--ink-soft)',
                          borderBottom: active ? '2px solid var(--accent)' : '2px solid transparent',
                          fontFamily:"'Space Grotesk', sans-serif",
                          fontWeight: active ? 700 : 500, fontSize:12,
                        }}>
                  {label}
                </button>
              );
            })}
          </div>

          {wordlistSource === 'builtin' && (
            <div className="muted" style={{fontSize:11.5, lineHeight:1.7}}>
              Short curated list covering the most common weak passwords plus a
              handful of DLP-triage shapes (<span className="mono">confidential</span>,{' '}
              <span className="mono">Welcome1</span>, etc.). Good first pass; paste a
              real wordlist if this doesn't crack it.
            </div>
          )}
          {wordlistSource === 'paste' && (
            <textarea value={wordlistText}
                      onChange={(e) => setWordlistText(e.target.value)}
                      placeholder={`password\nqwerty\n...`}
                      rows={6}
                      className="mono"
                      style={{
                        width:'100%', boxSizing:'border-box', fontSize:11.5,
                        padding:'8px 10px', background:'var(--bg-1)', color:'var(--ink)',
                        border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                        resize:'vertical', fontFamily:"'JetBrains Mono', monospace",
                      }}/>
          )}
          {wordlistSource === 'file' && (
            <>
              <CryptoFileDrop file={wordlistFile} onFile={setWordlistFile}
                              label="drop a .txt wordlist · one password per line · files stay in the browser"/>
              {wordlistFile && wordlistFileText != null && (
                <div className="muted mono" style={{fontSize:11}}>
                  loaded <span style={{color:'var(--ink-bright)'}}>{candidates.length.toLocaleString()}</span> unique passwords
                  from <span style={{color:'var(--ink)'}}>{wordlistFile.name}</span>
                </div>
              )}
            </>
          )}
        </div>
      </div>

      {/* Attack control + status */}
      <div className="box">
        <div className="box-title">
          <span className="t">Attack</span>
          <span className="k">in-browser dictionary · zip.js + WebCrypto</span>
        </div>
        <div style={{padding:14, display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
          {attack.status !== 'running' && attack.status !== 'loading' && (
            <button className="btn primary"
                    onClick={start}
                    disabled={!supported || candidates.length === 0}
                    title={!file ? 'pick an encrypted file first'
                         : !supported ? 'unrecognised container · need ZIP / PDF / OLE'
                         : candidates.length === 0 ? 'add candidates to the wordlist first'
                         : 'start the dictionary attack'}>
              {attack.status === 'idle' ? '▶ Start attack' : '↻ Run again'}
            </button>
          )}
          {(attack.status === 'running' || attack.status === 'loading') && (
            <button className="btn"
                    onClick={stop}
                    style={{background:'var(--red)', borderColor:'var(--red)', color:'#000'}}>
              ■ Stop
            </button>
          )}
          <span className="muted mono" style={{fontSize:11}}>
            {supported && candidates.length > 0
              ? <>{format.toUpperCase()} · {candidates.length.toLocaleString()} candidates</>
              : 'pick a zip / pdf / office file + wordlist to enable'}
          </span>
        </div>

        {/* Progress bar + status line */}
        {(attack.status === 'loading' || attack.status === 'running' || attack.tried > 0) && (
          <div style={{padding:'0 14px 14px'}}>
            <div style={{height:6, background:'var(--bg-3)', border:'1px solid var(--line-soft)', borderRadius:3, overflow:'hidden', marginBottom:8}}>
              <div style={{
                height:'100%',
                width: attack.total > 0 ? ((attack.tried / attack.total) * 100) + '%' : '0%',
                background: attack.status === 'success' ? 'var(--safe)'
                          : attack.status === 'exhausted' ? 'var(--amber)'
                          : attack.status === 'cancelled' ? 'var(--ink-soft)'
                          : attack.status === 'error' ? 'var(--red)'
                          : 'var(--accent)',
                transition: 'width 120ms linear',
              }}/>
            </div>
            <div className="mono" style={{fontSize:11, color:'var(--ink-soft)', display:'flex', gap:12, flexWrap:'wrap'}}>
              <span>
                <b style={{color:'var(--ink)'}}>{attack.tried.toLocaleString()}</b>
                <span> / {attack.total.toLocaleString()} tried</span>
              </span>
              {attack.status === 'running' && attack.current && (
                <span>
                  trying <span style={{color:'var(--accent)'}}>{attack.current}</span>
                </span>
              )}
              {attack.status === 'loading' && <span>loading zip.js…</span>}
              {attack.finishedAt > 0 && attack.startedAt > 0 && (
                <span>
                  <span className="muted">elapsed</span>{' '}
                  {((attack.finishedAt - attack.startedAt) / 1000).toFixed(1)}s
                  <span className="muted"> · </span>
                  {attack.tried > 0
                    ? ((attack.tried / ((attack.finishedAt - attack.startedAt) / 1000)).toFixed(0) + ' pw/s')
                    : '—'}
                </span>
              )}
            </div>
          </div>
        )}

        {/* Result — password found */}
        {attack.status === 'success' && (
          <div style={{padding:'0 14px 14px'}}>
            <div style={{padding:14, background:'var(--accent-wash)', border:'2px solid var(--safe)', borderRadius:'var(--radius)'}}>
              <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10, flexWrap:'wrap'}}>
                <span className="chip chip--safe" style={{fontSize:11, padding:'4px 10px'}}>
                  ✓ PASSWORD RECOVERED
                </span>
                <span className="muted mono" style={{fontSize:11}}>
                  after {attack.tried.toLocaleString()} attempt{attack.tried === 1 ? '' : 's'}
                </span>
              </div>
              <div className="mono" style={{
                fontSize: 16, fontWeight: 600,
                color:'var(--ink-bright)',
                padding:'8px 12px', background:'var(--bg-1)',
                border:'1px solid var(--safe)',
                borderRadius:2, userSelect:'all',
                wordBreak:'break-all',
                marginBottom: 12,
              }}>
                {attack.password}
              </div>
              <button onClick={() => {
                try { navigator.clipboard.writeText(attack.password); } catch {}
              }} className="btn ghost"
                 style={{fontSize:11}}>⎘ Copy password</button>

              {/* Entry manifest */}
              {attack.entries.length > 0 && (
                <div style={{marginTop:16, paddingTop:12, borderTop:'1px dashed var(--line-soft)'}}>
                  <div className="label" style={{marginBottom:6}}>
                    Archive contents · {attack.entries.length} entries
                  </div>
                  <div style={{
                    maxHeight: 220, overflowY:'auto',
                    fontFamily:"'JetBrains Mono', monospace", fontSize:11,
                    background:'var(--bg-1)', borderRadius:'var(--radius)',
                    border:'1px solid var(--line-soft)',
                  }}>
                    {attack.entries.slice(0, 100).map((e, i) => (
                      <div key={i} style={{
                        display:'grid', gridTemplateColumns:'1fr 100px 60px',
                        gap:10, padding:'5px 10px',
                        borderBottom:'1px solid var(--line-soft)',
                        color:'var(--ink)',
                      }}>
                        <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={e.filename}>
                          {e.encrypted
                            ? <span style={{color:'var(--amber)', marginRight:4}}>🔒</span>
                            : <span style={{color:'var(--ink-dim)', marginRight:4}}>  </span>}
                          {e.filename}
                        </span>
                        <span className="muted" style={{textAlign:'right'}}>
                          {e.size != null ? e.size.toLocaleString() + ' B' : '—'}
                        </span>
                        <span className="muted">
                          {e.encrypted ? 'AES' : 'plain'}
                        </span>
                      </div>
                    ))}
                    {attack.entries.length > 100 && (
                      <div className="muted" style={{padding:8, textAlign:'center', fontSize:10.5}}>
                        …{attack.entries.length - 100} more entries not shown
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Result — exhausted / cancelled / error */}
        {attack.status === 'exhausted' && (
          <div style={{padding:'0 14px 14px'}}>
            <div className="note" style={{borderColor:'var(--amber)', background:'var(--amber-wash)', color:'var(--ink)', fontSize:12}}>
              <b>Wordlist exhausted.</b> Tried {attack.tried.toLocaleString()} passwords without a match.
              Try a larger wordlist, or confirm the file is actually passworded (encrypted entries exist).
            </div>
          </div>
        )}
        {attack.status === 'cancelled' && (
          <div style={{padding:'0 14px 14px'}}>
            <div className="note" style={{borderColor:'var(--ink-soft)', background:'var(--bg-2)', color:'var(--ink)', fontSize:12}}>
              <b>Attack cancelled</b> after {attack.tried.toLocaleString()} attempts.
            </div>
          </div>
        )}
        {attack.status === 'error' && (
          <div style={{padding:'0 14px 14px'}}>
            <div className="note" style={{borderColor:'var(--red)', background:'var(--red-wash)', color:'var(--red)', fontSize:12}}>
              <b>Error:</b> {attack.error}
            </div>
          </div>
        )}

        <div className="muted" style={{padding:'0 14px 14px', fontSize:10.5, lineHeight:1.7}}>
          Triage-scale only — browser-side AES decrypt, not a GPU cluster. Good for
          the 'probably a weak password' case; for real throughput, export the hash
          and run hashcat / john the ripper. Files never leave the browser.{' '}
          <span className="mono">zip.js</span> (~80 KB), <span className="mono">pdf.js</span>{' '}
          (~350 KB), and <span className="mono">officecrypto-tool</span> (~500 KB)
          lazy-load from jsDelivr on first attack of that format.
        </div>
      </div>
    </div>
  );
}

// Tiny hook over the users list so rows reflect CRUD from anywhere
// in the console (admin impersonation menu, invite accept, etc.).
function useUsersList() {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const refresh = () => setTick(t => t + 1);
    window.addEventListener('ir:usersChanged', refresh);
    window.addEventListener('storage', (e) => {
      if (e.key === IR_USERS_KEY) refresh();
    });
    return () => {
      window.removeEventListener('ir:usersChanged', refresh);
    };
  }, []);
  return readUsers();
}

function irFormatRelative(iso) {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  if (!then || Number.isNaN(then)) return '—';
  const diff = Date.now() - then;
  if (diff < 0) return 'just now';
  const mins = Math.floor(diff / 60e3);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 14) return days + 'd ago';
  return new Date(iso).toISOString().slice(0, 10);
}

// Inline create-user form. Two provisioning modes:
//  · invite     — generate a magic link the admin shares; the
//                 invited user accepts via U5 and sets their own
//                 password. createUser() returns with status=invited
//                 and an invite_token.
//  · initial-pw — admin chooses a starting password; user logs in
//                 with it and hits the A4 forced-change flow.
function CreateUserForm({ canInvite, onCancel, onCreated }) {
  useRolesTick();
  const [name,     setName]     = React.useState('');
  const [email,    setEmail]    = React.useState('');
  const [role,     setRole]     = React.useState('analyst');
  const [timezone, setTimezone] = React.useState('browser');
  const [mode,     setMode]     = React.useState(canInvite ? 'invite' : 'initial-pw');
  const [pw1, setPw1] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [err, setErr] = React.useState(null);

  const submit = (e) => {
    if (e) e.preventDefault();
    setErr(null);
    if (!name.trim() && !email.trim()) {
      return setErr('name or email required');
    }
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
      return setErr('email looks malformed');
    }
    if (!getRoles()[role]) return setErr('pick a role');
    let default_password;
    if (mode === 'initial-pw') {
      const v = irValidatePassword(pw1, pw2);
      if (!v.ok) return setErr(v.reason);
      default_password = pw1;
    }
    const u = createUser({
      name: name.trim() || email.trim(),
      email: email.trim(),
      role,
      timezone,
      default_password,
    });
    onCreated(u, { mode });
  };

  const roleMeta = irRoleMeta(role);

  return (
    <div style={{
      padding:14,
      borderBottom:'1px solid var(--line-soft)',
      background:'var(--bg-2)',
    }}>
      <form onSubmit={submit}
            style={{
              display:'grid',
              gridTemplateColumns:'1fr 1fr',
              gap:12,
            }}>
        <label>
          <div className="label" style={{marginBottom:4}}>Name</div>
          <input type="text" value={name} autoFocus
                 onChange={(e) => setName(e.target.value)}
                 placeholder="A. Rao"
                 style={formInputStyle}/>
        </label>
        <label>
          <div className="label" style={{marginBottom:4}}>Email</div>
          <input type="email" value={email}
                 onChange={(e) => setEmail(e.target.value)}
                 placeholder="a.rao@corp.example"
                 style={formInputStyle}/>
        </label>
        <label>
          <div className="label" style={{marginBottom:4}}>Role</div>
          <select value={role} onChange={(e) => setRole(e.target.value)} style={formInputStyle}>
            {Object.entries(getRoles()).map(([id, r]) => (
              <option key={id} value={id}>{r.glyph} {r.label}</option>
            ))}
          </select>
          <div style={{marginTop:4, fontSize:11, color:'var(--ink-soft)', lineHeight:1.5}}>
            {roleMeta.description}
          </div>
        </label>
        <label>
          <div className="label" style={{marginBottom:4}}>Timezone</div>
          <select value={timezone} onChange={(e) => setTimezone(e.target.value)} style={formInputStyle}>
            {IR_TIMEZONES.map(tz => (
              <option key={tz.id} value={tz.id}>{tz.label}</option>
            ))}
          </select>
        </label>

        {/* Provisioning mode */}
        <div style={{gridColumn:'1 / -1', marginTop:4}}>
          <div className="label" style={{marginBottom:6}}>Initial credential</div>
          <div style={{display:'flex', gap:2, borderBottom:'1px solid var(--line-soft)'}}>
            {[
              ['invite',     'Send invite (magic link)', canInvite, 'users.invite not granted to your role'],
              ['initial-pw', 'Set initial password',     true,      ''],
            ].map(([id, label, enabled, hint]) => {
              const active = mode === id;
              return (
                <button key={id} type="button"
                        disabled={!enabled}
                        onClick={() => enabled && setMode(id)}
                        title={enabled ? '' : hint}
                        style={{
                          background:'transparent', border:'none',
                          padding:'8px 12px',
                          cursor: enabled ? 'pointer' : 'not-allowed',
                          color: enabled
                            ? (active ? 'var(--ink-bright)' : 'var(--ink-soft)')
                            : 'var(--ink-dim)',
                          borderBottom: active ? '2px solid var(--accent)' : '2px solid transparent',
                          fontFamily:"'Space Grotesk', sans-serif",
                          fontWeight: active ? 700 : 500, fontSize:12,
                        }}>
                  {label}
                </button>
              );
            })}
          </div>
        </div>

        {mode === 'invite' && (
          <div style={{
            gridColumn:'1 / -1',
            padding:'10px 12px',
            background:'var(--bg-1)',
            border:'1px dashed var(--line-soft)',
            borderRadius:'var(--radius)',
            fontSize:11.5, color:'var(--ink-soft)', lineHeight:1.6,
          }}>
            A one-time magic link is generated on create · share it via the
            channel of your choice (Slack, email, password manager). Link
            carries a <span className="mono">invite_token</span> that lets the
            user pick their own first password. Token is revoked on first use.
          </div>
        )}
        {mode === 'initial-pw' && (
          <>
            <label>
              <div className="label" style={{marginBottom:4}}>Initial password</div>
              <input type="password" value={pw1}
                     onChange={(e) => setPw1(e.target.value)}
                     placeholder="≥ 10 chars · letter + digit"
                     autoComplete="new-password"
                     style={formInputStyle}/>
            </label>
            <label>
              <div className="label" style={{marginBottom:4}}>Confirm</div>
              <input type="password" value={pw2}
                     onChange={(e) => setPw2(e.target.value)}
                     placeholder="re-enter"
                     autoComplete="new-password"
                     style={formInputStyle}/>
            </label>
            <div style={{gridColumn:'1 / -1', fontSize:11, color:'var(--ink-soft)', lineHeight:1.5}}>
              User logs in with this password once, then is forced to set their own on first sign-in.
            </div>
          </>
        )}

        {err && (
          <div style={{
            gridColumn:'1 / -1',
            padding:'8px 10px',
            background:'var(--red-wash)',
            border:'1px solid var(--threat)',
            color:'var(--threat)',
            borderRadius:'var(--radius)',
            fontSize:12,
          }}>{err}</div>
        )}

        <div style={{gridColumn:'1 / -1', display:'flex', gap:8, justifyContent:'flex-end', marginTop:4}}>
          <button type="button" className="btn ghost" onClick={onCancel} style={{fontSize:12}}>
            Cancel
          </button>
          <button type="submit" className="btn primary" style={{fontSize:12}}>
            Create user
          </button>
        </div>
      </form>
    </div>
  );
}

          </div>

// Per-row action menu · R1a. Kebab button in the last column opens
// a popover with role-change + (later R1b/R1c) disable / delete.
// Guards:
//   · hidden entirely when the row's user IS the signed-in user
//     (self-service goes through My Profile, not here)
//   · change-role requires users.update
function UserRowActions({ user, canUpdate, canDisable, canDelete }) {
  const [open, setOpen] = React.useState(false);
  const btnRef  = React.useRef(null);
  const menuRef = React.useRef(null);
  useRolesTick();
  const me = getCurrentUser();
  const isSelf = !!(me && me.id === user.id);

  // Last-admin lockout guard. If this is the only active admin
  // left, disable destructive paths so a misclick can't strand
  // the tenant without anyone able to invite new users.
  const activeAdmins = React.useMemo(() => {
    try { return readUsers().filter(u => u.role === 'admin' && u.status === 'active'); }
    catch { return []; }
  }, [user.id, user.role, user.status]);
  const isLastAdmin = user.role === 'admin'
    && user.status === 'active'
    && activeAdmins.length <= 1;

  React.useEffect(() => {
    if (!open) return;
    const onDown = (e) => {
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      if (btnRef.current  && btnRef.current.contains(e.target))  return;
      setOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDown);
    document.addEventListener('keydown',   onKey);
    return () => {
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('keydown',   onKey);
    };
  }, [open]);

  if (isSelf || (!canUpdate && !canDisable && !canDelete)) {
    // Keep the cell width consistent even when empty so the grid
    // doesn't reflow per-row. Render an inert placeholder.
    return <div style={{width:32}}/>;
  }

  const changeRole = (roleId) => {
    if (roleId === user.role) { setOpen(false); return; }
    updateUser(user.id, { role: roleId });
    setOpen(false);
  };
  const toggleStatus = () => {
    const next = user.status === 'active' ? 'disabled' : 'active';
    updateUser(user.id, { status: next });
    setOpen(false);
  };
  const handleDelete = () => {
    if (isLastAdmin) {
      window.alert("Can't delete the last active administrator. Promote another user to admin first.");
      return;
    }
    const label = user.name + (user.email ? ' (' + user.email + ')' : '');
    if (!window.confirm('Delete ' + label + '? This removes their record, dispositions tied to their id stay intact.')) {
      setOpen(false);
      return;
    }
    deleteUser(user.id);
    setOpen(false);
  };
  // Invited rows shouldn't show disable — they're not active yet.
  // Disabled rows get the "Enable" label instead.
  const statusToggleLabel = user.status === 'active' ? 'Disable user' : 'Enable user';
  const showStatusToggle = canDisable && user.status !== 'invited';

  return (
    <div style={{position:'relative', display:'flex', justifyContent:'flex-end'}}>
      <button ref={btnRef}
              type="button"
              onClick={() => setOpen(o => !o)}
              title="Row actions"
              style={{
                width:28, height:28,
                background:'transparent',
                border:'1px solid transparent',
                borderRadius:'var(--radius)',
                cursor:'pointer',
                color:'var(--ink-soft)',
                fontSize:14, lineHeight:1,
                outline: open ? '1px solid var(--line-strong)' : 'none',
              }}>⋯</button>
      {open && (
        <div ref={menuRef}
             style={{
               position:'absolute', top:'calc(100% + 4px)', right:0,
               minWidth:220,
               background:'var(--bg-1)',
               border:'1px solid var(--line-strong)',
               borderRadius:'var(--radius)',
               boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
               zIndex:500,
               padding:'6px 0',
               fontSize:12,
             }}>
          {canUpdate && (
            <>
              <div style={{
                padding:'4px 12px 6px',
                fontSize:10, letterSpacing:'0.08em',
                color:'var(--ink-soft)',
                fontFamily:"'Space Grotesk', sans-serif",
                fontWeight:600, textTransform:'uppercase',
              }}>
                Change role
              </div>
              {Object.entries(getRoles()).map(([id, r]) => {
                const current = id === user.role;
                return (
                  <button key={id}
                          onClick={() => changeRole(id)}
                          disabled={current}
                          style={{
                            ...menuItemStyle,
                            display:'flex', alignItems:'center', gap:8,
                            cursor: current ? 'default' : 'pointer',
                            opacity: current ? 0.55 : 1,
                          }}>
                    <span style={{color:r.color, width:12, textAlign:'center', fontSize:11}}>
                      {r.glyph}
                    </span>
                    <span style={{flex:1}}>{r.label}</span>
                    {current && (
                      <span className="mono" style={{fontSize:10, color:'var(--ink-soft)'}}>
                        current
                      </span>
                    )}
                  </button>
                );
              })}
            </>
          )}

          {showStatusToggle && (
            <>
              {canUpdate && (
                <div style={{
                  borderTop:'1px solid var(--line-soft)',
                  margin:'4px 0',
                }}/>
              )}
              <button onClick={toggleStatus}
                      style={{
                        ...menuItemStyle,
                        color: user.status === 'active' ? 'var(--amber)' : 'var(--safe)',
                      }}>
                <span style={{marginRight:8}}>
                  {user.status === 'active' ? '⊘' : '↻'}
                </span>
                {statusToggleLabel}
              </button>
            </>
          )}

          {canDelete && (
            <>
              {(canUpdate || showStatusToggle) && (
                <div style={{
                  borderTop:'1px solid var(--line-soft)',
                  margin:'4px 0',
                }}/>
              )}
              <button onClick={handleDelete}
                      disabled={isLastAdmin}
                      title={isLastAdmin ? "can't delete the last active admin" : ''}
                      style={{
                        ...menuItemStyle,
                        color: isLastAdmin ? 'var(--ink-dim)' : 'var(--threat)',
                        cursor: isLastAdmin ? 'not-allowed' : 'pointer',
                      }}>
                <span style={{marginRight:8}}>✕</span>
                Delete user
                {isLastAdmin && (
                  <span className="mono" style={{marginLeft:'auto', fontSize:10, color:'var(--ink-soft)'}}>
                    last admin
                  </span>
                )}
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── CreateRoleForm · R2b3 ─────────────────────────────────────
// Inline new-role form inside the Roles section. The palette +
// glyph presets keep new roles visually consistent with the
// system seeds; a free-text description documents intent so
// engineers reviewing the permission matrix later don't have to
// guess. Permission checkboxes come from irAllPermissions so the
// editor can only toggle actions that already exist on some role.
const IR_ROLE_COLOR_PRESETS = [
  { id: 'accent', label: 'Accent (green)', value: 'var(--accent)' },
  { id: 'red',    label: 'Red',            value: 'var(--red)' },
  { id: 'amber',  label: 'Amber',          value: 'var(--amber)' },
  { id: 'cyan',   label: 'Cyan',           value: 'var(--cyan)' },
  { id: 'ink',    label: 'Ink',            value: 'var(--ink-soft)' },
];
const IR_ROLE_GLYPH_PRESETS = ['◆', '◈', '◇', '◉', '◎', '◍', '▲', '△', '▼', '▽', '◖', '◗', '✦', '✧', '✪', '☰', '⚑', '⚐'];

// Shared form for creating a new role OR editing an existing one.
// When `existing` is provided the id field is locked (changing a
// role id in-place would strand every user assigned to it) and
// submission routes to irUpdateRole instead of irCreateRole.
function CreateRoleForm({ onCancel, onCreated, existing, existingId }) {
  const isEdit = !!existing;
  const [id, setId]             = React.useState(existingId || '');
  const [label, setLabel]       = React.useState(existing ? existing.label : '');
  const [glyph, setGlyph]       = React.useState(existing ? existing.glyph : '◆');
  const [color, setColor]       = React.useState(existing ? existing.color : 'var(--accent)');
  const [description, setDesc]  = React.useState(existing ? (existing.description || '') : '');
  const [perms, setPerms]       = React.useState(existing ? (existing.permissions || []).slice() : []);
  const [err, setErr]           = React.useState(null);
  const allPerms = irAllPermissions();

  // Auto-derive id from label while the id field hasn't been
  // touched by the user (create-mode only). Edit mode locks it.
  const [idTouched, setIdTouched] = React.useState(isEdit);
  const effectiveId = isEdit
    ? existingId
    : (idTouched ? id : (label || '').toLowerCase().replace(/[^a-z0-9-]+/g, '-').replace(/^-|-$/g, '').slice(0, 32));

  const togglePerm = (p) => {
    setPerms(cur => cur.includes(p) ? cur.filter(x => x !== p) : [...cur, p]);
  };

  const submit = (e) => {
    if (e) e.preventDefault();
    setErr(null);
    if (!label.trim())      return setErr('label required');
    if (!effectiveId)       return setErr('role id required');
    const res = isEdit
      ? irUpdateRole(effectiveId, { label, glyph, color, description, permissions: perms })
      : irCreateRole({ id: effectiveId, label, glyph, color, description, permissions: perms });
    if (!res.ok) return setErr(res.reason);
    onCreated(res.role);
  };

  // Group permissions by resource for a tidier checklist.
  const grouped = React.useMemo(() => {
    const g = new Map();
    allPerms.forEach(p => {
      const resource = p.split('.')[0] || 'other';
      if (!g.has(resource)) g.set(resource, []);
      g.get(resource).push(p);
    });
    return [...g.entries()].sort(([a], [b]) => a.localeCompare(b));
  }, [allPerms.join('|')]);

  return (
    <form onSubmit={submit}
          style={{
            padding:14,
            borderBottom:'1px solid var(--line-soft)',
            background:'var(--bg-2)',
            display:'grid', gap:12,
          }}>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
        <label>
          <div className="label" style={{marginBottom:4}}>Label</div>
          <input type="text" value={label} autoFocus
                 onChange={(e) => setLabel(e.target.value)}
                 placeholder="Compliance Auditor"
                 style={formInputStyle}/>
        </label>
        <label>
          <div className="label" style={{marginBottom:4}}>
            Role id{' '}
            <span className="muted" style={{fontSize:10}}>
              {isEdit ? 'locked · changing would orphan assigned users' : 'kebab-safe · used in URLs + APIs'}
            </span>
          </div>
          <input type="text" value={effectiveId}
                 disabled={isEdit}
                 onChange={(e) => { setId(e.target.value); setIdTouched(true); }}
                 placeholder="compliance-auditor"
                 style={{
                   ...formInputStyle,
                   opacity: isEdit ? 0.55 : 1,
                 }}/>
        </label>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'auto 1fr', gap:12}}>
        <label>
          <div className="label" style={{marginBottom:4}}>Glyph</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
            {IR_ROLE_GLYPH_PRESETS.map(g => (
              <button key={g} type="button"
                      onClick={() => setGlyph(g)}
                      style={{
                        width:30, height:30,
                        background: glyph === g ? 'var(--bg-0)' : 'transparent',
                        border: '1px solid ' + (glyph === g ? 'var(--accent)' : 'var(--line-soft)'),
                        borderRadius:'var(--radius)',
                        cursor:'pointer',
                        color: glyph === g ? color : 'var(--ink)',
                        fontSize:14,
                      }}>
                {g}
              </button>
            ))}
          </div>
        </label>
        <label>
          <div className="label" style={{marginBottom:4}}>Color</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
            {IR_ROLE_COLOR_PRESETS.map(c => (
              <button key={c.id} type="button"
                      onClick={() => setColor(c.value)}
                      title={c.label}
                      style={{
                        padding:'6px 12px',
                        background: color === c.value ? 'var(--bg-0)' : 'transparent',
                        border: '1px solid ' + (color === c.value ? c.value : 'var(--line-soft)'),
                        borderRadius:'var(--radius)',
                        cursor:'pointer',
                        color: c.value,
                        fontSize:11,
                        fontFamily:"'JetBrains Mono', monospace",
                      }}>
                ● {c.label}
              </button>
            ))}
          </div>
        </label>
      </div>

      <label>
        <div className="label" style={{marginBottom:4}}>Description</div>
        <input type="text" value={description}
               onChange={(e) => setDesc(e.target.value)}
               placeholder="What this role is for — e.g. 'Read-only audit access across findings + dispositions'"
               style={formInputStyle}/>
      </label>

      <div>
        <div className="label" style={{marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          Permissions
          <span className="mono" style={{fontSize:10, color:'var(--ink-dim)'}}>
            {perms.length} of {allPerms.length} selected
          </span>
        </div>
        <div style={{
          display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(220px, 1fr))',
          gap:10,
          padding:'10px 12px',
          background:'var(--bg-1)',
          border:'1px solid var(--line-soft)',
          borderRadius:'var(--radius)',
          maxHeight:260, overflowY:'auto',
        }}>
          {grouped.map(([resource, list]) => (
            <div key={resource}>
              <div className="mono" style={{
                fontSize:10, color:'var(--ink-soft)',
                letterSpacing:'0.08em', textTransform:'uppercase',
                marginBottom:4,
              }}>{resource}</div>
              {list.map(p => {
                const on = perms.includes(p);
                return (
                  <label key={p}
                         style={{
                           display:'flex', alignItems:'center', gap:6,
                           padding:'2px 0',
                           cursor:'pointer',
                           fontSize:11,
                           fontFamily:"'JetBrains Mono', monospace",
                           color: on ? 'var(--ink-bright)' : 'var(--ink)',
                         }}>
                    <input type="checkbox" checked={on}
                           onChange={() => togglePerm(p)}
                           style={{margin:0}}/>
                    {p}
                  </label>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {err && (
        <div style={{
          padding:'8px 10px',
          background:'var(--red-wash)',
          border:'1px solid var(--threat)',
          color:'var(--threat)',
          borderRadius:'var(--radius)',
          fontSize:12,
        }}>{err}</div>
      )}

      <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
        <button type="button" className="btn ghost" onClick={onCancel} style={{fontSize:12}}>
          Cancel
        </button>
        <button type="submit" className="btn primary" style={{fontSize:12}}>
          {isEdit ? 'Save changes' : 'Create role'}
        </button>
      </div>
    </form>
  );
}

// Per-role action menu · R2b4. Kebab in the action column opens
// a popover with Edit and Delete items. Delete is disabled for
// system roles and for custom roles that still have users
// assigned — the `in-use` count lives right in the menu item so
// the admin sees WHY they can't delete.
function RoleRowActions({ id, role, onEdit, userCount }) {
  const [open, setOpen] = React.useState(false);
  const btnRef  = React.useRef(null);
  const menuRef = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const onDown = (e) => {
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      if (btnRef.current  && btnRef.current.contains(e.target))  return;
      setOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDown);
    document.addEventListener('keydown',   onKey);
    return () => {
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('keydown',   onKey);
    };
  }, [open]);

  const handleDelete = () => {
    if (role.system)  { setOpen(false); return; }
    if (userCount > 0) { setOpen(false); return; }
    if (!window.confirm('Delete role "' + role.label + '"? This removes it from the tenant permanently.')) {
      setOpen(false);
      return;
    }
    const res = irDeleteRole(id);
    if (!res.ok) window.alert(res.reason);
    setOpen(false);
  };

  const deleteBlocked = role.system || userCount > 0;
  const deleteReason  = role.system ? 'system role · built-in'
                      : userCount > 0 ? userCount + ' user(s) still assigned'
                      : '';

  return (
    <div style={{position:'relative', display:'flex', justifyContent:'flex-end'}}>
      <button ref={btnRef}
              type="button"
              onClick={() => setOpen(o => !o)}
              title="Role actions"
              style={{
                width:28, height:28,
                background:'transparent',
                border:'1px solid transparent',
                borderRadius:'var(--radius)',
                cursor:'pointer',
                color:'var(--ink-soft)',
                fontSize:14, lineHeight:1,
                outline: open ? '1px solid var(--line-strong)' : 'none',
              }}>⋯</button>
      {open && (
        <div ref={menuRef}
             style={{
               position:'absolute', top:'calc(100% + 4px)', right:0,
               minWidth:220,
               background:'var(--bg-1)',
               border:'1px solid var(--line-strong)',
               borderRadius:'var(--radius)',
               boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
               zIndex:500,
               padding:'6px 0',
               fontSize:12,
             }}>
          <button onClick={() => { onEdit(); setOpen(false); }}
                  style={menuItemStyle}>
            <span style={{marginRight:8}}>✎</span>Edit role
          </button>
          <div style={{borderTop:'1px solid var(--line-soft)', margin:'4px 0'}}/>
          <button onClick={handleDelete}
                  disabled={deleteBlocked}
                  title={deleteReason}
                  style={{
                    ...menuItemStyle,
                    color: deleteBlocked ? 'var(--ink-dim)' : 'var(--threat)',
                    cursor: deleteBlocked ? 'not-allowed' : 'pointer',
                  }}>
            <span style={{marginRight:8}}>✕</span>
            Delete role
            {deleteBlocked && (
              <span className="mono" style={{marginLeft:'auto', fontSize:10, color:'var(--ink-soft)'}}>
                {role.system ? 'system' : 'in use'}
              </span>
            )}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Roles section · R2b2 ──────────────────────────────────────
// Lives inside UsersSurface between the users table and the
// permission matrix. Reads the live role store + user roster so
// each row can show how many users are assigned to the role —
// critical context before an admin deletes or edits a role.
function RolesSection() {
  useRolesTick();
  const canManage = useCan('roles.manage');
  // Subscribe to user changes so the in-use counter refreshes
  // when a role is swapped on a row via R1a's menu.
  const users = useUsersList();
  const [createOpen, setCreateOpen] = React.useState(false);
  const [editingId, setEditingId]   = React.useState(null);

  const roles = getRoles();
  const entries = Object.entries(roles)
    .sort(([, a], [, b]) => {
      // System roles first (they're the anchors), then custom
      // alphabetically by label.
      if ((a.system ? 0 : 1) !== (b.system ? 0 : 1)) return a.system ? -1 : 1;
      return (a.label || '').localeCompare(b.label || '');
    });

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Roles</span>
        <span className="k" style={{display:'flex', alignItems:'center', gap:10}}>
          <span className="mono" style={{fontSize:11}}>
            {entries.length} total ·{' '}
            {entries.filter(([, r]) => r.system).length} system ·{' '}
            {entries.filter(([, r]) => !r.system).length} custom
          </span>
          {canManage && (
            <button className="btn primary"
                    onClick={() => setCreateOpen(o => !o)}
                    style={{fontSize:11, padding:'5px 10px'}}>
              {createOpen ? '× Cancel' : '+ Create role'}
            </button>
          )}
        </span>
      </div>

      {createOpen && canManage && (
        <CreateRoleForm onCancel={() => setCreateOpen(false)}
                        onCreated={() => setCreateOpen(false)}/>
      )}

      <div>
        <div style={{
          display:'grid',
          gridTemplateColumns:'180px 1fr 90px 90px 60px',
          gap:10, padding:'8px 14px',
          borderBottom:'1px solid var(--line-soft)',
          background:'var(--bg-2)',
          fontSize:10, letterSpacing:'0.05em', textTransform:'uppercase',
          color:'var(--ink-soft)',
          fontFamily:"'Space Grotesk', sans-serif", fontWeight:600,
        }}>
          <span>Role</span>
          <span>Description</span>
          <span style={{textAlign:'right'}}>Permissions</span>
          <span style={{textAlign:'right'}}>Users</span>
          <span></span>
        </div>
        {entries.map(([id, r]) => {
          const userCount = users.filter(u => u.role === id).length;
          const isEditing = editingId === id;
          return (
            <React.Fragment key={id}>
              <div style={{
                     display:'grid',
                     gridTemplateColumns:'180px 1fr 90px 90px 60px',
                     gap:10, padding:'10px 14px',
                     borderBottom:'1px solid var(--line-soft)',
                     alignItems:'center', fontSize:12,
                     background: isEditing ? 'var(--bg-2)' : 'transparent',
                   }}>
                <div style={{minWidth:0}}>
                  <span className="chip"
                        title={r.label}
                        style={{
                          fontSize:10, padding:'2px 10px',
                          borderColor:r.color, color:r.color,
                          background:'var(--bg-1)',
                          whiteSpace:'nowrap',
                          maxWidth:'100%', overflow:'hidden', textOverflow:'ellipsis',
                        }}>
                    {r.glyph} {r.label}
                  </span>
                  <div className="mono" style={{fontSize:10, color:'var(--ink-dim)', marginTop:4}}>
                    {id}{r.system && <span style={{color:'var(--ink-soft)'}}> · system</span>}
                  </div>
                </div>
                <div style={{fontSize:11.5, color:'var(--ink)', lineHeight:1.5}}>
                  {r.description || <span className="muted">—</span>}
                </div>
                <div className="mono"
                     style={{fontSize:11, color:'var(--ink)', textAlign:'right'}}>
                  {(r.permissions || []).length}
                </div>
                <div className="mono"
                     style={{fontSize:11, color:'var(--ink)', textAlign:'right'}}>
                  {userCount}
                </div>
                <div style={{textAlign:'right'}}>
                  {canManage && (
                    <RoleRowActions id={id} role={r} userCount={userCount}
                                    onEdit={() => setEditingId(id)} />
                  )}
                </div>
              </div>
              {isEditing && (
                <CreateRoleForm existing={r} existingId={id}
                                onCancel={() => setEditingId(null)}
                                onCreated={() => setEditingId(null)}/>
              )}
            </React.Fragment>
          );
        })}
      </div>
      {!canManage && (
        <div className="muted" style={{
          padding:'10px 14px', fontSize:11, borderTop:'1px solid var(--line-soft)',
        }}>
          Your role doesn't carry <span className="mono">roles.manage</span>.
          Admins can create, edit, and delete custom roles here.
        </div>
      )}
    </div>
  );
}

function UsersSurface() {
  const canView    = useCan('users.view');
  const canCreate  = useCan('users.create');
  const canUpdate  = useCan('users.update');
  const canDisable = useCan('users.disable');
  const canDelete  = useCan('users.delete');
  const canInvite  = useCan('users.invite');
  useRolesTick();

  const users = useUsersList();
  const [search,     setSearch]     = React.useState('');
  const [roleFilter, setRoleFilter] = React.useState('');
  const [statFilter, setStatFilter] = React.useState('');
  const [matrixOpen, setMatrixOpen] = React.useState(false);
  const [createOpen, setCreateOpen] = React.useState(false);
  // Freshly-created user's invite payload (non-null immediately
  // after createUser so the admin can copy the magic link before
  // the form closes).
  const [justCreated, setJustCreated] = React.useState(null);

  if (!canView) {
    return (
      <div style={{padding:'var(--gap)'}}>
        <div className="box">
          <div className="box-title">
            <span className="t">Users & Roles</span>
            <span className="k">
              <span className="chip chip--red" style={{fontSize:10}}>PERMISSION DENIED</span>
            </span>
          </div>
          <div style={{padding:20, fontSize:12.5, lineHeight:1.7, color:'var(--ink-soft)'}}>
            Your role (<span className="mono">{(getCurrentUser() || {}).role || 'unknown'}</span>)
            doesn't carry <span className="mono">users.view</span>. Ask an administrator
            if you need access to user management.
          </div>
        </div>
      </div>
    );
  }

  const filtered = users.filter(u => {
    if (roleFilter && u.role !== roleFilter) return false;
    if (statFilter && u.status !== statFilter) return false;
    if (search) {
      const q = search.trim().toLowerCase();
      if (!(
           (u.name  || '').toLowerCase().includes(q)
        || (u.email || '').toLowerCase().includes(q)
        || (u.id    || '').toLowerCase().includes(q)
      )) return false;
    }
    return true;
  }).sort((a, b) => {
    // Keep invited rows pinned so the admin spots pending onboards.
    const ra = a.status === 'invited' ? 0 : 1;
    const rb = b.status === 'invited' ? 0 : 1;
    if (ra !== rb) return ra - rb;
    return (a.name || '').localeCompare(b.name || '');
  });

  return (
    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      <div className="box">
        <div className="box-title">
          <span className="t">Users & Roles</span>

            {users.length} total · {users.filter(u => u.status === 'active').length} active ·{' '}
            {users.filter(u => u.status === 'invited').length} invited

        </div>

        {/* Toolbar */}
        <div style={{
          display:'flex', gap:10, padding:'12px 14px',
          borderBottom:'1px solid var(--line-soft)', flexWrap:'wrap',

                 value={search}
                 onChange={(e) => setSearch(e.target.value)}
                 placeholder="search name / email / id…"
                 style={{
                   flex:'1 1 240px', minWidth:200,
                   padding:'7px 10px', fontSize:12,
                   background:'var(--bg-1)', color:'var(--ink)',
                   border:'1px solid var(--line-strong)',
                   borderRadius:'var(--radius)',
                   fontFamily:"'JetBrains Mono', monospace",
                 }}/>
          <select value={roleFilter}
                  onChange={(e) => setRoleFilter(e.target.value)}
                  style={{
                    padding:'7px 10px', fontSize:12,
                    background:'var(--bg-1)', color:'var(--ink)',
                    border:'1px solid var(--line-strong)',
                    borderRadius:'var(--radius)',
                  }}>
            <option value="">All roles</option>
            {Object.entries(getRoles()).map(([id, r]) => (
              <option key={id} value={id}>{r.glyph} {r.label}</option>
            ))}
          </select>
          <select value={statFilter}
                  onChange={(e) => setStatFilter(e.target.value)}
                  style={{
                    padding:'7px 10px', fontSize:12,
                    background:'var(--bg-1)', color:'var(--ink)',
                    border:'1px solid var(--line-strong)',
                    borderRadius:'var(--radius)',
                  }}>
            <option value="">All statuses</option>
            <option value="active">Active</option>
            <option value="invited">Invited</option>
            <option value="disabled">Disabled</option>
          </select>
          <button className="btn primary"
                  disabled={!canCreate}
                  onClick={() => setCreateOpen(o => !o)}
                  title={canCreate ? 'Create a new user' : 'users.create not granted to your role'}
                  style={{fontSize:12}}>
            {createOpen ? '× Cancel' : '+ New user'}
          </button>
        </div>

        {/* Inline create-user form · U4 */}
        {createOpen && canCreate && (
          <CreateUserForm
            canInvite={canInvite}
            onCancel={() => setCreateOpen(false)}
            onCreated={(u, ctx) => {
              setCreateOpen(false);
              setJustCreated({ user: u, ...ctx });
            }}/>
        )}

        {/* Post-create toast — shows once, shareable magic link
            preserved so the admin can copy/paste it without
            digging through localStorage. */}
        {justCreated && (
          <JustCreatedToast payload={justCreated}
                            onDismiss={() => setJustCreated(null)}/>
        )}

        {/* Table */}
        <div style={{padding:0}}>
          <div style={{
            display:'grid',
            gridTemplateColumns:'auto 1.4fr 1fr 180px 100px 130px 44px',
            gap:0,
            fontSize:11, color:'var(--ink-soft)',
            padding:'8px 14px',
            borderBottom:'1px solid var(--line-soft)',
            background:'var(--bg-2)',
            fontFamily:"'Space Grotesk', sans-serif",
            fontWeight:600, letterSpacing:'0.05em', textTransform:'uppercase',
          }}>
            <div></div>
            <div>Name</div>
            <div>Email / ID</div>
            <div>Role</div>
            <div>Status</div>
            <div>Last active</div>
            <div></div>
          </div>
          {filtered.map(u => {
            const role = irRoleMeta(u.role);
            return (
              <div key={u.id}
                   style={{
                     display:'grid',
                     gridTemplateColumns:'auto 1.4fr 1fr 180px 100px 130px 44px',
                     gap:0,
                     alignItems:'center',
                     padding:'10px 14px',
                     borderBottom:'1px solid var(--line-soft)',
                     fontSize:12,
                   }}>
                <div style={{
                  width:28, height:28, borderRadius:'50%',
                  background:'var(--bg-2)',

function ChangePasswordForm({ user, onDone, onCancel }) {
  const [cur, setCur] = React.useState('');
  const [pw1, setPw1] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [err, setErr] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [success, setSuccess] = React.useState(false);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(null);
    setSuccess(false);
    const v = irValidatePassword(pw1, pw2);
    if (!v.ok) return setErr(v.reason);
    setBusy(true);
    // Verify the current password. Skip the check if the user
    // still has the default seed password — they're not really
    // "changing" at that point, just setting for real.
    let currentOk = true;
    if (user.auth) {
      currentOk = await irVerifyPassword(cur, user.auth);
    } else if (user.default_password) {
      currentOk = cur === user.default_password;
    }
    if (!currentOk) {
      setBusy(false);
      return setErr('current password is wrong');
    }
    await irSetPassword(user.id, pw1);
    setBusy(false);
    setSuccess(true);
    setTimeout(() => onDone(), 900);
  };

  return (
    <form onSubmit={submit} style={{display:'grid', gap:10, maxWidth:420}}>

        <input type="password" value={pw1}
               onChange={(e) => setPw1(e.target.value)}

               placeholder="≥ 10 chars · letter + digit"
               style={formInputStyle}/>
      </label>
      <label>
        <div className="label" style={{marginBottom:4}}>Confirm new password</div>
        <input type="password" value={pw2}
               onChange={(e) => setPw2(e.target.value)}
               autoComplete="new-password"
               style={formInputStyle}/>
      </label>
      {err && (
        <div style={{
          padding:'8px 10px',
          background:'var(--red-wash)',
          border:'1px solid var(--threat)',
          color:'var(--threat)',
          borderRadius:'var(--radius)',
          fontSize:12,
        }}>{err}</div>
      )}
      {success && (
        <div style={{
          padding:'8px 10px',
          background:'var(--accent-wash)',
          border:'1px solid var(--safe)',
          color:'var(--safe)',
          borderRadius:'var(--radius)',

        }}>✓ Password updated</div>
      )}
      <div style={{display:'flex', gap:8}}>
        <button type="submit" className="btn primary" disabled={busy} style={{fontSize:12}}>
          {busy ? 'saving…' : 'Update password'}
        </button>
        <button type="button" className="btn ghost" onClick={onCancel} style={{fontSize:12}}>
          Cancel
        </button>
      </div>
    </form>
  );
}

// ─── Settings → Engineering ─────────────────────────────────────
// Developer-facing toggles. Primary MVP tenant: the demo-data
// switch, which backs every IR surface with seeded fixtures when
// on. Live pod data resumes the moment the toggle flips off; the
// two datasets never mix (separate disposition stores).
function EngineeringSurface() {
  const [mode, setMode] = React.useState(isDemoMode);
  const [seed, setSeed] = React.useState(readDemoSeed);
  const [demoDispoCount, setDemoDispoCount] = React.useState(() => Object.keys(JSON.parse(localStorage.getItem(IR_DEMO_DISPO_KEY) || '{}')).length);

  // Seed demo dispositions the first time demo mode is turned on so
  // the dashboard has MTTR data to chart. Re-seed happens only when
  // the analyst explicitly clicks Regenerate.
  React.useEffect(() => {
    if (!mode) return;
    const existing = localStorage.getItem(IR_DEMO_DISPO_KEY);
    if (existing && existing !== '{}') return;
    const findings = generateDemoFindings(seed);
    const dispo = generateDemoDispositions(findings, seed);
    localStorage.setItem(IR_DEMO_DISPO_KEY, JSON.stringify(dispo));
    setDemoDispoCount(Object.keys(dispo).length);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'seeded' } }));
  }, [mode, seed]);

  const toggle = () => {
    const next = !mode;
    setMode(next);
    setDemoMode(next);
  };

  const regenerate = () => {
    if (!confirm('Regenerate demo data? Any triage actions you made in demo mode will be overwritten.')) return;
    const newSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
    writeDemoSeed(newSeed);
    setSeed(newSeed);
    const findings = generateDemoFindings(newSeed);
    const dispo = generateDemoDispositions(findings, newSeed);
    localStorage.setItem(IR_DEMO_DISPO_KEY, JSON.stringify(dispo));
    setDemoDispoCount(Object.keys(dispo).length);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'regenerate' } }));
  };

  const clearDemoOnly = () => {
    if (!confirm('Clear demo dispositions? Your real (live-mode) triage state is NOT touched.')) return;
    localStorage.removeItem(IR_DEMO_DISPO_KEY);
    setDemoDispoCount(0);
    window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { reason: 'cleared' } }));
  };

  const findingsPreview = React.useMemo(() => generateDemoFindings(seed).length, [seed]);

    <div style={{padding:'var(--gap)', display:'grid', gap:'var(--gap)'}}>
      <div className="box">
        <div className="box-title">

        <div style={{padding:14, display:'grid', gap:12, fontSize:12, lineHeight:1.7}}>
          <div className="muted">
            Swaps the Findings Queue + Dashboard data source from live pod unions to
            a deterministic seeded set ({findingsPreview} findings across {DEMO_ANALYSTS.length} analysts
            and {DEMO_USERS.length} end-users, with pre-triaged dispositions).
            Useful for demos, screenshots, and dashboard tuning without
            needing a real pod scanning real traffic.
          </div>
          <div className="muted" style={{fontSize:11.5, padding:'8px 10px', background:'var(--bg-1)', border:'1px dashed var(--line-soft)', borderRadius:'var(--radius)'}}>
            <b>Isolation:</b> demo dispositions are stored under{' '}
            <span className="mono">localStorage[ir:demoDispositions]</span>, separate from your
            live triage state at <span className="mono">ir:dispositions</span>. They never mix.
            The FP Queue handoff to the admin console also suppresses demo entries so you don't
            pollute the real engineering queue.
          </div>
