<div id="root"></div>
<script>
// ResizeObserver benign-loop shim (same as siphon-c2). Swallows the
// "ResizeObserver loop completed with undelivered notifications"
// warning that browsers surface as an uncaught error in dev.
window.addEventListener('error', (e) => {
  if (e.message && e.message.includes('ResizeObserver')) { e.stopImmediatePropagation(); e.preventDefault(); return false; }
});
const _RO = window.ResizeObserver;
if (_RO) {
  window.ResizeObserver = class extends _RO {
    constructor(cb) { super((entries, o) => { requestAnimationFrame(() => { try { cb(entries, o); } catch {} }); }); }
  };
}
</script>

<!-- React + Babel from CDN (same versions siphon-c2 uses). -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Shared JS primitives (URLs, auth, pod registry hooks, LivePill).
     Source of truth at docs/wireframes/siphon-shared.js — inlined
     here for the same file:// reason as the CSS above. -->
<script>
// ─── siphon-shared.js ───────────────────────────────────────────
// Primitives used by every siphon console (siphon-c2 admin console,
// siphon-ir responder console). Loaded as a plain <script> tag
// AFTER react + react-dom + babel-standalone. Exposes everything on
// `window.` so both Babel-transpiled and plain-JS consumers pick it
// up without an import.
//
// Layered on purpose — keep this file limited to primitives that
// don't depend on console-specific UI. Adding surface-level
// components (Topbar, Sidenav, etc.) is a separate step once both
// consoles agree on their shape.
// ─────────────────────────────────────────────────────────────────

(function () {
  'use strict';

  // ─── Endpoint config ────────────────────────────────────────────
  // localStorage keys keep the admin console and the responder
  // console pointed at the same pods without either needing to
  // duplicate state. The same `c2:*` prefix is reused so a user who
  // configured the admin console before the IR console existed has
  // zero migration work.

  window.SIPHON_API_URL = function () {
    try { return localStorage.getItem('c2:apiUrl') || 'http://127.0.0.1:8080'; }
    catch { return 'http://127.0.0.1:8080'; }
  };

  window.SIPHON_FS_URL = function () {
    try {
      const explicit = localStorage.getItem('c2:fsUrl');
      if (explicit) return explicit;
    } catch {}
    const api = window.SIPHON_API_URL();
    if (/\/api\/?$/.test(api)) return api.replace(/\/api\/?$/, '/fs');
    try {
      const u = new URL(api);
      if (u.port === '8080') { u.port = '8081'; return u.origin; }
    } catch {}
    return 'http://127.0.0.1:8081';
  };

  window.SIPHON_LAUNCHER_URL = function () {
    try {
      const v = localStorage.getItem('c2:launcherUrl');
      if (v) return v;
    } catch {}
    return 'http://127.0.0.1:8090';
  };

  window.SIPHON_API_KEY = function () {
    try { return localStorage.getItem('c2:apiKey') || null; }
    catch { return null; }
  };

  window.siphonAuthHeaders = function () {
    const k = window.SIPHON_API_KEY();
    return k ? { 'Authorization': 'Bearer ' + k } : {};
  };

  // Thin fetch wrapper — attaches Authorization when a key is saved.
  // Safe against any URL; pods ignore the header when SIPHON_API_KEY
  // isn't set. LocalLauncherPanel / direct-to-launcher code paths
  // deliberately stick with plain fetch (no auth on loopback).
  window.siphonFetch = function (url, options) {
    const opts = options || {};
    opts.headers = { ...(opts.headers || {}), ...window.siphonAuthHeaders() };
    return fetch(url, opts);
  };

  // ─── Pod registry ───────────────────────────────────────────────
  // Flat list of {url, label, role?, disabled?} persisted in
  // localStorage[c2:pods]. Both consoles fan out across this list.
  // Seeded on first read from SIPHON_API_URL + SIPHON_FS_URL so
  // existing users keep working.
  const POD_REGISTRY_KEY = 'c2:pods';
  window.__pod_registry_listeners = window.__pod_registry_listeners || new Set();

  function __podReadRaw() {
    try { return JSON.parse(localStorage.getItem(POD_REGISTRY_KEY) || '[]'); }
    catch { return []; }
  }
  function __podWriteRaw(list) {
    try { localStorage.setItem(POD_REGISTRY_KEY, JSON.stringify(list)); } catch {}
    window.__pod_registry_listeners.forEach(fn => { try { fn(); } catch {} });
  }
  function __podNormalise(url) {
    try {
      const u = new URL((url || '').trim());
      const path = u.pathname.replace(/\/$/, '');
      return u.origin + path;
    } catch {
      return (url || '').trim().replace(/\/$/, '');
    }
  }
  function __podSeedIfEmpty() {
    const list = __podReadRaw();
    if (list.length) return;
    const seed = [
      { url: __podNormalise(window.SIPHON_API_URL()), role: 'api', label: 'primary-api', added_at: new Date().toISOString() },
      { url: __podNormalise(window.SIPHON_FS_URL()),  role: 'fs',  label: 'primary-fs',  added_at: new Date().toISOString() },
    ].filter((p, i, arr) => p.url && arr.findIndex(q => q.url === p.url) === i);
    if (seed.length) __podWriteRaw(seed);
  }

  window.c2PodAdd = function (entry) {
    const list = __podReadRaw();
    const url = __podNormalise(entry.url);
    if (!url) return false;
    if (list.some(p => p.url === url)) return false;
    list.push({
      url,
      role: entry.role || 'auto',
      label: entry.label || '',
      disabled: !!entry.disabled,
      added_at: new Date().toISOString(),
    });
    __podWriteRaw(list);
    return true;
  };
  window.c2PodRemove = function (url) {
    const norm = __podNormalise(url);
    __podWriteRaw(__podReadRaw().filter(p => p.url !== norm));
  };
  window.c2PodUpdate = function (url, patch) {
    const norm = __podNormalise(url);
    const list = __podReadRaw().map(p => p.url === norm ? { ...p, ...patch } : p);
    __podWriteRaw(list);
  };

  // ─── React hooks ────────────────────────────────────────────────
  // Wired as window.* rather than ES exports so Babel-transpiled
  // scripts in either console can just reference them as globals.

  window.usePodRegistry = function () {
    const [, setTick] = React.useState(0);
    React.useEffect(() => {
      __podSeedIfEmpty();
      const fn = () => setTick(t => t + 1);
      window.__pod_registry_listeners.add(fn);
      const onStorage = (e) => { if (e.key === POD_REGISTRY_KEY) fn(); };
      window.addEventListener('storage', onStorage);
      return () => {
        window.__pod_registry_listeners.delete(fn);
        window.removeEventListener('storage', onStorage);
      };
    }, []);
    return __podReadRaw();
  };

  // GET /<path> against the primary siphon-api (SIPHON_API_URL).
  // Returns { loading, data, error, refetch, source }.
  window.useSiphonApi = function (path, deps) {
    const [tick, setTick] = React.useState(0);
    const [state, setState] = React.useState({ loading: true, data: null, error: null });
    React.useEffect(() => {
      let cancelled = false;
      setState(s => ({ ...s, loading: true, error: null }));
      const url = window.SIPHON_API_URL().replace(/\/$/, '') + path;
      window.siphonFetch(url, { method: 'GET' })
        .then(async r => {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0, 200));
          return r.json();
        })
        .then(data => { if (!cancelled) setState({ loading: false, data, error: null }); })
        .catch(e => { if (!cancelled) setState({ loading: false, data: null, error: String(e.message || e) }); });
      return () => { cancelled = true; };
    }, [...(deps || []), tick]);
    const source = state.loading ? 'loading' : state.error ? 'offline' : 'live';
    return { ...state, source, refetch: () => setTick(t => t + 1) };
  };

  // Fan-out across every enabled pod in the registry → union findings.
  // Same shape both consoles consume.
  window.useFindingsUnion = function (qs, deps) {
    const [tick, setTick] = React.useState(0);
    const [state, setState] = React.useState({
      loading: true, data: null, error: null, perPod: [],
    });
    const rawPods = window.usePodRegistry ? window.usePodRegistry() : null;
    const pods = rawPods ? rawPods.filter(p => !p.disabled) : null;
    const effectivePods = pods !== null
      ? pods
      : [
          { url: window.SIPHON_API_URL(), role: 'api', label: 'api' },
          { url: window.SIPHON_FS_URL(),  role: 'fs',  label: 'fs'  },
        ];
    const podsKey = effectivePods.map(p => p.url).join('|');

    React.useEffect(() => {
      let cancelled = false;
      setState(s => ({ ...s, loading: true, error: null }));

      const fetchFrom = (pod) => {
        const url = pod.url.replace(/\/$/, '') + '/v1/findings' + (qs || '');
        return window.siphonFetch(url, { method: 'GET' })
          .then(async r => {
            if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0, 200));
            return r.json();
          })
          .then(data => ({ pod, ok: true, data, error: null }))
          .catch(e => ({ pod, ok: false, data: null, error: String(e.message || e) }));
      };

      Promise.all(effectivePods.map(fetchFrom)).then((results) => {
        if (cancelled) return;

        const findings = results
          .flatMap(r => (r.data && r.data.findings) || [])
          .sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));

        const m = (qs || '').match(/[?&]limit=(\d+)/);
        const limit = m ? parseInt(m[1], 10) : findings.length;
        const trimmed = findings.slice(0, limit);

        const total    = results.reduce((a, r) => a + ((r.data && r.data.total)    || 0), 0);
        const capacity = results.reduce((a, r) => a + ((r.data && r.data.capacity) || 0), 0);

        const perPod = results.map(r => ({
          url: r.pod.url, label: r.pod.label || '', role: r.pod.role || 'auto',
          ok: r.ok, error: r.error, data: r.data,
        }));
        let source;
        if (perPod.length === 0) source = 'offline';
        else if (perPod.every(p => p.ok)) source = 'live';
        else if (perPod.some(p => p.ok)) source = 'partial';
        else source = 'offline';

        setState({
          loading: false,
          data: { total, returned: trimmed.length, capacity, findings: trimmed },
          error: source === 'offline'
            ? (perPod.length === 0 ? 'no pods in registry' : (perPod[0] && perPod[0].error) || 'no pods reachable')
            : null,
          perPod,
          source,
        });
      });

      return () => { cancelled = true; };
    }, [...(deps || []), qs, tick, podsKey]);

    const source = state.loading
      ? 'loading'
      : state.source || (state.data ? 'live' : 'offline');
    return { ...state, source, refetch: () => setTick(t => t + 1) };
  };

  // ─── LivePill ────────────────────────────────────────────────────
  // Status chip rendered in page-head actions. Written with
  // React.createElement rather than JSX so this file stays loadable
  // as a plain <script> without Babel re-parsing.
  window.LivePill = function LivePill({ source, onClick, title }) {
    const map = { live:'safe', offline:'red', loading:'warn', fixture:'ghost', partial:'warn' };
    const label = { live:'LIVE', offline:'OFFLINE', loading:'LOADING…', fixture:'FIXTURE', partial:'PARTIAL' }[source] || source;
    return React.createElement(
      'span',
      {
        className: 'chip chip--' + (map[source] || 'ghost'),
        onClick: onClick,
        title: title || '',
        style: { cursor: onClick ? 'pointer' : 'default' },
      },
      label,
    );
  };
})();
</script>

<script type="text/babel" data-presets="react">
/* ===== siphon-ir shell ========================================= */

//

const IR_SURFACES = [

  { id: 'investigations', workspace: 'respond',   icon: '⌖',  title: 'Investigations',   sub: 'case view · grouping' },
  { id: 'handoffs',       workspace: 'respond',   icon: '⇉',  title: 'Handoffs',         sub: 'tickets · escalations' },
  // ── ANALYZE ──────────────────────────────────────────────────

function workspaceOf(surfaceId) {
  const s = IR_SURFACES.find(x => x.id === surfaceId);

}
function firstSurfaceOf(wsId) {
  const s = IR_SURFACES.find(x => x.workspace === wsId);

}

// ─── Topbar ─────────────────────────────────────────────────────
// Mirrors siphon-c2's topbar layout so muscle memory carries over.
// The brand chip reads "IR" instead of "C2" — the only visual
// difference so the user always knows which console they're in.
function Topbar({ tweaks, setTweak, openPlaybooks }) {
  return (
    <div className="topbar">
      <div className="brand">

      </div>
      <ConsoleChip />
      <span className="spacer" />

              onClick={() => openPlaybooks && openPlaybooks()}
              title="Playbooks · analyst procedures + runbooks (press 'p')"
              style={{fontSize:11, color:'var(--accent)'}}>
        ❖ Playbooks
      </button>
      <button className="tb-theme" onClick={() => {
        const order = ['phosphor','amber','ice','light'];
        const next = order[(order.indexOf(tweaks.theme)+1) % order.length];
        setTweak('theme', next);
      }} title="Cycle theme">
        {({phosphor:'◉ PHOSPHOR', amber:'◉ AMBER', ice:'◉ ICE', light:'◉ DAY'})[tweaks.theme] || '◉ PHOSPHOR'}
      </button>
      <a href="siphon-c2.html"

}

// Identity slot in the topbar — clicking opens a dropdown with:
//   · who you are (name · email · role)
//   · "My profile" nav link
//   · impersonation sub-list (admins only; reads the full user
//     roster and lets an admin pose as anyone for demos)
//   · "Sign out"
// The impersonation list is gated on users.view, not a separate
// users.impersonate permission — if you can see the roster, you
// can switch seats. Production would replace this with real
// identity signals from the IdP.
function TopbarUser() {
  const [open, setOpen] = React.useState(false);
  const [showAll, setShowAll] = React.useState(false);
  const [, setTick] = React.useState(0);
  const btnRef = React.useRef(null);
  const menuRef = React.useRef(null);

  React.useEffect(() => {
    const refresh = () => setTick(t => t + 1);
    window.addEventListener('ir:currentUserChanged', refresh);
    window.addEventListener('ir:usersChanged',       refresh);
    window.addEventListener('ir:sessionChanged',     refresh);
    return () => {
      window.removeEventListener('ir:currentUserChanged', refresh);
      window.removeEventListener('ir:usersChanged',       refresh);
      window.removeEventListener('ir:sessionChanged',     refresh);
    };
  }, []);

  // Click-outside + Escape close
  React.useEffect(() => {
    if (!open) return;
    const onDown = (e) => {
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      if (btnRef.current  && btnRef.current.contains(e.target))  return;
      setOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDown);
    document.addEventListener('keydown',   onKey);
    return () => {
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('keydown',   onKey);
    };
  }, [open]);

  const user = getCurrentUser();
  if (!user) return <span className="tb-user">guest</span>;
  const role = irRoleMeta(user.role);

  const logout = () => {
    setOpen(false);
    if (typeof window.__ir_logout === 'function') window.__ir_logout();
  };
  const goToProfile = () => {
    setOpen(false);
    if (typeof window.__ir_go === 'function') window.__ir_go('ir-settings');
  };

  // Impersonation: admin clicks a user in the list, we swap
  // ir:currentUserId + write a fresh session tied to that id.
  // This is a demo-time convenience — prod deployments should
  // require a step-up auth + audit log.
  const canImpersonate = canDo(user, 'users.view');
  const impersonate = (target) => {
    if (!target || target.id === user.id) { setOpen(false); return; }
    setCurrentUser(target.id);
    writeSession(target.id);
    setOpen(false);
  };

  const otherUsers = canImpersonate
    ? readUsers().filter(u => u.status !== 'disabled' && u.id !== user.id)
        .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
    : [];
  const shownOthers = showAll ? otherUsers : otherUsers.slice(0, 6);

  return (
    <span style={{display:'flex', alignItems:'center', gap:8, position:'relative'}}>
      <button ref={btnRef}
              type="button"
              onClick={() => setOpen(o => !o)}
              title={role.label + ' · click for menu'}
              className="tb-user"
              style={{
                display:'flex', alignItems:'center', gap:6,
                background:'transparent', border:'none', cursor:'pointer',
                fontFamily:'inherit', fontSize:'inherit', color:'inherit',
                padding:'4px 8px',
                borderRadius:'var(--radius)',
                outline: open ? '1px solid var(--line-strong)' : 'none',
              }}>
        <span style={{color: role.color, fontSize:11}}>{role.glyph}</span>
        <span>{user.name}</span>
        <span style={{fontSize:9, color:'var(--ink-soft)', marginLeft:2}}>
          {open ? '▲' : '▼'}
        </span>
      </button>

      {open && (
        <div ref={menuRef}
             style={{
               position:'absolute', top:'calc(100% + 6px)', right:0,
               minWidth:260, maxWidth:320,
               background:'var(--bg-1)',
               border:'1px solid var(--line-strong)',
               borderRadius:'var(--radius)',
               boxShadow:'0 10px 30px rgba(0,0,0,0.4)',
               zIndex:1000,
               padding:0,
               fontSize:12,
             }}>
          {/* Identity header */}
          <div style={{
            padding:'12px 14px',
            borderBottom:'1px solid var(--line-soft)',
          }}>
            <div style={{color:'var(--ink-bright)', fontWeight:700, fontSize:13, marginBottom:2}}>
              {user.name}
            </div>
            <div className="mono" style={{fontSize:10.5, color:'var(--ink-soft)'}}>
              {user.email || user.id}
            </div>
            <div style={{marginTop:6}}>
              <span className="chip"
                    style={{
                      fontSize:10, padding:'2px 8px',
                      borderColor: role.color, color: role.color,
                      background:'var(--bg-2)',
                    }}>
                {role.glyph} {role.label}
              </span>
            </div>
          </div>

          {/* Nav items */}
          <button onClick={goToProfile} className="menu-item"
                  style={menuItemStyle}>
            <span style={{marginRight:8}}>⚙</span>My profile
          </button>

          {/* Impersonation */}
          {canImpersonate && otherUsers.length > 0 && (
            <div style={{
              borderTop:'1px solid var(--line-soft)',
              padding:'8px 0',
            }}>
              <div style={{
                padding:'2px 14px 6px',
                fontSize:10, letterSpacing:'0.08em',
                color:'var(--ink-soft)',
                fontFamily:"'Space Grotesk', sans-serif",
                fontWeight:600, textTransform:'uppercase',
              }}>
                Switch user (demo)
              </div>
              {shownOthers.map(u => {
                const r = irRoleMeta(u.role);
                return (
                  <button key={u.id}
                          onClick={() => impersonate(u)}
                          style={{
                            ...menuItemStyle,
                            display:'flex', alignItems:'center', gap:8,
                          }}>
                    <span style={{color:r.color, width:12, textAlign:'center', fontSize:11}}>
                      {r.glyph}
                    </span>
                    <span style={{flex:1, color:'var(--ink)'}}>{u.name}</span>
                    <span className="mono" style={{fontSize:10, color:'var(--ink-dim)'}}>
                      {u.role}
                    </span>
                  </button>
                );
              })}
              {otherUsers.length > shownOthers.length && (
                <button onClick={() => setShowAll(true)}
                        style={{
                          ...menuItemStyle,
                          color:'var(--accent)', fontSize:11,
                        }}>
                  + show {otherUsers.length - shownOthers.length} more
                </button>
              )}
            </div>
          )}

          {/* Sign out */}
          <div style={{borderTop:'1px solid var(--line-soft)'}}>
            <button onClick={logout} style={{
              ...menuItemStyle,
              color:'var(--threat)',
            }}>
              <span style={{marginRight:8}}>⏻</span>Sign out
            </button>
          </div>
        </div>
      )}
    </span>
  );
}

const menuItemStyle = {
  display:'block', width:'100%', textAlign:'left',
  background:'transparent', border:'none',
  padding:'9px 14px', cursor:'pointer',
  color:'var(--ink)', fontSize:12,
  fontFamily:"'Space Grotesk', sans-serif",
};

// Console chip — IR-flavoured equivalent of siphon-c2's DeploymentChip.
// Red accent so the operator instantly knows this is the IR console,
// not the admin surface.
function ConsoleChip() {

    <span
      title="Incident-response console · reads findings from every pod in the registry"
      style={{
        padding: '2px 8px', fontSize: 10,

        letterSpacing: '0.12em', fontWeight: 700, textTransform: 'uppercase',
        border: '1px solid var(--threat)',

// ─── WorkspaceBar ───────────────────────────────────────────────
function WorkspaceBar({ current, go }) {
  const activeW = workspaceOf(current);
  return (

      {IR_WORKSPACES.filter(w => !w.hidden).map(w => (
        <button

// ─── SurfaceBar (horizontal, sits under wsbar) ──────────────────
function SurfaceBar({ current, go }) {
  const activeW = workspaceOf(current);

  return (
    <nav className="surfacebar" aria-label="Surfaces">
      {items.map(s => (
        <a key={s.id}
           className={current === s.id ? 'active' : ''}
           onClick={() => go(s.id)}>
          <span className="icn">{s.icon}</span>

        </a>
      ))}

}

// ─── Placeholder surface ────────────────────────────────────────
// Every workspace that isn't built yet renders this. Keeps the shell
// navigable and tells the operator exactly what's coming.
function Stub({ title, description }) {
  return (
    <div style={{padding:'var(--gap)'}}>
      <div className="box">
        <div className="box-title">
          <span className="t">{title}</span>
          <span className="k">coming soon</span>
        </div>
        <div className="muted" style={{padding:16, lineHeight:1.7, fontSize:13}}>
          {description}
        </div>
      </div>
    </div>
  );
}

// ─── Findings Queue ─────────────────────────────────────────────
// The core Respond surface. DLP analyst workflow per finding:
//   1. Review the 5W detail: who uploaded/sent/logged it, what was
//      detected, where (channel), when, why (pattern + policy).
//   2. Add investigator notes capturing the rationale.
//   3. Dispose:
//        · Close Event           — benign activity, log + archive
//        · False Positive        — submit to admin-console FP queue
//                                  so detection engineering can tune
//        · Escalate to XSOAR     — hand off to SOAR pipeline for
//                                  remediation (open modal with JSON
//                                  payload + optional webhook POST)
//
// Dispositions live in localStorage[ir:dispositions] (persists across
// reloads) and False-Positive submissions additionally write to the
// shared localStorage[c2:fpQueue] bucket that the admin console's FP
// Queue surface reads.
const IR_DISPO_KEY = 'ir:dispositions';
const IR_DEMO_DISPO_KEY = 'ir:demoDispositions';
const FP_QUEUE_KEY = 'c2:fpQueue';
const XSOAR_CFG_KEY = 'ir:xsoar';
const IR_DEMO_MODE_KEY = 'ir:demoMode';
const IR_DEMO_SEED_KEY = 'ir:demoSeed';

// ─── Demo-mode plumbing ─────────────────────────────────────────
// Toggle lives under Settings → Engineering. When on, the Findings
// Queue and dashboard read from a seeded fixture set instead of the
// live pod union. Dispositions made in demo mode are stored in a
// separate localStorage key so the analyst's real triage state never
// collides with the demo state.

function isDemoMode() {
  try { return localStorage.getItem(IR_DEMO_MODE_KEY) === 'on'; }
  catch { return false; }
}
function readDemoSeed() {
  try {
    const v = localStorage.getItem(IR_DEMO_SEED_KEY);
    if (v) return parseInt(v, 10);
  } catch {}
  // Default stable-but-non-obvious seed so the first load always
  // renders the same demo set for screenshot + doc purposes.
  return 0x51D705C4;
}
function writeDemoSeed(seed) {
  try { localStorage.setItem(IR_DEMO_SEED_KEY, String(seed >>> 0)); } catch {}
}
function setDemoMode(on) {
  try { localStorage.setItem(IR_DEMO_MODE_KEY, on ? 'on' : 'off'); } catch {}
  // Same-tab notifier — other tabs get the 'storage' event for free.
  window.dispatchEvent(new CustomEvent('ir:demoChanged', { detail: { on } }));
}

// Four legal dispositions. 'open' means untriaged (no record in the
// disposition map). Values in records use the 4 below + a free-text
// `notes` field.
const DISPO = {
  event:    { label: 'Event closed',       chip: 'safe',  short: 'event' },
  fp:       { label: 'False positive',     chip: 'ghost', short: 'fp'    },
  escalate: { label: 'Escalated · XSOAR',  chip: 'warn',  short: 'esc'   },
};

// Dispo read/write route through the current mode so demo triage and
// real triage never stomp each other. Same contract either way.
function dispoKey() { return isDemoMode() ? IR_DEMO_DISPO_KEY : IR_DISPO_KEY; }
function readDispo() {
  try { return JSON.parse(localStorage.getItem(dispoKey()) || '{}') || {}; }
  catch { return {}; }
}
function writeDispo(m) {
  try { localStorage.setItem(dispoKey(), JSON.stringify(m)); } catch {}
}
function readFpQueue() {
  try { return JSON.parse(localStorage.getItem(FP_QUEUE_KEY) || '[]') || []; }
  catch { return []; }
}
function writeFpQueue(list) {
  try { localStorage.setItem(FP_QUEUE_KEY, JSON.stringify(list)); } catch {}
}
function readXsoarCfg() {
  try { return JSON.parse(localStorage.getItem(XSOAR_CFG_KEY) || '{}') || {}; }
  catch { return {}; }

// ─── Seeded RNG + demo data generator ───────────────────────────
// mulberry32 — small, good-enough, deterministic from a uint32 seed.
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = seed;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Weighted pick — `items` is `[{...entry, weight: N}]`.
function wpick(rng, items) {
  const total = items.reduce((a, i) => a + (i.weight || 1), 0);
  let r = rng() * total;
  for (const i of items) {
    r -= (i.weight || 1);
    if (r <= 0) return i;
  }
  return items[items.length - 1];
}

// Build a stable set of findings + dispositions from the seed. Same
// seed → same output, so the dashboard always has the same numbers
// unless the analyst explicitly regenerates.
function generateDemoFindings(seed) {
  const rng = mulberry32(seed);
  const n = 420; // 400+ days of history so YoY trending has data
  const now = Date.now();
  const findings = [];
  for (let i = 0; i < n; i++) {
    const cat = wpick(rng, DEMO_CATALOG);
    const user = wpick(rng, DEMO_USERS);
    const channel = wpick(rng, DEMO_CHANNELS);
    // Skew timestamps so most findings are in the last week; some
    // trail back up to 30 days for the longer-horizon chart.
    // Skewed so most findings land in the last 30 days but a long
    // tail reaches 400+ for YoY comparisons. Cube power puts ~60%
    // of findings in the last 30 days, ~90% in the last year.
    const ageDays = Math.pow(rng(), 3) * 420;
    const ts = new Date(now - ageDays * 86400e3).toISOString();
    const confidence = 0.55 + rng() * 0.44;
    const hasContext = rng() > 0.15;
    const ip = `10.${(rng() * 240 | 0) + 10}.${rng() * 256 | 0}.${rng() * 256 | 0}`;
    const destUrl = rng() > 0.4
      ? `https://${wpick(rng, [{w:'partner', weight:2}, {w:'personal', weight:1}, {w:'competitor', weight:1}, {w:'backup', weight:1}]).w}.example.com/upload/${rng().toString(36).slice(2, 10)}`
      : null;
    const hash = ((rng() * 0xFFFFFFFF) >>> 0).toString(16).padStart(8, '0')
               + ((rng() * 0xFFFFFFFF) >>> 0).toString(16).padStart(8, '0')
               + ((rng() * 0xFFFFFFFF) >>> 0).toString(16).padStart(8, '0')
               + ((rng() * 0xFFFFFFFF) >>> 0).toString(16).padStart(8, '0');
    findings.push({
      id: 'f-demo-' + i.toString().padStart(4, '0'),
      ts,
      category: cat.cat,
      sub_category: cat.sub,
      text: cat.ex,
      confidence,
      has_context: hasContext,
      span: [rng() * 2000 | 0, 0].map((v, j) => j === 0 ? v : v + cat.ex.length),
      severity: cat.sev,
      source_pod: channel.pod,
      source_ip: channel.pod === 'siphon-fs'
        ? `report_q${(rng() * 4 | 0) + 1}_${user.id.split('@')[0]}.xlsx`
        : ip,
      request_id: 'r-' + ((rng() * 0xFFFFFF) | 0).toString(16).padStart(6, '0'),
      metadata: {
        user: user.id,
        region: user.region,
        department: user.dept,
        channel: channel.label,
        src_ip: ip,
        ...(destUrl ? { dest_url: destUrl } : {}),
        ...(channel.id.startsWith('email') ? {
          sender: user.id,
          recipient: wpick(rng, [
            { w: 'partner.vendor@external.example', weight: 2 },
            { w: 'personal@gmail.example', weight: 2 },
            { w: 'competitor.contact@rival.example', weight: 1 },
          ]).w,
        } : {}),
        content_hash: 'sha256:' + hash,
      },
    });
  }
  return findings;
}

// Seed dispositions for ~65% of findings so the dashboard has real
// numbers for MTTR / totals. Analyst pick is weighted by the analyst
// table; the analyst's 'style' nudges disposition probabilities.
function generateDemoDispositions(findings, seed) {
  const rng = mulberry32(seed ^ 0xABCDEF);
  const map = {};
  for (const f of findings) {
    if (rng() > 0.65) continue; // 35% stay open
    const analyst = wpick(rng, DEMO_ANALYSTS);
    let kindRoll = rng();
    // Style bias.
    if (analyst.style === 'escalator')   kindRoll *= 0.7;
    if (analyst.style === 'fp-heavy')    kindRoll = 0.2 + kindRoll * 0.8;
    if (analyst.style === 'event-heavy') kindRoll = 0.6 + kindRoll * 0.4;
    let kind;
    if (kindRoll < 0.35) kind = 'escalate';
    else if (kindRoll < 0.7) kind = 'event';
    else kind = 'fp';
    // Respond-time = minutes between finding.ts and triage.
    const respondMins = 2 + Math.pow(rng(), 1.5) * 240; // 2-240 min, skewed fast
    const triagedAt = new Date(new Date(f.ts).getTime() + respondMins * 60e3).toISOString();
    const record = {
      kind,
      at: triagedAt,
      by: analyst.name,
      by_id: analyst.id,
      respond_min: respondMins,
      notes: ({
        event: 'Verified with user — legitimate business activity per policy.',
        fp: 'Pattern false-fired on a public-record identifier. Submitted to detection engineering.',
        escalate: 'Confirmed TP — data exfiltration candidate. Handed off to XSOAR for remediation.',
      })[kind],
    };
    if (kind === 'escalate') {
      record.xsoar_status = 'POST 202';
      // Remediate-time = extra minutes after escalation before
      // XSOAR closes the incident (not all are closed yet).
      if (rng() > 0.3) {
        const remediateMins = 30 + Math.pow(rng(), 1.8) * 720; // 30-720 min
        record.remediated_at = new Date(new Date(triagedAt).getTime() + remediateMins * 60e3).toISOString();
        record.remediate_min = remediateMins;
      }
    }
    map[f.id] = record;
  }
  return map;
}

// React hook — findings source of truth for every IR surface. Honors
// demo mode; returns the same { loading, data, error, source,
// perPod, refetch } contract as window.useFindingsUnion so surfaces
// don't care which backend is live.
window.useIrFindings = function (qs) {
  const [mode, setMode] = React.useState(isDemoMode);
  const [seed, setSeed] = React.useState(readDemoSeed);
  const [tick, setTick] = React.useState(0);

  React.useEffect(() => {
    const sync = () => { setMode(isDemoMode()); setSeed(readDemoSeed()); };
    window.addEventListener('ir:demoChanged', sync);
    const onStorage = (e) => {
      if (e.key === IR_DEMO_MODE_KEY || e.key === IR_DEMO_SEED_KEY) sync();
    };
    window.addEventListener('storage', onStorage);
    return () => {
      window.removeEventListener('ir:demoChanged', sync);
      window.removeEventListener('storage', onStorage);
    };
  }, []);

  const live = window.useFindingsUnion(qs, [mode, seed, tick]);

  if (!mode) return live;

  const demoFindings = generateDemoFindings(seed);
  const m = (qs || '').match(/[?&]limit=(\d+)/);
  const limit = m ? parseInt(m[1], 10) : demoFindings.length;
  const findings = demoFindings
    .slice()
    .sort((a, b) => (b.ts || '').localeCompare(a.ts || ''))
    .slice(0, limit);
  return {
    loading: false,
    data: { total: demoFindings.length, returned: findings.length, capacity: 1000, findings },
    error: null,
    source: 'fixture',
    perPod: [{ url: 'demo://seeded', label: 'demo', role: 'demo', ok: true, data: null, error: null }],
    refetch: () => setTick(t => t + 1),
  };
};

const SEVERITY_RANK = { critical: 4, high: 3, medium: 2, low: 1, info: 0 };
function severityChip(sev) {
  const cls = {

    low: 'warn', info: 'ghost',
  }[sev] || 'ghost';
  return <span className={`chip chip--${cls}`} style={{fontSize:10}}>{sev || 'info'}</span>;
}

// Derive Who / What / Where / When / Why from whatever the finding
// carries. siphon-fs findings smuggle the filename through
// `source_ip`; siphon-api findings carry the real caller IP. Channel
// can be inferred from pod kind. Rich metadata (actor, email subject,
// etc.) isn't captured today — left as 'unknown' so the analyst
// annotates in the notes field.
function deriveContext(f) {
  const md = f.metadata || {};
  const pod = f.source_pod || '';
  const isFile = pod === 'siphon-fs' || md.filename;
  const who =
    md.actor || md.user || md.sender ||
    (isFile
      ? (f.source_ip && f.source_ip !== '<anon-upload>' ? `uploader of ${f.source_ip}` : 'anonymous upload')
      : (f.source_ip || 'unknown'));
  const what = `${f.category || '—'}${f.sub_category ? ' / ' + f.sub_category : ''}`;
  const where =
    md.channel || md.source_type ||
    (isFile ? 'file upload (siphon-fs)'
            : pod === 'siphon-api' ? 'API submission (siphon-api)'
            : pod ? `pod: ${pod}` : 'unknown channel');
  const when = f.ts || 'unknown';
  const why =
    (f.confidence != null ? `confidence ${f.confidence.toFixed(2)}` : 'no confidence')
    + (f.has_context ? ' · keyword-context confirmed'
                     : f.confidence != null ? ' · no context keyword nearby' : '')
    + (md.list_matched ? ` · match-list "${md.list_matched}" (${md.list_action || '—'})` : '')
    + (md.unique_count_breach ? ` · unique-count breach` : '');
  return { who, what, where, when, why, isFile, filename: md.filename || (isFile ? f.source_ip : null) };
}

function FindingsQueue() {
  const [filters, setFilters] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ir:queueFilters') || '{}') || {}; }
    catch { return {}; }
  });
  const [limit, setLimit] = React.useState(() => {
    try { return parseInt(localStorage.getItem('ir:queueLimit') || '100', 10); }
    catch { return 100; }
  });
  const [expanded, setExpanded] = React.useState(null);
  const [dispo, setDispo] = React.useState(readDispo);
  const [notesDraft, setNotesDraft] = React.useState({});
  const [xsoarFor, setXsoarFor] = React.useState(null); // finding being escalated
  const [flash, setFlash] = React.useState(null);

  React.useEffect(() => {
    try { localStorage.setItem('ir:queueFilters', JSON.stringify(filters)); } catch {}
  }, [filters]);
  React.useEffect(() => {
    try { localStorage.setItem('ir:queueLimit', String(limit)); } catch {}
  }, [limit]);
  // Re-read dispositions when demo mode flips so the row chips flip
  // between the real and seeded stores without a reload.
  React.useEffect(() => {
    const resync = () => setDispo(readDispo());
    window.addEventListener('ir:demoChanged', resync);
    window.addEventListener('storage', resync);
    return () => {
      window.removeEventListener('ir:demoChanged', resync);
      window.removeEventListener('storage', resync);
    };
  }, []);

  const findings = window.useIrFindings('?limit=' + limit);
  const all = (findings.data && findings.data.findings) || [];

  const categories = React.useMemo(
    () => Array.from(new Set(all.map(f => f.category).filter(Boolean))).sort(),
    [all]
  );
  const pods = React.useMemo(
    () => Array.from(new Set(all.map(f => f.source_pod).filter(Boolean))).sort(),
    [all]
  );

  const filtered = React.useMemo(() => {
    const s = (filters.search || '').toLowerCase();
    return all.filter(f => {
      if (filters.severity && filters.severity !== 'all' && f.severity !== filters.severity) return false;
      if (filters.category && filters.category !== 'all' && f.category !== filters.category) return false;
      if (filters.pod && filters.pod !== 'all' && f.source_pod !== filters.pod) return false;
      if (s && !(f.text || '').toLowerCase().includes(s)
          && !(f.category || '').toLowerCase().includes(s)
          && !(f.sub_category || '').toLowerCase().includes(s)) return false;
      const d = dispo[f.id];
      if (filters.state === 'open' && d) return false;
      if (filters.state === 'hide-event' && d && d.kind === 'event') return false;
      if (filters.state === 'hide-fp' && d && d.kind === 'fp') return false;
      if (filters.state === 'only-escalated' && (!d || d.kind !== 'escalate')) return false;
      return true;
    }).sort((a, b) => {
      const sa = SEVERITY_RANK[a.severity] || 0;
      const sb = SEVERITY_RANK[b.severity] || 0;
      if (sa !== sb) return sb - sa;
      return (b.ts || '').localeCompare(a.ts || '');
    });
  }, [all, filters, dispo]);

  // Record a disposition. Always stamps who/when + carries the
  // analyst's note (pulled from notesDraft[id]). FP dispositions also
  // fan out to the shared FP queue the admin console watches.
  const dispose = (finding, kind, extra) => {
    const note = (notesDraft[finding.id] || '').trim();
    const record = {
      kind,
      at: new Date().toISOString(),
      by: 'local-analyst',
      notes: note || null,
      ...extra,
    };
    const next = { ...dispo, [finding.id]: record };
    setDispo(next);
    writeDispo(next);

    if (kind === 'fp' && !isDemoMode()) {
      // Append to the cross-console FP queue so detection engineering
      // (admin console → Engineering → FP Queue) can triage. Skipped
      // in demo mode so seeded data doesn't contaminate the real
      // admin-side queue.
      const queue = readFpQueue();
      // Dedup by finding id — re-submitting overwrites the note + ts
      // rather than stacking duplicates.
      const existing = queue.findIndex(x => x.finding_id === finding.id);
      const entry = {
        finding_id: finding.id,
        category: finding.category,
        sub_category: finding.sub_category,
        text: finding.text,
        confidence: finding.confidence,
        severity: finding.severity,
        source_pod: finding.source_pod,
        submitted_at: record.at,
        submitted_by: record.by,
        notes: note,
        // Full finding for future rescanning / pattern-tuning context.
        finding,
      };
      if (existing >= 0) queue[existing] = entry;
      else queue.push(entry);
      writeFpQueue(queue);
    }

    setFlash({ id: finding.id, label: DISPO[kind].label });
    setTimeout(() => setFlash(null), 1800);
    setNotesDraft(d => { const c = { ...d }; delete c[finding.id]; return c; });
  };

  const clearDispo = (finding) => {
    const next = { ...dispo };
    delete next[finding.id];
    setDispo(next);
    writeDispo(next);
    // If this was an FP, remove from the cross-console queue too.
    const q = readFpQueue().filter(x => x.finding_id !== finding.id);
    writeFpQueue(q);
  };

  const counts = React.useMemo(() => {
    const c = { open: 0, event: 0, fp: 0, escalate: 0 };
    for (const f of all) {
      const d = dispo[f.id];
      if (!d) c.open += 1;
      else if (c[d.kind] != null) c[d.kind] += 1;

  // changes land across every row without each call site doing

  const fmtTs = (ts) => irFormatTimestamp(ts);

  return (
    <div style={{padding:'var(--gap)'}}>

          <span className="k" style={{display:'flex', alignItems:'center', gap:8}}>
            <window.LivePill source={findings.source} onClick={findings.refetch}
                             title="click to refetch across all pods" />
            <TzLabel />
            <span className="mono" style={{fontSize:11}}>
              {filtered.length} shown · {all.length} loaded
              {findings.data && findings.data.total > all.length ? ` · ${findings.data.total} in ring` : ''}
            </span>
          </span>
        </div>

        {/* triage summary chips */}

          <span className="muted mono" style={{fontSize:11, marginRight:4}}>queue:</span>
          <span className="chip chip--red" style={{fontSize:10, cursor:'pointer'}}
                onClick={() => setFilters({...filters, state: filters.state === 'open' ? 'all' : 'open'})}
                title="show only not-yet-triaged findings">
            {counts.open} open
          </span>
          <span className="chip chip--warn" style={{fontSize:10, cursor:'pointer'}}
                onClick={() => setFilters({...filters, state: filters.state === 'only-escalated' ? 'all' : 'only-escalated'})}
                title="show only findings escalated to XSOAR">

          {pods.length > 1 && (
            <select value={filters.pod || 'all'}
                    onChange={e => setFilters({...filters, pod: e.target.value})}
                    style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}>

            </select>
          )}
          <select value={filters.state || 'all'}
                  onChange={e => setFilters({...filters, state: e.target.value})}
                  style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}>
            <option value="all">all triage states</option>
            <option value="open">only open</option>
            <option value="only-escalated">only escalated</option>
            <option value="hide-event">hide closed-events</option>
            <option value="hide-fp">hide fp-submitted</option>
          </select>
          <select value={limit}
                  onChange={e => setLimit(parseInt(e.target.value, 10))}
                  style={{fontSize:11, padding:'6px 8px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}}
                  title="how many findings to pull from each pod">
            <option value={50}>50 per pod</option>
            <option value={100}>100 per pod</option>
            <option value={500}>500 per pod</option>
            <option value={1000}>1000 per pod</option>
          </select>
          <button className="btn ghost" onClick={() => setFilters({})}
                  title="clear all filters" style={{fontSize:11}}>
            clear
          </button>
        </div>

        {/* table */}
        {findings.loading && (
          <div className="muted mono" style={{padding:20, textAlign:'center', fontSize:12}}>
            loading findings from pod registry…
          </div>
        )}
        {!findings.loading && findings.error && (
          <div className="note" style={{margin:10, borderColor:'var(--red)', background:'var(--red-wash)', color:'var(--red)', fontSize:12}}>
            <b>Error:</b> {findings.error}
          </div>
        )}
        {!findings.loading && !findings.error && filtered.length === 0 && (
          <div className="muted mono" style={{padding:30, textAlign:'center', fontSize:12}}>
            — no findings match the current filter —
            {all.length > 0 && (
              <><br/><br/>
              <a style={{color:'var(--accent)', cursor:'pointer'}}
                 onClick={() => setFilters({})}>clear filters</a>
              {' '}to see all {all.length} loaded.</>
            )}
          </div>
        )}

        {/* header row */}
        {filtered.length > 0 && (
          <div style={{
            display:'grid',
            gridTemplateColumns:'140px 90px 180px 1fr 60px 90px 160px',
            gap:8, padding:'8px 14px', borderBottom:'1.5px solid var(--line)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:10,
            color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:'0.08em',
          }}>
            <span>timestamp</span>
            <span>pod</span>
            <span>category / sub</span>
            <span>matched text</span>
            <span>conf</span>
            <span>severity</span>
            <span>triage</span>
          </div>
        )}

        {filtered.map(f => {
          const d = dispo[f.id];
          const rowTint = d && d.kind === 'fp' ? 'var(--bg-1)'
                        : d && d.kind === 'escalate' ? 'var(--amber-wash, var(--bg-2))'
                        : 'transparent';
          const opacity = d && d.kind === 'fp' ? 0.5 : 1;
          return (
            <div key={f.id} style={{borderBottom:'1px solid var(--line-soft)'}}>
              <div onClick={() => window.__ir_goFinding && window.__ir_goFinding(f.id)}
                   style={{
                     display:'grid',
                     gridTemplateColumns:'140px 90px 180px 1fr 60px 90px 160px',
                     gap:8, padding:'8px 14px', fontSize:11.5, alignItems:'center',
                     cursor:'pointer', background: rowTint, opacity,
                     fontFamily:"'JetBrains Mono', monospace",
                   }}
                   title="click to open the 5W+H review surface">
                <span style={{color:'var(--ink-soft)'}}>{fmtTs(f.ts)}</span>
                <span className="chip chip--ghost" style={{fontSize:9, justifySelf:'start'}}>
                  {f.source_pod || '—'}
                </span>
                <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}
                      title={`${f.category} / ${f.sub_category}`}>
                  <span style={{color:'var(--ink-bright)'}}>{f.category}</span>
                  {f.sub_category && <span className="muted"> / {f.sub_category}</span>}
                </span>
                <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--accent)'}}
                      title={f.text || ''}>
                  {f.text || '—'}
                </span>
                <span style={{color: f.confidence >= 0.9 ? 'var(--safe)'
                                    : f.confidence >= 0.7 ? 'var(--amber)'
                                    : 'var(--ink-soft)'}}>
                  {f.confidence != null ? f.confidence.toFixed(2) : '—'}
                </span>
                <span>{severityChip(f.severity)}</span>
                <span style={{display:'flex', gap:4, justifySelf:'end', alignItems:'center'}}>
                  {!d && (
                    <span className="muted mono" style={{fontSize:10}}>
                      open →
                    </span>
                  )}
                  {d && (
                    <>
                      <span className={`chip chip--${DISPO[d.kind].chip}`}
                            title={`${DISPO[d.kind].label}${d.notes ? '\n\n' + d.notes : ''}`}
                            style={{fontSize:9}}>{DISPO[d.kind].short}</span>
                      <button className="btn ghost" onClick={(e) => { e.stopPropagation(); clearDispo(f); }}
                              title="undo disposition"
                              style={{fontSize:10, padding:'3px 6px'}}>↶</button>
                    </>
                  )}
                  {flash && flash.id === f.id && (
                    <span className="mono" style={{fontSize:10, color:'var(--safe)'}}>
                      ✓
                    </span>
                  )}
                </span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// raw-record KV are lifted wholesale. The c2 panels (DetectionPipeline,

// IR-local PageBar primitive. Simpler than c2's (no search, no

// surface. If more IR surfaces pick it up we can widen the API.
function IrPageBar({ crumbs, title, subtitle, actions }) {

// Apply a filter to the queue and navigate back to it. Used by the
// Who + What panels (and later the When panel) as the one-click
// pivot: "show me everything by the same user / same hash / same
// recipient". The queue picks up the updated filters from
// localStorage on its next render.
function irPivotToQueue(patch) {
  try {
    const cur = JSON.parse(localStorage.getItem('ir:queueFilters') || '{}');
    localStorage.setItem('ir:queueFilters', JSON.stringify({ ...cur, ...patch }));
  } catch {}
  window.__ir_go && window.__ir_go('findings', '');
}

// ── Who panel ─────────────────────────────────────────────────
// Identity context for the event. Pulls every identity-ish field
// out of the finding's top-level + metadata and offers one-click
// pivots back to the queue filtered on that value. Useful when the
// analyst wants to know "what else has this user been doing today?"
function WhoPanel({ f, all }) {
  const md = f.metadata || {};
  const user = md.user || null;
  const sender = md.sender || null;
  const recipient = md.recipient || null;
  const ip = md.src_ip || f.source_ip || null;
  const region = md.region || null;
  const department = md.department || null;

  // Count same-user / same-ip / etc neighbours. `all` is the current
  // findings set (live or demo) so counts follow whatever the analyst
  // is looking at.
  const eqUser = user
    ? all.filter(x => x.id !== f.id && x.metadata && x.metadata.user === user)
    : [];
  const eqSender = sender && sender !== user
    ? all.filter(x => x.id !== f.id && x.metadata && x.metadata.sender === sender)
    : [];
  const eqRecipient = recipient
    ? all.filter(x => x.id !== f.id && x.metadata && x.metadata.recipient === recipient)
    : [];
  const eqIp = ip
    ? all.filter(x => x.id !== f.id
        && (x.source_ip === ip
            || (x.metadata && x.metadata.src_ip === ip)))
    : [];

  const hasAnyPivot = eqUser.length + eqSender.length + eqRecipient.length + eqIp.length > 0;

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Who</span>
        <span className="k">identity · pivot</span>
      </div>
      <div style={{padding:14, fontSize:12}}>
        <div className="kv" style={{gridTemplateColumns:'120px 1fr', gap:'6px 12px'}}>
          {user && (<>
            <span className="k">User</span>
            <span className="v mono" style={{color:'var(--ink-bright)'}}>{user}</span>
          </>)}
          {sender && sender !== user && (<>
            <span className="k">Sender</span>
            <span className="v mono">{sender}</span>
          </>)}
          {recipient && (<>
            <span className="k">Recipient</span>
            <span className="v mono" style={{color: (recipient.includes('external.example')
                                                   || recipient.includes('gmail.example')
                                                   || recipient.includes('rival.example'))
                                                   ? 'var(--amber)' : 'var(--ink)'}}>
              {recipient}
            </span>
          </>)}
          {ip && (<>
            <span className="k">Source IP</span>
            <span className="v mono">{ip}</span>
          </>)}
          {region && (<>
            <span className="k">Region</span>
            <span className="v">
              <span className="chip chip--ghost" style={{fontSize:10}}>{region}</span>
            </span>
          </>)}
          {department && (<>
            <span className="k">Department</span>
            <span className="v">{department}</span>
          </>)}
          {!user && !sender && !ip && (
            <span className="muted" style={{gridColumn:'1 / span 2', fontSize:11.5}}>
              No identity metadata on this finding. Source emitter should add
              <span className="mono"> metadata.user</span>,<span className="mono"> .sender</span>,<span className="mono"> .src_ip</span> when scanning.
            </span>
          )}
        </div>

        {hasAnyPivot && (<>
          <div className="label" style={{marginTop:14, marginBottom:6}}>Pivot on identity</div>
          <div style={{display:'flex', flexDirection:'column', gap:4, fontSize:11.5}}>
            {user && eqUser.length > 0 && (
              <a onClick={() => irPivotToQueue({ search: user })}
                 style={{color:'var(--accent)', cursor:'pointer'}}
                 title={`filter queue to ${user}`}>
                → {eqUser.length} other finding{eqUser.length === 1 ? '' : 's'} by <span className="mono">{user}</span>
              </a>
            )}
            {sender && eqSender.length > 0 && (
              <a onClick={() => irPivotToQueue({ search: sender })}
                 style={{color:'var(--accent)', cursor:'pointer'}}>
                → {eqSender.length} other finding{eqSender.length === 1 ? '' : 's'} from sender <span className="mono">{sender}</span>
              </a>
            )}
            {recipient && eqRecipient.length > 0 && (
              <a onClick={() => irPivotToQueue({ search: recipient })}
                 style={{color:'var(--accent)', cursor:'pointer'}}>
                → {eqRecipient.length} other finding{eqRecipient.length === 1 ? '' : 's'} to recipient <span className="mono">{recipient}</span>
              </a>
            )}
            {ip && eqIp.length > 0 && (
              <a onClick={() => irPivotToQueue({ search: ip })}
                 style={{color:'var(--accent)', cursor:'pointer'}}>
                → {eqIp.length} other finding{eqIp.length === 1 ? '' : 's'} from IP <span className="mono">{ip}</span>
              </a>
            )}
          </div>
        </>)}
      </div>
    </div>
  );
}

// ── Classification + helpers ──────────────────────────────────
// Map the scanner's category to a regulatory/classification label.
// These are policy-framework labels that responders reason about
// ("is this PCI? PHI?") and DLP regimes anchor to. The admin
// console doesn't surface them; the IR surface needs them front
// and centre.
function deriveClassification(f) {
  const md = f.metadata || {};
  // Explicit metadata wins if the emitter tagged it upstream.
  if (md.classification) return { label: md.classification.toUpperCase(), color: 'var(--amber)' };
  if (md.tlp) return { label: 'TLP:' + md.tlp.toUpperCase(), color: 'var(--amber)' };
  const cat = (f.category || '').toLowerCase();
  const sub = (f.sub_category || '').toLowerCase();
  if (cat.includes('credit card') || cat.includes('card number')) return { label: 'PCI-DSS', color: 'var(--red)' };
  if (cat.includes('healthcare') || sub.includes('medical') || cat.includes('hipaa')) return { label: 'PHI · HIPAA', color: 'var(--red)' };
  if (cat.includes('aws') || cat.includes('credentials') || cat.includes('auth tokens') || cat.includes('banking authentication')) return { label: 'CREDENTIAL', color: 'var(--red)' };
  if (cat.includes('biometric')) return { label: 'BIOMETRIC PII', color: 'var(--red)' };
  if (cat.includes('regulatory')) return { label: 'REGULATORY', color: 'var(--amber)' };
  if (cat.includes('traffic light') || sub.startsWith('tlp:')) {
    const name = (f.sub_category || 'TLP').toUpperCase();
    return { label: name, color: 'var(--amber)' };
  }
  if (cat.includes('customer financial')) return { label: 'FINANCIAL PII', color: 'var(--amber)' };
  if (cat.includes('north america') || cat.includes('europe') || cat.includes('asia-pacific') || cat.includes('latin') || cat.includes('middle east') || cat.includes('africa')) {
    return { label: 'PII · REGIONAL ID', color: 'var(--amber)' };
  }
  if (cat.includes('email') || cat.includes('phone') || cat.includes('address')) return { label: 'PII', color: 'var(--amber)' };
  return { label: 'SENSITIVE', color: 'var(--ink-soft)' };
}

// Small wall-clock helper. Lifted verbatim from siphon-c2.
function fmtWallClock(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return String(d.getHours()).padStart(2, '0') + ':'
       + String(d.getMinutes()).padStart(2, '0') + ':'
       + String(d.getSeconds()).padStart(2, '0');
}

// Large-format severity chip for the PageBar — the small one in
// queue rows is too cramped when the finding # is 28px.
function severityChipLarge(sev) {
  const cls = {
    critical: 'red', high: 'red', medium: 'amber',
    low: 'warn', info: 'ghost',
  }[sev] || 'ghost';
  return (
    <span className={`chip chip--${cls}`}
          style={{
            fontSize: 11, padding: '5px 12px',
            fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700,
            letterSpacing: '0.08em',
          }}>
      {(sev || 'info').toUpperCase()}
    </span>
  );
}

          fontSize:14, padding:'8px 10px',
          background:'var(--amber-wash)', border:'1.5px solid var(--amber)',
          borderRadius:2, wordBreak:'break-all', color:'var(--ink-bright)',
        }}>{f.text || '—'}</div>

        <div className="kv" style={{marginTop:14, gridTemplateColumns:'120px 1fr', gap:'6px 12px', fontSize:12}}>
          <span className="k">Category</span>
          <span className="v">
            <a href={`siphon-c2.html#patterns/${encodeURIComponent(f.category)}/${encodeURIComponent(f.sub_category || '')}`}
               target="_blank" rel="noopener"
               style={{color:'var(--accent)', textDecoration:'none'}}

              {f.category}
              {f.sub_category && <><span className="muted"> / </span><span style={{color:'var(--accent)'}}>{f.sub_category}</span></>}
              <span style={{marginLeft:4, fontSize:10}}>↗</span>
            </a>
          </span>
          <span className="k">Confidence</span>
          <span className="v">
            {f.confidence != null ? (
              <span style={{display:'inline-flex', alignItems:'center', gap:8, verticalAlign:'middle'}}>
                <span style={{
                  width:120, height:6, background:'var(--bg-3)',
                  borderRadius:3, overflow:'hidden', display:'inline-block',
                  border:'1px solid var(--line-soft)',
                }}>
                  <span style={{
                    display:'block', height:'100%',
                    width: `${Math.min(100, Math.max(0, f.confidence * 100))}%`,
                    background: f.confidence >= 0.9 ? 'var(--safe)'

                  }}/>

              </span>

          </span>
          <span className="k">Context</span>
          <span className="v">
            {f.has_context
              ? <span className="chip chip--safe" style={{fontSize:10}}>keyword matched</span>
              : <span className="chip chip--ghost" style={{fontSize:10}}>no nearby keyword</span>}
          </span>
          <span className="k">Severity</span>
          <span className="v">{severityChip(f.severity)}</span>
          <span className="k">Span</span>
          <span className="v mono">
            offset {f.span ? f.span[0] : '—'} → {f.span ? f.span[1] : '—'}
            {f.span && <span className="muted"> ({f.span[1] - f.span[0]} chars)</span>}
          </span>
          {ctxHash && (<>
            <span className="k">Content hash</span>
            <span className="v mono" title={ctxHash}
                  style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:10.5}}>
              <a onClick={() => irPivotToQueue({ search: ctxHash })}
                 style={{color:'var(--accent)', cursor:'pointer', textDecoration:'none'}}
                 title="pivot · find all findings with the same content hash">
                {ctxHash.slice(0, 40)}{ctxHash.length > 40 ? '…' : ''}
              </a>
            </span>
          </>)}
          {md.list_matched && (<>
            <span className="k">List match</span>
            <span className="v">
              <span className="chip chip--warn" style={{fontSize:10}}>
                {md.list_matched}
              </span>
              <span className="muted"> · action <span className="mono">{md.list_action || 'tag'}</span></span>
            </span>
          </>)}
          {md.unique_count_breach === 'true' && (<>
            <span className="k">Breach</span>
            <span className="v">
              <span className="chip chip--red" style={{fontSize:10}}>unique-count breach</span>
              <span className="muted"> · {md.unique_count || '?'} distinct values</span>
            </span>
          </>)}
        </div>
      </div>
    </div>
  );
}

  'Authentication Tokens':         ['token', 'session', 'bearer', 'api key', 'jwt'],
  'Banking Authentication':        ['pin', 'authorization', 'hsm', 'key', 'encryption'],
  'AWS Credentials':               ['aws', 'access key', 'secret', 'credentials'],
  'Biometric Identifiers':         ['fingerprint', 'biometric', 'retina'],
  'North America - United States': ['ssn', 'social security', 'itin', 'passport'],
  'North America - Canada':        ['sin', 'social insurance', 'quebec'],
  'Email Addresses':               ['email', 'address', 'mailto'],
  'Dates':                         ['date of birth', 'dob', 'birthdate', 'birth', 'born'],
};

// Synthesise a fake-but-plausible document preview per channel.
// Body contains every finding.text from `sameReq` embedded in a
// realistic surrounding so the analyst can read the matched value
// in context.
function generatePreviewText(finding, sameReq) {
  const md = finding.metadata || {};
  const channel = (md.channel || '').toLowerCase();
  const all = [finding, ...(sameReq || [])];
  const matched = all.map(f => f.text).filter(Boolean);
  const ts = finding.ts || new Date().toISOString();
  const tsDisp = ts.replace('T', ' ').replace('Z', '').slice(0, 19);

  const joinedMatches = matched.length
    ? matched.map(m => `  · ${m}`).join('\n')
    : '  · [no matched slice available]';

  if (channel.includes('email')) {
    const sender = md.sender || 'unknown.sender@corp.example';
    const recipient = md.recipient || 'unknown.recipient@example.com';
    const outbound = channel.includes('outbound');
    const firstName = sender.split('@')[0].split('.')[0];
    const capName = firstName[0].toUpperCase() + firstName.slice(1);
    const cats = Array.from(new Set(all.map(f => f.category))).join(' + ');
    const body =
`Hi,

${outbound
  ? 'Per our earlier discussion, sharing the records you requested. Please store securely and let me know if anything is missing.'
  : 'Forwarding the records we pulled for the quarterly review. Let me know if you need the expanded dataset.'}

Relevant identifiers flagged for follow-up:
${joinedMatches}

Context: ${cats} · generated from our backend on ${tsDisp}.

${outbound ? 'Best regards,\n' + capName : 'Thanks,\n' + capName}
`;
    return {
      kind: 'email',
      direction: outbound ? 'outbound' : 'inbound',
      headers: {
        From: sender,
        To: recipient,
        Date: tsDisp,
        Subject: `${outbound ? 'Fwd: ' : 'Re: '}${cats} records · Q1`,
        'Message-ID': `<${(finding.request_id || 'x').slice(0, 12)}.${ts.slice(0, 10)}@mail.corp.example>`,
      },
      body,
      size: body.length,
    };
  }

  if (channel.includes('slack')) {
    const sender = md.sender || md.user || 'user@corp.example';
    const firstName = sender.split('@')[0].split('.')[0];
    const body =
`[slack · direct message · ${tsDisp}]

${firstName}: hey quick one — i'm prepping the handoff to the vendor and need to confirm a couple of values. can you check these?

${matched.map(m => firstName + ': ' + m).join('\n')}

${firstName}: would it be easier to share via the secure channel or should i paste in chat?
`;
    return {
      kind: 'slack',
      headers: {
        Channel: 'direct message',
        Participant: sender,
        Date: tsDisp,
      },
      body,
      size: body.length,
    };
  }

  if (channel.includes('print')) {
    const who = md.user || finding.source_ip || 'unknown';
    const body =
`[print spool · ${md.channel || 'print'}]
user=${who}  printer=HQ-NE-18-COLOR  pages=4  ts=${tsDisp}

─── page 1 ──────────────────────────────────────────

Quarterly customer review — CONFIDENTIAL

The following records are included in this report:

${joinedMatches}

These should not be printed on shared devices. If you received this
in error, please destroy and notify the compliance team.

─── page 2 ──────────────────────────────────────────
`;
    return {
      kind: 'print',
      headers: {
        User: who,
        Printer: 'HQ-NE-18-COLOR',
        Pages: '4',
        Date: tsDisp,
      },
      body,
      size: body.length,
    };
  }

  if (channel.includes('api')) {
    const body = JSON.stringify({
      ts: tsDisp,
      user: md.user || 'service-account',
      action: 'records.export',
      payload: {
        rows: matched.map((m, i) => ({ id: i + 1, value: m })),
        note: `batch export via api · ${all[0].category}`,
      },
    }, null, 2);
    return {
      kind: 'api',
      headers: {
        Endpoint: 'POST /v1/exports',
        'Content-Type': 'application/json',
        Date: tsDisp,
      },
      body,
      size: body.length,
    };
  }

  // Default — file upload / sharepoint / usb / web-upload / etc.
  const filename = md.filename || (finding.source_pod === 'siphon-fs' ? finding.source_ip : null) || `document-${(finding.request_id || 'x').slice(0, 6)}.txt`;
  const who = md.user || 'unknown';
  const body =
`[file preview · extracted text]
filename=${filename}  uploaded_by=${who}  size≈${8 + Math.round(Math.random() * 40)}kb  ts=${tsDisp}

────────────────────────────────────────────────────

CUSTOMER RECORDS — CONFIDENTIAL

This document contains the customer records requested for review. The
following values appear in the extracted text at the positions siphon-fs
flagged:

${joinedMatches}

End of extracted preview.
`;
  return {
    kind: 'file',
    headers: {
      Filename: filename,
      'Uploaded by': who,
      Date: tsDisp,
      'Channel': md.channel || (finding.source_pod || 'unknown'),
    },
    body,
    size: body.length,
  };
}

// Locate every match + keyword + find range in `body`, merge
// overlaps by priority (find > match > keyword), and emit a flat
// list of render-ready segments. Each segment is either
// `{ kind: 'plain', text }` or a highlight segment with metadata.
function applyHighlights(body, findings, keywords, findText) {
  const ranges = [];

  // Regex matches from the scanner — priority 2.
  for (const f of findings) {
    if (!f.text) continue;
    let from = 0;
    while (true) {
      const at = body.indexOf(f.text, from);
      if (at === -1) break;
      ranges.push({
        start: at, end: at + f.text.length,
        kind: 'match', prio: 2,
        category: f.category, sub_category: f.sub_category,
      });
      from = at + f.text.length;
    }
  }

  // Context keywords — priority 1.
  for (const kw of keywords) {
    const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx = new RegExp('\\b' + escaped + '\\b', 'gi');
    let m;
    while ((m = rx.exec(body)) !== null) {
      ranges.push({
        start: m.index, end: m.index + m[0].length,
        kind: 'keyword', prio: 1, keyword: kw,
      });
    }
  }

  // Find hits — priority 3 (wins over both). Indexed so the UI
  // can wire prev/next jumps.
  let findCounter = 0;
  if (findText) {
    const escaped = findText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx = new RegExp(escaped, 'gi');
    let m;
    while ((m = rx.exec(body)) !== null) {
      ranges.push({
        start: m.index, end: m.index + m[0].length,
        kind: 'find', prio: 3, findIdx: findCounter++,
      });
      if (m.index === rx.lastIndex) rx.lastIndex++; // avoid infinite loop
    }
  }

  // Sort: earlier start first, higher priority on ties.
  ranges.sort((a, b) => a.start - b.start || b.prio - a.prio);

  // Drop any range fully inside a higher-priority prior one.
  const kept = [];
  let furthest = 0;
  for (const r of ranges) {
    if (r.start < furthest) {
      const prev = kept[kept.length - 1];
      if (prev && prev.prio >= r.prio) continue;
    }
    kept.push(r);
    furthest = Math.max(furthest, r.end);
  }

  const segs = [];
  let pos = 0;
  for (const r of kept) {
    if (r.start > pos) segs.push({ kind: 'plain', text: body.slice(pos, r.start) });
    segs.push({ ...r, text: body.slice(r.start, r.end) });
    pos = r.end;
  }
  if (pos < body.length) segs.push({ kind: 'plain', text: body.slice(pos) });
  return segs;
}

// Standardised highlight palette for preview. Regex-hits always
// green, keyword hits always purple, find-in-document hits amber.
// Swaps the previous per-category palette — category chromatics
// live on the dashboard charts where multi-colour semantics help;
// inside the document they were noisy + hard to scan.
const REGEX_HL   = { bg: 'rgba(94,243,140,0.18)',  border: '#5ef38c' };
const KEYWORD_HL = { bg: 'rgba(186,145,255,0.14)', border: '#ba91ff' };
const FIND_HL    = { bg: 'rgba(255,180,50,0.55)',  border: '#ffb432' };

function DocumentPreview({ finding, sameReq }) {
  const preview = React.useMemo(
    () => generatePreviewText(finding, sameReq),
    [finding.id, (sameReq || []).length]
  );
  const allFindings = React.useMemo(
    () => [finding, ...(sameReq || [])],
    [finding.id, (sameReq || []).length]
  );

  const [fontSize, setFontSize] = React.useState(() => {
    try { return parseFloat(localStorage.getItem('ir:preview:font')) || 12; }
    catch { return 12; }
  });
  const [wrap, setWrap] = React.useState(() => {
    try { return localStorage.getItem('ir:preview:wrap') !== 'off'; } catch { return true; }
  });
  const [showHl, setShowHl] = React.useState(() => {
    try { return localStorage.getItem('ir:preview:hl') !== 'off'; } catch { return true; }
  });
  const [height, setHeight] = React.useState(() => {
    try { return parseInt(localStorage.getItem('ir:preview:h'), 10) || 480; }
    catch { return 480; }
  });
  const [findText, setFindText] = React.useState('');
  const [findIdx, setFindIdx] = React.useState(0);
  const [flash, setFlash] = React.useState(null);
  const ping = (m) => { setFlash(m); setTimeout(() => setFlash(null), 1200); };
  React.useEffect(() => { try { localStorage.setItem('ir:preview:font', String(fontSize)); } catch {} }, [fontSize]);
  React.useEffect(() => { try { localStorage.setItem('ir:preview:wrap', wrap ? 'on' : 'off'); } catch {} }, [wrap]);
  React.useEffect(() => { try { localStorage.setItem('ir:preview:hl',   showHl ? 'on' : 'off'); } catch {} }, [showHl]);

  const preRef = React.useRef(null);

  // Custom resize handle — mouse-driven drag below the body.
  // Replaces the CSS `resize: vertical` which was fighting the
  // React render cycle via ResizeObserver.
  const onResizeStart = (e) => {
    e.preventDefault();
    const startY = e.clientY;
    const startH = height;
    let lastH = startH;
    const move = (ev) => {
      const h = Math.max(200, Math.min(2000, startH + (ev.clientY - startY)));
      lastH = h;
      setHeight(h);
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      try { localStorage.setItem('ir:preview:h', String(lastH)); } catch {}
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  };

  const categories = Array.from(new Set(allFindings.map(f => f.category).filter(Boolean)));
  const keywords = React.useMemo(() => {
    const s = new Set();
    for (const c of categories) {
      (CONTEXT_KEYWORDS_MAP[c] || []).forEach(k => s.add(k));
    }
    return Array.from(s);
  }, [categories.join('|')]);

  const segs = React.useMemo(
    () => applyHighlights(preview.body, allFindings, keywords, findText),
    [preview.body, allFindings.length, keywords.length, findText]
  );

  // Find-hit count for the toolbar counter. Resets idx when the
  // query changes.
  const findHitCount = React.useMemo(() => segs.filter(s => s.kind === 'find').length, [segs]);
  React.useEffect(() => { setFindIdx(0); }, [findText]);

  // Scroll the current find-hit into view when idx or query change.
  React.useEffect(() => {
    if (!findHitCount) return;
    const el = preRef.current && preRef.current.querySelector('[data-find-idx="' + findIdx + '"]');
    if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, [findIdx, findHitCount]);

  const download = () => {
    const lines = [];
    if (preview.headers) {
      for (const [k, v] of Object.entries(preview.headers)) lines.push(`${k}: ${v}`);
      lines.push('');
    }
    lines.push(preview.body);
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `finding-${finding.id}-preview.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    ping('Downloaded');
  };

  const copyBody = () => {
    const lines = [];
    if (preview.headers) {
      for (const [k, v] of Object.entries(preview.headers)) lines.push(`${k}: ${v}`);
      lines.push('');
    }
    lines.push(preview.body);
    try {
      navigator.clipboard.writeText(lines.join('\n'));
      ping('Copied to clipboard');
    } catch {
      ping('Copy failed');
    }
  };

  // Copy-as-redacted — replaces every regex-match span with X's of
  // the same length. Handy for pasting into a ticket / handoff
  // without leaking the sensitive value.
  const copyRedacted = () => {
    const redactSpan = (s) => 'X'.repeat(s.length);
    const redacted = segs.map(s => s.kind === 'match' ? redactSpan(s.text) : s.text).join('');
    const lines = [];
    if (preview.headers) {
      for (const [k, v] of Object.entries(preview.headers)) lines.push(`${k}: ${v}`);
      lines.push('');
    }
    lines.push(redacted);
    try {
      navigator.clipboard.writeText(lines.join('\n'));
      ping('Copied redacted');
    } catch {
      ping('Copy failed');
    }
  };

  // Rescan — stuff the raw body into c2:livescan-text and open
  // the admin console. Lets the analyst re-run siphon-api's
  // detection pipeline with trace=on and verify what fires.
  const sendToLiveScan = () => {
    try { localStorage.setItem('c2:livescan-text', preview.body); } catch {}
    window.open('siphon-c2.html', '_blank');
    ping('Opened admin console');
  };

  const kindIcon = {
    email: '✉', slack: '💬', print: '🖨', file: '📄', api: '⟨/⟩', text: '☰',
  }[preview.kind] || '☰';
  const kindLabel = {
    email: preview.direction === 'outbound' ? 'Email · outbound' : 'Email · inbound',
    slack: 'Slack · direct message',
    print: 'Print job',
    file: 'File upload',
    api: 'API payload',
    text: 'Text',
  }[preview.kind] || preview.kind;

  const matchCount = segs.filter(s => s.kind === 'match').length;
  const keywordCount = segs.filter(s => s.kind === 'keyword').length;

  // Larger square toolbar button — 32×32 for icons, keeps the
  // rails legible at a glance.
  const ToolBtn = ({ onClick, title, active, children, danger, wide }) => (
    <button
      onClick={onClick}
      title={title}
      style={{
        background: active ? 'var(--accent-wash)' : 'transparent',
        color: danger ? 'var(--red)' : active ? 'var(--accent)' : 'var(--ink-bright)',
        border: '1px solid ' + (active ? 'var(--accent)' : 'var(--line-strong)'),
        width: wide ? 'auto' : 32, height: 32,
        padding: wide ? '0 10px' : 0,
        fontSize: 14, fontFamily: "'JetBrains Mono', monospace", fontWeight: 500,
        borderRadius: 'var(--radius)',
        cursor: 'pointer', lineHeight: 1,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      }}>
      {children}
    </button>
  );

  return (
    <div className="box" style={{overflow:'hidden'}}>
      <div className="box-title">
        <span className="t">
          Document preview
          <span className="muted" style={{fontWeight:400, marginLeft:10, fontSize:11}}>
            synthesised · future /v1/findings/{'{'}id{'}'}/payload will serve the real capture
          </span>
        </span>
        <span className="k" style={{display:'flex', alignItems:'center', gap:8}}>
          <span className="mono" style={{fontSize:11, color:'var(--ink-soft)'}}>
            {preview.size.toLocaleString()} bytes
          </span>
          {flash && (
            <span className="mono" style={{fontSize:10.5, color:'var(--safe)', marginLeft:4}}>
              ✓ {flash}
            </span>
          )}
        </span>
      </div>

      {/* ── TOP EDGE — metadata strip ──────────────────────────── */}
      <div style={{
        display:'flex', alignItems:'center', gap:14,
        padding:'10px 14px', borderBottom:'1px solid var(--line-soft)',
        background:'var(--bg-2)', flexWrap:'wrap',
      }}>
        <span style={{fontSize:20, lineHeight:1}}>{kindIcon}</span>
        <span className="chip chip--ghost" style={{fontSize:10}}>{kindLabel}</span>
        {preview.headers && Object.entries(preview.headers).map(([k, v]) => (
          <span key={k} style={{display:'inline-flex', alignItems:'baseline', gap:5}}>
            <span className="muted mono" style={{fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.08em'}}>{k}</span>
            <span className="mono" style={{fontSize:11.5, color:'var(--ink-bright)'}}>{String(v)}</span>
          </span>
        ))}
      </div>

      {/* ── SECONDARY TOOLBAR — find + actions ──────────────────
          Brings in-document actions inside the preview window
          itself. Find navigates through matches; the three action
          buttons replace the equivalents that used to live in
          the How panel for preview-scoped work. */}
      <div style={{
        display:'flex', alignItems:'center', gap:10,
        padding:'8px 12px', borderBottom:'1px solid var(--line-soft)',
        background:'var(--bg-2)', flexWrap:'wrap',
      }}>
        {/* Find input */}
        <div style={{
          display:'flex', alignItems:'center', gap:6,
          padding:'3px 8px',
          background:'var(--bg-1)', border:'1px solid var(--line-strong)',
          borderRadius:'var(--radius)', minWidth:240, flex:'0 1 320px',
        }}>
          <span className="muted mono" style={{fontSize:11}}>⌕</span>
