<script type="text/babel" data-presets="react">
/* ===== lib/siphon-api.jsx ===== */
// Shared fetch helper used by every surface that pulls live data from
// siphon-api. URL is shared with Live Scan / Corpus Runner via the
// `c2:apiUrl` localStorage key.

window.SIPHON_API_URL = function() {
  try { return localStorage.getItem('c2:apiUrl') || 'http://127.0.0.1:8080'; }
  catch { return 'http://127.0.0.1:8080'; }
};

// React hook. Returns { loading, data, error, refetch, source }.
// `source` is 'live' | 'offline' | 'loading' — useful for the live chip.
window.useSiphonApi = function(path, deps) {
  const [tick, setTick] = React.useState(0);
  const [state, setState] = React.useState({ loading: true, data: null, error: null });
  React.useEffect(() => {
    let cancelled = false;
    setState(s => ({ ...s, loading: true, error: null }));
    const url = window.SIPHON_API_URL().replace(/\/$/, '') + path;
    fetch(url, { method: 'GET' })
      .then(async r => {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0, 200));
        return r.json();
      })
      .then(data => { if (!cancelled) setState({ loading: false, data, error: null }); })
      .catch(e => { if (!cancelled) setState({ loading: false, data: null, error: String(e.message || e) }); });
    return () => { cancelled = true; };
  }, [...(deps || []), tick]);

  const source = state.loading ? 'loading' : state.error ? 'offline' : 'live';
  return { ...state, source, refetch: () => setTick(t => t + 1) };
};

// Small chip rendered in page-head actions to signal live vs. fixture data.
window.LivePill = function LivePill({ source, onClick, title }) {
  const map = { live:'safe', offline:'red', loading:'warn', fixture:'ghost' };
  const label = { live:'LIVE', offline:'OFFLINE', loading:'LOADING…', fixture:'FIXTURE' }[source] || source;
  return (
    <span
      className={`chip chip--${map[source] || 'ghost'}`}
      onClick={onClick}
      title={title || ''}
      style={{cursor: onClick ? 'pointer' : 'default'}}>
      {label}
    </span>
  );
};

// Badge for surfaces (or sections) that aren't wired to real data yet.
// When `full` is true, returns a bigger "FIXTURE · design-only" banner
// intended for the page-head of entirely-fictional surfaces, plus a
// style wrapper hook the caller can spread onto the root div.
window.FixtureBadge = function FixtureBadge({ small, reason }) {
  return (
    <span
      className="chip chip--warn"
      title={reason || 'No backing data in siphon-api yet — this surface is a design fixture.'}
      style={{
        fontSize: small ? 9 : 10,
        letterSpacing: '0.14em',
        fontWeight: 700,
      }}>
      FIXTURE{reason ? ' · ' + reason : ''}
    </span>
  );
};

// A subtle visual treatment for entirely-fictional surfaces — dashed
// left rule + slightly muted opacity. Applied to the page root via a
// wrapper div so every box inside inherits the same cue.
window.FixtureWrap = function FixtureWrap({ reason, children }) {
  return (
    <div style={{
      position: 'relative',
      borderLeft: '2px dashed var(--amber)',
      paddingLeft: 14,
      marginLeft: -16,
    }}>
      <div style={{
        position: 'absolute', top: 0, left: -2,
        background: 'var(--amber-wash)',
        borderLeft: '2px solid var(--amber)',
        padding: '4px 10px',
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 9,
        letterSpacing: '0.14em',
        fontWeight: 700,
        color: 'var(--amber)',
        textTransform: 'uppercase',
        pointerEvents: 'none',
        zIndex: 2,
      }}>
        FIXTURE · {reason || 'design-only'}
      </div>
      <div style={{paddingTop: 22}}>{children}</div>
    </div>
  );
};

// ── Contextual help (early definition) ─────────────────────────
// HelpIcon and HelpModal were originally defined in a late script
// block (with the docs viewer) but are referenced in JSX by surfaces
// in earlier blocks. We define them here so the identifier resolves
// no matter which block's JSX runs first. The HELP_MAP is populated
// later; when a HelpIcon has topic="..." and the map entry doesn't
// exist yet at import time, the click handler reads it fresh.

window.__c2_help_listeners = window.__c2_help_listeners || new Set();
window.openHelp = function(path, opts) {
  window.__c2_help_current = { path, title: (opts && opts.title) || null };
  window.__c2_help_listeners.forEach(fn => { try { fn(); } catch {} });
};
window.closeHelp = function() {
  window.__c2_help_current = null;
  window.__c2_help_listeners.forEach(fn => { try { fn(); } catch {} });
};

function HelpIcon({ path, title, topic, size }) {
  const enabled = window.useFeatureFlag ? window.useFeatureFlag('help_icons') : true;
  if (!enabled) return null;
  const resolved = path || (topic && window.HELP_MAP && window.HELP_MAP[topic]);
  if (!resolved) return null;
  return (
    <span
      onClick={(e) => { e.stopPropagation(); window.openHelp(resolved, { title }); }}
      title={`open help · ${title || resolved}`}
      style={{
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        width: size || 16, height: size || 16, marginLeft:6,
        fontFamily:"'JetBrains Mono', monospace", fontSize: (size || 16) - 5,
        fontWeight: 700,
        border:'1px solid var(--line-strong)', borderRadius:'50%',
        color:'var(--ink-soft)', background:'var(--bg-3)',
        cursor:'pointer',
        verticalAlign:'middle',
      }}>
      ?
    </span>
  );
}

function HelpModal() {
  const [, setTick] = React.useState(0);
  React.useEffect(() => {
    const fn = () => setTick(t => t + 1);
    window.__c2_help_listeners.add(fn);
    return () => window.__c2_help_listeners.delete(fn);
  }, []);
  const st = window.__c2_help_current;
  const cur = window.useSiphonApi(
    st ? `/v1/docs/content?path=${encodeURIComponent(st.path)}` : '/v1/docs/content?path=',
    [st && st.path]
  );
  if (!st) return null;
  const content = (cur.data && cur.data.content) || '';
  return (
    <div
      onClick={window.closeHelp}
      style={{
        position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
        zIndex: 500, display:'flex', alignItems:'flex-start', justifyContent:'center',
        padding:'56px 24px',
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width:'100%', maxWidth: 880, maxHeight:'calc(100vh - 112px)',
          background:'var(--bg-2)', border:'1px solid var(--accent)',
          borderRadius:'var(--radius)',
          boxShadow:'0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px var(--accent-wash)',
          display:'flex', flexDirection:'column', overflow:'hidden',
        }}>
        <div style={{
          padding:'10px 14px', borderBottom:'1px solid var(--line-strong)',
          display:'flex', gap:10, alignItems:'center',
          background:'var(--bg-topbar)',
        }}>
          <span className="chip chip--safe" style={{fontSize:9}}>HELP</span>
          <span className="mono" style={{fontSize:11, color:'var(--ink-soft)'}}>{st.path}</span>
          <span style={{flex:1}} />
          <button
            className="btn ghost"
            onClick={() => { window.closeHelp(); window.__c2_go && window.__c2_go('docs'); setTimeout(() => window.__c2_open_doc && window.__c2_open_doc(st.path), 50); }}>
            Open in Docs →
          </button>
          <button className="btn" onClick={window.closeHelp}>Close</button>
        </div>
        <div style={{padding:'16px 20px', overflow:'auto', fontSize:13, lineHeight:1.7, color:'var(--ink)'}}>
          {cur.loading && !content && <div className="muted" style={{textAlign:'center', padding:20}}>loading…</div>}
          {cur.error && (
            <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)'}}>
              <b>Error:</b> {cur.error}
            </div>
          )}
          {content && (
            <div dangerouslySetInnerHTML={{ __html: window.renderMarkdown ? window.renderMarkdown(content) : content }} />
          )}
        </div>
      </div>
    </div>
  );
}

window.HelpIcon = HelpIcon;
window.HelpModal = HelpModal;
</script>

// siphon-api directly — there's no local fleet/tenant/pod fiction.

function fmtUptime(s) {
  if (s == null) return '—';
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  return Math.floor(s/86400) + 'd ' + Math.floor((s%86400)/3600) + 'h';
}

// Aggregate findings by a string key (category / sub_category / severity).
function aggregateByKey(findings, key) {
  const by = {};
  findings.forEach(f => {
    const k = f[key] || '(none)';
    by[k] = (by[k] || 0) + 1;
  });
  return Object.entries(by).sort((a, b) => b[1] - a[1]);
}

// Derive a per-minute findings sparkline from the ring. Returns an
// array of 10 buckets ending at "now", newest last.
function findingsSparkline(findings, buckets = 20, windowMinutes = 10) {
  const now = Date.now();
  const bucketMs = (windowMinutes * 60 * 1000) / buckets;
  const data = new Array(buckets).fill(0);
  findings.forEach(f => {
    const t = new Date(f.ts).getTime();
    if (isNaN(t)) return;
    const delta = now - t;
    if (delta < 0 || delta > windowMinutes * 60 * 1000) return;
    const idx = buckets - 1 - Math.floor(delta / bucketMs);
    if (idx >= 0 && idx < buckets) data[idx]++;
  });
  return data;
}

// Bucket findings into N buckets covering `windowMin` minutes back
// from now. For each bucket returns { count, confSum, red, warn, safe }.
// Used by the KPI sparklines and the density heatmap.
function bucketFindings(findings, buckets, windowMin) {
  const now = Date.now();
  const windowMs = windowMin * 60 * 1000;
  const bucketMs = windowMs / buckets;
  const out = Array.from({ length: buckets }, () => ({ count: 0, confSum: 0, red: 0, warn: 0, safe: 0 }));
  (findings || []).forEach(f => {
    const t = new Date(f.ts).getTime();
    if (isNaN(t)) return;
    const delta = now - t;
    if (delta < 0 || delta > windowMs) return;
    const idx = buckets - 1 - Math.floor(delta / bucketMs);
    if (idx < 0 || idx >= buckets) return;
    const b = out[idx];
    b.count++;
    b.confSum += (f.confidence || 0);
    const sev = f.severity === 'red' ? 'red' : f.severity === 'warn' ? 'warn' : 'safe';
    b[sev]++;
  });
  return out;
}

// Tiny inline sparkline renderer — emits an SVG polyline.
// Named MiniSpark (not Spark) to avoid colliding with the richer
// HI-FI Spark component later in the file which takes { series } as
// props. When two function declarations in separate script blocks
// share a name the later one overrides globally, and a <Spark data=…>
// call would land on the HI-FI version expecting series.
function MiniSpark({ data, height, color }) {
  const safe = Array.isArray(data) && data.length ? data : [0];
  const max = Math.max(1, ...safe);
  const h = height || 30;
  const points = safe.map((v, i) => `${(i / Math.max(1, safe.length - 1)) * 100},${h - (v / max) * h}`).join(' ');
  const fill = color || 'var(--accent)';
  return (
    <svg viewBox={`0 0 100 ${h}`} preserveAspectRatio="none" style={{width:'100%', height:h, display:'block'}}>
      <polyline points={points} fill="none" stroke={fill} strokeWidth="1.5"/>
    </svg>
  );
}

// KPI tile — big value, sparkline on the right, delta below. The
// caller supplies everything pre-computed so the tile stays dumb.
// Bucket the 127 real categories into the 6 high-level groups the
// hi-fi dashboard renders (PCI · PII · CRED · PHI · SECRET ·
// CLASSIFIED). Anything that doesn't match falls through to OTHER.
const CAT_GROUPS = ['PCI','PII','CRED','PHI','SECRET','CLASSIFIED','OTHER'];
const CAT_GROUP_COLOR = {
  PCI:        'var(--red)',
  PII:        'var(--cyan)',
  CRED:       'var(--amber)',
  PHI:        'var(--violet)',
  SECRET:     'var(--magenta)',
  CLASSIFIED: 'var(--ink-bright)',
  OTHER:      'var(--ink-soft)',
};
function catGroup(category) {
  const c = (category || '').toLowerCase();
  if (c.includes('credit card') || c.includes('primary account') || c.includes('iban') || c.includes('bank')) return 'PCI';
  if (c.includes('medical') || c.includes('health') || c.includes('phi')) return 'PHI';
  if (c.includes('cloud provider secret') || c.includes('code platform secret')) return 'CRED';
  if (c.includes('generic secret') || c.includes('private key') || c.includes('token')) return 'SECRET';
  if (c.includes('classif') || c.includes('marking')) return 'CLASSIFIED';
  if (c.includes('personal') || c.includes('contact') || c.includes('national id') || c.includes('identifier')) return 'PII';
  return 'OTHER';
}

// Availability · Coverage · Efficacy band — three executive-level
// SLO numbers in one thin strip above the KPI tiles. Each value is
// honest: derived from a real signal, or marked `—` when there's no
// source available.
function SloBand({ metrics, findings, source }) {
  const m = metrics || {};
  const f = findings || [];
  const scans = m.scans_total || 0;
  const errors = m.scan_errors_total || 0;

  // ── Availability: share of scans that did NOT return an error.
  // When the process has served scans, this is a real signal. When
  // it hasn't, we can still report liveness from the source pill.
  const availability = scans > 0 ? (1 - errors / scans) * 100 : (source === 'live' ? 100 : null);
  const availColor = availability == null ? 'var(--ink-soft)'
    : availability >= 99.9 ? 'var(--safe)'
    : availability >= 99   ? 'var(--amber)'
    : 'var(--red)';

  // ── Coverage: unique categories that have actually fired in the
  // ring vs the total categories loaded in siphon-core. Measures
  // "how much of the pattern space is the current traffic exercising".
  const seenCats = new Set(f.map(x => x.category).filter(Boolean));
  const coverage = m.categories_loaded
    ? (seenCats.size / m.categories_loaded) * 100
    : null;

  // ── Efficacy: recall against a labelled corpus. We don't persist
  // corpus-run results server-side yet so this is intentionally
  // blank with a deep-link to Corpus Runner where you can measure
  // it manually. Honest > fabricated.
  return (
    <div style={{
      display:'grid',
      gridTemplateColumns:'1.2fr 1.2fr 1.6fr auto',
      gap: 40,
      padding:'14px 20px',
      marginBottom:'var(--gap)',
      background:'var(--bg-panel)',
      border:'1px solid var(--line)',
      borderLeft:'3px solid var(--accent)',
      borderRadius:'var(--radius)',
      alignItems:'center',
    }}>
      <div>
        <span className="label" style={{marginRight:10}}>AVAILABILITY</span>
        <span style={{
          fontFamily:"'Space Grotesk', sans-serif",
          fontWeight:600, fontSize:24, letterSpacing:'-0.01em',
          color: availColor,
        }}>
          {availability == null ? '—' : availability.toFixed(3) + '%'}
        </span>
        <span className="muted mono" style={{marginLeft:8, fontSize:11}}>
          {scans > 0 ? errors + ' err / ' + scans + ' scans' : 'no scans yet'}
        </span>
      </div>
      <div>
        <span className="label" style={{marginRight:10}}>COVERAGE</span>
        <span style={{
          fontFamily:"'Space Grotesk', sans-serif",
          fontWeight:600, fontSize:24, letterSpacing:'-0.01em',
          color: coverage == null ? 'var(--ink-soft)' : 'var(--cyan)',
        }}>
          {coverage == null ? '—' : coverage.toFixed(1) + '%'}
        </span>
        <span className="muted mono" style={{marginLeft:8, fontSize:11}}>
          {seenCats.size} / {m.categories_loaded != null ? m.categories_loaded : '—'} categories observed
        </span>
      </div>
      <div>
        <span className="label" style={{marginRight:10}}>EFFICACY</span>
        <span style={{
          fontFamily:"'Space Grotesk', sans-serif",
          fontWeight:600, fontSize:24, letterSpacing:'-0.01em',
          color:'var(--ink-soft)',
        }}>—</span>
        <span className="muted mono" style={{marginLeft:8, fontSize:11}}>
          recall needs a corpus run ·{' '}
          <a onClick={() => window.__c2_go && window.__c2_go('corpusrun')}
             style={{color:'var(--accent)', cursor:'pointer', textDecoration:'underline'}}>
            open Corpus Runner
          </a>
        </span>
      </div>
      <button
        className="btn ghost"
        onClick={() => window.openHelp && window.openHelp('docs/enterprise/observability.md', { title: 'SLOs & observability' })}
        title="what these three mean"
        style={{whiteSpace:'nowrap'}}>
        SLO help →
      </button>
    </div>
  );
}

function KpiTile({ label, value, series, delta, color, formatDelta }) {
  const up = typeof delta === 'number' ? delta > 0 : (delta || '').toString().trim().startsWith('+');
  const down = typeof delta === 'number' ? delta < 0 : (delta || '').toString().trim().startsWith('-') || (delta || '').toString().trim().startsWith('−');
  const deltaText = formatDelta
    ? formatDelta(delta)
    : (typeof delta === 'number' ? (delta > 0 ? '+' : '') + delta.toFixed(1) + '%' : delta || '—');
  return (
    <div className="box" style={{padding:'16px 18px'}}>
      <div className="s-label" style={{marginBottom:10}}>{label}</div>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
        <div style={{
          color: color || 'var(--ink-bright)',
          fontFamily: "'Space Grotesk', 'JetBrains Mono', sans-serif",
          fontWeight: 600,
          fontSize: 42,
          lineHeight: 1,
          letterSpacing: '-0.02em',
          whiteSpace: 'nowrap',
          overflow: 'hidden',
          textOverflow: 'ellipsis',
        }}>{value}</div>
        <div style={{flex:'0 0 110px'}}>
          <MiniSpark data={series} height={34} color={color || 'var(--accent)'} />
        </div>
      </div>
      <div className="s-delta" style={{marginTop:8, color: up ? 'var(--safe)' : down ? 'var(--red)' : 'var(--ink-soft)'}}>
        {deltaText}
      </div>
    </div>
  );
}

function DashV1_Ops_Local() {
  // === The single Operations dashboard for siphon-c2.html ===
  //
  // Layout (top → bottom):
  //   1. metrics strip (scans / findings / errors / uptime)
  //   2. full-width Recent findings list
  //   3. Inputs → Detection → Outputs topology
  //   4. Detection histogram (by category · live)
  //
  // Everything is derived from /v1/metrics + /v1/findings +
  // /v1/integrations. No audit panel, no fleet, no tenants.
  const mx = window.useSiphonApi('/v1/metrics');
  const fx = window.useSiphonApi('/v1/findings?limit=500');
  const ix = window.useSiphonApi('/v1/integrations');

  const autorefresh = window.useFeatureFlag ? window.useFeatureFlag('dashboard_autorefresh') : true;
  React.useEffect(() => {
    if (!autorefresh) return;
    const t = setInterval(() => { mx.refetch(); fx.refetch(); ix.refetch(); }, 5000);
    return () => clearInterval(t);
  }, [autorefresh]);

  const m = mx.data || {};
  const findings = (fx.data && fx.data.findings) || [];
  const sparkData = findingsSparkline(findings, 20, 10);

  // ── KPI strip values ──────────────────────────────────────────
  // Findings/min: buckets of 20s each for 20 minutes, the last 3
  // buckets (=60s) summed gives the per-minute rate.
  const fpmBuckets = bucketFindings(findings, 20, 20);
  const fpmSeries = fpmBuckets.map(b => b.count);
  const findingsPerMin = fpmSeries.slice(-3).reduce((a, b) => a + b, 0); // last 60s
  const fpmPrev = fpmSeries.slice(-6, -3).reduce((a, b) => a + b, 0);
  const fpmDelta = fpmPrev > 0 ? ((findingsPerMin - fpmPrev) / fpmPrev) * 100 : 0;

  // Mean confidence: avg over the ring, plus per-bucket for sparkline.
  const mcBuckets = bucketFindings(findings, 20, 20);
  const mcSeries = mcBuckets.map(b => b.count ? (b.confSum / b.count) * 100 : 0);
  const meanConf = findings.length
    ? (findings.reduce((a, f) => a + (f.confidence || 0), 0) / findings.length) * 100
    : 0;
  const mcPrev = mcSeries.slice(-6, -3).filter(v => v > 0);
  const mcPrevAvg = mcPrev.length ? mcPrev.reduce((a, b) => a + b, 0) / mcPrev.length : 0;
  const mcCur = mcSeries.slice(-3).filter(v => v > 0);
  const mcCurAvg = mcCur.length ? mcCur.reduce((a, b) => a + b, 0) / mcCur.length : meanConf;
  const mcDelta = mcPrevAvg ? (mcCurAvg - mcPrevAvg) : 0;

  // Scans/sec: derived from total counters + uptime. Rolling delta
  // between polls would be more accurate but needs state we don't
  // currently keep in this component.
  const scansPerSec = m.uptime_secs ? (m.scans_total || 0) / m.uptime_secs : 0;

  const overall = [mx.source, fx.source, ix.source].includes('offline') ? 'offline'
    : [mx.source, fx.source, ix.source].every(s => s === 'live') ? 'live' : 'loading';

  // ── Inputs: aggregate findings by source_ip to figure out who's
  // actually calling this siphon-api right now. Top 5.
  const bySource = aggregateByKey(findings, 'source_ip').slice(0, 5);

  // ── Outputs: configured SIEM integrations from /v1/integrations.
  const configuredIntegrations = ((ix.data && ix.data.integrations) || []).filter(i => i.configured);

  return (
    <div className="variant-body">
      {/* ── Live indicator row ───────────────────────────────── */}
      <div style={{marginBottom: 'var(--gap)', display:'flex', gap:8, alignItems:'center'}}>
        <window.LivePill source={overall} onClick={() => { mx.refetch(); fx.refetch(); ix.refetch(); }} />
        <span className="muted mono" style={{fontSize:11}}>
          {window.SIPHON_API_URL()} · {autorefresh ? 'polls every 5s' : 'manual refresh (dashboard_autorefresh=off)'}
        </span>
      </div>

      {/* ── SLO band (Availability · Coverage · Efficacy) ────── */}
      <SloBand metrics={m} findings={findings} source={overall} />

      {/* ── 1 · KPI strip ─────────────────────────────────────── */}
      <div className="grid grid-4" style={{marginBottom: 'var(--gap)'}}>
        <KpiTile
          label="Findings / min"
          value={findingsPerMin}
          series={fpmSeries}
          delta={fpmDelta}
          color="var(--accent)"
        />
        <KpiTile
          label="Errors · total"
          value={m.scan_errors_total != null ? m.scan_errors_total : '—'}
          series={[0, 0, 0, 0]}
          delta={m.scans_total ? ((m.scan_errors_total || 0) / m.scans_total * 100).toFixed(2) + '% rate' : '—'}
          color="var(--red)"
          formatDelta={(d) => d}
        />
        <KpiTile
          label="Mean confidence"
          value={findings.length ? meanConf.toFixed(1) + '%' : '—'}
          series={mcSeries}
          delta={mcDelta}
          color="var(--cyan)"
          formatDelta={(d) => d > 0 ? '+' + d.toFixed(1) + ' pp' : d < 0 ? d.toFixed(1) + ' pp' : '— steady'}
        />
        <KpiTile
          label="Scans / sec"
          value={scansPerSec > 0 ? scansPerSec.toFixed(2) : '—'}
          series={fpmSeries}
          delta={`uptime ${fmtUptime(m.uptime_secs)} · ${m.scans_total != null ? m.scans_total.toLocaleString() : '—'} total`}
          color="var(--violet)"
          formatDelta={(d) => d}
        />
      </div>

      {/* ── 2 · Rich stream table · full width ────────────────── */}
      <StreamTable findings={findings} />


      {/* ── 3 · Ingress → Inspect → Route SVG topology ───────── */}
      <TopologyStrip
        bySource={bySource}
        metrics={m}
        findings={findings}
        integrations={configuredIntegrations}
        live={overall === 'live'}
      />

      {/* ── 4 · Detection histogram (by category, live) ──────── */}
      <DetectionHistogram findings={findings} />
    </div>
  );
}

// Ingress → INSPECT → Route topology. Modelled on the demo's HfTopology
// SVG so the layout scales cleanly and the connectors flow properly.
//
// Inputs are the top source_ips aggregated from /v1/findings.
// The centre INSPECT node is the siphon-api process (live scan rate
// + p95 derived from /v1/metrics). Outputs are configured SIEM
// destinations from /v1/integrations, with per-destination action
// colour (SIEM flag, tokenize vault, block/drop).
function TopologyStrip({ bySource, metrics, findings, integrations, live }) {
  const m = metrics || {};

  // Build a fixed 4-slot input list — pad with placeholders so the
  // layout stays symmetrical even when only one caller is active.
  const inputRaw = (bySource && bySource.length) ? bySource.slice(0, 4) : [];
  while (inputRaw.length < 4) inputRaw.push(null);

  // Same pad treatment for outputs.
  const outRaw = ((integrations && integrations.length) ? integrations : []).slice(0, 4);
  while (outRaw.length < 4) outRaw.push(null);

  // Route actions are derived from integration kind. siphon-api doesn't
  // execute policies on scans so we can't surface a real "action" per
  // finding; we label the route by what the destination would do.
  const kindAction = (kind) => {
    const k = (kind || '').toLowerCase();
    if (!kind) return null;
    if (k.includes('syslog') || k.includes('splunk') || k.includes('elastic') || k.includes('datadog')) return 'flag';
    if (k.includes('webhook') || k.includes('slack')) return 'flag';
    return 'flag';
  };
  const actColor = { flag: 'var(--cyan)', tokenize: 'var(--violet)', block: 'var(--red)' };

  // Compute per-input rate label. findings-per-second derived from ring
  // density over the last 60s if the ip is top of list. Rough, but
  // honest.
  const rateLabel = (count) => count > 0 ? (count >= 1000 ? (count/1000).toFixed(1) + 'k' : count) + '/r' : '—';

  // SVG layout constants
  const VBW = 480, VBH = 240;
  const inBoxW = 112, inBoxH = 30, inBoxX = 14;
  const outBoxW = 118, outBoxH = 30, outBoxX = VBW - outBoxW - 14;
  const INSPECT_X = 180, INSPECT_Y = 110, INSPECT_W = 108, INSPECT_H = 58;
  const inspectL = INSPECT_X, inspectR = INSPECT_X + INSPECT_W;
  const inspectCy = INSPECT_Y + INSPECT_H / 2;

  const scansPerSec = m.uptime_secs ? (m.scans_total || 0) / m.uptime_secs : 0;

  return (
    <div className="box" style={{marginBottom:'var(--gap)'}}>
      <div className="box-title">
        <span className="t">Topology</span>
        <span className="k">INGRESS → INSPECT → ROUTE · live</span>
      </div>
      <svg viewBox={`0 0 ${VBW} ${VBH}`} style={{width:'100%', height:260, display:'block', background:'var(--bg-1)', borderRadius:'var(--radius)', border:'1px solid var(--line-soft)'}}>

// Finding density — 24-hour × 1-hour-bucket heatmap per category
// group (PCI · PII · CRED · PHI · SECRET · CLASSIFIED). One row per
// group, one cell per hour, opacity scaled by density. Reproduces
// the demo's hf-heat layout but reads live /v1/findings.
function DetectionHistogram({ findings }) {
  const BUCKETS = 24;
  const WINDOW_MIN = 24 * 60;

  const rows = React.useMemo(() => {
    // Pre-build an empty per-group × per-bucket matrix so every
    // defined group appears in the heatmap even when idle.
    const zeros = () => Array.from({ length: BUCKETS }, () => 0);
    const matrix = {};
    CAT_GROUPS.forEach(g => { matrix[g] = zeros(); });

    const now = Date.now();
    const bucketMs = (WINDOW_MIN * 60 * 1000) / BUCKETS;
    (findings || []).forEach(f => {
      const t = new Date(f.ts).getTime();
      if (isNaN(t)) return;
      const delta = now - t;
      if (delta < 0 || delta > WINDOW_MIN * 60 * 1000) return;
      const idx = BUCKETS - 1 - Math.floor(delta / bucketMs);
      if (idx < 0 || idx >= BUCKETS) return;
      const g = catGroup(f.category);
      matrix[g][idx]++;
    });
    return CAT_GROUPS.map(g => ({
      group: g,
      buckets: matrix[g],
      total: matrix[g].reduce((a, b) => a + b, 0),
    }));
  }, [findings]);

  const maxCell = Math.max(1, ...rows.flatMap(r => r.buckets));

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Finding density</span>
        <span className="k">by category · last 24h · 1h buckets · {(findings || []).length} in ring</span>
        <span style={{marginLeft:'auto', display:'flex', gap:8, flexWrap:'wrap', fontFamily:"'JetBrains Mono', monospace", fontSize:10}}>
          {CAT_GROUPS.filter(g => g !== 'OTHER').map(g => (
            <span key={g} style={{display:'inline-flex', alignItems:'center', gap:4, color:'var(--ink-soft)'}}>
              <i style={{display:'inline-block', width:10, height:10, background: CAT_GROUP_COLOR[g], borderRadius:2}} />
              {g}
            </span>
          ))}
        </span>
      </div>

      {rows.every(r => r.total === 0) ? (
        <div className="muted" style={{padding:30, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
          — no findings in the last 24h —
        </div>
      ) : (
        <div style={{padding:'8px 0'}}>
          {rows.map(row => (
            <div key={row.group} style={{display:'grid', gridTemplateColumns:'90px 1fr 60px', alignItems:'center', gap:10, marginBottom:4}}>
              <div style={{
                fontFamily:"'JetBrains Mono', monospace",
                fontSize:11,
                fontWeight:600,
                color: CAT_GROUP_COLOR[row.group],
              }}>
                {row.group}
              </div>
              <div style={{display:'flex', gap:1, height:14}}>
                {row.buckets.map((v, i) => {
                  const opacity = v === 0 ? 0.08 : Math.max(0.12, v / maxCell);
                  return (
                    <div
                      key={i}
                      title={`${v} finding${v === 1 ? '' : 's'} in hour bucket ${i}`}
                      style={{
                        flex: 1,
                        background: CAT_GROUP_COLOR[row.group],
                        opacity,
                        borderRadius: 1,
                      }}
                    />
                  );
                })}
              </div>
              <div className="mono" style={{textAlign:'right', fontSize:11.5, color: row.total > 0 ? 'var(--ink)' : 'var(--ink-dim)'}}>
                {row.total}
              </div>
            </div>
          ))}
          {/* Hour axis */}
          <div style={{display:'grid', gridTemplateColumns:'90px 1fr 60px', alignItems:'center', gap:10, marginTop:8}}>
            <div />
            <div style={{display:'flex', gap:1, fontFamily:"'JetBrains Mono', monospace", fontSize:9, color:'var(--ink-dim)'}}>
              {Array.from({length: BUCKETS}).map((_, i) => (
                <span key={i} style={{flex:1, textAlign:'center'}}>
                  {i % 6 === 0 ? i + ':00' : '·'}
                </span>
              ))}
            </div>
            <div />
          </div>
        </div>
      )}
    </div>
  );
}

  const configuredIntegrations = ((ix.data && ix.data.integrations) || []).filter(i => i.configured);
  const byCategory = aggregateByKey(findings, 'category').slice(0, 6);
  const maxCatCount = byCategory.length ? byCategory[0][1] : 1;

  // Map ring categories to frameworks by substring match against the
  // framework's failing_categories. For each framework, how many ring
  // findings currently land in one of its fail-triggering categories.
  const fwHits = frameworks.map(fw => {
    const failSet = (fw.failing_categories || []).map(s => s.toLowerCase());

    return { ...fw, hits: hits.length };

  const patternDensity = m.categories_loaded ? (m.patterns_loaded || 0) / m.categories_loaded : 0;

// Findings-density histogram — bucketed per-minute counts with a severity

// Display-only helper — pull HH:MM:SS out of an ISO timestamp, or the raw

function fmtWallClock(iso) {
  if (!iso) return '—';

  if (isNaN(d.getTime())) return iso;
  return String(d.getHours()).padStart(2,'0') + ':'
       + String(d.getMinutes()).padStart(2,'0') + ':'
       + String(d.getSeconds()).padStart(2,'0');
}

// ── FP queue ─────────────────────────────────────────────────
// Findings that an analyst flagged as potential false positives are
// stored in localStorage.c2:fp-queue so they're reviewable in one
// place and survive reloads. Each entry is { finding, flaggedAt,
// status, note }.
window.c2FpQueue = function() {
  try { return JSON.parse(localStorage.getItem('c2:fp-queue') || '[]'); }
  catch { return []; }
};
window.useFpQueue = function() {
  const [q, setQ] = React.useState(window.c2FpQueue());
  React.useEffect(() => {
    const poll = setInterval(() => setQ(window.c2FpQueue()), 500);
    const h = (e) => { if (e.key === 'c2:fp-queue') setQ(window.c2FpQueue()); };
    window.addEventListener('storage', h);
    return () => { clearInterval(poll); window.removeEventListener('storage', h); };
  }, []);
  return q;
};
window.c2FpQueueAdd = function(finding, note) {
  const q = window.c2FpQueue();
  // Dedup by finding id — re-flagging bumps the entry's flaggedAt.
  const filtered = q.filter(e => !e.finding || e.finding.id !== finding.id);
  filtered.unshift({
    finding,
    flaggedAt: new Date().toISOString(),
    status: 'open',
    note: note || '',
  });
  try { localStorage.setItem('c2:fp-queue', JSON.stringify(filtered.slice(0, 200))); } catch {}
};
window.c2FpQueueRemove = function(findingId) {
  const q = window.c2FpQueue().filter(e => !e.finding || e.finding.id !== findingId);
  try { localStorage.setItem('c2:fp-queue', JSON.stringify(q)); } catch {}
};
window.c2FpQueueSetStatus = function(findingId, status, note) {
  const q = window.c2FpQueue().map(e => {
    if (!e.finding || e.finding.id !== findingId) return e;
    return { ...e, status, note: note != null ? note : e.note };
  });
  try { localStorage.setItem('c2:fp-queue', JSON.stringify(q)); } catch {}
};

// Advanced search parser.
// Supports space-separated tokens, each of which is either:
//   - free text        → substring match across text, category,
//                        sub_category, source_ip, id, request_id
//   - `id:XYZ`         → id contains XYZ (case-insensitive)
//   - `sev:red`        → severity is red|warn|safe
//   - `cat:PCI`        → category group (PCI, PII, CRED, PHI, SECRET,
//                        CLASSIFIED, OTHER) — uses catGroup()
//   - `sub:visa`       → sub_category contains visa (case-insens.)
//   - `source:1.2.3.4` → source_ip contains
//   - `conf:>0.9`      → confidence > 0.9 (also <, >=, <=, =)
//   - `conf:0.7..0.95` → inclusive range
// Returns a function f → boolean.
function parseFindingQuery(raw) {
  const q = (raw || '').trim();
  if (!q) return () => true;
  const tokens = q.match(/"[^"]*"|\S+/g) || [];
  const predicates = [];
  const cmpNum = (op, lhs, rhs) => {
    switch (op) {
      case '>':  return lhs > rhs;
      case '<':  return lhs < rhs;
      case '>=': return lhs >= rhs;
      case '<=': return lhs <= rhs;
      case '=':  return lhs === rhs;
      default:   return false;
    }
  };
  for (const rawTok of tokens) {
    const tok = rawTok.replace(/^"(.*)"$/, '$1');
    const colon = tok.indexOf(':');
    if (colon > 0) {
      const key = tok.slice(0, colon).toLowerCase();
      const val = tok.slice(colon + 1);
      if (key === 'id')         predicates.push(f => (f.id || '').toLowerCase().includes(val.toLowerCase()));
      else if (key === 'sev')   predicates.push(f => (f.severity || '') === val.toLowerCase());
      else if (key === 'cat')   predicates.push(f => catGroup(f.category) === val.toUpperCase());
      else if (key === 'sub')   predicates.push(f => (f.sub_category || '').toLowerCase().includes(val.toLowerCase()));
      else if (key === 'source') predicates.push(f => (f.source_ip || '').toLowerCase().includes(val.toLowerCase()));
      else if (key === 'req')   predicates.push(f => (f.request_id || '').toLowerCase().includes(val.toLowerCase()));
      else if (key === 'conf') {
        const range = val.match(/^([0-9]*\.?[0-9]+)\.\.([0-9]*\.?[0-9]+)$/);
        if (range) {
          const lo = parseFloat(range[1]), hi = parseFloat(range[2]);
          predicates.push(f => typeof f.confidence === 'number' && f.confidence >= lo && f.confidence <= hi);
        } else {
          const m = val.match(/^(>=|<=|>|<|=)?([0-9]*\.?[0-9]+)$/);
          if (m) {
            const op = m[1] || '=';
            const n = parseFloat(m[2]);
            predicates.push(f => typeof f.confidence === 'number' && cmpNum(op, f.confidence, n));
          }
        }
      } else {
        // unknown prefix → fall back to substring match across the whole token
        const needle = tok.toLowerCase();
        predicates.push(f => (f.text + ' ' + (f.category || '') + ' ' + (f.sub_category || '') + ' ' + (f.source_ip || '') + ' ' + (f.id || ''))
          .toLowerCase().includes(needle));
      }
    } else {
      const needle = tok.toLowerCase();
      predicates.push(f => (f.text + ' ' + (f.category || '') + ' ' + (f.sub_category || '') + ' ' + (f.source_ip || '') + ' ' + (f.id || '') + ' ' + (f.request_id || ''))
        .toLowerCase().includes(needle));
    }
  }
  return (f) => predicates.every(p => p(f));
}

// Timeframes for the stream console header. `ms: null` means "no
// window constraint" — i.e. show everything in the ring regardless of
// age. Custom timeframes are not yet wired.
const STREAM_TIMEFRAMES = [
  { id: '15m', label: '15m', ms: 15 * 60 * 1000 },
  { id: '1h',  label: '1h',  ms: 60 * 60 * 1000 },
  { id: '24h', label: '24h', ms: 24 * 60 * 60 * 1000 },
  { id: '7d',  label: '7d',  ms: 7 * 24 * 60 * 60 * 1000 },
  { id: '30d', label: '30d', ms: 30 * 24 * 60 * 60 * 1000 },
  { id: 'all', label: 'All', ms: null },
];

function Stream({ go }) {
  const [search, setSearch] = React.useState('');
  const [severity, setSeverity] = React.useState('any');
  const [category, setCategory] = React.useState('any');
  const [subCategory, setSubCategory] = React.useState('any');
  const [source, setSource] = React.useState('any');
  const [groupBy, setGroupBy] = React.useState('none');
  const [paused, setPaused] = React.useState(false);
  const [tf, setTf] = React.useState('24h');
  const [advOpen, setAdvOpen] = React.useState(false);
  const [page, setPage] = React.useState(0);
  const [pageSize, setPageSize] = React.useState(25);

  // Reset to the first page whenever the effective filter changes.
  React.useEffect(() => { setPage(0); }, [search, severity, category, subCategory, source, groupBy, tf, pageSize]);

  const fx = window.useSiphonApi('/v1/findings?limit=500');
  // Live tail — refetch every 2s unless paused.
  React.useEffect(() => {
    if (paused) return;
    const t = setInterval(() => fx.refetch(), 2000);
    return () => clearInterval(t);
  }, [paused]);

  const all = (fx.data && fx.data.findings) || [];
  const tfMeta = STREAM_TIMEFRAMES.find(x => x.id === tf) || STREAM_TIMEFRAMES[2];

  const inWindow = React.useMemo(() => {
    if (tfMeta.ms == null) return all;
    const cutoff = Date.now() - tfMeta.ms;
    return all.filter(f => {
      const t = new Date(f.ts).getTime();
      return isNaN(t) || t >= cutoff;
    });
  }, [all, tfMeta]);

  const queryPredicate = React.useMemo(() => parseFindingQuery(search), [search]);
  const filtered = inWindow.filter(f =>
    (severity === 'any' || f.severity === severity) &&
    (category === 'any' || f.category === category) &&
    (subCategory === 'any' || f.sub_category === subCategory) &&
    (source === 'any' || f.source_ip === source) &&
    queryPredicate(f)
  );

  // Sparkline for the header — matching-count per bucket over the
  // active timeframe. 30 buckets.
  const headerSpark = React.useMemo(() => {
    const buckets = 30;
    const windowMs = tfMeta.ms || (24 * 60 * 60 * 1000);
    const now = Date.now();
    const bucketMs = windowMs / buckets;
    const out = new Array(buckets).fill(0);
    filtered.forEach(f => {
      const t = new Date(f.ts).getTime();
      if (isNaN(t)) return;
      const delta = now - t;
      if (delta < 0 || delta > windowMs) return;
      const idx = buckets - 1 - Math.floor(delta / bucketMs);
      if (idx >= 0 && idx < buckets) out[idx]++;
    });
    return out;
  }, [filtered, tfMeta]);

  // Pagination — only active when group-by is 'none'. Grouped views
  // show every group's rows inline so paging doesn't make sense there.
  const paginated = groupBy === 'none'
    ? filtered.slice(page * pageSize, page * pageSize + pageSize)
    : filtered;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));

  const groups = (() => {
    if (groupBy === 'none') return [['', paginated]];
    const by = {};
    filtered.forEach(f => {
      const k = f[groupBy] || '(none)';
      (by[k] = by[k] || []).push(f);
    });
    return Object.entries(by).sort((a,b) => b[1].length - a[1].length);
  })();

  // Derive filter options from what's actually in the ring.
  const categories = Array.from(new Set(all.map(f => f.category))).sort();

  const clearFilters = () => {
    setSearch(''); setSeverity('any'); setCategory('any');
    setSubCategory('any'); setSource('any');
    setGroupBy('none'); setTf('24h');
  };
  const exportJson = () => {
    try {
      const blob = new Blob([JSON.stringify(filtered, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `findings-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch {}
  };

  return (
    <div>
      {/* ── Header ─────────────────────────────────────────────── */}
      <div className="page-head" style={{alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <div className="crumbs">Operate · Findings</div>
          <h1 style={{display:'flex', alignItems:'center', gap:12, margin:'3px 0 0'}}>
            Findings stream
            <window.LivePill source={paused ? 'loading' : fx.source} onClick={fx.refetch} title={fx.error || ''} />
            <HelpIcon topic="findings" title="Findings pipeline" size={16} />
          </h1>
          <div className="page-sub mono" style={{fontSize:12, color:'var(--ink-soft)', marginTop:6}}>
            window <b style={{color:'var(--ink-bright)'}}>{tfMeta.label}</b>
            {' · '}
            <b style={{color:'var(--ink-bright)'}}>{filtered.length.toLocaleString()}</b>
            {' of '}
            <b style={{color:'var(--ink-bright)'}}>{inWindow.length.toLocaleString()}</b>
            {' findings match'}
            {fx.data && (
              <>
                {' · ring '}
                <span style={{color:'var(--ink-faint)'}}>{fx.data.total}/{fx.data.capacity}</span>
              </>
            )}
          </div>
        </div>
        <div className="actions" style={{alignItems:'center'}}>
          <button
            className={paused ? 'btn' : 'btn primary'}
            onClick={() => setPaused(p => !p)}>
            {paused ? '▶ Resume' : '❙❙ Pause'}
          </button>
          <button className="btn ghost" onClick={clearFilters} title="reset search + filters + timeframe">Clear</button>
          <button className="btn" onClick={exportJson} title="download visible findings as JSON">Export</button>
        </div>
      </div>

      {fx.error && (
        <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)', marginBottom:'var(--gap)'}}>
          <b>Error:</b> {fx.error}
        </div>
      )}

      {/* ── Search row + timeframe tabs + header sparkline ───── */}
      <div className="box" style={{marginBottom:'var(--gap)', padding:'10px 14px'}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr auto auto auto', gap:14, alignItems:'center'}}>
          <div className="tb-search" style={{minWidth: 'auto', flex:'none', width:'100%'}}>
            <span className="mag">⌕</span>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="search match, doc, id, hash, ip   ·   id:F- · sev:red · cat:PCI · conf:>0.9" />
            <span className="kbd">/</span>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span className="label">TIMEFRAME</span>
            <div style={{display:'flex', gap:1, border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', overflow:'hidden'}}>
              {STREAM_TIMEFRAMES.map(t => (
                <button key={t.id}
                  onClick={() => setTf(t.id)}
                  style={{
                    padding:'5px 12px', fontSize:11,
                    fontFamily:"'JetBrains Mono', monospace",
                    border:'none',
                    background: tf === t.id ? 'var(--accent)' : 'transparent',
                    color: tf === t.id ? 'var(--bg-0)' : 'var(--ink)',
                    cursor:'pointer',
                  }}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
          <button
            className="btn ghost"
            onClick={() => setAdvOpen(v => !v)}
            title="show advanced search syntax"
            style={{
              borderStyle:'dashed',
              color: advOpen ? 'var(--accent)' : 'var(--ink)',
              borderColor: advOpen ? 'var(--accent)' : 'var(--line)',
            }}>
            + Advanced search
          </button>
          <div style={{display:'flex', alignItems:'center', gap:8, minWidth:180}}>
            <div style={{flex:1}}>
              <MiniSpark data={headerSpark} height={24} color="var(--accent)" />
            </div>
            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, whiteSpace:'nowrap'}}>
              <span style={{color:'var(--accent)', fontWeight:600}}>{filtered.length}</span>
              <span className="muted"> / {inWindow.length}</span>
            </div>
          </div>
        </div>

        {advOpen && (
          <div style={{marginTop:12, paddingTop:12, borderTop:'1px dashed var(--line-soft)', fontFamily:"'JetBrains Mono', monospace", fontSize:11.5, lineHeight:1.8}}>
            <div className="label" style={{marginBottom:6}}>Advanced search — combine tokens with spaces</div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:'2px 24px'}}>
              <div><span style={{color:'var(--cyan)'}}>id:</span>F- <span className="muted">— match finding id prefix/substring</span></div>
              <div><span style={{color:'var(--cyan)'}}>sev:</span>red <span className="muted">— red · warn · safe</span></div>
              <div><span style={{color:'var(--cyan)'}}>cat:</span>PCI <span className="muted">— PCI · PII · CRED · PHI · SECRET · CLASSIFIED · OTHER</span></div>
              <div><span style={{color:'var(--cyan)'}}>sub:</span>visa <span className="muted">— sub-category contains</span></div>
              <div><span style={{color:'var(--cyan)'}}>source:</span>127.0.0.1 <span className="muted">— source_ip contains</span></div>
              <div><span style={{color:'var(--cyan)'}}>req:</span>a1b2 <span className="muted">— request_id contains</span></div>
              <div><span style={{color:'var(--cyan)'}}>conf:</span>&gt;0.9 <span className="muted">— &gt; &lt; &gt;= &lt;= = accepted</span></div>
              <div><span style={{color:'var(--cyan)'}}>conf:</span>0.7..0.95 <span className="muted">— inclusive range</span></div>
            </div>
            <div className="muted" style={{marginTop:8, fontSize:11}}>
              e.g. <span style={{color:'var(--accent)'}}>cat:PCI sev:red conf:&gt;0.85</span> — all high-confidence PCI reds
            </div>
          </div>
        )}
      </div>

      {/* ── Filter row ─────────────────────────────────────────── */}
      <FilterRow
        severity={severity} setSeverity={setSeverity}
        category={category} setCategory={setCategory}
        subCategory={subCategory} setSubCategory={setSubCategory}
        source={source} setSource={setSource}
        categories={categories}
        groupBy={groupBy} setGroupBy={setGroupBy}
        findings={all}
      />

      <StreamTableBig
        groups={groups}
        groupBy={groupBy}
        loading={fx.loading && all.length === 0}
        empty={!fx.loading && all.length === 0 && !fx.error}
        onOpen={(fid) => go('stream', 'finding:' + fid)}
      />

      {groupBy === 'none' && filtered.length > 0 && (
        <Pagination
          page={page} setPage={setPage}
          pageSize={pageSize} setPageSize={setPageSize}
          total={filtered.length} totalPages={totalPages}
        />
      )}
      {groupBy !== 'none' && filtered.length > 0 && (
        <div className="muted mono" style={{textAlign:'center', padding:'8px 0', fontSize:11}}>
          pagination disabled while grouping · set GROUP BY to none to page through
        </div>
      )}
    </div>
  );
}

function Pagination({ page, setPage, pageSize, setPageSize, total, totalPages }) {
  const first = page * pageSize + 1;
  const last = Math.min(total, (page + 1) * pageSize);
  const btn = (label, disabled, onClick, width) => (
    <button
      onClick={onClick} disabled={disabled}
      className="btn ghost"
      style={{
        padding: '5px 12px', fontSize: 11,
        opacity: disabled ? 0.4 : 1,
        cursor: disabled ? 'not-allowed' : 'pointer',
        minWidth: width || undefined,
      }}>{label}</button>
  );
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:12, padding:'10px 14px', marginTop:'var(--gap)',
      background:'var(--bg-2)', border:'1px solid var(--line)', borderRadius:'var(--radius)',
      fontFamily:"'JetBrains Mono', monospace", fontSize:11,
    }}>
      <span className="mono">
        <span style={{color:'var(--ink-bright)'}}>{first.toLocaleString()}–{last.toLocaleString()}</span>
        {' '}<span className="muted">of {total.toLocaleString()}</span>
      </span>
      <span style={{flex:1}} />
      <span className="muted">page {page + 1} / {totalPages}</span>
      {btn('‹‹ First', page === 0, () => setPage(0))}
      {btn('‹ Prev',  page === 0, () => setPage(p => Math.max(0, p - 1)))}
      {btn('Next ›',  page >= totalPages - 1, () => setPage(p => Math.min(totalPages - 1, p + 1)))}
      {btn('Last ››', page >= totalPages - 1, () => setPage(totalPages - 1))}
      <span style={{display:'flex', alignItems:'center', gap:6}}>
        <span className="label">PAGE SIZE</span>
        <select
          value={pageSize}
          onChange={e => setPageSize(parseInt(e.target.value, 10))}
          style={{
            background:'var(--bg-1)', color:'var(--ink)',
            border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
            padding:'3px 6px',
            fontFamily:"'JetBrains Mono', monospace", fontSize:11,
            cursor:'pointer',
          }}>
          {[10, 25, 50, 100, 200].map(n => <option key={n} value={n}>{n}</option>)}
        </select>
      </span>
    </div>
  );
}

// Rich HTML stream table — ID is the first column (user-requested),
// severity tints the left edge. Row click opens the Finding Detail.
// Columns adapted to what /v1/findings actually returns so we never
// fabricate tenant / channel / policy-action.
function StreamTableBig({ groups, groupBy, loading, empty, onOpen }) {
  const cellPad = '7px 10px';
  return (
    <div className="box" style={{padding:0, overflow:'hidden'}}>
      {loading && (
        <div className="muted" style={{padding:20, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>loading…</div>
      )}
      {empty && (
        <div className="muted" style={{padding:30, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
          — ring empty · run a scan from <b>Engineering → Live Scan</b> or <b>Corpus Runner</b> —
        </div>
      )}
      {!loading && !empty && (
        <div style={{overflow:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontFamily:"'JetBrains Mono', monospace", fontSize:11.5}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--line-strong)', background:'var(--bg-2)'}}>
                {['ID','TIME','SEV','CATEGORY','SUB-CATEGORY','SOURCE','MATCH','REQUEST','CONF',''].map((h, i) => (
                  <th key={i} className="label" style={{
                    textAlign:'left', padding:cellPad,
                    fontWeight:600, color:'var(--ink-faint)', whiteSpace:'nowrap',
                    position:'sticky', top:0, background:'var(--bg-2)',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {groups.map(([gname, rows], gi) => (
                <React.Fragment key={gi}>
                  {groupBy !== 'none' && (
                    <tr>
                      <td colSpan={10} style={{
                        padding:'6px 12px',
                        background:'var(--bg-3)',
                        borderTop:'1px solid var(--line-strong)',
                        borderBottom:'1px solid var(--line-strong)',
                        fontWeight:700, color:'var(--ink-bright)', fontSize:10.5,
                        letterSpacing:'0.14em', textTransform:'uppercase',
                      }}>
                        {gname || '(none)'} <span className="muted" style={{fontWeight:400, marginLeft:8, fontSize:10}}>{rows.length} findings</span>
                      </td>
                    </tr>
                  )}
                  {rows.map((f, i) => <StreamRow key={(f.id || '') + '-' + i} f={f} onOpen={onOpen} cellPad={cellPad} />)}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function StreamRow({ f, onOpen, cellPad }) {
  const gid = catGroup(f.category);
  const sevShade = f.severity === 'red' ? 'var(--red)' : f.severity === 'warn' ? 'var(--amber)' : 'var(--accent-dim)';
  const shortReq = (f.request_id || '').split('-')[0] || '—';
  return (
    <tr
      onClick={() => onOpen && onOpen(f.id)}
      style={{cursor:'pointer', borderBottom:'1px solid var(--line-soft)', boxShadow:'inset 3px 0 0 ' + sevShade}}
      onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-3)'}
      onMouseLeave={(e) => e.currentTarget.style.background = ''}
    >
      <td style={{padding:cellPad, color:'var(--ink-dim)', whiteSpace:'nowrap'}}>{(f.id || '').slice(-8) || '—'}</td>
      <td style={{padding:cellPad, color:'var(--ink-soft)', whiteSpace:'nowrap'}} title={f.ts}>{fmtWallClock(f.ts)}</td>
      <td style={{padding:cellPad}}>
        <span className={`chip chip--${f.severity}`} style={{fontSize:9, padding:'2px 7px'}}>{f.severity}</span>
      </td>
      <td style={{padding:cellPad}}>
        <span style={{
          fontSize:10, padding:'2px 6px',
          border:'1px solid ' + CAT_GROUP_COLOR[gid],
          color: CAT_GROUP_COLOR[gid],
          borderRadius:'var(--radius)',
          letterSpacing:'0.06em',
          fontWeight:600,
        }}>{gid}</span>
      </td>
      <td style={{padding:cellPad, color:'var(--ink)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:200}} title={f.category + ' / ' + (f.sub_category || '')}>
        {f.sub_category || '—'}
      </td>
      <td style={{padding:cellPad, color:'var(--ink-soft)', whiteSpace:'nowrap'}}>{f.source_ip || '—'}</td>
      <td style={{padding:cellPad, color:'var(--ink-bright)', maxWidth:360, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={f.text}>
        {f.text}
      </td>
      <td style={{padding:cellPad, color:'var(--ink-faint)', whiteSpace:'nowrap', fontSize:10.5}} title={f.request_id}>{shortReq}</td>

        {f.confidence != null ? f.confidence.toFixed(2) : '—'}
      </td>
      <td style={{padding:cellPad, color:'var(--accent)', textAlign:'right', fontWeight:700}}>›</td>
    </tr>
  );
}

// Finding Detail — full page, drilled in from the stream.
// Fetches the same /v1/findings list and looks up by id so a fresh deep
// link works even without prior stream state in memory.
// SourceDestination — the repurposed "pod path" view. Shows how the
// finding entered the system (HTTP POST /scan from a source IP, Kafka
// event, email, etc.) and where any configured integrations would
// route it. All three swim-lanes are derived from real data:
//
//   - source:   finding.source_ip (who called POST /scan)
//   - channel:  always "http · POST /scan" today; future ingest shapes
//               (email, kafka, s3 upload) would set this differently
//   - detector: siphon-api · siphon-core
//   - outputs:  /v1/integrations → the configured SIEM kinds
//
// No fabrication — fields that don't exist in the current runtime are
// rendered as "not configured" dashed boxes.
function SourceDestination({ finding }) {
  const ix = window.useSiphonApi('/v1/integrations');
  const outs = ((ix.data && ix.data.integrations) || []).filter(i => i.configured);
  const apiUrl = window.SIPHON_API_URL ? window.SIPHON_API_URL() : '';
  // SVG text can't wrap, so we truncate values to fit the inner width of
  // each box at the given font size. Char budgets below are measured for
  // JetBrains Mono — tweak only if font-size changes.
  const trunc = (s, n) => {
    const str = String(s || '—');
    return str.length > n ? str.slice(0, Math.max(0, n - 1)) + '…' : str;
  };
  const apiDisplay = apiUrl.replace(/^https?:\/\//, '');
  return (
    <div className="box">
      <div className="box-title"><span className="t">Source → Destination</span><span className="k">how the scan arrived · where it was routed</span></div>
      <svg viewBox="0 0 520 170" style={{width:'100%', height:200, display:'block', background:'var(--bg-1)', borderRadius:'var(--radius)', border:'1px solid var(--line-soft)'}}>
        <defs>
          <marker id="sdArr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ink-soft)" />
          </marker>
          <marker id="sdArrAmber" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)" />
          </marker>
        </defs>

        {/* SOURCE */}
        <g>
          <text x="12" y="16" fontFamily="JetBrains Mono, monospace" fontSize="9"
                letterSpacing="1.5" fill="var(--ink-dim)">SOURCE</text>
          <rect x="10" y="32" width="140" height="54" rx="3"
                fill="var(--bg-2)" stroke="var(--line-strong)" />
          <text x="18" y="50" fontFamily="JetBrains Mono" fontSize="11" fontWeight="600" fill="var(--ink)">
            {trunc(finding.source_ip, 19)}
            <title>{finding.source_ip || '—'}</title>
          </text>
          <text x="18" y="64" fontFamily="JetBrains Mono" fontSize="9.5" fill="var(--ink-soft)">
            caller · http client
          </text>
          <text x="18" y="78" fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-faint)">
            req {trunc((finding.request_id || '').slice(0, 8) + '…', 20)}
            <title>{finding.request_id || '—'}</title>
          </text>
        </g>

        {/* CHANNEL */}
        <g>
          <text x="180" y="16" fontFamily="JetBrains Mono, monospace" fontSize="9"
