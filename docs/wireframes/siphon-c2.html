/* ===== surfaces/procstate.jsx ===== */
// Process State — a per-process diagnostic view of siphon-api's runtime
// machinery: cache hit-rate, rate-limit bucket usage, tokenize vault
// status. Single page, polls every 5s. Useful when you're trying to
// figure out why something is slow / why a request is being throttled.

function ProcessState() {
  const cache = window.useSiphonApi('/v1/cache/stats');
  const rate  = window.useSiphonApi('/v1/ratelimit');
  const tok   = window.useSiphonApi('/v1/tokenize/status');
  const mx    = window.useSiphonApi('/v1/metrics');

  React.useEffect(() => {
    const t = setInterval(() => {
      cache.refetch(); rate.refetch(); tok.refetch(); mx.refetch();
    }, 5000);
    return () => clearInterval(t);
  }, []);

  const overallSource = [cache.source, rate.source, tok.source, mx.source].includes('offline')
    ? 'offline'
    : [cache.source, rate.source, tok.source, mx.source].every(s => s === 'live')
      ? 'live'
      : 'loading';

  const c = cache.data || {};
  const r = rate.data || {};
  const t = tok.data || {};
  const m = mx.data || {};

  const fmtUptime = (s) => {
    if (!s && s !== 0) return '—';
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
    return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  };

  const bucketPct = (r.active_buckets || 0) / (r.max_buckets || 1) * 100;

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Engineering · Process State</div>
          <h1>Process State <HelpIcon topic="rate_limit" title="Rate limiting &amp; cache" size={18} /></h1>
        </div>
        <div className="actions">
          <window.LivePill source={overallSource} onClick={() => { cache.refetch(); rate.refetch(); tok.refetch(); mx.refetch(); }} title="polls every 5s · click to force" />
          <span className="muted mono" style={{fontSize:11}}>target: {window.SIPHON_API_URL()}</span>
        </div>
      </div>

      <div className="grid grid-4" style={{marginBottom:'var(--gap)'}}>
        <div className="box"><div className="stat">
          <span className="s-label">Uptime</span>
          <span className="s-val">{fmtUptime(m.uptime_secs)}</span>
          <span className="s-delta">since boot</span>
        </div></div>
        <div className="box"><div className="stat">
          <span className="s-label">Scans</span>
          <span className="s-val">{m.scans_total != null ? m.scans_total.toLocaleString() : '—'}</span>
          <span className="s-delta">total served</span>
        </div></div>
        <div className="box"><div className="stat">
          <span className="s-label">Errors</span>
          <span className="s-val" style={{color: (m.scan_errors_total || 0) > 0 ? 'var(--red)' : undefined}}>
            {m.scan_errors_total != null ? m.scan_errors_total : '—'}
          </span>
          <span className="s-delta">scan 5xx</span>
        </div></div>
        <div className="box"><div className="stat">
          <span className="s-label">Findings</span>
          <span className="s-val">{m.findings_total != null ? m.findings_total.toLocaleString() : '—'}</span>
          <span className="s-delta">cumulative</span>
        </div></div>
      </div>

      <div className="grid grid-2" style={{marginBottom:'var(--gap)'}}>
        <div className="box">
          <div className="box-title">
            <span className="t">Result cache</span>
            <span className="k">{c.enabled ? 'LRU · SHA-256 keyed · TTL' : 'disabled'}</span>
          </div>
          {c.enabled ? (
            <>
              <div style={{display:'flex', gap:18, alignItems:'baseline', marginBottom:14}}>
                <div>
                  <div className="label">Hit rate</div>
                  <div className="hand-b" style={{fontSize:36, color: c.hit_rate >= 0.6 ? 'var(--safe)' : c.hit_rate >= 0.3 ? 'var(--amber)' : 'var(--red)'}}>
                    {(c.hit_rate * 100).toFixed(1)}%
                  </div>
                </div>
                <div style={{marginLeft:'auto', textAlign:'right'}}>
                  <div className="label">Entries</div>
                  <div className="mono" style={{fontSize:18}}>{c.size.toLocaleString()}</div>
                </div>
              </div>
              <div className="bar-row">
                <span className="hand-b">hits</span>
                <span className="b"><i style={{width: (c.hits + c.misses ? (c.hits / (c.hits + c.misses) * 100) : 0) + '%', background:'var(--safe)'}}/></span>
                <span className="n">{c.hits.toLocaleString()}</span>
              </div>
              <div className="bar-row">
                <span className="hand-b">misses</span>
                <span className="b"><i style={{width: (c.hits + c.misses ? (c.misses / (c.hits + c.misses) * 100) : 100) + '%', background:'var(--amber)'}}/></span>
                <span className="n">{c.misses.toLocaleString()}</span>
              </div>
            </>
          ) : (
            <div className="muted" style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.7, padding:'12px 0'}}>
              No global cache configured.<br/>
              <span style={{fontSize:11}}>Activate via <b>siphon::cache::set_default_cache(Some(ScanCache::new(...)))</b> at startup.</span>
            </div>
          )}
        </div>

        <div className="box">
          <div className="box-title">
            <span className="t">Rate limiter</span>
            <span className="k">sliding window · per IP</span>
          </div>
          <div style={{display:'flex', gap:18, alignItems:'baseline', marginBottom:14}}>
            <div>
              <div className="label">Active IPs</div>
              <div className="hand-b" style={{fontSize:36}}>{r.active_buckets != null ? r.active_buckets.toLocaleString() : '—'}</div>
            </div>
            <div style={{marginLeft:'auto', textAlign:'right'}}>
              <div className="label">In-window reqs</div>
              <div className="mono" style={{fontSize:18}}>{r.total_recent_requests != null ? r.total_recent_requests.toLocaleString() : '—'}</div>
            </div>
          </div>
          <div className="bar-row">
            <span className="hand-b">bucket usage</span>
            <span className="b"><i style={{width: Math.min(100, bucketPct) + '%', background: bucketPct >= 75 ? 'var(--red)' : bucketPct >= 25 ? 'var(--amber)' : 'var(--safe)'}}/></span>
            <span className="n">{r.max_buckets ? `${bucketPct.toFixed(2)}%` : ''}</span>
          </div>
          <hr className="sep" />
          <div className="kv" style={{fontSize:12}}>
            <span className="k">Window</span>      <span className="v mono">{r.window_secs ? r.window_secs + 's' : '—'}</span>
            <span className="k">Per-IP limit</span><span className="v mono">{r.per_ip_limit != null ? r.per_ip_limit + ' req/window' : '—'}</span>
            <span className="k">Max buckets</span> <span className="v mono">{r.max_buckets != null ? r.max_buckets.toLocaleString() : '—'}</span>
          </div>
        </div>
      </div>

      <div className="box">
        <div className="box-title">
          <span className="t">Tokenize vault</span>
          <span className="k">{t.global_vault ? 'global vault active' : 'no global vault'}</span>
        </div>
        <div className="muted" style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.7}}>
          {t.note || 'No tokenize status reported.'}
        </div>
      </div>
    </div>
  );
}

/* ===== surfaces/fptool.jsx ===== */
// FP Troubleshooter — given a finding that was flagged from Operate →
// Findings → Detail, help the analyst decide: is this actually a false
// positive, and if so what's the minimum change?
//
// Reads the finding from localStorage (`c2:fp-finding`, set by
// FindingDetail). Fetches /v1/allowlist to show current suppression
// rules, /v1/patterns to show which pattern in that category most
// likely fired, and offers a side-by-side rescan after a proposed
// mitigation (either redact the exact match or change the surrounding
// context) to see if something else still fires.

function FPTool() {
  const [finding, setFinding] = React.useState(null);
  const [mitigation, setMitigation] = React.useState('replace'); // replace | remove | context
  const [replaceWith, setReplaceWith] = React.useState('[REDACTED]');
  const [testText, setTestText] = React.useState('');
  const [beforeScan, setBeforeScan] = React.useState(null);
  const [afterScan, setAfterScan] = React.useState(null);
  const [running, setRunning] = React.useState(false);
  const [allowKind, setAllowKind] = React.useState('text'); // text | pattern | path

  React.useEffect(() => {
    try {
      const raw = localStorage.getItem('c2:fp-finding');
      if (raw) setFinding(JSON.parse(raw));
    } catch {}
  }, []);

  const allow = window.useSiphonApi('/v1/allowlist');
  const cats = window.useSiphonApi(
    finding ? `/v1/patterns?category=${encodeURIComponent(finding.category)}&limit=50` : '/v1/patterns?limit=0',
    [finding && finding.category]
  );
  const patternHits = (cats.data && cats.data.patterns) || [];

  const alreadyAllowed = React.useMemo(() => {
    if (!finding || !allow.data) return null;
    const e = allow.data.entries || {};
    if ((e.texts || []).includes(finding.text)) return 'text';
    if ((e.patterns || []).some(p => finding.sub_category && p.toLowerCase() === finding.sub_category.toLowerCase())) return 'pattern';
    return null;
  }, [finding, allow.data]);

  // Build a reconstructed "before" text — span isn't enough alone because we
  // don't have the original document, only the matched slice. So we give
  // the analyst a template they can paste the real context into.
  React.useEffect(() => {
    if (!finding || testText) return;
    setTestText(`Paste the surrounding context here, around the matched value:\n\n  …${finding.text}…\n\nThe scan will tell you whether this context triggers anything beyond the original pattern.`);
  }, [finding]);

  const apiUrl = window.SIPHON_API_URL();

  const scan = async (text) => {
    const r = await fetch(apiUrl.replace(/\/$/, '') + '/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, options: {} }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  };

  const runBoth = async () => {
    if (!finding) return;
    setRunning(true); setBeforeScan(null); setAfterScan(null);
    try {
      const before = await scan(testText);
      // apply mitigation
      let after;
      if (mitigation === 'replace') {
        after = testText.split(finding.text).join(replaceWith);
      } else if (mitigation === 'remove') {
        after = testText.split(finding.text).join('');
      } else {
        after = testText; // context-only; same text, different analysis (not meaningful without backend support)
      }
      const afterJson = await scan(after);
      setBeforeScan(before);
      setAfterScan(afterJson);
    } catch (e) {
      setBeforeScan({ error: String(e.message || e) });
    } finally {
      setRunning(false);
    }
  };

  const allowlistPayload = () => {
    if (!finding) return '';
    const key = allowKind === 'text' ? 'texts' : allowKind === 'pattern' ? 'patterns' : 'paths';
    const val = allowKind === 'text' ? finding.text
              : allowKind === 'pattern' ? (finding.sub_category || finding.category)
              : '';
    const existing = (allow.data && allow.data.entries) || { texts: [], patterns: [], paths: [] };
    const merged = {
      texts: [...existing.texts],
      patterns: [...existing.patterns],
      paths: [...existing.paths],
    };
    if (val && !merged[key].includes(val)) merged[key].push(val);
    return JSON.stringify(merged, null, 2);
  };

  if (!finding) {
    return (
      <div>
        <div className="page-head">
          <div>
            <div className="crumbs">Engineering · FP Troubleshooter</div>
            <h1>FP Troubleshooter</h1>
          </div>
        </div>
        <div className="note" style={{borderColor:'var(--amber)', background:'var(--amber-wash)'}}>
          <b>No finding loaded.</b> Open a finding from <b>Operate → Findings</b>,
          click <b>⚑ Flag as false positive…</b> on the detail page, and you'll
          land back here with the finding context pre-filled.
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Engineering · FP Troubleshooter · {finding.id}</div>
          <h1>FP Troubleshooter <HelpIcon topic="patterns" title="Pattern tuning" size={18} /></h1>
        </div>
        <div className="actions">
          <span className="muted mono" style={{fontSize:11}}>target: {apiUrl}</span>
          <button className="btn ghost" onClick={() => { try { localStorage.removeItem('c2:fp-finding'); } catch {} setFinding(null); }}>
            Clear
          </button>
        </div>
      </div>

      <div className="box" style={{marginBottom:'var(--gap)'}}>
        <div className="box-title">
          <span className="t">Finding under review</span>
          <span className="k">
            {alreadyAllowed
              ? <span className="chip chip--warn">already allowlisted ({alreadyAllowed})</span>
              : <span className="chip chip--ghost">not in allowlist</span>}
          </span>
        </div>
        <div className="kv">
          <span className="k">Matched text</span> <span className="v mono" style={{color:'var(--amber)'}}>{finding.text}</span>
          <span className="k">Category</span>     <span className="v">{finding.category}</span>
          <span className="k">Sub-category</span> <span className="v">{finding.sub_category || '—'}</span>
          <span className="k">Confidence</span>   <span className="v mono">{finding.confidence != null ? finding.confidence.toFixed(3) : '—'}</span>
          <span className="k">Severity</span>     <span className="v"><span className={`chip chip--${finding.severity}`}>{finding.severity}</span></span>
          <span className="k">Request</span>      <span className="v mono">{finding.request_id}</span>
          <span className="k">Observed at</span>  <span className="v mono">{finding.ts}</span>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 1fr', gap:'var(--gap)', marginBottom:'var(--gap)'}}>
        <div className="box">
          <div className="box-title">
            <span className="t">① Add to allowlist</span>
            <span className="k">
              <window.LivePill source={allow.source} onClick={allow.refetch} />
              {' '}{allow.data && allow.data.loaded_from ? allow.data.loaded_from : 'SIPHON_ALLOWLIST_PATH unset'}
            </span>
          </div>
          <div className="label" style={{marginBottom:6}}>Suppression kind</div>
          <div style={{display:'flex', gap:6, marginBottom:10}}>
            {['text','pattern','path'].map(k => (
              <button key={k}
                className="btn ghost"
                onClick={() => setAllowKind(k)}
                style={{padding:'4px 12px', fontSize:10,
                  background: allowKind === k ? 'var(--accent)' : 'transparent',
                  color: allowKind === k ? 'var(--bg-0)' : 'var(--ink)',
                  borderColor: allowKind === k ? 'var(--accent)' : 'var(--line)'}}>
                {k}
              </button>
            ))}
          </div>
          <div className="label" style={{marginBottom:6}}>Allowlist file (merged preview)</div>
          <pre className="mono" style={{fontSize:11, lineHeight:1.5, padding:10, background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)', maxHeight:220, overflow:'auto', margin:0}}>
{allowlistPayload()}
          </pre>
          <div style={{display:'flex', gap:6, marginTop:10}}>
            <button className="btn" onClick={() => { try { navigator.clipboard.writeText(allowlistPayload()); } catch {} }}>
              Copy merged JSON
            </button>
            <button className="btn ghost" onClick={allow.refetch}>Re-fetch allowlist</button>
          </div>
          <div className="margin-note" style={{marginTop:8}}>
            write this to <b>{allow.data && allow.data.loaded_from ? allow.data.loaded_from : '$SIPHON_ALLOWLIST_PATH'}</b> and restart <b>siphon-api</b> to take effect
          </div>
        </div>

        <div className="box">
          <div className="box-title"><span className="t">② Rescan with mitigation</span><span className="k">verify the FP goes away</span></div>
          <div className="label" style={{marginBottom:6}}>Surrounding context</div>
          <textarea
            value={testText}
            onChange={e => setTestText(e.target.value)}
            rows={6}
            spellCheck={false}
            style={{
              width:'100%', resize:'vertical',
              fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.6,
              padding:10, background:'var(--bg-1)',
              color:'var(--ink)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
            }}
          />
          <div style={{display:'flex', gap:6, alignItems:'center', marginTop:10, flexWrap:'wrap'}}>
            <span className="label">Mitigation</span>
            {['replace','remove'].map(m => (
              <button key={m}
                className="btn ghost"
                onClick={() => setMitigation(m)}
                style={{padding:'4px 10px', fontSize:10,
                  background: mitigation === m ? 'var(--accent)' : 'transparent',
                  color: mitigation === m ? 'var(--bg-0)' : 'var(--ink)',
                  borderColor: mitigation === m ? 'var(--accent)' : 'var(--line)'}}>
                {m}
              </button>
            ))}
            {mitigation === 'replace' && (
              <input
                value={replaceWith}
                onChange={e => setReplaceWith(e.target.value)}
                placeholder="[REDACTED]"
                style={{

                <div className="margin-note" style={{marginTop:4, color:'var(--safe)'}}>

      <div className="box">
        <div className="box-title">
          <span className="t">③ Patterns in category</span>
          <span className="k">
            <window.LivePill source={cats.source} onClick={cats.refetch} />
            {' '}{cats.data ? `${cats.data.total} pattern${cats.data.total===1?'':'s'} in ${finding.category}` : 'loading…'}
          </span>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1.4fr 2fr 80px 60px', gap:8, padding:'6px 0', borderBottom:'1.5px solid var(--line)'}}>
          <span className="label">Sub-category</span><span className="label">Regex</span><span className="label">Spec.</span><span className="label">Ctx</span>
        </div>
        {patternHits.map((p, i) => {
          const isLikely = p.sub_category === finding.sub_category;
          return (
            <div key={i} style={{display:'grid', gridTemplateColumns:'1.4fr 2fr 80px 60px', gap:8, padding:'6px 0', borderBottom:'1px dashed var(--line-soft)', alignItems:'center', fontSize:12, fontFamily:"'JetBrains Mono', monospace", background: isLikely ? 'var(--bg-3)' : 'transparent'}}>
              <span style={{color: isLikely ? 'var(--accent)' : 'var(--ink-bright)'}}>
                {isLikely ? '▸ ' : '  '}{p.sub_category}
              </span>
              <span className="muted" style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={p.regex}>{p.regex}</span>
              <span className="mono">{p.specificity.toFixed(2)}</span>
              <span>{p.context_required ? <span className="chip chip--teal" style={{fontSize:9}}>req</span> : <span className="chip chip--ghost" style={{fontSize:9}}>—</span>}</span>
            </div>
          );
        })}
        <div className="margin-note" style={{marginTop:8}}>
          lowering a pattern's <b>specificity</b> or requiring <b>context</b> can reduce FPs without an allowlist entry. Edit at the pattern ruleset level.
        </div>
      </div>
    </div>
  );
}

// Small client-side mirror of severity_for() so the before/after dots
// don't need another network round-trip.
function severityJS(category, confidence) {
  const c = (category || '').toLowerCase();
  const critical = c.includes('credit card') || c.includes('primary account')
    || c.includes('secret') || c.includes('medical identifier');
  if (critical && confidence >= 0.80) return 'red';
  if (confidence >= 0.90) return 'red';
  if (confidence >= 0.70) return 'warn';
  return 'safe';
}

// ---------------------------------------------------------------------------
// Docs viewer — browse every markdown doc bundled into siphon-api.
// Left rail: tree grouped by section, with a live search that filters
// by path + title. Main panel: rendered markdown via renderMarkdown().
// Deep-link: the selected doc path is persisted in localStorage so
// refreshes don't lose your place, and window.__c2_open_doc(path, search)
// lets other surfaces navigate here directly.
// ---------------------------------------------------------------------------

const DOC_SECTION_LABELS = {
  root: 'Root',
  top: 'Top-level',
  architecture: 'Architecture',
  baselines: 'Baselines',
  deployment: 'Deployment',
  enterprise: 'Enterprise',
  'getting-started': 'Getting started',
  other: 'Other',
};

function DocsSurface() {
  const ix = window.useSiphonApi('/v1/docs');
  const [selected, setSelected] = React.useState(() => {
    try { return localStorage.getItem('c2:doc') || 'README.md'; }
    catch { return 'README.md'; }
  });
  const [search, setSearch] = React.useState('');

  React.useEffect(() => {
    try { localStorage.setItem('c2:doc', selected); } catch {}
  }, [selected]);

  // Register a global opener so HelpIcon (and other code) can navigate
  // the Docs surface to a specific path.
  React.useEffect(() => {
    window.__c2_open_doc = (path, searchFor) => {
      if (path) setSelected(path);
      if (searchFor != null) setSearch(searchFor);
    };
  }, []);

  const entries = (ix.data && ix.data.entries) || [];
  const q = search.trim().toLowerCase();
  const filtered = q
    ? entries.filter(e =>
        e.path.toLowerCase().includes(q) ||
        (e.title || '').toLowerCase().includes(q))
    : entries;

  // Group by section for the sidebar.
  const grouped = React.useMemo(() => {
    const by = new Map();
    for (const e of filtered) {
      const s = e.section || 'other';
      if (!by.has(s)) by.set(s, []);
      by.get(s).push(e);
    }
    // Deterministic section order
    const order = ['root', 'top', 'getting-started', 'architecture', 'baselines', 'deployment', 'enterprise', 'other'];
    return order
      .filter(k => by.has(k))
      .map(k => [k, by.get(k)]);
  }, [filtered]);

  const cur = window.useSiphonApi(
    selected ? `/v1/docs/content?path=${encodeURIComponent(selected)}` : '/v1/docs/content?path=',
    [selected]
  );
  const content = (cur.data && cur.data.content) || '';
  const title = entries.find(e => e.path === selected)?.title || selected;

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Docs · {DOC_SECTION_LABELS[(entries.find(e => e.path === selected) || {}).section] || 'all'}</div>
          <h1 style={{margin:0, fontFamily:"'Space Grotesk', sans-serif", fontWeight:600}}>{title}</h1>
          <div className="page-sub mono" style={{fontSize:11, color:'var(--ink-soft)'}}>{selected} · {cur.data ? cur.data.bytes : '—'} bytes</div>
        </div>
        <div className="actions">
          <window.LivePill source={cur.source} onClick={cur.refetch} title={cur.error || 'click to refetch'} />
          <button className="btn ghost" onClick={() => {
            try { navigator.clipboard.writeText(content); } catch {}
          }}>Copy markdown</button>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'300px 1fr', gap:'var(--gap)'}}>
        <div className="box" style={{padding:10, maxHeight:760, overflowY:'auto', position:'sticky', top:100}}>
          <div className="label" style={{marginBottom:6}}>
            Docs · {ix.data ? ix.data.total : '—'}
          </div>
          <input
            placeholder="filter…"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              width:'100%', marginBottom:8, padding:'4px 8px',
              fontFamily:"'JetBrains Mono', monospace", fontSize:11,
              background:'var(--bg-1)', color:'var(--ink)',
              border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'
            }}
          />
          {grouped.length === 0 && (
            <div className="muted" style={{padding:10, fontSize:11, textAlign:'center'}}>— no matches —</div>
          )}
          {grouped.map(([section, list]) => (
            <React.Fragment key={section}>
              <div className="section-l" style={{marginTop:10, marginBottom:4}}>
                {DOC_SECTION_LABELS[section] || section}
              </div>
              {list.map(e => (
                <div key={e.path}
                     onClick={() => setSelected(e.path)}
                     style={{
                       padding:'5px 8px', cursor:'pointer',
                       borderLeft: e.path === selected ? '2px solid var(--accent)' : '2px solid transparent',
                       background: e.path === selected ? 'var(--bg-3)' : 'transparent',
                       color: e.path === selected ? 'var(--accent)' : 'var(--ink)',
                       fontSize:12,
                       fontFamily:"'JetBrains Mono', monospace",
                     }}>
                  <div style={{fontWeight: e.path === selected ? 600 : 400}}>{e.title}</div>
                  <div className="muted" style={{fontSize:10, marginTop:2}}>
                    {e.path.split('/').pop()}
                  </div>
                </div>
              ))}
            </React.Fragment>
          ))}
        </div>

        <div className="box">
          {cur.loading && !content && (
            <div className="muted" style={{padding:30, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>loading…</div>
          )}
          {cur.error && (
            <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)'}}>
              <b>Error:</b> {cur.error}
            </div>
          )}
          {content && (
            <div
              style={{fontSize:13, lineHeight:1.7, color:'var(--ink)', padding:'4px 2px'}}
              dangerouslySetInnerHTML={{ __html: renderMarkdown(content) }}
            />
          )}
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// HelpIcon + HelpModal — small "?" chip next to panel titles that pops
// open a modal rendering the relevant markdown doc. A shared global
// state (window.__c2_help) is used instead of React context so any
// component can mount a HelpIcon without prop-drilling.
// ---------------------------------------------------------------------------

window.__c2_help_listeners = window.__c2_help_listeners || new Set();
window.openHelp = function(path, opts) {
  window.__c2_help_current = { path, title: (opts && opts.title) || null };
  window.__c2_help_listeners.forEach(fn => { try { fn(); } catch {} });
};
window.closeHelp = function() {
  window.__c2_help_current = null;
  window.__c2_help_listeners.forEach(fn => { try { fn(); } catch {} });
};

function useHelpState() {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const fn = () => setTick(t => t + 1);
    window.__c2_help_listeners.add(fn);
    return () => window.__c2_help_listeners.delete(fn);
  }, []);
  return window.__c2_help_current;
}

function HelpIcon({ path, title, topic, size }) {
  // honour the help_icons feature flag — when off, render nothing
  const enabled = window.useFeatureFlag('help_icons');
  if (!enabled) return null;
  const resolved = path || (topic && HELP_MAP[topic]);
  if (!resolved) return null;
  return (
    <span
      onClick={(e) => { e.stopPropagation(); window.openHelp(resolved, { title }); }}
      title={`open help · ${title || resolved}`}
      style={{
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        width: size || 16, height: size || 16, marginLeft:6,
        fontFamily:"'JetBrains Mono', monospace", fontSize: (size || 16) - 5,
        fontWeight: 700,
        border:'1px solid var(--line-strong)', borderRadius:'50%',
        color:'var(--ink-soft)', background:'var(--bg-3)',
        cursor:'pointer',
        verticalAlign:'middle',
      }}>
      ?
    </span>
  );
}

function HelpModal() {
  const st = useHelpState();
  const cur = window.useSiphonApi(
    st ? `/v1/docs/content?path=${encodeURIComponent(st.path)}` : '/v1/docs/content?path=',
    [st && st.path]
  );
  if (!st) return null;
  const content = (cur.data && cur.data.content) || '';
  return (
    <div

          <button

          )}
          {content && (
            <div dangerouslySetInnerHTML={{ __html: renderMarkdown(content) }} />

      </div>

                      {f.sub_category || '—'}
                    </td>
                    <td style={{padding:'7px 10px', color:'var(--ink-bright)', maxWidth:260, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={f.text}>
                      {f.text}
                    </td>
                    <td style={{padding:'7px 10px', whiteSpace:'nowrap'}}>
                      <button className="btn ghost" onClick={() => openInTroubleshooter(entry)} title="FP Troubleshooter"
                              style={{padding:'2px 8px', fontSize:9, marginRight:4}}>FP Tool</button>
                      <button className="btn ghost" onClick={() => openInScanDiff(entry)} title="Scan Diff · A/B"
                              style={{padding:'2px 8px', fontSize:9, marginRight:4}}>Diff</button>
                      <button className="btn ghost" onClick={() => openInLiveScan(entry)} title="Live Scan · rerun"
                              style={{padding:'2px 8px', fontSize:9, marginRight:4}}>Scan</button>
                      <button className="btn ghost" onClick={() => window.c2FpQueueRemove(f.id)} title="remove from queue"
                              style={{padding:'2px 8px', fontSize:9, color:'var(--red)', borderColor:'var(--red)'}}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { ApiExplorer, ScanDiff, ProcessState, FPTool, FpQueue, DocsSurface, HelpIcon, HelpModal });
</script>

<script type="text/babel" data-presets="react">
/* ===== app.jsx ===== */
// Main app — shell + route + tweaks + editmode wiring
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "nav": "side",
  "density": "comfy",
  "theme": "light"
}/*EDITMODE-END*/;

function App() {
  const [surface, setSurface] = React.useState(() => {
    try { return localStorage.getItem('c2:surface') || 'dashboard'; } catch { return 'dashboard'; }
  });
  // sub-routes: e.g. "finding:F-4a92" opens the detail view
  const [sub, setSub] = React.useState(() => {
    try { return localStorage.getItem('c2:sub') || ''; } catch { return ''; }
  });
  const [dashVariant, setDashVariant] = React.useState(() => {
    try { return localStorage.getItem('c2:dash') || 'ops'; } catch { return 'ops'; }
  });
  const [tweaks, setTweaks] = React.useState(() => {
    // Hydrate from localStorage so theme / density / nav choices
    // survive reloads. Falls back to TWEAK_DEFAULTS per key.
    let stored = {};
    try { stored = JSON.parse(localStorage.getItem('c2:tweaks') || '{}'); } catch {}
    return { ...TWEAK_DEFAULTS, ...stored };
  });
  const [tweakOpen, setTweakOpen] = React.useState(false);

  React.useEffect(() => { try { localStorage.setItem('c2:surface', surface); } catch {} }, [surface]);
  React.useEffect(() => { try { localStorage.setItem('c2:sub', sub); } catch {} }, [sub]);
  React.useEffect(() => { try { localStorage.setItem('c2:dash', dashVariant); } catch {} }, [dashVariant]);
  // Persist tweaks so Settings → Appearance + the floating tweaks
  // panel both see the same source of truth across reloads.
  React.useEffect(() => {
    try { localStorage.setItem('c2:tweaks', JSON.stringify(tweaks)); } catch {}
  }, [tweaks]);

  // Cross-tab / same-tab-from-Settings sync: if another component writes
  // to c2:tweaks directly via localStorage, pick up the change.
  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== 'c2:tweaks') return;
      try {
        const parsed = JSON.parse(e.newValue || '{}');
        setTweaks(t => ({ ...t, ...parsed }));
      } catch {}
    };
    window.addEventListener('storage', onStorage);
    const poll = setInterval(() => {
      try {
        const stored = JSON.parse(localStorage.getItem('c2:tweaks') || '{}');
        setTweaks(t => {
          // Cheap shallow equality — only update if something differs.
          for (const k of Object.keys(stored)) if (stored[k] !== t[k]) return { ...t, ...stored };
          return t;
        });
      } catch {}
    }, 500);
    return () => { window.removeEventListener('storage', onStorage); clearInterval(poll); };
  }, []);

  // Apply theme attr to html so dark-mode CSS kicks in globally
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme || 'phosphor');
  }, [tweaks.theme]);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweakOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    } catch {}
  };

  const go = (id, s) => { setSurface(id); setSub(s || ''); };

  const { Dashboard, Stream, FindingDetail, Pods, Policy, Patterns, PatternDetail, Models, Assets,
          Compliance, Testing, AssureOverview, DetectOverview, Settings, Logs, Topbar, WorkspaceBar, SurfaceBar, TweaksPanel,
          Investigations, Alerts, Tokenization, Corpora, Audit, Integrations, ApiKeys, Agents, Users,
          LiveScan, CorpusRunner, ApiExplorer, ScanDiff, ProcessState, FPTool, FpQueue, Profiles,
          DocsSurface, HelpModal } = window;

  // expose go() globally so nested surfaces (e.g. DetectOverview cards) can navigate.
  React.useEffect(() => { window.__c2_go = go; }, []);

  let Surface;
  if (surface === 'stream' && sub && sub.startsWith('finding:')) {
    Surface = <FindingDetail id={sub.slice(8)} back={() => setSub('')} />;
  } else if (surface === 'patterns' && sub && sub.startsWith('pattern:')) {
    // sub-route shape: pattern:<category>/<sub_category>
    const key = sub.slice(8);
    const slash = key.indexOf('/');
    const cat = slash >= 0 ? key.slice(0, slash) : key;
    const subCat = slash >= 0 ? key.slice(slash + 1) : '';
    Surface = <PatternDetail category={cat} sub_category={subCat} back={() => setSub('')} />;
  } else {
    Surface = {
      dashboard:      <Dashboard variant={dashVariant} setVariant={setDashVariant} go={go} />,
      livescan:       <LiveScan />,
      corpusrun:      <CorpusRunner />,
      scandiff:       <ScanDiff />,
      apiex:          <ApiExplorer />,
      procstate:      <ProcessState />,
      fptool:         <FPTool />,
      fpqueue:        <FpQueue />,
      stream:         <Stream go={go} />,
      investigations: <Investigations />,
      pods:           <Pods />,
      logs:           <Logs />,
      alerts:         <Alerts />,
      detect:         <DetectOverview />,
      policy:         <Policy />,
      patterns:       <Patterns />,
      profiles:       <Profiles />,
      models:         <Models />,
      assets:         <Assets />,
      tokenization:   <Tokenization />,
      testing:        <Testing />,
      assurance:      <AssureOverview />,
      corpora:        <Corpora />,
      settings:       <Settings tweaks={tweaks} setTweak={setTweak} />,
      compliance:     <Compliance />,
      audit:          <Audit />,
      docs:           <DocsSurface />,
      users:          <Users />,
      integrations:   <Integrations />,
      keys:           <ApiKeys />,
      agents:         <Agents />,
    }[surface] || <div style={{padding: 40}}>Coming soon</div>;
  }

  return (
    <div className="shell" data-density={tweaks.density} data-theme={tweaks.theme}>
      <Topbar tweaks={tweaks} setTweak={setTweak} />
      <WorkspaceBar current={surface} go={go} />
      <SurfaceBar current={surface} go={go} />
      <main className="page">{Surface}</main>
      <TweaksPanel on={tweakOpen} state={tweaks} set={setTweak} />
      {HelpModal && <HelpModal />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
