            <text x={x+8} y={y+14} fontFamily="JetBrains Mono" fontSize="10.5" fontWeight="600" fill="var(--ink)">{n.label}</text>
            <text x={x+8} y={y+25} fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-soft)">{n.sub} · {n.rate}</text>
            {/* flow path — gentle curve */}
            <path d={`M ${x+w} ${y+h/2} C ${x+w+30} ${y+h/2}, ${inspectL-30} ${inspectCy}, ${inspectL} ${inspectCy}`}
                  fill="none" stroke="var(--accent)" strokeWidth="1.2" opacity="0.35"
                  strokeDasharray="3 5" markerEnd="url(#hfArr)">
              <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.4s" repeatCount="indefinite" />
            </path>
          </g>
        );
      })}

      {/* INSPECT node */}
      <g>
        <rect x={INSPECT_X} y={INSPECT_Y} width={INSPECT_W} height={INSPECT_H}
              rx="4" fill="var(--bg-2)" stroke="var(--accent)" strokeWidth="1.4" />
        <text x={INSPECT_X + INSPECT_W/2} y={INSPECT_Y + 22}
              fontFamily="Space Grotesk" fontSize="13" fontWeight="700"
              fill="var(--accent)" textAnchor="middle" letterSpacing="1.5">INSPECT</text>
        <text x={INSPECT_X + INSPECT_W/2} y={INSPECT_Y + 38}
              fontFamily="JetBrains Mono" fontSize="10" fill="var(--ink)" textAnchor="middle">4.6k/s</text>
        <text x={INSPECT_X + INSPECT_W/2} y={INSPECT_Y + 50}
              fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-soft)" textAnchor="middle">p95 · 142ms</text>
        {/* pulse halo */}
        <circle cx={INSPECT_X + INSPECT_W/2} cy={inspectCy} r="50" fill="none"
                stroke="var(--accent)" strokeWidth="0.6" opacity="0.4">
          <animate attributeName="r" values="50;72;50" dur="2.6s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.4;0;0.4" dur="2.6s" repeatCount="indefinite" />
        </circle>
      </g>

      {/* output boxes + flows from inspect, color-coded by action */}
      {outputs.map((n, i) => {
        const y = 42 + i*42;
        const x = 354, w = 112, h = 30;
        const col = actColor[n.act] || 'var(--ink-soft)';
        const stroke = n.s==='warn' ? 'var(--amber)' : col;
        const markerId = n.act==='block' ? 'hfArrRed' : n.act==='tokenize' ? 'hfArrViolet' : 'hfArrCyan';
        return (
          <g key={n.id}>
            <path d={`M ${inspectR} ${inspectCy} C ${inspectR+30} ${inspectCy}, ${x-30} ${y+h/2}, ${x} ${y+h/2}`}
                  fill="none" stroke={col} strokeWidth="1.4" opacity="0.7"
                  strokeDasharray="3 5" markerEnd={`url(#${markerId})`}>
              <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.2s" repeatCount="indefinite" />
            </path>
            <rect x={x} y={y} width={w} height={h} rx="3" fill="var(--bg-3)" stroke={stroke} strokeWidth={n.act==='block'?1.3:1} />
            <text x={x+8} y={y+14} fontFamily="JetBrains Mono" fontSize="10.5" fontWeight="600" fill="var(--ink)">{n.label}</text>
            <text x={x+8} y={y+25} fontFamily="JetBrains Mono" fontSize="9" fill="var(--ink-soft)">{n.sub} · {n.rate}</text>
            {/* action tag — inside right edge, above box */}
            <rect x={x+w-46} y={y-15} width="46" height="13" rx="2" fill="var(--bg-panel)" stroke={col} />
            <text x={x+w-23} y={y-5} fontFamily="JetBrains Mono" fontSize="8.5"
                  fontWeight="700" fill={col} textAnchor="middle" letterSpacing="1">
              {n.act.toUpperCase()}
            </text>
          </g>
        );
      })}

      {/* legend */}
      <g fontFamily="JetBrains Mono, monospace" fontSize="9" letterSpacing="0.5">
        <rect x="14" y="218" width="10" height="2" fill="var(--cyan)" />
        <text x="28"  y="222" fill="var(--ink-soft)">flag/route</text>
        <rect x="92" y="218" width="10" height="2" fill="var(--violet)" />
        <text x="106" y="222" fill="var(--ink-soft)">tokenize</text>
        <rect x="166" y="218" width="10" height="2" fill="var(--threat)" />
        <text x="180" y="222" fill="var(--ink-soft)">block</text>
      </g>
    </svg>
  );
}

const HF_TIMEFRAMES = [
  { id: '15m', label: '15m', ms: 15*60*1000 },
  { id: '1h',  label: '1h',  ms: 60*60*1000 },
  { id: '24h', label: '24h', ms: 24*60*60*1000 },
  { id: '7d',  label: '7d',  ms: 7*24*60*60*1000 },
  { id: '30d', label: '30d', ms: 30*24*60*60*1000 },
  { id: 'all', label: 'All', ms: Infinity },
];

function StreamHF({ go }) {
  const [rows, setRows] = React.useState(() => seedFindings(140));
  const [live, setLive] = React.useState(true);

  // primary filters
  const [search, setSearch] = React.useState('');
  const [sev, setSev] = React.useState('any');
  const [cat, setCat] = React.useState('any');
  const [tenant, setTenant] = React.useState('any');
  const [channel, setChannel] = React.useState('any');
  const [action, setAction] = React.useState('any');

  // timeframe
  const [tf, setTf] = React.useState('24h');
  const [tfFrom, setTfFrom] = React.useState(isoDateLocal(new Date(Date.now() - 7*24*3600*1000)));
  const [tfTo,   setTfTo]   = React.useState(isoDateLocal(new Date()));

  // advanced filters (text)
  const [advOpen, setAdvOpen] = React.useState(false);
  const [fileType, setFileType]   = React.useState('any');
  const [hashQ, setHashQ]         = React.useState('');
  const [srcIpQ, setSrcIpQ]       = React.useState('');
  const [dstIpQ, setDstIpQ]       = React.useState('');
  const [emailFromQ, setEmailFromQ] = React.useState('');
  const [emailToQ, setEmailToQ]   = React.useState('');
  const [domainQ, setDomainQ]     = React.useState('');
  const [urlQ, setUrlQ]           = React.useState('');

  const allFileTypes = React.useMemo(() => {
    const set = new Set();
    Object.values(HF_FILETYPES_BY_CAT).forEach(arr => arr.forEach(t => set.add(t)));
    return Array.from(set).sort();
  }, []);

  React.useEffect(() => {
    if (!live) return;
    const t = setInterval(() => {
      setRows(r => [synthFinding(new Date()), ...r].slice(0, 400));
    }, 1800 + Math.random()*900);
    return () => clearInterval(t);
  }, [live]);

  // build timeframe bounds
  const { fromTs, toTs } = React.useMemo(() => {
    if (tf === 'custom') {
      const from = new Date(tfFrom + 'T00:00:00').getTime();
      const to   = new Date(tfTo   + 'T23:59:59').getTime();
      return { fromTs: from, toTs: to };
    }
    const meta = HF_TIMEFRAMES.find(x => x.id === tf);
    const now = Date.now();
    return { fromTs: meta.ms === Infinity ? 0 : now - meta.ms, toTs: now + 60000 };
  }, [tf, tfFrom, tfTo]);

  const matches = (r) => {
    const ts = new Date(r.ts).getTime();
    if (ts < fromTs || ts > toTs) return false;
    if (sev !== 'any' && r.severity !== sev) return false;
    if (cat !== 'any' && r.category !== cat) return false;
    if (tenant !== 'any' && r.tenant !== tenant) return false;
    if (channel !== 'any' && r.channel !== channel) return false;
    if (action !== 'any' && r.action !== action) return false;
    if (fileType !== 'any' && r.fileType !== fileType) return false;
    if (hashQ && !(r.hash||'').toLowerCase().includes(hashQ.toLowerCase())) return false;
    if (srcIpQ && !(r.srcIp||'').includes(srcIpQ)) return false;
    if (dstIpQ && !(r.dstIp||'').includes(dstIpQ)) return false;
    if (emailFromQ && !(r.emailFrom||'').toLowerCase().includes(emailFromQ.toLowerCase())) return false;
    if (emailToQ && !(r.emailTo||'').toLowerCase().includes(emailToQ.toLowerCase())) return false;
    if (domainQ && !(r.domain||'').toLowerCase().includes(domainQ.toLowerCase())) return false;
    if (urlQ && !(r.url||'').toLowerCase().includes(urlQ.toLowerCase())) return false;
    if (search) {
      const hay = [r.match, r.doc, r.pod, r.id, r.tenant, r.category, r.hash, r.srcIp, r.dstIp, r.emailFrom, r.emailTo, r.domain, r.url]
        .filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(search.toLowerCase())) return false;
    }
    return true;
  };

  const filtered = rows.filter(matches);

  const hist = React.useMemo(() => {
    const N = 30;
    const buckets = Array(N).fill(0);
    const span = Math.max(toTs - fromTs, 1);
    filtered.forEach(r => {
      const ts = new Date(r.ts).getTime();
      const idx = Math.min(N-1, Math.floor(((ts - fromTs) / span) * N));
      if (idx >= 0) buckets[idx]++;
    });
    return buckets;
  }, [filtered, fromTs, toTs]);

  // active filter chips
  const activeChips = [];
  if (sev !== 'any')      activeChips.push({ k:'sev',       v:sev,       clr:() => setSev('any') });
  if (cat !== 'any')      activeChips.push({ k:'cat',       v:cat,       clr:() => setCat('any') });
  if (tenant !== 'any')   activeChips.push({ k:'tenant',    v:tenant,    clr:() => setTenant('any') });
  if (channel !== 'any')  activeChips.push({ k:'channel',   v:channel,   clr:() => setChannel('any') });
  if (action !== 'any')   activeChips.push({ k:'action',    v:action,    clr:() => setAction('any') });
  if (fileType !== 'any') activeChips.push({ k:'type',      v:'.'+fileType, clr:() => setFileType('any') });
  if (hashQ)              activeChips.push({ k:'hash',      v:hashQ,     clr:() => setHashQ('') });
  if (srcIpQ)             activeChips.push({ k:'src ip',    v:srcIpQ,    clr:() => setSrcIpQ('') });
  if (dstIpQ)             activeChips.push({ k:'dst ip',    v:dstIpQ,    clr:() => setDstIpQ('') });
  if (emailFromQ)         activeChips.push({ k:'from',      v:emailFromQ,clr:() => setEmailFromQ('') });
  if (emailToQ)           activeChips.push({ k:'to',        v:emailToQ,  clr:() => setEmailToQ('') });
  if (domainQ)            activeChips.push({ k:'domain',    v:domainQ,   clr:() => setDomainQ('') });
  if (urlQ)               activeChips.push({ k:'url',       v:urlQ,      clr:() => setUrlQ('') });
  if (search)             activeChips.push({ k:'search',    v:search,    clr:() => setSearch('') });

  const clearAll = () => {
    setSearch(''); setSev('any'); setCat('any'); setTenant('any');
    setChannel('any'); setAction('any'); setFileType('any');
    setHashQ(''); setSrcIpQ(''); setDstIpQ('');
    setEmailFromQ(''); setEmailToQ(''); setDomainQ(''); setUrlQ('');
  };

  const tfLabel = tf === 'custom'
    ? `${tfFrom} → ${tfTo}`
    : HF_TIMEFRAMES.find(x => x.id === tf).label;

  return (
    <div className="hf-stream">
      <div className="hf-stream-head">
        <div>
          <div className="crumbs">Operate · Findings</div>
          <h1 className="hf-h1">Findings stream <LivePulse on={live} /></h1>
          <div className="hf-sub">window <b>{tfLabel}</b> · <b>{filtered.length.toLocaleString()}</b> of {rows.length.toLocaleString()} findings match</div>
        </div>
        <div className="hf-dash-actions">
          <button className={`btn ${live?'primary':'ghost'}`} onClick={() => setLive(!live)}>
            {live ? '⏸ Pause' : '▶ Resume'}
          </button>
          <button className="btn ghost" onClick={() => setRows(seedFindings(140))}>Reseed</button>
          <button className="btn ghost">Export</button>
        </div>
      </div>

      {/* Multi-row filter panel */}
      <div className="hf-stream-filters hf-stream-filters--multi">
        {/* Row 1 — search + timeframe */}
        <div className="hf-filter-row hf-filter-row--primary">
          <div className="hf-search">
            <span>⌕</span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
                   placeholder="search match, doc, id, hash, ip, email, domain, url…" />
            <span className="kbd">/</span>
          </div>

          <span className="hf-tf-label">Timeframe</span>
          <div className="hf-tf-group">
            {HF_TIMEFRAMES.map(t => (
              <button key={t.id}
                      className={`hf-tf-btn ${tf===t.id?'active':''}`}
                      onClick={() => setTf(t.id)}>{t.label}</button>
            ))}
            <button className={`hf-tf-btn ${tf==='custom'?'active':''}`}
                    onClick={() => setTf('custom')}>Custom</button>
          </div>
          {tf === 'custom' && (
            <div className="hf-tf-custom">
              <input type="date" value={tfFrom} onChange={e=>setTfFrom(e.target.value)} />
              <span style={{color:'var(--ink-faint)'}}>→</span>
              <input type="date" value={tfTo} onChange={e=>setTfTo(e.target.value)} />
            </div>
          )}

          <div className="hf-stream-hist" title="arrivals in current window">
            <Spark series={hist} w={120} h={22} color="var(--accent)" />
          </div>
          <div className="hf-stream-count">
            <b>{filtered.length}</b> / {rows.length}
          </div>
        </div>

        {/* Row 2 — categorical filters */}
        <div className="hf-filter-row">
          <HfPicker label="Severity" value={sev}     set={setSev}     opts={['any','red','warn','safe']} />
          <HfPicker label="Category" value={cat}     set={setCat}     opts={['any', ...HF_CATS]} />
          <HfPicker label="Tenant"   value={tenant}  set={setTenant}  opts={['any', ...HF_TENANTS]} />
          <HfPicker label="Channel"  value={channel} set={setChannel} opts={['any', ...HF_CHANNELS]} />
          <HfPicker label="Action"   value={action}  set={setAction}  opts={['any', ...HF_ACTS]} />
          <HfPicker label="File type" value={fileType} set={setFileType} opts={['any', ...allFileTypes]} />

          <button className={`hf-adv-toggle ${advOpen ? 'active':''}`}
                  onClick={() => setAdvOpen(!advOpen)}
                  style={{marginLeft:'auto'}}>
            {advOpen ? '− Advanced' : '+ Advanced search'}
          </button>
        </div>

        {/* Row 3 — advanced fielded search */}
        {advOpen && (
          <div className="hf-adv-grid">
            <div className="hf-adv-field">
              <label>hash (sha256)</label>
              <input value={hashQ} onChange={e=>setHashQ(e.target.value)} placeholder="prefix or fragment…" />
            </div>
            <div className="hf-adv-field">
              <label>source ip</label>
              <input value={srcIpQ} onChange={e=>setSrcIpQ(e.target.value)} placeholder="10.2. / exact…" />
            </div>
            <div className="hf-adv-field">
              <label>destination ip</label>
              <input value={dstIpQ} onChange={e=>setDstIpQ(e.target.value)} placeholder="172.16.0.4…" />
            </div>
            <div className="hf-adv-field">
              <label>email · from</label>
              <input value={emailFromQ} onChange={e=>setEmailFromQ(e.target.value)} placeholder="j.doe@…" />
            </div>
            <div className="hf-adv-field">
              <label>email · to</label>
              <input value={emailToQ} onChange={e=>setEmailToQ(e.target.value)} placeholder="partner@…" />
            </div>
            <div className="hf-adv-field">
              <label>domain (web)</label>
              <input value={domainQ} onChange={e=>setDomainQ(e.target.value)} placeholder="paste.ee…" />
            </div>
            <div className="hf-adv-field">
              <label>url path contains</label>
              <input value={urlQ} onChange={e=>setUrlQ(e.target.value)} placeholder="/share/ or ?format=csv…" />
            </div>
            <div className="hf-adv-field" style={{alignSelf:'end'}}>
              <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10.5, color:'var(--ink-faint)'}}>
                email fields only match when channel=email · domain/url only when channel=web or upload
              </span>
            </div>
          </div>
        )}

        {/* Active-filters chip strip */}
        {activeChips.length > 0 && (
          <div className="hf-active-chips">
            <span className="l">active</span>
            {activeChips.map((c,i) => (
              <span key={i} className="hf-active-chip">
                <span className="k">{c.k}</span>
                <span className="v">{c.v}</span>
                <button onClick={c.clr} aria-label="clear">×</button>
              </span>
            ))}
            <button className="hf-active-chip hf-active-chip--clear" onClick={clearAll}>clear all</button>
          </div>
        )}
      </div>

      <div className="hf-stream-table-wrap">
        <table className="hf-stream-table">
          <thead><tr>
            <th>Time</th><th>Sev</th><th>Category</th><th>Tenant</th>
            <th>Channel</th><th>Type</th><th>Match</th><th>Route</th><th>Action</th><th>Conf</th><th>ID</th><th aria-label="open"></th>
          </tr></thead>
          <tbody>
            {filtered.slice(0, 120).map((r,i) => (
              <tr key={r.id}
                  className={`hf-stream-row hf-stream-row--${r.severity} ${i===0 && live ? 'hf-stream-row--new' : ''}`}
                  onClick={() => go && go('stream', 'finding:' + r.id)}
                  title="Open finding detail">
                <td className="mono hf-t" title={new Date(r.ts).toISOString()}>{fmtDateTime(r.ts)}</td>
                <td><span className={`hf-sev hf-sev--${r.severity}`}>{r.severity}</span></td>
                <td><span className="hf-cat-tag" style={{color:HF_CAT_COLOR[r.category], borderColor:HF_CAT_COLOR[r.category]}}>{r.category}</span></td>
                <td className="mono">{r.tenant}</td>
                <td className="hf-ch">{r.channel}</td>
                <td className="mono" style={{color:'var(--ink-soft)'}}>.{r.fileType}</td>
                <td className="mono hf-match">{r.match}</td>
                <td className="mono" style={{color:'var(--ink-soft)', fontSize:11, maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                  {r.channel==='email'  ? <span>{r.emailFrom} → {r.emailTo}</span> :
                   r.channel==='web' || r.channel==='upload' ? <span>{r.domain}</span> :
                                       <span>{r.srcIp} → {r.dstIp}</span>}
                </td>
                <td><span className={`hf-act hf-act--${r.action}`}>{r.action}</span></td>
                <td className="mono right">{r.confidence}</td>
                <td className="mono" style={{color:'var(--ink-dim)'}}>{r.id}</td>
                <td className="hf-stream-chev">›</td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="12" style={{padding:'40px 20px', textAlign:'center', color:'var(--ink-faint)', fontFamily:'JetBrains Mono, monospace', fontSize:12}}>
                No findings match these filters in window <b style={{color:'var(--ink-soft)'}}>{tfLabel}</b>.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function HfPicker({ label, value, set, opts }) {
  return (
    <div className="hf-picker">
      <span className="l">{label}</span>
      <select value={value} onChange={e=>set(e.target.value)}>
        {opts.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function actionLabel(a) {
  return ({block:'BLOCKED', redact:'REDACTED', flag:'FLAGGED', tokenize:'TOKENIZED', allow:'ALLOWED'})[a] || a.toUpperCase();
}
function actionSubtitle(a, fx) {
  switch (a) {
    case 'block':    return `egress to ${fx.tenant} halted · 1 route terminated`;
    case 'redact':   return 'match replaced in outbound payload';
    case 'flag':     return 'logged for review · no route change';
    case 'tokenize': return 'match replaced with reversible token';
    case 'allow':    return 'match permitted by policy exception';
    default:         return '';
  }
}

function FindingDetailHF({ id, back }) {
  const fx = React.useMemo(() => {
    const r = synthFinding(new Date());
    r.id = id || r.id;
    return r;
  }, [id]);

  return (
    <div className="hf-detail">
      <div className="hf-detail-head">
        <div style={{minWidth:0, flex:1}}>
          <div className="crumbs"><a onClick={back}>← Findings</a> · {fx.id}</div>

          <div className="hf-status-strip">
            <span className={`hf-status-badge hf-status-badge--${fx.severity}`}>
              <span className="hf-status-dot"></span>
              {fx.severity === 'red' ? 'THREAT' : fx.severity === 'warn' ? 'WARNING' : 'SAFE'}
            </span>
            <span className="hf-status-sep">·</span>
            <span className={`hf-action-badge hf-action-badge--${fx.action}`}>
              {actionLabel(fx.action)}
            </span>
            <span className="hf-status-meta">{actionSubtitle(fx.action, fx)}</span>
          </div>

          <h1 className="hf-h1 hf-h1--detail">
            {fx.category} · <span className="hf-match-mono">{fx.match}</span>
          </h1>
          <div className="hf-sub">tenant <b>{fx.tenant}</b> · pod <b className="mono">{fx.pod}</b> · {fmtTime(fx.ts)} · confidence <b>{fx.confidence}</b></div>
        </div>
        <div className="hf-dash-actions">
          <button className="btn ghost">Mute pattern</button>
          <button className="btn ghost">Assign</button>
          <button className="btn primary">Escalate</button>
        </div>
      </div>

      <div className="hf-detail-grid">
        <section className="hf-panel">
          <header className="hf-panel-h"><span className="t">Evidence</span><span className="k">redacted · tokens resolvable w/ MFA</span></header>
          <div className="hf-evidence">
            <div className="hf-ev-doc">
              <div className="label">{fx.doc} · p. 4</div>
              <div className="hf-ev-body">
                <div>Invoice #INV-4829 — net 30 — billed to {fx.tenant}</div>
                <div>Card on file: <mark className="hf-mark">{fx.match}</mark> (last used 2026-04-12)</div>
                <div>Auth ref: 2F8E···71A ; terminal id 40021</div>
                <div style={{color:'var(--ink-faint)'}}>— generated by billing/print_invoice.py:142</div>
              </div>
            </div>
          </div>
        </section>

        <section className="hf-panel">
          <header className="hf-panel-h"><span className="t">Policy that fired</span><span className="k">#12 block-pci-egress</span></header>
          <pre className="hf-code">{`when finding.category == "PCI"
  and finding.confidence >= 0.75
  and tenant in ["acme-corp","globex-eu"]
then
  action: BLOCK
  route:  splunk-hec, #secops
  tokenize: card-numbers`}</pre>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:8, fontFamily:'JetBrains Mono, monospace'}}>
            last edited by R.Solanki · 2h ago · pending approval from K.Mori
          </div>
        </section>

        <section className="hf-panel">
          <header className="hf-panel-h"><span className="t">Pod path</span><span className="k">ingress → inspect → route</span></header>
          <HfTopology />
        </section>

        <section className="hf-panel">

<script type="text/babel" data-presets="react">
/* ===== surfaces/livescan.jsx ===== */
// Live Scan — the one surface that talks to a real siphon-api.
// POSTs text to /scan and renders findings returned by the scanner.

const LS_SAMPLE = `Hi support team, please charge my visa 4532 0151 1283 0366 (exp 05/29) and
send the receipt to jane.doe@example.com.
Customer SSN on file: 123-45-6789, phone 415-555-0199.
AWS key for the old integration: AKIAIOSFODNN7EXAMPLE (should be rotated).`;

function LiveScan() {
  const defaultUrl = (() => {
    try { return localStorage.getItem('c2:apiUrl') || 'http://127.0.0.1:8080'; }
    catch { return 'http://127.0.0.1:8080'; }
  })();
  const [apiUrl, setApiUrl] = React.useState(defaultUrl);
  // Accept a preloaded text blob from the finding-detail / FP-queue
  // hand-off and clear it so reloads don't keep re-seeding.
  const initialText = React.useMemo(() => {
    try {
      const v = localStorage.getItem('c2:livescan-text');
      if (v != null) { localStorage.removeItem('c2:livescan-text'); return v; }
    } catch {}
    return LS_SAMPLE;
  }, []);
  const [text, setText] = React.useState(initialText);
  const [minConf, setMinConf] = React.useState(0);
  const [requireCtx, setRequireCtx] = React.useState(false);
  const [dedupe, setDedupe] = React.useState(true);
  const [traceOn, setTraceOn] = React.useState(() => !!(window.c2Flag && window.c2Flag('trace_by_default')));
  const [loading, setLoading] = React.useState(false);
  const [health, setHealth] = React.useState('unknown');
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    try { localStorage.setItem('c2:apiUrl', apiUrl); } catch {}
  }, [apiUrl]);

  const pingHealth = React.useCallback(async () => {
    setHealth('checking');
    try {
      const r = await fetch(apiUrl.replace(/\/$/, '') + '/health', { method: 'GET' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      setHealth(j.status === 'ok' ? 'ok' : 'degraded');
    } catch (e) {
      setHealth('down');
    }
  }, [apiUrl]);

  React.useEffect(() => { pingHealth(); }, [pingHealth]);

  const runScan = async () => {
    setLoading(true); setError(null); setResult(null);
    const body = {
      text,
      options: {
        min_confidence: minConf || undefined,
        require_context: requireCtx || undefined,
        deduplicate:     dedupe || undefined,
        trace:           traceOn || undefined,
      },
    };
    try {
      const r = await fetch(apiUrl.replace(/\/$/, '') + '/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
      setResult(j);
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setLoading(false);
    }
  };

  const findings = (result && result.findings) || [];
  const confColor = (c) => c >= 0.9 ? 'var(--safe)' : c >= 0.7 ? 'var(--amber)' : 'var(--ink-soft)';

  // Highlight matched spans in the source text
  const highlighted = React.useMemo(() => {
    if (!findings.length) return null;
    const marks = findings
      .filter(f => f.span && typeof f.span[0] === 'number')
      .map(f => ({ start: f.span[0], end: f.span[1], cat: f.category, conf: f.confidence }))
      .sort((a,b) => a.start - b.start);
    const out = [];
    let cursor = 0;
    marks.forEach((m, i) => {
      if (m.start < cursor) return;
      out.push(<span key={'t'+i}>{text.slice(cursor, m.start)}</span>);
      out.push(
        <mark key={'m'+i}
              title={`${m.cat} · conf ${m.conf.toFixed(2)}`}
              style={{background:'var(--accent-wash)', border:'1px solid var(--accent)', color:'var(--ink-bright)', padding:'0 2px', borderRadius:2}}>
          {text.slice(m.start, m.end)}
        </mark>
      );
      cursor = m.end;
    });
    out.push(<span key="tail">{text.slice(cursor)}</span>);
    return out;
  }, [findings, text]);

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Engineering · Live Scan</div>
          <h1>Live Scan <HelpIcon topic="api" title="siphon-api scan endpoint" size={18} /></h1>
        </div>
        <div className="actions">
          <span className={`chip chip--${health==='ok'?'safe':health==='down'?'red':'warn'}`} title={`API ${health}`}>
            API · {health}
          </span>
          <button className="btn ghost" onClick={pingHealth}>Re-check</button>
        </div>
      </div>

      <div className="box" style={{marginBottom:'var(--gap)'}}>
        <div className="box-title"><span className="t">Endpoint</span><span className="k">POST /scan</span></div>
        <div style={{display:'grid', gridTemplateColumns:'auto 1fr auto auto auto', gap:10, alignItems:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
          <span className="label">API URL</span>
          <input
            type="text"
            value={apiUrl}
            onChange={e => setApiUrl(e.target.value)}
            style={{
              fontFamily:"'JetBrains Mono', monospace", fontSize:12,
              padding:'6px 8px', background:'var(--bg-1)',
              color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
            }}
          />
          <label style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <input type="checkbox" checked={requireCtx} onChange={e => setRequireCtx(e.target.checked)} />
            <span className="label">require-context</span>
          </label>
          <label style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <input type="checkbox" checked={dedupe} onChange={e => setDedupe(e.target.checked)} />
            <span className="label">deduplicate</span>
          </label>
          <label style={{display:'inline-flex', alignItems:'center', gap:6}}
                 title="when on, the server records every candidate's trip through the pipeline so you can see where a detection was accepted or dropped">
            <input type="checkbox" checked={traceOn} onChange={e => setTraceOn(e.target.checked)} />
            <span className="label" style={{color: traceOn ? 'var(--accent)' : undefined}}>trace pipeline</span>
          </label>
          <label style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <span className="label">min-conf</span>
            <input type="number" min="0" max="1" step="0.05" value={minConf}
                   onChange={e => setMinConf(parseFloat(e.target.value) || 0)}
                   style={{width:60, fontFamily:"'JetBrains Mono', monospace", fontSize:12, padding:'4px 6px', background:'var(--bg-1)', color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)'}} />
          </label>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 1fr', gap:'var(--gap)', marginBottom:'var(--gap)'}}>
        <div className="box">
          <div className="box-title"><span className="t">Input text</span><span className="k">{text.length} chars</span></div>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            rows={14}
            style={{
              width:'100%', resize:'vertical',
              fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.6,
              padding:10, background:'var(--bg-1)',
              color:'var(--ink)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
            }}
          />
          <div style={{display:'flex', gap:8, marginTop:10, alignItems:'center'}}>
            <button className="btn primary" onClick={runScan} disabled={loading || !text.trim()}>
              {loading ? 'Scanning…' : '▶ Scan'}
            </button>
            <button className="btn ghost" onClick={() => setText(LS_SAMPLE)}>Load sample</button>
            <button className="btn ghost" onClick={() => { setText(''); setResult(null); setError(null); }}>Clear</button>
            {result && <span className="muted" style={{marginLeft:'auto', fontFamily:"'JetBrains Mono', monospace", fontSize:11}}>
              {result.finding_count} findings · {result.scan_duration_ms}ms · {result.source_pod}
            </span>}
          </div>
        </div>

        <div className="box">
          <div className="box-title"><span className="t">Highlighted</span><span className="k">{findings.length} spans</span></div>
          {error && (
            <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)'}}>
              <b>Error:</b> {error}<br/>
              <span className="muted" style={{fontSize:11}}>Check the server is running and CORS is open for this origin.</span>
            </div>
          )}
          {!error && !result && !loading && (
            <div className="muted" style={{padding:20, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
              ─ no scan yet ─
            </div>
          )}
          {!error && result && (
            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.7, whiteSpace:'pre-wrap', wordBreak:'break-word', padding:'8px 10px', background:'var(--bg-1)', border:'1px dashed var(--line-soft)', borderRadius:'var(--radius)', maxHeight:360, overflow:'auto'}}>
              {highlighted || text}
            </div>
          )}
          {!error && result && result.request_id && (
            <div className="muted" style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10.5, marginTop:8}}>request_id: {result.request_id}</div>
          )}
        </div>
      </div>

      <div className="box">
        <div className="box-title"><span className="t">Findings</span><span className="k">{findings.length} rows</span></div>
        {findings.length === 0 ? (
          <div className="muted" style={{padding:14, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
            {result ? '— nothing detected —' : '— run a scan to see findings —'}
          </div>
        ) : (
          <>
            <div style={{display:'grid', gridTemplateColumns:'1.4fr 1.4fr 2fr 90px 80px 90px', gap:10, padding:'6px 0', borderBottom:'1.5px solid var(--line)'}}>
              <span className="label">Category</span>
              <span className="label">Sub-category</span>
              <span className="label">Match</span>
              <span className="label">Conf</span>
              <span className="label">Ctx</span>
              <span className="label">Span</span>
            </div>
            {findings.map((f,i) => (
              <div key={i} style={{display:'grid', gridTemplateColumns:'1.4fr 1.4fr 2fr 90px 80px 90px', gap:10, padding:'7px 0', borderBottom:'1px solid var(--line-soft)', alignItems:'center', fontSize:12, fontFamily:"'JetBrains Mono', monospace"}}>
                <span style={{color:'var(--ink-bright)'}}>{f.category}</span>
                <span className="muted">{f.sub_category || '—'}</span>
                <span style={{color:'var(--accent)'}}>{f.text}</span>
                <span style={{color: confColor(f.confidence)}}>{(f.confidence != null ? f.confidence.toFixed(2) : '—')}</span>
                <span>{f.has_context ? <span className="chip chip--safe" style={{fontSize:9}}>yes</span> : <span className="chip chip--ghost" style={{fontSize:9}}>no</span>}</span>
                <span className="muted">{f.span ? f.span.join('..') : '—'}</span>
              </div>
            ))}
          </>
        )}
      </div>

      {result && result.trace && <TracePanel trace={result.trace} />}
    </div>
  );
}

// Pipeline trace panel — groups raw StageEvents by (category · sub_category
// · span) so each would-be match becomes one row, with a horizontal strip
// showing which stages it passed and where it got dropped. The order of
// stages mirrors scan_text_with_config: regex → validation → context →
// min_confidence → emit. Alt-decoding candidates get their own pass.
const TRACE_STAGES = [
  { key: 'regex',            label: 'regex',      desc: 'pattern matched bytes' },
  { key: 'validation',       label: 'validate',   desc: 'Luhn / checksum / format' },
  { key: 'context',          label: 'context',    desc: 'keyword proximity' },
  { key: 'ctx_required',     label: 'ctx-gate',   desc: 'pattern requires nearby keyword' },
  { key: 'require_context',  label: 'req-ctx',    desc: 'caller-imposed context gate' },
  { key: 'min_confidence',   label: 'min-conf',   desc: 'caller-imposed confidence floor' },
  { key: 'emit',             label: 'emit',       desc: 'added to result set' },
];
const TRACE_ALT_STAGES = [
  { key: 'alt_regex',        label: 'alt regex',    desc: 'pattern fired on base32/64/ROT13 decoding' },
  { key: 'alt_validation',   label: 'alt validate', desc: 'Luhn / checksum on alt' },
  { key: 'alt_ctx_required', label: 'alt ctx-gate', desc: 'ctx-required patterns cannot fire through alt path' },
  { key: 'alt_confidence',   label: 'alt min-conf', desc: 'caller-imposed confidence floor' },
  { key: 'alt_emit',         label: 'alt emit',     desc: 'added to result set (confidence × 0.9)' },
];

function TracePanel({ trace }) {
  // Group by (pass, cat::sub::span). The span for primary events is in
  // NORMALIZED byte coordinates; for alt events it's in alt-text
  // coordinates. Either way equality within a group identifies the
  // same candidate.
  const groups = React.useMemo(() => {
    const by = new Map();
    trace.forEach(e => {
      const key = `${e.pass}::${e.category}::${e.sub_category}::${e.span[0]}::${e.span[1]}::${e.text}`;
      if (!by.has(key)) {
        by.set(key, {
          pass: e.pass, category: e.category, sub_category: e.sub_category,
          span: e.span, text: e.text, events: [],
        });
      }
      by.get(key).events.push(e);
    });
    // sort: emit-first, then drops by stage order, then passes
    const order = [...TRACE_STAGES, ...TRACE_ALT_STAGES].reduce((acc, s, i) => {
      acc[s.key] = i; return acc;
    }, {});
    const outcomeRank = { emit: 0, drop: 1, pass: 2 };
    return Array.from(by.values()).sort((a, b) => {
      const aFinal = a.events[a.events.length - 1];
      const bFinal = b.events[b.events.length - 1];
      const ao = outcomeRank[aFinal.outcome] ?? 3;
      const bo = outcomeRank[bFinal.outcome] ?? 3;
      if (ao !== bo) return ao - bo;
      return (order[aFinal.stage] || 0) - (order[bFinal.stage] || 0);
    });
  }, [trace]);

  const emitCount = groups.filter(g => g.events.some(e => e.outcome === 'emit')).length;
  const dropCount = groups.filter(g => g.events.some(e => e.outcome === 'drop')).length;

  return (
    <div className="box" style={{marginTop: 'var(--gap)'}}>
      <div className="box-title">
        <span className="t">Pipeline trace</span>
        <span className="k">
          {groups.length} candidate{groups.length === 1 ? '' : 's'} ·{' '}
          <span style={{color:'var(--safe)'}}>{emitCount} emitted</span> ·{' '}
          <span style={{color:'var(--red)'}}>{dropCount} dropped</span>
        </span>
      </div>

      {/* Legend */}
      <div style={{display:'flex', flexWrap:'wrap', gap:12, padding:'8px 0 12px', borderBottom:'1px dashed var(--line-soft)', marginBottom:10, fontFamily:"'JetBrains Mono', monospace", fontSize:10.5}}>
        <span style={{color:'var(--ink-soft)'}}>stages:</span>
        {TRACE_STAGES.map(s => (
          <span key={s.key} className="muted" title={s.desc}>{s.label}</span>
        ))}
        <span className="muted">·</span>
        {TRACE_ALT_STAGES.map(s => (
          <span key={s.key} className="muted" title={s.desc} style={{color:'var(--violet)'}}>{s.label}</span>
        ))}
        <span className="right" style={{marginLeft:'auto'}}>
          <span className="chip chip--safe" style={{fontSize:9, marginRight:4}}>pass</span>
          <span className="chip chip--red" style={{fontSize:9, marginRight:4}}>drop</span>
          <span className="chip chip--teal" style={{fontSize:9}}>emit</span>
        </span>
      </div>

      {groups.length === 0 && (
        <div className="muted" style={{padding:20, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
          — no stage events — (did scanner find any regex hits?) —
        </div>
      )}

      {groups.map((g, i) => {
        const stages = g.pass === 'alt' ? TRACE_ALT_STAGES : TRACE_STAGES;
        const byStage = {};
        g.events.forEach(e => { byStage[e.stage] = e; });
        const finalEvt = g.events[g.events.length - 1];
        const wasEmitted = g.events.some(e => e.outcome === 'emit');
        const wasDropped = g.events.some(e => e.outcome === 'drop');
        return (
          <div key={i} style={{padding:'10px 0', borderBottom:'1px solid var(--line-soft)'}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6, fontFamily:"'JetBrains Mono', monospace", fontSize:12, flexWrap:'wrap'}}>
              <span className={`chip chip--${wasEmitted ? 'safe' : wasDropped ? 'red' : 'warn'}`} style={{fontSize:9, minWidth:50, textAlign:'center'}}>
                {wasEmitted ? 'EMIT' : wasDropped ? 'DROP' : 'PASS'}
              </span>
              {g.pass === 'alt' && <span className="chip chip--teal" style={{fontSize:9, color:'var(--violet)', borderColor:'var(--violet)'}}>ALT-DECODE</span>}
              <span style={{color:'var(--ink-bright)'}}>{g.category}</span>
              <span className="muted">/</span>
              <span style={{color:'var(--cyan)'}}>{g.sub_category}</span>
              <span className="muted">·</span>
              <span style={{color:'var(--accent)', maxWidth:300, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                {g.text}
              </span>
              <span className="muted" style={{marginLeft:'auto', fontSize:10.5}}>span {g.span[0]}..{g.span[1]}</span>
            </div>

            <div style={{display:'flex', gap:2, marginBottom:6, flexWrap:'wrap'}}>
              {stages.map((s, si) => {
                const e = byStage[s.key];
                const color = !e
                  ? { bg: 'var(--bg-3)', fg: 'var(--ink-dim)', border: 'var(--line)' }
                  : e.outcome === 'emit'
                    ? { bg: 'var(--accent-wash)', fg: 'var(--accent)', border: 'var(--accent)' }
                    : e.outcome === 'drop'
                      ? { bg: 'var(--red-wash)', fg: 'var(--red)', border: 'var(--red)' }
                      : { bg: 'var(--amber-wash)', fg: 'var(--amber)', border: 'var(--amber)' };
                return (
                  <React.Fragment key={si}>
                    <span
                      title={e ? `${s.label} · ${e.outcome}${e.confidence != null ? ' · conf ' + e.confidence.toFixed(3) : ''}${e.reason ? '\n' + e.reason : ''}` : `${s.label} · not reached`}
                      style={{
                        padding:'3px 9px',
                        fontFamily:"'JetBrains Mono', monospace",
                        fontSize:10,
                        fontWeight: 600,
                        letterSpacing:'0.06em',
                        textTransform:'uppercase',
                        border:'1px solid ' + color.border,
                        color: color.fg,
                        background: color.bg,
                        borderRadius:'var(--radius)',
                        borderStyle: e ? 'solid' : 'dashed',
                      }}>
                      {s.label}
                    </span>
                    {si < stages.length - 1 && (
                      <span style={{alignSelf:'center', color: e && e.outcome !== 'drop' ? 'var(--accent)' : 'var(--line)', fontSize:12}}>→</span>
                    )}
                  </React.Fragment>
                );
              })}
            </div>

            {finalEvt && finalEvt.reason && (
              <div className="margin-note" style={{
                color: finalEvt.outcome === 'drop' ? 'var(--red)' : 'var(--ink-soft)',
                marginTop:4, fontSize:11,
              }}>
                {finalEvt.outcome === 'drop' ? `dropped at ${finalEvt.stage}: ` : `${finalEvt.stage}: `}
                {finalEvt.reason}
                {finalEvt.confidence != null && ` · confidence ${finalEvt.confidence.toFixed(3)}`}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ===== surfaces/corpusrun.jsx ===== */
// Corpus Runner — batch /scan. Paste N docs separated by a line
// containing "---" and optionally prefix each with [category[,category]]
// to mark expected categories. Renders a per-doc result matrix.

const CR_SAMPLE = `[Contact Information]
Email the team at support@polygoncyber.ca for onboarding.

---

[Contact Information]
Call us at +1 (415) 555-0199 or text 415-555-0199.

---

[PCI]
Please charge the following card:
Visa 4532 0151 1283 0366, exp 05/29, CVV 921.

---

[PII]
Customer SSN on file: 123-45-6789 for claim review.

---

[Secret]
AWS access key AKIAIOSFODNN7EXAMPLE — rotate on next deploy.

---

[negative]
Hello team, meeting moved to 3pm tomorrow in room 204. Agenda attached.`;

function parseCorpus(raw) {
  return raw.split(/^---\s*$/m).map(block => block.trim()).filter(Boolean).map((block, i) => {
    const m = block.match(/^\s*\[([^\]]+)\]\s*\n?/);
    let expected = null;
    let text = block;
    if (m) {
      expected = m[1].split(/[,;]\s*/).map(s => s.trim()).filter(Boolean);
      text = block.slice(m[0].length);
    }
    return { index: i + 1, expected, text: text.trim(), raw: block };
  });
}

function CorpusRunner() {
  const apiUrl = (() => {
    try { return localStorage.getItem('c2:apiUrl') || 'http://127.0.0.1:8080'; }
    catch { return 'http://127.0.0.1:8080'; }
  })();
  const [source, setSource] = React.useState(CR_SAMPLE);
  const [results, setResults] = React.useState([]);   // [{doc, res, err, ms}]
  const [running, setRunning] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [expanded, setExpanded] = React.useState(null);

  const docs = React.useMemo(() => parseCorpus(source), [source]);

  const run = async () => {
    setRunning(true); setResults([]); setProgress(0); setExpanded(null);
    const acc = [];
    for (let i = 0; i < docs.length; i++) {
      const d = docs[i];
      const t0 = performance.now();
      try {
        const r = await fetch(apiUrl.replace(/\/$/, '') + '/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: d.text, options: {} }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
        acc.push({ doc: d, res: j, err: null, ms: performance.now() - t0 });
      } catch (e) {
        acc.push({ doc: d, res: null, err: String(e.message || e), ms: performance.now() - t0 });
      }
      setProgress(i + 1);
      setResults([...acc]);
    }
    setRunning(false);
  };

  // Aggregate stats and categories
  const { totalFindings, byCategory, passCount, failCount, negativeExpected } = React.useMemo(() => {
    let totalFindings = 0;
    const byCategory = {};
    let passCount = 0, failCount = 0, negativeExpected = 0;
    results.forEach(r => {
      if (!r.res) return;
      totalFindings += r.res.finding_count || 0;
      (r.res.findings || []).forEach(f => {
        byCategory[f.category] = (byCategory[f.category] || 0) + 1;
      });
      const exp = r.doc.expected || [];
      const foundCats = new Set((r.res.findings || []).map(f => f.category.toLowerCase()));
      const isNeg = exp.some(e => e.toLowerCase() === 'negative');
      if (isNeg) negativeExpected++;
      let ok;
      if (isNeg) {
        ok = (r.res.finding_count === 0);
      } else if (exp.length) {
        ok = exp.every(e => Array.from(foundCats).some(c => c.includes(e.toLowerCase()) || e.toLowerCase().includes(c)));
      } else {
        ok = true;
      }
      if (ok) passCount++; else failCount++;
    });
    return { totalFindings, byCategory, passCount, failCount, negativeExpected };
  }, [results]);

  const verdict = (r) => {
    if (r.err) return ['err', 'var(--red)'];
    const exp = r.doc.expected || [];
    const cats = (r.res.findings || []).map(f => f.category.toLowerCase());
    const isNeg = exp.some(e => e.toLowerCase() === 'negative');
    if (isNeg) {
      return r.res.finding_count === 0 ? ['pass', 'var(--safe)'] : ['FP', 'var(--red)'];
    }
    if (!exp.length) return ['—', 'var(--ink-soft)'];
    const ok = exp.every(e => cats.some(c => c.includes(e.toLowerCase()) || e.toLowerCase().includes(c)));
    return ok ? ['pass', 'var(--safe)'] : ['miss', 'var(--amber)'];
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Engineering · Corpus Runner</div>
          <h1>Corpus Runner <HelpIcon topic="evasion" title="Evasion defenses" size={18} /></h1>
        </div>
        <div className="actions">
          <span className="muted mono" style={{fontSize:11}}>target: {apiUrl}</span>
          <button className="btn ghost" onClick={() => setSource(CR_SAMPLE)}>Load sample</button>
          <button className="btn primary" onClick={run} disabled={running || !docs.length}>
            {running ? `Running ${progress}/${docs.length}…` : `▶ Run ${docs.length} doc${docs.length===1?'':'s'}`}
          </button>
        </div>
      </div>

      <div className="grid grid-4" style={{marginBottom:'var(--gap)'}}>
        <div className="box"><div className="stat"><span className="s-label">Docs</span><span className="s-val">{docs.length}</span><span className="s-delta">{negativeExpected} negative</span></div></div>
        <div className="box"><div className="stat"><span className="s-label">Pass</span><span className="s-val" style={{color:'var(--safe)'}}>{passCount}</span><span className="s-delta">{results.length ? Math.round((passCount/results.length)*100) : 0}%</span></div></div>
        <div className="box"><div className="stat"><span className="s-label">Fail</span><span className="s-val" style={{color:'var(--red)'}}>{failCount}</span><span className="s-delta">miss · FP · err</span></div></div>
        <div className="box"><div className="stat"><span className="s-label">Findings</span><span className="s-val">{totalFindings}</span><span className="s-delta">across all docs</span></div></div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1.1fr 1.6fr', gap:'var(--gap)', marginBottom:'var(--gap)'}}>
        <div className="box">
          <div className="box-title"><span className="t">Corpus source</span><span className="k">split on lines with ---</span></div>
          <textarea
            value={source}
            onChange={e => setSource(e.target.value)}
            rows={18}
            spellCheck={false}
            style={{
              width:'100%', resize:'vertical',
              fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.6,
              padding:10, background:'var(--bg-1)',
              color:'var(--ink)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
            }}
          />
          <div className="margin-note" style={{marginTop:6}}>
            prefix a doc with <b>[Category]</b> to mark expected; use <b>[negative]</b> for docs that must not produce findings
          </div>
        </div>

        <div className="box">
          <div className="box-title"><span className="t">Category totals</span><span className="k">findings summed across corpus</span></div>
          {Object.keys(byCategory).length === 0 ? (
            <div className="muted" style={{padding:20, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
              {results.length ? '— no findings —' : '— run to populate —'}
            </div>
          ) : (
            Object.entries(byCategory).sort((a,b) => b[1]-a[1]).map(([cat, n]) => {
              const max = Math.max(...Object.values(byCategory));
              return (
                <div key={cat} className="bar-row">
                  <span className="hand-b">{cat}</span>
                  <span className="b"><i style={{width: (n/max*100)+'%', background:'var(--accent)'}}/></span>
                  <span className="n">{n}</span>
                </div>
              );
            })
          )}
        </div>
      </div>

      <div className="box">
        <div className="box-title"><span className="t">Per-doc results</span><span className="k">click a row to drill into findings</span></div>
        <div style={{display:'grid', gridTemplateColumns:'40px 130px 1fr 110px 70px 70px 70px', gap:10, padding:'6px 0', borderBottom:'1.5px solid var(--line)'}}>
          <span className="label">#</span>
          <span className="label">Expected</span>
          <span className="label">Preview</span>
          <span className="label">Categories</span>
          <span className="label">Findings</span>
          <span className="label">Time</span>
          <span className="label">Verdict</span>
        </div>
        {docs.length === 0 && (
          <div className="muted" style={{padding:14, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12}}>
            — paste documents separated by <b>---</b> lines —
          </div>
        )}
        {docs.map((d, i) => {
          const r = results[i];
          const ran = !!r;
          const [vTxt, vColor] = r ? verdict(r) : [ran ? '…' : 'queued', 'var(--ink-faint)'];
          const preview = (d.text || '').replace(/\s+/g,' ').slice(0, 90);
          const cats = r && r.res ? [...new Set((r.res.findings || []).map(f => f.category))] : [];
          const expCls = d.expected && d.expected[0] && d.expected[0].toLowerCase() === 'negative'
            ? 'chip chip--ghost' : d.expected ? 'chip chip--teal' : 'chip chip--ghost';
          return (
            <React.Fragment key={i}>
              <div
                onClick={() => setExpanded(expanded === i ? null : i)}
                style={{display:'grid', gridTemplateColumns:'40px 130px 1fr 110px 70px 70px 70px', gap:10, padding:'8px 0', borderBottom:'1px solid var(--line-soft)', alignItems:'center', fontSize:12, fontFamily:"'JetBrains Mono', monospace", cursor:'pointer', background: expanded===i ? 'var(--bg-3)' : 'transparent'}}>
                <span className="muted">#{d.index}</span>
                <span>{d.expected ? <span className={expCls} style={{fontSize:9}}>{d.expected.join(',')}</span> : <span className="muted">—</span>}</span>
                <span style={{color:'var(--ink-bright)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{preview}{(d.text || '').length > 90 ? '…' : ''}</span>
                <span style={{color:'var(--cyan)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                  {cats.length ? cats.join(', ') : (ran ? '—' : '')}
                </span>
                <span>{r && r.res ? r.res.finding_count : (r && r.err ? '!' : '')}</span>
                <span className="muted">{r ? Math.round(r.ms) + 'ms' : ''}</span>
                <span><span className="chip" style={{color: vColor, borderColor: vColor, background:'transparent', fontSize:9}}>{vTxt}</span></span>
              </div>
              {expanded === i && r && (
                <div style={{padding:'10px 14px', background:'var(--bg-1)', borderBottom:'1px solid var(--line-soft)', fontFamily:"'JetBrains Mono', monospace", fontSize:11.5, lineHeight:1.7}}>
                  {r.err ? (
                    <div style={{color:'var(--red)'}}>{r.err}</div>
                  ) : (
                    <>
                      <div className="label" style={{marginBottom:6}}>Text</div>
                      <div style={{whiteSpace:'pre-wrap', padding:'6px 8px', background:'var(--bg-2)', borderLeft:'2px solid var(--accent)', marginBottom:10}}>{d.text}</div>
                      <div className="label" style={{marginBottom:6}}>Findings ({r.res.finding_count})</div>
                      {(r.res.findings || []).length === 0 ? (
                        <div className="muted">— none —</div>
                      ) : (
                        <div style={{display:'grid', gridTemplateColumns:'1.2fr 1.2fr 2fr 60px 80px', gap:8}}>
                          {(r.res.findings || []).map((f, fi) => (
                            <React.Fragment key={fi}>
                              <span style={{color:'var(--ink-bright)'}}>{f.category}</span>
                              <span className="muted">{f.sub_category || '—'}</span>
                              <span style={{color:'var(--accent)'}}>{f.text}</span>
                              <span>{f.confidence != null ? f.confidence.toFixed(2) : '—'}</span>
                              <span className="muted">{f.span ? f.span.join('..') : '—'}</span>
                            </React.Fragment>
                          ))}
                        </div>
                      )}
                    </>
                  )}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { LiveScan, CorpusRunner });
</script>

<script type="text/babel" data-presets="react">
/* ===== surfaces/apiexplorer.jsx ===== */
// API Explorer — self-documenting sandbox for every siphon-api endpoint.
// Pick an endpoint, tweak params/body, hit Run, see raw JSON + timing +
// generated cURL. No abstractions: this is the "am I talking to the right
// server?" diagnostic tool.

const API_ENDPOINTS = [
  { id: 'health',       method: 'GET',  path: '/health',                     tag: 'meta',  desc: 'Liveness probe' },
  { id: 'metrics',      method: 'GET',  path: '/v1/metrics',                 tag: 'meta',  desc: 'Process metrics + config counts' },
  { id: 'categories',   method: 'GET',  path: '/v1/categories',              tag: 'detect', desc: 'List of all pattern categories' },
  { id: 'patterns',     method: 'GET',  path: '/v1/patterns',                tag: 'detect', desc: 'Enumerate patterns',
    query: [
      { key: 'category', placeholder: 'Credit Card Numbers' },
      { key: 'limit',    placeholder: '50' },
    ] },
  { id: 'profiles',     method: 'GET',  path: '/v1/profiles',                tag: 'detect', desc: 'Masking profiles' },
  { id: 'policies',     method: 'GET',  path: '/v1/policies',                tag: 'admin',  desc: 'Loaded TOML policies (SIPHON_POLICIES_DIR)' },
  { id: 'roles',        method: 'GET',  path: '/v1/roles',                   tag: 'admin',  desc: 'RBAC roles × permissions' },
  { id: 'frameworks',   method: 'GET',  path: '/v1/compliance/frameworks',   tag: 'assure', desc: 'Compliance frameworks + fail categories' },
  { id: 'scan',         method: 'POST', path: '/scan',                       tag: 'detect', desc: 'Scan text for findings',
    body: JSON.stringify({ text: 'contact me at support@example.com', options: {} }, null, 2) },
];

function ApiExplorer() {
  const [selectedId, setSelectedId] = React.useState('health');
  const [queryParams, setQueryParams] = React.useState({});
  const [body, setBody] = React.useState(API_ENDPOINTS.find(e => e.id === 'scan').body);
  const [running, setRunning] = React.useState(false);
  const [result, setResult] = React.useState(null);

  const ep = API_ENDPOINTS.find(e => e.id === selectedId) || API_ENDPOINTS[0];
  const apiUrl = window.SIPHON_API_URL();

  // Reset query inputs when endpoint changes
  React.useEffect(() => { setQueryParams({}); setResult(null); }, [selectedId]);

  const buildUrl = () => {
    const base = apiUrl.replace(/\/$/, '') + ep.path;
    if (ep.method !== 'GET' || !ep.query) return base;
    const parts = Object.entries(queryParams).filter(([, v]) => v && v !== '');
    return parts.length ? base + '?' + parts.map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&') : base;
  };

  const buildCurl = () => {
    const url = buildUrl();
    if (ep.method === 'GET') return `curl -s '${url}'`;
    return `curl -s -X ${ep.method} '${url}' \\\n  -H 'Content-Type: application/json' \\\n  -d '${(body || '').replace(/'/g, "'\\''")}'`;
  };

  const run = async () => {
    setRunning(true); setResult(null);
    const url = buildUrl();
    const t0 = performance.now();
    try {
      const opts = { method: ep.method };
      if (ep.method !== 'GET') {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = body;
      }
      const r = await fetch(url, opts);
      const ct = r.headers.get('content-type') || '';
      const raw = await r.text();
      let parsed = null;
      if (ct.includes('application/json')) {
        try { parsed = JSON.parse(raw); } catch {}
      }
      setResult({
        ok: r.ok,
        status: r.status,
        statusText: r.statusText,
        ms: Math.round(performance.now() - t0),
        headers: Object.fromEntries([...r.headers.entries()]),
        body: parsed,
        raw,
      });
    } catch (e) {
      setResult({
        ok: false, status: 0, statusText: 'network error',
        ms: Math.round(performance.now() - t0),
        error: String(e.message || e),
      });
    } finally {
      setRunning(false);
    }
  };

  const copy = (s) => { try { navigator.clipboard.writeText(s); } catch {} };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Engineering · API Explorer</div>
          <h1>API Explorer <HelpIcon topic="api" title="API reference" size={18} /></h1>
        </div>
        <div className="actions">
          <span className="muted mono" style={{fontSize:11}}>target: {apiUrl}</span>
          <button className="btn primary" onClick={run} disabled={running}>
            {running ? 'Running…' : '▶ Run'}
          </button>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'260px 1fr', gap:'var(--gap)'}}>
        <div className="box" style={{padding:10}}>
          <div className="label" style={{marginBottom:8}}>Endpoints · {API_ENDPOINTS.length}</div>
          {API_ENDPOINTS.map(e => (
            <div
              key={e.id}
              onClick={() => setSelectedId(e.id)}
              style={{
                padding:'6px 6px', borderBottom:'1px dashed var(--line-soft)', cursor:'pointer',
                background: e.id === selectedId ? 'var(--bg-3)' : 'transparent',
              }}>
              <div style={{display:'flex', alignItems:'center', gap:6}}>
                <span className={`chip chip--${e.method==='GET'?'teal':'warn'}`} style={{fontSize:9, minWidth:40, textAlign:'center'}}>{e.method}</span>
                <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, color: e.id === selectedId ? 'var(--accent)' : 'var(--ink-bright)'}}>
                  {e.path}
                </span>
              </div>
              <div className="muted" style={{fontSize:10.5, fontFamily:"'JetBrains Mono', monospace", marginTop:2, marginLeft:46}}>
                {e.desc}
              </div>
            </div>
          ))}
        </div>

        <div>
          <div className="box" style={{marginBottom:'var(--gap)'}}>
            <div className="box-title">
              <span className="t">
                <span className={`chip chip--${ep.method==='GET'?'teal':'warn'}`} style={{marginRight:8}}>{ep.method}</span>
                {ep.path}
              </span>
              <span className="k">{ep.desc}</span>
            </div>

            {ep.method === 'GET' && ep.query && ep.query.length > 0 && (
              <div style={{marginBottom:12}}>
                <div className="label" style={{marginBottom:6}}>Query parameters</div>
                <div style={{display:'grid', gridTemplateColumns:'auto 1fr', gap:8}}>
                  {ep.query.map(q => (
                    <React.Fragment key={q.key}>
                      <span style={{alignSelf:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:12, color:'var(--cyan)'}}>{q.key}</span>
                      <input
                        placeholder={q.placeholder}
                        value={queryParams[q.key] || ''}
                        onChange={e => setQueryParams({ ...queryParams, [q.key]: e.target.value })}
                        style={{
                          fontFamily:"'JetBrains Mono', monospace", fontSize:12,
                          padding:'6px 8px', background:'var(--bg-1)',
                          color:'var(--ink)', border:'1px solid var(--line-strong)', borderRadius:'var(--radius)',
                        }}
                      />
                    </React.Fragment>
                  ))}
                </div>
              </div>
            )}

            {ep.method === 'POST' && (
              <div style={{marginBottom:12}}>
                <div className="label" style={{marginBottom:6}}>Request body (JSON)</div>
                <textarea
                  value={body}
                  onChange={e => setBody(e.target.value)}
                  rows={10}
                  spellCheck={false}
                  style={{
                    width:'100%', resize:'vertical',
                    fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.6,
                    padding:10, background:'var(--bg-1)',
                    color:'var(--ink)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
                  }}
                />
              </div>
            )}

            <div className="label" style={{marginBottom:6}}>Full URL</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr auto', gap:8, alignItems:'center'}}>
              <div className="mono" style={{fontSize:12, padding:'6px 8px', background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)', color:'var(--accent)', overflow:'hidden', textOverflow:'ellipsis'}}>
                {buildUrl()}
              </div>
              <button className="btn ghost" onClick={() => copy(buildUrl())}>Copy URL</button>
            </div>

            <div className="label" style={{marginTop:12, marginBottom:6}}>cURL</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr auto', gap:8, alignItems:'start'}}>
              <pre className="mono" style={{fontSize:11, lineHeight:1.5, padding:'8px 10px', background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)', margin:0, whiteSpace:'pre-wrap', wordBreak:'break-all'}}>{buildCurl()}</pre>
              <button className="btn ghost" onClick={() => copy(buildCurl())}>Copy cURL</button>
            </div>
          </div>

          <div className="box">
            <div className="box-title">
              <span className="t">Response</span>
              <span className="k">
                {result
                  ? <>
                      <span className={`chip chip--${result.ok ? 'safe' : 'red'}`}>{result.status} {result.statusText}</span>
                      {' '}<span className="mono">{result.ms}ms</span>
                    </>
                  : '— click Run —'}
              </span>
            </div>
            {result && result.error && (
              <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)'}}>
                <b>Error:</b> {result.error}
              </div>
            )}
            {result && !result.error && (
              <>
                <div className="label" style={{marginBottom:6}}>Headers</div>
                <pre className="mono" style={{fontSize:10.5, lineHeight:1.5, padding:'6px 10px', background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)', margin:0, marginBottom:12, maxHeight:80, overflow:'auto'}}>
{Object.entries(result.headers).map(([k, v]) => `${k}: ${v}`).join('\n')}
                </pre>

                <div className="label" style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                  <span>Body</span>
                  <button className="btn ghost" onClick={() => copy(result.body ? JSON.stringify(result.body, null, 2) : result.raw)} style={{padding:'2px 8px', fontSize:9}}>Copy</button>
                </div>
                <pre className="mono" style={{fontSize:11, lineHeight:1.5, padding:'8px 10px', background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)', margin:0, maxHeight:480, overflow:'auto', whiteSpace:'pre-wrap', wordBreak:'break-word'}}>
{result.body ? JSON.stringify(result.body, null, 2) : result.raw}
                </pre>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== surfaces/scandiff.jsx ===== */
// Scan Diff — paste two texts, scan both, see which findings are added,
// removed, or shared. Regression test buddy: run this before and after
// any pattern/policy change.

const SD_SAMPLE_A = `Please charge visa 4532 0151 1283 0366, billing to billing@example.com.
SSN on file: 123-45-6789. AWS key AKIAIOSFODNN7EXAMPLE.`;

const SD_SAMPLE_B = `Please charge visa 4532-0151-1283-0366, billing to billing＠example.com.
SSN on file: 123 45 6789. AWS key AKIAIOSFODNN7EXAMPLE.`;

function ScanDiff() {
  const apiUrl = window.SIPHON_API_URL();
  // Finding-detail + FP-queue hand-off: if a preload blob is in
  // localStorage, use it to seed side A (and optionally B) and then
  // clear so a reload doesn't keep re-seeding.
  const initialA = React.useMemo(() => {
    try {
      const v = localStorage.getItem('c2:scandiff-a');
      if (v != null) { localStorage.removeItem('c2:scandiff-a'); return v; }
    } catch {}
    return SD_SAMPLE_A;
  }, []);
  const initialB = React.useMemo(() => {
    try {
      const v = localStorage.getItem('c2:scandiff-b');
      if (v != null) { localStorage.removeItem('c2:scandiff-b'); return v; }
    } catch {}
    return SD_SAMPLE_B;
  }, []);
  const [a, setA] = React.useState(initialA);
  const [b, setB] = React.useState(initialB);
  const [ra, setRa] = React.useState(null);
  const [rb, setRb] = React.useState(null);
  const [running, setRunning] = React.useState(false);
  const [error, setError] = React.useState(null);

  const scan = async (text) => {
    const r = await fetch(apiUrl.replace(/\/$/, '') + '/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, options: {} }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
    return j;
  };

  const runBoth = async () => {
    setRunning(true); setError(null); setRa(null); setRb(null);
    try {
      const [ja, jb] = await Promise.all([scan(a), scan(b)]);
      setRa(ja); setRb(jb);
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setRunning(false);
    }
  };

  // Key findings by "category:text" so we can set-diff. Not perfect but
  // good enough for visual regression triage.
  const keyOf = (f) => `${f.category}::${f.text}`;
  const setA_ = new Set((ra && ra.findings || []).map(keyOf));
  const setB_ = new Set((rb && rb.findings || []).map(keyOf));
  const onlyA = (ra && ra.findings || []).filter(f => !setB_.has(keyOf(f)));
  const onlyB = (rb && rb.findings || []).filter(f => !setA_.has(keyOf(f)));
  const shared = (ra && ra.findings || []).filter(f => setB_.has(keyOf(f)));

  const row = (f, color) => (
    <div style={{display:'grid', gridTemplateColumns:'1.4fr 2fr 60px', gap:8, padding:'5px 0', borderBottom:'1px dashed var(--line-soft)', alignItems:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:11.5}}>
      <span style={{color}}>{f.category}</span>
      <span style={{color:'var(--ink-bright)'}}>{f.text}</span>
      <span className="muted">{f.confidence != null ? f.confidence.toFixed(2) : '—'}</span>
    </div>
  );

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="crumbs">Engineering · Scan Diff</div>
          <h1>Scan Diff <HelpIcon topic="pipeline" title="Detection pipeline" size={18} /></h1>
        </div>
        <div className="actions">
          <span className="muted mono" style={{fontSize:11}}>target: {apiUrl}</span>
          <button className="btn ghost" onClick={() => { setA(SD_SAMPLE_A); setB(SD_SAMPLE_B); }}>Load sample</button>
          <button className="btn ghost" onClick={() => { const t = a; setA(b); setB(t); }}>Swap A↔B</button>
          <button className="btn primary" onClick={runBoth} disabled={running || !a.trim() || !b.trim()}>
            {running ? 'Scanning…' : '▶ Scan both'}
          </button>
        </div>
      </div>

      {error && (
        <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)', marginBottom:'var(--gap)'}}>
          <b>Error:</b> {error}
        </div>
      )}

      <div className="grid grid-4" style={{marginBottom:'var(--gap)'}}>
        <div className="box"><div className="stat"><span className="s-label">A findings</span><span className="s-val">{ra ? ra.finding_count : '—'}</span><span className="s-delta">{ra ? ra.scan_duration_ms + 'ms' : ''}</span></div></div>
        <div className="box"><div className="stat"><span className="s-label">B findings</span><span className="s-val">{rb ? rb.finding_count : '—'}</span><span className="s-delta">{rb ? rb.scan_duration_ms + 'ms' : ''}</span></div></div>
        <div className="box"><div className="stat"><span className="s-label">Only in A</span><span className="s-val" style={{color: onlyA.length ? 'var(--red)' : 'var(--ink-soft)'}}>{ra && rb ? onlyA.length : '—'}</span><span className="s-delta">lost</span></div></div>
        <div className="box"><div className="stat"><span className="s-label">Only in B</span><span className="s-val" style={{color: onlyB.length ? 'var(--safe)' : 'var(--ink-soft)'}}>{ra && rb ? onlyB.length : '—'}</span><span className="s-delta">gained</span></div></div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 1fr', gap:'var(--gap)', marginBottom:'var(--gap)'}}>
        <div className="box">
          <div className="box-title">
            <span className="t">A</span>
            <span className="k">{a.length} chars · {ra ? `${ra.finding_count} findings` : ''}</span>
          </div>
          <textarea
            value={a}
            onChange={e => setA(e.target.value)}
            rows={8}
            spellCheck={false}
            style={{
              width:'100%', resize:'vertical',
              fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.6,
              padding:10, background:'var(--bg-1)',
              color:'var(--ink)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
            }}
          />
        </div>
        <div className="box">
          <div className="box-title">
            <span className="t">B</span>
            <span className="k">{b.length} chars · {rb ? `${rb.finding_count} findings` : ''}</span>
          </div>
          <textarea
            value={b}
            onChange={e => setB(e.target.value)}
            rows={8}
            spellCheck={false}
            style={{
              width:'100%', resize:'vertical',
              fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.6,
              padding:10, background:'var(--bg-1)',
              color:'var(--ink)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius)',
            }}
          />
        </div>
      </div>

      {ra && rb && (
        <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr', gap:'var(--gap)'}}>
          <div className="box">
            <div className="box-title">
              <span className="t" style={{color:'var(--red)'}}>− Only in A</span>
              <span className="k">{onlyA.length}</span>
            </div>
            {onlyA.length === 0
              ? <div className="muted" style={{padding:14, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:11}}>— none lost —</div>
              : onlyA.map((f, i) => <div key={i}>{row(f, 'var(--red)')}</div>)}
          </div>
          <div className="box">
            <div className="box-title">
              <span className="t" style={{color:'var(--safe)'}}>+ Only in B</span>
              <span className="k">{onlyB.length}</span>
            </div>
            {onlyB.length === 0
              ? <div className="muted" style={{padding:14, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:11}}>— none gained —</div>
              : onlyB.map((f, i) => <div key={i}>{row(f, 'var(--safe)')}</div>)}
          </div>
          <div className="box">
            <div className="box-title">
              <span className="t">= Shared</span>
              <span className="k">{shared.length}</span>
            </div>
            {shared.length === 0
              ? <div className="muted" style={{padding:14, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:11}}>— none —</div>
              : shared.map((f, i) => <div key={i}>{row(f, 'var(--cyan)')}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}
