// Timeline — derived from the finding itself: request_id tells us
// when the scan was accepted, ts marks detection, neighbouring
// findings in the same request share the pipeline, and the audit
// event (if present in /v1/audit) closes it out.
function FindingTimeline({ finding, sameReq }) {
  const ax = window.useSiphonApi('/v1/audit?limit=200');
  const events = (ax.data && ax.data.events) || [];
  const auditEvt = events.find(e => e.request_id === finding.request_id);

  const baseMs = auditEvt ? new Date(finding.ts).getTime() - ((auditEvt.duration_ms || 0) | 0) : new Date(finding.ts).getTime();
  const fmt = (ts) => fmtWallClock(ts) + (ts ? '.' + new Date(ts).getMilliseconds().toString().padStart(3, '0') : '');
  const offset = (ts) => {
    const ms = new Date(ts).getTime() - baseMs;
    const sign = ms >= 0 ? '+' : '-';
    return sign + Math.abs(ms) + 'ms';
  };

  const steps = [];
  steps.push({
    ts: new Date(baseMs).toISOString(),
    label: 'request accepted',
    detail: <>source <span className="mono">{finding.source_ip || '—'}</span> · POST /scan · req <span className="mono">{(finding.request_id || '').slice(0, 8)}</span></>,
    marker: 'dim',
  });
  steps.push({
    ts: finding.ts,
    label: 'match detected',
    detail: <>pattern <span className="mono">{finding.sub_category || finding.category}</span> · span {finding.span ? finding.span.join('..') : '—'} · conf <b>{finding.confidence != null ? finding.confidence.toFixed(3) : '—'}</b></>,
    marker: 'accent',
  });
  (sameReq || []).forEach(r => {
    steps.push({
      ts: r.ts,
      label: 'also in same scan',
      detail: <><span className="mono">{r.sub_category || r.category}</span> · <span style={{color:'var(--accent)'}}>{r.text}</span> · conf {r.confidence != null ? r.confidence.toFixed(2) : '—'}</>,
      marker: 'dim',
    });
  });
  if (auditEvt) {
    steps.push({
      ts: auditEvt.timestamp,
      label: 'audit event emitted',
      detail: <>outcome <b>{auditEvt.outcome || '—'}</b> · {auditEvt.finding_count} finding{auditEvt.finding_count === 1 ? '' : 's'} total · duration {auditEvt.duration_ms != null ? Math.round(auditEvt.duration_ms) + 'ms' : '—'}</>,
      marker: 'accent',
    });
  }
  steps.push({
    ts: new Date().toISOString(),
    label: 'you are here',
    detail: <>awaiting analyst decision · <i>Acknowledge</i> or <i>Mark as FP</i></>,
    marker: 'live',
  });

  return (
    <div className="box">
      <div className="box-title"><span className="t">Timeline</span><span className="k">detection → audit → you are here</span></div>
      <div style={{display:'grid', gridTemplateColumns:'100px 16px 1fr', rowGap:8, fontFamily:"'JetBrains Mono', monospace", fontSize:11.5, marginTop:4}}>
        {steps.map((s, i) => {
          const markerColor = s.marker === 'accent' ? 'var(--accent)'
                            : s.marker === 'live'   ? 'var(--red)'
                            : 'var(--ink-faint)';
          return (
            <React.Fragment key={i}>
              <div className="muted mono" style={{fontSize:10.5}} title={s.ts + ' (' + offset(s.ts) + ')'}>
                {fmt(s.ts)}
              </div>
              <div style={{display:'flex', justifyContent:'center', alignItems:'center', position:'relative'}}>
                <span style={{
                  display:'inline-block', width: s.marker === 'live' ? 10 : 8, height: s.marker === 'live' ? 10 : 8,
                  borderRadius:'50%', background: markerColor,
                  boxShadow: s.marker === 'live' ? '0 0 0 2px var(--bg-1), 0 0 8px ' + markerColor : 'none',
                }} />
                {i < steps.length - 1 && (
                  <span style={{
                    position:'absolute', top:'calc(50% + 6px)', bottom:'-8px',
                    width:1, background:'var(--line)',
                  }} />
                )}
              </div>
              <div>
                <div style={{color:'var(--ink-bright)', fontWeight:600}}>{s.label}</div>
                <div className="muted" style={{fontSize:11, marginTop:2, lineHeight:1.5}}>{s.detail}</div>
              </div>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

// PolicyThatFired — walks /v1/policies (loaded from SIPHON_POLICIES_DIR)
// and surfaces any policy whose scan config could have applied to
// this finding's category. Policies are TOML-declared; we can't
// actually evaluate them server-side since siphon-api doesn't run
// the rule engine on /scan — this is a best-match view.
function PolicyThatFired({ finding }) {
  const px = window.useSiphonApi('/v1/policies');
  const policies = (px.data && px.data.policies) || [];
  const loaded = px.data && px.data.loaded;

  const matches = React.useMemo(() => {
    if (!policies.length) return [];
    const cat = (finding.category || '').toLowerCase();
    return policies
      .map(p => {
        const scope = (p.scan && p.scan.categories) || [];
        const hits = scope.filter(c => cat.includes(c.toLowerCase()) || c.toLowerCase().includes(cat));
        return { policy: p, hits };
      })
      .filter(m => m.hits.length > 0);
  }, [policies, finding]);

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Policy that fired</span>
        <span className="k">
          {loaded
            ? <>{matches.length} match · /v1/policies has {policies.length} loaded</>
            : <span className="chip chip--ghost">no policies loaded · set SIPHON_POLICIES_DIR</span>}
        </span>
      </div>

      {!loaded && (
        <div className="muted mono" style={{padding:'6px 0', fontSize:11.5, lineHeight:1.7}}>
          Start siphon-api with <span style={{color:'var(--cyan)'}}>SIPHON_POLICIES_DIR</span> pointing at a directory of <span className="mono">*.toml</span> policy files to populate this panel.
          siphon-api serves them read-only via <span className="mono">/v1/policies</span>.
        </div>
      )}

      {loaded && matches.length === 0 && (
        <div className="muted mono" style={{padding:'6px 0', fontSize:11.5}}>
          No policy in <span className="mono">/v1/policies</span> declares a <span className="mono">scan.categories</span> that includes <span style={{color:'var(--accent)'}}>{finding.category}</span>.
        </div>
      )}

      {matches.map((m, i) => (
        <div key={i} style={{padding:'8px 0', borderBottom: i < matches.length - 1 ? '1px dashed var(--line-soft)' : 'none'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:3, flexWrap:'wrap'}}>
            <span style={{fontFamily:"'Space Grotesk', sans-serif", fontWeight:600, color:'var(--ink-bright)', fontSize:13}}>{m.policy.name}</span>
            <span className="muted mono" style={{fontSize:11}}>v{m.policy.version}</span>
            {m.policy.scan && m.policy.scan.action && (
              <span className={`chip chip--${m.policy.scan.action === 'block' ? 'red' : m.policy.scan.action === 'redact' ? 'warn' : 'safe'}`} style={{fontSize:9}}>
                {m.policy.scan.action.toUpperCase()}
              </span>
            )}
            {m.policy.scan && m.policy.scan.min_confidence > 0 && (
              <span className="muted mono" style={{fontSize:10.5}}>min conf {m.policy.scan.min_confidence}</span>
            )}
          </div>
          {m.policy.description && (
            <div className="muted" style={{fontSize:11.5, marginBottom:3}}>{m.policy.description}</div>
          )}
          <div className="mono" style={{fontSize:10.5, color:'var(--ink-soft)'}}>
            scope: {m.hits.map(h => <span key={h} style={{color:'var(--accent)'}}>{h}</span>).reduce((acc, el, idx) => idx === 0 ? [el] : [...acc, ', ', el], [])}
            {m.policy.rules && m.policy.rules.length > 0 && <> · {m.policy.rules.length} rule{m.policy.rules.length === 1 ? '' : 's'}</>}
          </div>
        </div>
      ))}
    </div>
  );
}

// RelatedFindings — clusters neighbouring findings by four axes:
//   · same request_id     (found in the same scan)
//   · same source_ip      (same caller, different scan)
//   · same category       (same detection type, anywhere in ring)
//   · temporal proximity  (within ±5 min of this finding)
// A finding can hit multiple axes — we surface the strongest signal
// first and render smaller chips for the rest.
function RelatedFindings({ finding, onJump }) {
  const fx = window.useSiphonApi('/v1/findings?limit=500');
  const list = (fx.data && fx.data.findings) || [];
  const selfTs = new Date(finding.ts).getTime();
  const WINDOW_MS = 5 * 60 * 1000;

  const axes = React.useMemo(() => {
    const out = { request: [], source: [], category: [], temporal: [] };
    for (const r of list) {
      if (r.id === finding.id) continue;
      if (r.request_id && r.request_id === finding.request_id) out.request.push(r);
      if (r.source_ip && r.source_ip === finding.source_ip) out.source.push(r);
      if (r.category && r.category === finding.category) out.category.push(r);
      const rt = new Date(r.ts).getTime();
      if (!isNaN(rt) && Math.abs(rt - selfTs) <= WINDOW_MS) out.temporal.push(r);
    }
    return out;
  }, [list, finding]);

  // Build a scored/deduped union: each finding carries which axes it hit
  // so the render can show badges.
  const clustered = React.useMemo(() => {
    const map = new Map();
    const tag = (arr, axis, weight) => {
      for (const r of arr) {
        const e = map.get(r.id) || { finding: r, axes: new Set(), score: 0 };
        if (!e.axes.has(axis)) {
          e.axes.add(axis);
          e.score += weight;
        }
        map.set(r.id, e);
      }
    };
    // weight order mirrors analyst intent: same-scan is always
    // strongest, then same-caller, then same-category, then windowed.
    tag(axes.request, 'request', 8);
    tag(axes.source, 'source', 4);
    tag(axes.category, 'category', 2);
    tag(axes.temporal, 'temporal', 1);
    return Array.from(map.values()).sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return new Date(b.finding.ts).getTime() - new Date(a.finding.ts).getTime();
    });
  }, [axes]);

  const AXIS_META = {
    request:  { label: 'same scan',     color: 'var(--accent)',  hint: 'same request_id' },
    source:   { label: 'same source',   color: 'var(--cyan)',    hint: 'same source_ip' },
    category: { label: 'same category', color: 'var(--amber)',   hint: 'same category' },
    temporal: { label: '±5 min',        color: 'var(--ink-soft)',hint: 'within ±5 min' },
  };

  const counts = {
    request:  axes.request.length,
    source:   axes.source.length,
    category: axes.category.length,
    temporal: axes.temporal.length,
  };

  const offsetLabel = (ts) => {
    const ms = new Date(ts).getTime() - selfTs;
    if (isNaN(ms)) return '—';
    const abs = Math.abs(ms);
    const sign = ms >= 0 ? '+' : '−';
    if (abs < 1000) return sign + abs + 'ms';
    if (abs < 60000) return sign + (abs / 1000).toFixed(1) + 's';
    if (abs < 3600000) return sign + Math.round(abs / 60000) + 'm';
    return sign + Math.round(abs / 3600000) + 'h';
  };

  if (fx.loading && clustered.length === 0) {
    return (
      <div className="box">
        <div className="box-title"><span className="t">Related findings</span><span className="k">loading…</span></div>
      </div>
    );
  }

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Related findings</span>
        <span className="k">
          {clustered.length} in ring · scan <b>{counts.request}</b> · source <b>{counts.source}</b> · category <b>{counts.category}</b> · ±5m <b>{counts.temporal}</b>
        </span>
      </div>

      {clustered.length === 0 ? (
        <div className="muted mono" style={{fontSize:11.5, padding:'6px 0', lineHeight:1.7}}>
          No other findings in <span className="mono">/v1/findings</span> share this finding's scan, source, category, or ±5 min window.
        </div>
      ) : (
        <div style={{display:'grid', gridTemplateColumns:'auto auto 1fr auto', rowGap:6, columnGap:10, alignItems:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:11.5}}>
          {clustered.slice(0, 12).map(({ finding: r, axes: hits }) => (
            <React.Fragment key={r.id}>
              <span className={`chip chip--${r.severity}`} style={{fontSize:9, padding:'2px 6px'}}>{r.severity}</span>
              <span style={{color:'var(--ink-bright)', fontWeight:600}}>
                <a href="#" onClick={(e) => { e.preventDefault(); onJump && onJump(r.id); }}
                   style={{color:'inherit', textDecoration:'none', borderBottom:'1px dashed var(--line-strong)'}}>
                  {r.id}
                </a>
              </span>
              <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0}}>
                <span style={{color:'var(--cyan)'}}>{r.category}</span>
                {r.sub_category && <span className="muted"> / {r.sub_category}</span>}
                <span className="muted"> · </span>
                <span style={{color:'var(--ink)'}}>{r.text}</span>
              </span>
              <span style={{display:'flex', gap:3, alignItems:'center'}}>
                {[...hits].map(a => (
                  <span key={a}
                        title={AXIS_META[a].hint}
                        style={{
                          fontSize:9, padding:'1px 5px',
                          border:`1px solid ${AXIS_META[a].color}`,
                          color: AXIS_META[a].color,
                          borderRadius:2, letterSpacing:0.5,
                        }}>
                    {AXIS_META[a].label}
                  </span>
                ))}
                <span className="muted" style={{fontSize:10, marginLeft:4}} title={r.ts}>
                  {offsetLabel(r.ts)}
                </span>
              </span>
            </React.Fragment>
          ))}
          {clustered.length > 12 && (
            <div className="muted" style={{gridColumn:'1 / -1', fontSize:11, paddingTop:4}}>
              … {clustered.length - 12} more hidden. Narrow the filter on the Findings Console to see them.
            </div>
          )}
        </div>
      )}

      <div className="margin-note" style={{marginTop:8}}>
        ring is bounded ({fx.data ? fx.data.capacity : '—'}) — only findings still in-memory are considered. User-behavioural joins across pods will come later.
      </div>
    </div>
  );
}

// DetectionPipeline — re-runs /scan with trace:true against the
// finding's matched text so the analyst can see every stage in the
// scanner pipeline and the exact moment this match was either
// emitted or dropped. Self-contained (doesn't cross-reference the
// Engineering TracePanel) so it can live in an earlier script block.
const FD_STAGES = [
  { key: 'regex',           label: 'regex' },
  { key: 'validation',      label: 'validate' },
  { key: 'context',         label: 'context' },
  { key: 'ctx_required',    label: 'ctx-gate' },
  { key: 'require_context', label: 'req-ctx' },
  { key: 'min_confidence',  label: 'min-conf' },
  { key: 'emit',            label: 'emit' },
];
function DetectionPipeline({ finding }) {
  const [state, setState] = React.useState({ loading: true, trace: null, error: null });

  React.useEffect(() => {
    if (!finding || !finding.text) {
      setState({ loading: false, trace: [], error: null });
      return;
    }
    let cancelled = false;
    setState(s => ({ ...s, loading: true, error: null }));
    const url = (window.SIPHON_API_URL ? window.SIPHON_API_URL() : 'http://127.0.0.1:8080').replace(/\/$/, '') + '/scan';
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: finding.text, options: { trace: true } }),
    })
      .then(r => r.ok ? r.json() : r.text().then(t => Promise.reject(new Error('HTTP ' + r.status + ': ' + t))))
      .then(j => { if (!cancelled) setState({ loading: false, trace: j.trace || [], error: null }); })
      .catch(e => { if (!cancelled) setState({ loading: false, trace: null, error: String(e.message || e) }); });
    return () => { cancelled = true; };
  }, [finding && finding.id]);

  // Narrow the trace to events about THIS candidate — matching
  // category + sub_category (more forgiving than span since the
  // rescan text is just the matched slice, not the original document).
  const events = (state.trace || []).filter(e =>
    e.category === finding.category &&
    (!finding.sub_category || e.sub_category === finding.sub_category)
  );
  const byStage = {};
  events.forEach(e => { byStage[e.stage] = e; });
  const wasEmitted = events.some(e => e.outcome === 'emit');
  const dropEvt = events.find(e => e.outcome === 'drop');

  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Detection pipeline</span>
        <span className="k">
          re-run of <span className="mono">POST /scan</span> against the matched slice with <span className="mono">trace:true</span>
        </span>
      </div>

      {state.loading && (
        <div className="muted" style={{padding:12, textAlign:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:11.5}}>
          tracing pipeline…
        </div>
      )}
      {state.error && (
        <div className="note" style={{borderColor:'var(--red)', color:'var(--red)', background:'var(--red-wash)'}}>
          <b>Error:</b> {state.error}
        </div>
      )}

      {!state.loading && !state.error && (
        <>
          {/* verdict row */}
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10, flexWrap:'wrap'}}>
            <span className={`chip chip--${wasEmitted ? 'safe' : 'red'}`} style={{fontSize:9, minWidth:50, textAlign:'center'}}>
              {wasEmitted ? 'EMIT' : 'DROP'}
            </span>
            <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11.5, color:'var(--ink)'}}>
              {finding.category} / {finding.sub_category || '—'}
            </span>
            {typeof finding.confidence === 'number' && (
              <span className="muted mono" style={{fontSize:11}}>confidence {finding.confidence.toFixed(3)}</span>
            )}
            <span className="muted mono" style={{marginLeft:'auto', fontSize:10}}>
              {events.length} stage event{events.length === 1 ? '' : 's'}
            </span>
          </div>

          {/* stage strip */}
          <div style={{display:'flex', gap:2, marginBottom:10, flexWrap:'wrap'}}>
            {FD_STAGES.map((s, si) => {
              const e = byStage[s.key];
              const color = !e
                ? { bg: 'var(--bg-3)', fg: 'var(--ink-dim)', border: 'var(--line)' }
                : e.outcome === 'emit'
                  ? { bg: 'var(--accent-wash)', fg: 'var(--accent)', border: 'var(--accent)' }
                  : e.outcome === 'drop'
                    ? { bg: 'var(--red-wash)', fg: 'var(--red)', border: 'var(--red)' }
                    : { bg: 'var(--amber-wash)', fg: 'var(--amber)', border: 'var(--amber)' };
              return (
                <React.Fragment key={si}>
                  <span
                    title={e
                      ? `${s.label} · ${e.outcome}${e.confidence != null ? ' · conf ' + e.confidence.toFixed(3) : ''}${e.reason ? '\n' + e.reason : ''}`
                      : `${s.label} · not reached`}
                    style={{
                      padding:'4px 10px',
                      fontFamily:"'JetBrains Mono', monospace",
                      fontSize:10,
                      fontWeight: 600,
                      letterSpacing:'0.08em',
                      textTransform:'uppercase',
                      border:'1px solid ' + color.border,
                      color: color.fg,
                      background: color.bg,
                      borderRadius:'var(--radius)',
                      borderStyle: e ? 'solid' : 'dashed',
                    }}>
                    {s.label}
                  </span>
                  {si < FD_STAGES.length - 1 && (
                    <span style={{alignSelf:'center', color: e && e.outcome !== 'drop' ? 'var(--accent)' : 'var(--line)', fontSize:12}}>→</span>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* reason for the final outcome */}
          {dropEvt && (
            <div className="margin-note red" style={{marginTop:4}}>
              dropped at <b>{dropEvt.stage}</b>: {dropEvt.reason}
              {dropEvt.confidence != null && <> · confidence {dropEvt.confidence.toFixed(3)}</>}
            </div>
          )}
          {!dropEvt && wasEmitted && byStage.emit && byStage.emit.confidence != null && (
            <div className="margin-note" style={{marginTop:4}}>
              emitted at confidence <b>{byStage.emit.confidence.toFixed(3)}</b>
            </div>
          )}
          {events.length === 0 && (
            <div className="muted mono" style={{padding:8, fontSize:11}}>
              No stage events for this category · may have been the alt-decoding pass or a different pattern class.
            </div>
          )}
        </>
      )}
    </div>
  );
}

function FindingDetail({ id, back }) {
  // ALL hooks must run on every render — any early return below must
  // come AFTER the hook block, otherwise React throws
  // 'Rendered more hooks than during the previous render' once the
  // first /v1/findings response lands.
  const fx = window.useSiphonApi('/v1/findings?limit=500');
  const fpQueue = window.useFpQueue();
  // Escalation state is keyed by `id` (the route param), not `f` — so
  // this hook can run before the ring has loaded the full finding.
  const [escalated, setEscalated] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('c2:escalations') || '[]').includes(id); }
    catch { return false; }
  });
  const { PageBar } = window;
  const list = (fx.data && fx.data.findings) || [];
  const f = list.find(x => x.id === id);

  // Prev/Next navigation — must be computed before the keyboard
  // useEffect so the closure captures the right neighbours. Guarded
  // for the not-yet-loaded case.
  const idx = f ? list.findIndex(x => x.id === id) : -1;
  const prev = idx > 0 ? list[idx - 1] : null;
  const next = idx >= 0 && idx < list.length - 1 ? list[idx + 1] : null;
  const gotoFinding = (fid) => window.__c2_go && window.__c2_go('stream', 'finding:' + fid);
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === 'j' || e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        if (next) gotoFinding(next.id);
      } else if (e.key === 'k' || e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        if (prev) gotoFinding(prev.id);
      } else if (e.key === 'Escape') {
        back && back();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [prev, next, back]);

  // Early returns live here — AFTER all hooks. React's hook-order
  // invariant allows divergent branches as long as the hook calls
  // above this line are the same on every render.
  if (!fx.loading && !f) {
    return (
      <div>
        <PageBar
          crumbs={['Operate', 'Findings', id]}
          title="Finding not found"
          subtitle="This finding is no longer in the ring buffer."
          actions={<button className="btn ghost" onClick={back}>‹ Back to console</button>}
        />
        <div className="note" style={{borderColor:'var(--amber)', color:'var(--amber)', background:'var(--amber-wash)'}}>
          Ring size is bounded ({fx.data ? fx.data.capacity : '—'}). Older
          findings fall off as new ones arrive. Run a fresh scan to populate.
        </div>
      </div>
    );
  }
  if (!f) {
    return <div className="muted" style={{padding:30, textAlign:'center'}}>loading…</div>;
  }

  const sev = f.severity;
  const sameReq = list.filter(x => x.request_id === f.request_id && x.id !== f.id);
  const inFpQueue = fpQueue.some(e => e.finding && e.finding.id === f.id);
  // Queue-only — analyst workflow is to gather several FPs, then switch
  // to the FP Troubleshooter. No navigation on click; the Actions panel
  // already has an explicit 'Open FP queue' button for the task-switch.
  const flagFp = () => { window.c2FpQueueAdd(f); };
  const unflagFp = () => window.c2FpQueueRemove(f.id);
  // Escalation is a placeholder until a real pipeline exists (email,
  // ticketing, PagerDuty, etc.). Persisted locally so the button can
  // flip state between renders. No navigation.
  const toggleEscalate = () => {
    try {
      const cur = JSON.parse(localStorage.getItem('c2:escalations') || '[]');
      const next = escalated ? cur.filter(x => x !== f.id) : [...new Set([...cur, f.id])];
      localStorage.setItem('c2:escalations', JSON.stringify(next));
      setEscalated(!escalated);
    } catch {}
  };

  return (
    <div>
      <PageBar
        crumbs={['Operate', 'Findings', f.id]}
        title={<>
          <span className="mono" style={{color:'var(--ink-bright)'}}>{f.id}</span>
          <span className="muted" style={{marginLeft:10, fontSize:14}}>·</span>
          <span style={{marginLeft:10, fontFamily:"'Space Grotesk', sans-serif"}}>{f.category}</span>
          <span className={`chip chip--${sev}`} style={{marginLeft:12, fontSize:10, verticalAlign:'middle'}}>{sev.toUpperCase()}</span>
          <HelpIcon topic="finding_detail" title="Finding anatomy" size={16} />
        </>}
        subtitle={<>
          <span className="mono">source {f.source_ip}</span>
          <span className="muted"> · req </span>
          <span className="mono">{(f.request_id || '').split('-')[0]}</span>
          <span className="muted"> · </span>
          <span className="mono">{f.ts}</span>
          {idx >= 0 && (
            <>
              <span className="muted"> · </span>
              <span className="mono">{idx + 1} of {list.length} in ring</span>
            </>
          )}
        </>}
        actions={<>
          <window.LivePill source={fx.source} onClick={fx.refetch} />
          <div style={{display:'flex', gap:2, border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', overflow:'hidden'}}>
            <button
              className="btn ghost"
              onClick={() => prev && gotoFinding(prev.id)}
              disabled={!prev}
              title={prev ? `newer · ${prev.id} · k / ← / ↑` : 'no newer finding in ring'}
              style={{border:'none', borderRight:'1px solid var(--line-strong)', padding:'5px 10px', opacity: prev ? 1 : 0.4, cursor: prev ? 'pointer' : 'not-allowed'}}>
              ‹ Prev
            </button>
            <button
              className="btn ghost"
              onClick={() => next && gotoFinding(next.id)}
              disabled={!next}
              title={next ? `older · ${next.id} · j / → / ↓` : 'no older finding in ring'}
              style={{border:'none', padding:'5px 10px', opacity: next ? 1 : 0.4, cursor: next ? 'pointer' : 'not-allowed'}}>
              Next ›
            </button>
          </div>
          <button className="btn ghost" onClick={back} title="Esc">‹ Back</button>
          <button
            className="btn"
            onClick={toggleEscalate}
            title={escalated
              ? 'escalation flagged locally · click to clear · escalation pipeline not yet wired in siphon-api'
              : 'escalate this finding · stored locally until an escalation pipeline is wired'}
            style={escalated ? {color:'var(--red)', borderColor:'var(--red)'} : null}>
            {escalated ? '✦ Escalated' : '✦ Escalate'}
          </button>
          <button className="btn primary">Acknowledge</button>
        </>}
      />

      {/* Top pair — the two panels an analyst reads first: the actual
          matched value + the actions they can take on it. Everything
          below is context/history/provenance. */}
      <div style={{
             display:'grid',
             gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)',
             gap:'var(--gap)',
             alignItems:'stretch',
           }}>
        {/* top · left: Match & context */}
        <div className="box">
          <div className="box-title"><span className="t">Match &amp; context</span><span className="k">from /v1/findings</span></div>

          <div className="label" style={{marginBottom:4}}>Matched value</div>
          <div className="mono" style={{
            fontSize:14, padding:'8px 10px',
            background: 'var(--amber-wash)',
            border:'1.5px solid var(--amber)',
            borderRadius:2, marginBottom:12,
            wordBreak:'break-all',
          }}>{f.text}</div>

          <div className="label" style={{marginBottom:4}}>Span</div>
          <div className="mono" style={{fontSize:12, lineHeight:1.7, padding:'10px 12px', background:'var(--bg-1)', border:'1px dashed var(--line-soft)', borderRadius:2, marginBottom:12}}>
            offset {f.span ? f.span[0] : '—'} → {f.span ? f.span[1] : '—'} ({f.span ? (f.span[1] - f.span[0]) : 0} chars)
          </div>

          <div className="label" style={{marginTop:14, marginBottom:6}}>Signals (from scanner)</div>
          <div style={{fontSize:13, lineHeight:1.9}}>
            <div className="tick">Category <span className="mono">{f.category}</span>{f.sub_category ? <> · sub <span className="mono">{f.sub_category}</span></> : null}</div>
            <div className="tick">Confidence <span className="mono">{f.confidence != null ? f.confidence.toFixed(3) : '—'}</span></div>
            <div className={f.has_context ? 'tick' : 'cross'}>Context {f.has_context ? 'matched' : 'not matched'}</div>
            <div className="tick">Severity <span className="mono">{f.severity}</span> (derived)</div>
          </div>

          {f.metadata && Object.keys(f.metadata).length > 0 && (
            <>
              <div className="label" style={{marginTop:14, marginBottom:6}}>Metadata (from pattern match)</div>
              <div className="mono" style={{fontSize:11, lineHeight:1.8, background:'var(--bg-1)', padding:10, border:'1px dashed var(--line-soft)'}}>
                {Object.entries(f.metadata).map(([k, v]) => (
                  <div key={k}><span style={{color:'var(--cyan)'}}>{k}</span> = <span style={{color:'var(--accent)'}}>{String(v)}</span></div>
                ))}
              </div>
            </>
          )}

          {sameReq.length > 0 && (
            <>
              <div className="label" style={{marginTop:14, marginBottom:6}}>Other findings in the same scan</div>
              <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11.5, lineHeight:1.8}}>
                {sameReq.map(r => (
                  <div key={r.id}>
                    <span className={`chip chip--${r.severity}`} style={{fontSize:9}}>{r.severity}</span>{' '}
                    <span style={{color:'var(--cyan)'}}>{r.category}</span> / {r.sub_category}{' '}
                    · <span style={{color:'var(--ink-bright)'}}>{r.text}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>

        {/* top · right: Actions */}
        <div className="box">
          <div className="box-title"><span className="t">Actions</span><span className="k">this finding</span></div>
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {inFpQueue ? (
              <button className="btn" onClick={unflagFp} style={{color:'var(--amber)', borderColor:'var(--amber)'}}>
                ⚑ Remove from FP queue
              </button>
            ) : (
              <button className="btn primary" onClick={flagFp}>
                ⚑ Flag as false positive…
              </button>
            )}
            <button
              className="btn ghost"
              onClick={() => window.__c2_go && window.__c2_go('fpqueue')}>
              Open FP queue ({fpQueue.length})
            </button>
            <button
              className="btn"
              onClick={() => {
                try {
                  localStorage.setItem('c2:scandiff-a', f.text || '');
                  // seed side B with a minimally redacted variant so the diff
                  // is non-trivial on first paint. Analyst can overwrite.
                  const masked = (f.text || '').replace(/[A-Za-z0-9]/g, '*');
                  localStorage.setItem('c2:scandiff-b', masked);
                } catch {}
                window.__c2_go && window.__c2_go('scandiff');
              }}
              title="compare this match against a mitigated variant">
              Send to Scan Diff ⇌
            </button>
            <button
              className="btn"
              onClick={() => {
                try { localStorage.setItem('c2:livescan-text', f.text || ''); } catch {}
                window.__c2_go && window.__c2_go('livescan');
              }}
              title="open this match's text in Live Scan for re-analysis">
              Send to Live Scan ▶
            </button>
            <button
              className="btn"
              onClick={() => {
                try { navigator.clipboard.writeText(JSON.stringify(f, null, 2)); } catch {}
              }}>
              Copy record as JSON
            </button>
            <button
              className="btn ghost"
              onClick={() => window.__c2_go && window.__c2_go('patterns')}>
              Open in Patterns browser
            </button>
          </div>
        </div>
      </div>

      {/* 3-row detail grid. Boxes flow left-to-right into equal-width
          columns: DP|SD, Related|Record, Timeline|Policy.
          alignItems:stretch so both cells in a row match heights —
          analysts read the layout as an aligned grid, not a ragged
          masonry. minmax(0,1fr) keeps long mono strings from blowing
          out column widths. */}
      <div className="finding-hero"
           style={{
             marginTop:'var(--gap)',
             gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)',
             alignItems:'stretch',
           }}>
        {/* row 1 · left: Detection pipeline */}
        <DetectionPipeline finding={f} />

        {/* row 1 · right: Source → Destination */}
        <SourceDestination finding={f} />

        {/* row 2 · left: Related findings (onJump hops via gotoFinding
            so j/k shortcuts stay consistent) */}
        <RelatedFindings finding={f} onJump={gotoFinding} />

        {/* row 2 · right: Record */}
        <div className="box">
          <div className="box-title"><span className="t">Record</span><span className="k">raw shape</span></div>
          <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:8}}>
            <span className={`chip chip--${sev}`} style={{fontSize:12, padding:'4px 12px'}}>{f.severity.toUpperCase()}</span>
            <span className="chip">{f.category}</span>
          </div>
          <div className="kv">
            <span className="k">Finding id</span>      <span className="v mono">{f.id}</span>
            <span className="k">Request id</span>      <span className="v mono">{f.request_id}</span>
            <span className="k">Timestamp</span>       <span className="v mono">{f.ts}</span>
            <span className="k">Source IP</span>       <span className="v mono">{f.source_ip}</span>
            <span className="k">Category</span>        <span className="v">{f.category}</span>
            <span className="k">Sub-category</span>    <span className="v">{f.sub_category || '—'}</span>
            <span className="k">Confidence</span>      <span className="v mono">{f.confidence != null ? f.confidence.toFixed(3) : '—'}</span>
            <span className="k">Context matched</span> <span className="v">{f.has_context ? 'yes' : 'no'}</span>
            <span className="k">Span</span>            <span className="v mono">{f.span ? f.span.join('..') : '—'}</span>
            <span className="k">Severity</span>        <span className="v">{f.severity}</span>
          </div>
        </div>

        {/* row 3 · left: Timeline */}
        <FindingTimeline finding={f} sameReq={sameReq} />

        {/* row 3 · right: Policy that fired */}
        <PolicyThatFired finding={f} />
      </div>
    </div>
  );
}

Object.assign(window, { Stream, FindingDetail, fmtWallClock });

</script>

<script type="text/babel" data-presets="react">
/* ===== surfaces/logs.jsx ===== */
// Pod Logs — terminal-style live logs from the Siphon pods.
// One main panel (the terminal) + the topbar filters. That's it.

function Logs() {
  const [pod, setPod] = React.useState('siphon-gw');
  const [level, setLevel] = React.useState('info+');
  const [search, setSearch] = React.useState('');
  const [follow, setFollow] = React.useState(true);
  const [tick, setTick] = React.useState(0);

  // Simulated live tail — advance 'tick' every 1.5s so we see new lines
  React.useEffect(() => {
    if (!follow) return;
    const t = setInterval(() => setTick(x => x + 1), 1500);
    return () => clearInterval(t);
  }, [follow]);

  const PODS = [
    ['siphon-gw',      'OK',   'ingress gateway · 3/3 replicas'],
    ['siphon-api',     'OK',   'detection api · 6/6'],
    ['siphon-fs',      'OK',   'file scanner · 18/18'],
    ['siphon-ds',      'WARN', 'datastore · 2/3 (1 replica lagging)'],
    ['siphon-vision',  'WARN', 'image/OCR · 3/4'],
    ['siphon-ml',      'OK',   'classifier fleet · 4/4'],
    ['siphon-classify','OK',   'routing · 2/2'],
  ];

  // Log-line generator
  const tpl = {
    'siphon-gw': [
      ['info',  'req',  'GET /v1/scan tenant=<v>{t}</v> bytes=<v>{b}</v> mime=<v>{m}</v>'],
      ['info',  'req',  'POST /v1/embed tenant=<v>{t}</v> model=<v>classify-v2.3.1</v>'],
      ['warn',  'rate', 'tenant=<v>{t}</v> 429 exceeded <v>200 rps</v> — backpressure engaged'],
      ['info',  'auth', 'sk_live_••••<v>{k}</v> role=<v>Operator</v> tenant=<v>{t}</v>'],
      ['error', 'tls',  'peer cert verify failed host=<v>{t}.egress.internal</v>'],
    ],
    'siphon-api': [
      ['info',  'det',  'match <k>pattern</k>=<v>pci.visa.v3</v> <k>luhn</k>=✓ <k>bin</k>=<v>visa-us</v>'],
      ['info',  'det',  'classifier <k>invoice-intent</k>=<v>0.88</v> <k>passthrough</k>=<v>no</v>'],
      ['debug', 'nfkc', 'fullwidth digits normalised len=<v>{b}</v>'],
      ['info',  'pol',  'policy#<v>12</v> action=<v>BLOCK</v> reason=<v>pci-egress</v>'],
      ['warn',  'edm',  'vault <v>customer-ccs</v> latency <v>p95=62ms</v> (sla 40ms)'],
    ],
    'siphon-fs': [
      ['info',  'scan', 'file <v>doc_{b}.pdf</v> pages=<v>3</v> tokens=<v>12004</v>'],
      ['info',  'parse','mime=<v>application/pdf</v> ocr=<v>skipped</v>'],
      ['warn',  'parse','zip bomb heuristic · depth=<v>5</v> halted'],
      ['info',  'fwd',  'splunk-hec batch=<v>512</v> bytes=<v>41.2kb</v> ack=✓'],
      ['debug', 'gc',   'arena=<v>14</v> freed=<v>128mb</v>'],
    ],
    'siphon-ds': [
      ['info',  'rep',  'replica <v>2</v> caught up · lag=<v>82ms</v>'],
      ['warn',  'rep',  'replica <v>3</v> lag=<v>3.8s</v> above <v>1s</v> threshold'],
      ['info',  'q',    'queue depth=<v>412</v> drain=<v>1.4k/s</v>'],
      ['debug', 'ck',   'checkpoint flushed · <v>14MB</v>'],
      ['error', 'rep',  'follower lost · attempting rejoin attempt=<v>3</v>'],
    ],
    'siphon-vision': [
      ['info',  'ocr',  'img=<v>receipt_{b}.png</v> words=<v>214</v> conf=<v>0.91</v>'],
      ['warn',  'ocr',  'low contrast · retrying with denoise+2'],
      ['info',  'det',  'match <k>pattern</k>=<v>pci.mc.v2</v> from ocr tokens'],
      ['debug', 'mem',  'cuda arena=<v>2.1GB</v> peak=<v>2.6GB</v>'],
      ['error', 'ocr',  'model <v>v2.1</v> timeout · falling back to <v>v2.0</v>'],
    ],
    'siphon-ml':       [['info','cls','batch=32 p50=18ms p95=41ms'],['info','cls','model=classify-v2.3.1 loaded'],['debug','cache','embedding cache hit=0.74']],
    'siphon-classify': [['info','route','tenant=<v>{t}</v> → detector-pool=<v>B</v>'],['info','route','policy tag=<v>egress-scan</v>']],
  };

  const tenants = ['acme-corp','globex-eu','initech','stark-labs','wayne-ent'];
  const mimes = ['application/pdf','text/plain','image/png','application/json'];

  const lines = (() => {
    const src = tpl[pod] || tpl['siphon-gw'];
    const now = new Date();
    now.setSeconds(now.getSeconds() - 0);
    const out = [];
    // 140 lines back in time, interleaved
    for (let i = 0; i < 140 + tick; i++) {
      const r = src[(i * 7 + tick * 3) % src.length];
      const ts = new Date(now.getTime() - i * 120 - (tick * 150));
      const line = {
        ts: String(ts.getHours()).padStart(2,'0') + ':' + String(ts.getMinutes()).padStart(2,'0') + ':' + String(ts.getSeconds()).padStart(2,'0'),
        pod: pod,
        lvl: r[0],
        tag: r[1],
        msg: r[2]
          .replace(/\{t\}/g, tenants[(i*3) % tenants.length])
          .replace(/\{b\}/g, String(1200 - i))
          .replace(/\{k\}/g, (i * 17).toString(16).slice(-4))
          .replace(/\{m\}/g, mimes[i % mimes.length]),
      };
      out.push(line);
    }
    return out;
  })();

  // Filter
  const levelOrder = { debug: 0, info: 1, warn: 2, error: 3 };
  const minLvl = { 'all': 0, 'info+': 1, 'warn+': 2, 'error': 3 }[level] ?? 1;
  const filtered = lines.filter(l =>
    levelOrder[l.lvl] >= minLvl &&
    (!search || (l.msg + ' ' + l.tag).toLowerCase().includes(search.toLowerCase()))
  );

  const { PageBar } = window;
  const podMeta = PODS.find(p => p[0] === pod) || PODS[0];

  return (
    <div>
      <PageBar
        crumbs={['Overview', 'Pod Logs']}
        title="Pod Logs"
        subtitle={`${pod} · ${podMeta[2]} · ${filtered.length} lines in buffer`}
        search={search} setSearch={setSearch}
        filters={[
          { label: 'Pod',   value: pod },
          { label: 'Level', value: level },
          { label: 'Time',  value: 'last 30m' },
          { label: 'Tenant',value: 'any' },
          { label: 'Tag',   value: 'any' },
        ]}
        actions={<>
          <window.FixtureBadge reason="no log aggregator — lines generated client-side" />
          <button className="btn ghost"
            onClick={() => setFollow(f => !f)}
            style={{color: follow ? 'var(--safe)' : 'var(--ink-soft)'}}>
            {follow ? '● tail -f' : '❘❘ paused'}
          </button>
          <button className="btn">Download .log</button>
          <button className="btn">Copy URL</button>
          <button className="btn primary">Open in SIEM</button>
        </>}
      />

      {/* quick pod switcher — inline row below the bar */}
      <div className="row" style={{marginBottom:'var(--gap)', flexWrap:'wrap'}}>
        <span className="label" style={{alignSelf:'center'}}>Pod</span>
        {PODS.map(([p, st]) => (
          <button key={p}
            onClick={() => setPod(p)}
            className="btn ghost"
            style={{
              padding: '3px 10px', fontSize: 10,
              background: pod === p ? 'var(--accent)' : 'transparent',
              color: pod === p ? '#e8efe6' : 'var(--ink)',
              borderColor: pod === p ? 'var(--accent)' : 'var(--line)'
            }}>
            <span style={{
              display:'inline-block', width:8, height:8, borderRadius:'50%',
              background: st === 'OK' ? 'var(--safe)' : 'var(--amber)',
              marginRight:6, verticalAlign:'middle'
            }}/>
            {p}
          </button>
        ))}
        <span className="right label" style={{alignSelf:'center'}}>Level</span>
        {['all','info+','warn+','error'].map(lv => (
          <button key={lv}
            onClick={() => setLevel(lv)}
            className="btn ghost"
            style={{
              padding:'3px 10px', fontSize:10,
              background: level === lv ? 'var(--accent)' : 'transparent',

  // default-select the first category once categories arrive
  React.useEffect(() => {
    if (!selected && cats.data && cats.data.categories && cats.data.categories.length) {

  const pats = window.useSiphonApi(
    selected ? `/v1/patterns?category=${encodeURIComponent(selected)}&limit=500` : '/v1/patterns?limit=0',
    [selected]
  );

  const avgSpec = (list) => {
    if (!list || !list.length) return 0;
    return list.reduce((a, b) => a + (b.specificity || 0), 0) / list.length;
  };

  const catList = (cats.data && cats.data.categories) || [];
  const catFiltered = filter
    ? catList.filter(c => c.category.toLowerCase().includes(filter.toLowerCase()))

  const patList = (pats.data && pats.data.patterns) || [];

          {catFiltered.map((c, i) => (
            <div
              key={i}
              onClick={() => setSelected(c.category)}
              style={{
                display:'flex', justifyContent:'space-between', padding:'4px 6px',

                    <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                      {active.categories.map((c, i) => <span key={i} className="chip">{c}</span>)}
                    </div>
                  ) : <div className="muted" style={{fontSize:11}}>— presets only —</div>}
                </div>
              </div>

              {active.confidence_overrides && Object.keys(active.confidence_overrides).length > 0 && (
                <>
                  <hr className="sep" />
                  <div className="label" style={{marginBottom:6}}>Confidence overrides</div>
                  <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.8}}>
                    {Object.entries(active.confidence_overrides).map(([cat, val]) => (
                      <div key={cat}><span className="muted">{cat}</span> → <span style={{color:'var(--accent)'}}>{val}</span></div>
                    ))}
                  </div>
                </>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
// PatternDetail — read-only drill-in view for a single pattern,
// keyed by (category, sub_category). Phase 1: purely render-side.
// Edit/Reset/Enable/Disable/Simulator/Threshold buttons are present
// but disabled with honest tooltips pointing at the Phase that
// unlocks each. Stats are computed client-side off /v1/findings +
// the local FP queue — no server-side per-pattern aggregation exists
// yet (needs pattern_id on findings, Phase 3).
// ────────────────────────────────────────────────────────────────
function PatternStatsBox({ stats, ringCapacity }) {
  if (!stats || stats.count === 0) {
    return (
      <div className="box">
        <div className="box-title"><span className="t">Detection stats</span><span className="k">from /v1/findings ring</span></div>
        <div className="muted mono" style={{padding:'6px 0', fontSize:11.5, lineHeight:1.7}}>
          No findings for this pattern in the ring (capacity {ringCapacity || '—'}).
          Run a scan that fires this pattern to populate stats.
        </div>
      </div>
    );
  }
  const fmtPct = (n) => (n * 100).toFixed(1) + '%';
  const fmt3 = (n) => n != null ? n.toFixed(3) : '—';
  const wc = window.fmtWallClock || ((s) => s || '—');
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Detection stats</span>
        <span className="k">last {stats.count} hit{stats.count === 1 ? '' : 's'} in ring · date range {wc(stats.firstTs)} → {wc(stats.lastTs)}</span>
      </div>
      <div className="kv" style={{gridTemplateColumns:'auto 1fr'}}>
        <span className="k">Fire count</span>       <span className="v mono">{stats.count}</span>
        <span className="k">First seen</span>       <span className="v mono">{stats.firstTs || '—'}</span>
        <span className="k">Last seen</span>        <span className="v mono">{stats.lastTs || '—'}</span>
        <span className="k">Unique sources</span>   <span className="v mono">{stats.uniqueSources}</span>
        <span className="k">Confidence</span>       <span className="v mono">{fmt3(stats.confMin)} · avg {fmt3(stats.confAvg)} · {fmt3(stats.confMax)}</span>
        <span className="k">Flagged as FP</span>    <span className="v mono">{stats.fpCount} · <span style={{color: stats.fpRate > 0.2 ? 'var(--red)' : stats.fpRate > 0.05 ? 'var(--amber)' : 'var(--ink-soft)'}}>{fmtPct(stats.fpRate)} FP rate</span></span>
      </div>
      <div className="margin-note" style={{marginTop:8}}>
        Stats derived from in-memory findings ring (bounded to {ringCapacity || '—'} entries) + local FP queue.
        Per-pattern aggregation with full-history FP rate ships once findings carry <span className="mono">pattern_id</span> (Phase 3).
      </div>
    </div>
  );
}

function PatternRegexBox({ pattern }) {
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Regex</span>

function PatternKeywordsBox({ pattern }) {
  // Context keywords + proximity are served by /v1/patterns (Phase 1b).

    <div className="box">
      <div className="box-title">
        <span className="t">Context keywords</span>
        <span className="k">
          {kws.length > 0
            ? <>{kws.length} keyword{kws.length === 1 ? '' : 's'} · </>
            : null}
          {pattern.context_required
            ? <>requirement: <b>required</b> · at least one must appear within the proximity window</>
            : <>requirement: <b>optional</b> · boost confidence but don't gate emission</>}
        </span>
      </div>
      {kws.length === 0 ? (
        <div className="note" style={{borderColor:'var(--line-strong)', background:'var(--bg-1)', color:'var(--ink-soft)', fontSize:12, lineHeight:1.7}}>
          No dedicated keyword list for <span className="mono">({pattern.category}, {pattern.sub_category})</span>.
          {pattern.context_required
            ? <> Context is marked <b>required</b> but the scanner falls through to category-level keywords when no sub-category entry exists.</>
            : <> This pattern relies on the regex + validators; context keywords would be additive.</>}
          <br/>
          <b>Phase 5</b> enables adding a keyword set + per-keyword toggle for this pattern via the overrides layer.
        </div>
      ) : (
        <>
          <div style={{display:'flex', flexWrap:'wrap', gap:4, padding:'4px 0'}}>
            {kws.map((kw, i) => (
              <span key={i}
                    className="chip chip--teal"

                    style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, cursor:'default'}}>
                {kw}
              </span>

          </div>

            Keywords are matched case-insensitively via Aho-Corasick. Per-keyword enable/disable + add/remove + fuzzy-match toggle ship with the overrides layer (<b>Phase 5</b>).
          </div>
        </>
      )}
    </div>
  );
}

function PatternProximityBox({ pattern }) {
  // Proximity is served by /v1/patterns (Phase 1b) — pulled from the
  // ContextEntry.distance for this (category, sub_category). Falls
  // back to siphon-core's DEFAULT_DISTANCE (50 chars) when the pattern
  // has no dedicated keyword entry.
  const windowChars = pattern.proximity_chars != null ? pattern.proximity_chars : 50;
  const hasKeywords = (pattern.context_keywords || []).length > 0;
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Proximity</span>
        <span className="k">
          context match window ·{' '}
          {hasKeywords
            ? <>from <span className="mono">ContextEntry.distance</span></>
            : <>siphon-core default · no dedicated entry</>}
        </span>
      </div>
      <div style={{padding:'4px 0 8px'}}>
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
          <span className="mono" style={{fontSize:18, color:'var(--accent)', minWidth:60}}>±{windowChars}</span>
          <span className="muted mono" style={{fontSize:11}}>chars around the match</span>
        </div>
        {/* visual: matched span centre with the proximity window either side */}
        <div style={{position:'relative', background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:2, height:26, overflow:'hidden'}}>
          <div style={{position:'absolute', left:'20%', right:'20%', top:0, bottom:0, background:'var(--accent-wash)', borderLeft:'1px dashed var(--accent)', borderRight:'1px dashed var(--accent)'}} />
          <div style={{position:'absolute', left:'calc(50% - 40px)', width:80, top:3, bottom:3, background:'var(--amber-wash)', border:'1.5px solid var(--amber)', borderRadius:2}} />
          <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:'var(--ink-soft)'}}>
            <span style={{position:'absolute', left:6}}>keyword zone</span>
            <span style={{color:'var(--ink-bright)', zIndex:1}}>match</span>
            <span style={{position:'absolute', right:6}}>keyword zone</span>
          </div>
        </div>
        <div className="margin-note" style={{marginTop:8}}>
          The window expands <span className="mono">±{windowChars}</span> chars around the matched span;
          context keywords must land inside it to satisfy the <i>context required</i> gate.
          Per-pattern override + unit switch (chars vs tokens vs lines) lands with the overrides layer
          (<b>Phase 5</b>). Change history (<b>Phase 7</b>) will record proximity changes alongside regex/keyword edits.
        </div>
      </div>
    </div>
  );
}

function PatternValidatorsBox({ pattern }) {
  // Validators today are compile-time Rust fns applied per category
  // (Luhn for PCI, IBAN checksums, BIN lookups, etc.). They're not
  // individually declared per pattern. Honest empty state + a nod at
  // what becomes possible in the overrides model.
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Validators</span>
        <span className="k">compile-time · applied per category</span>
      </div>
      <div className="note" style={{borderColor:'var(--line-strong)', background:'var(--bg-1)', color:'var(--ink-soft)', fontSize:12, lineHeight:1.7}}>
        Validators aren't attached to patterns individually — they're Rust fns in
        <span className="mono"> crates/siphon-core/src/validation/</span> dispatched by category
        (Luhn check for PCI, IBAN checksum, BIN lookup, etc.).
        <br/>
        <b>Phase 5</b> surfaces the dispatch map + lets a pattern opt-in or opt-out of the default validator set via the overrides layer.
        Defining new validators still requires Rust code.
      </div>
    </div>

}

function PatternSpecificityBox({ pattern }) {
  const pct = Math.round((pattern.specificity || 0) * 100);
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Specificity</span>

      </div>

        <div style={{background:'var(--bg-1)', border:'1px solid var(--line-soft)', borderRadius:2, height:10, overflow:'hidden'}}>
          <div style={{background:'var(--accent)', height:'100%', width: pct + '%'}} />
        </div>
        <div className="margin-note" style={{marginTop:6}}>
          Higher specificity → larger confidence boost when this pattern fires.
          Default is set in <span className="mono">crates/siphon-core/src/patterns/mod.rs</span>.
        </div>
      </div>

}

function PatternSimulatorStub() {
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Simulator</span>
        <span className="k">Phase 2 · reuses /scan?trace=true</span>
      </div>
      <div className="note" style={{borderColor:'var(--line-strong)', background:'var(--bg-1)', color:'var(--ink-soft)', fontSize:12, lineHeight:1.7}}>
        The pattern simulator will let you paste or pick text from the findings ring and re-run
        just this pattern through the scanner pipeline with <span className="mono">trace:true</span>,
        showing which stages it passed / was dropped at.
        <br/>
        Historical-data mode will loop through recent findings that fired this pattern so you can
        see how a regex or keyword change would affect them retroactively. File-mode simulation
        goes through <b>siphon-fs</b> (Phase 2b).
      </div>
    </div>
  );
}

function PatternThresholdStub() {
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Unique-count threshold</span>
        <span className="k">Phase 9 · belongs in policies, not patterns</span>
      </div>
      <div className="note" style={{borderColor:'var(--line-strong)', background:'var(--bg-1)', color:'var(--ink-soft)', fontSize:12, lineHeight:1.7}}>
        A threshold like "1 SIN is fine, 2 distinct SINs = block" is a policy concern, not a pattern
        property — one pattern can be tolerated or blocked depending on which policy picks it up.
        <br/>
        <b>Phase 9</b> adds <span className="mono">scan.max_unique_count</span> to the Policy schema and enforcement in the scanner.
        This box becomes a read-only cross-link to the policies that apply a threshold to this pattern.
      </div>
    </div>
  );
}

function PatternDetail({ category, sub_category, back }) {
  // Hooks first — rules of hooks. No early returns above this block.
  const pats = window.useSiphonApi(
    category ? `/v1/patterns?category=${encodeURIComponent(category)}&limit=500` : '/v1/patterns?limit=0'
  );
  const fx = window.useSiphonApi('/v1/findings?limit=500');
  const fpQueue = window.useFpQueue();
  const { PageBar } = window;

  const list = (pats.data && pats.data.patterns) || [];
  const p = list.find(x => x.sub_category === sub_category);
  const findings = (fx.data && fx.data.findings) || [];

  // Prev/Next across sibling patterns in this category (j/k/arrows).
  const idx = p ? list.findIndex(x => x.sub_category === sub_category) : -1;
  const prev = idx > 0 ? list[idx - 1] : null;
  const next = idx >= 0 && idx < list.length - 1 ? list[idx + 1] : null;
  const gotoPat = (sub) =>
    window.__c2_go && window.__c2_go('patterns', 'pattern:' + category + '/' + sub);
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === 'j' || e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        if (next) gotoPat(next.sub_category);
      } else if (e.key === 'k' || e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        if (prev) gotoPat(prev.sub_category);
      } else if (e.key === 'Escape') {
        back && back();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [prev, next, back]);

  // Stats — filter findings ring by (category, sub_category) + overlay
  // FP queue counts. No pattern_id on findings yet (Phase 3), so this
  // will over-count when two patterns share the same sub_category
  // within a category. Rare in practice; honest caveat in the box.
  const stats = React.useMemo(() => {
    const matches = findings.filter(f =>
      f.category === category && f.sub_category === sub_category
    );
    if (matches.length === 0) return { count: 0 };
    const tsNums = matches.map(m => new Date(m.ts).getTime()).filter(x => !isNaN(x));
    const confs  = matches.map(m => m.confidence).filter(c => typeof c === 'number');
    const ips    = new Set(matches.map(m => m.source_ip).filter(Boolean));
    const fps    = fpQueue.filter(e =>
      e.finding &&
      e.finding.category === category &&
      e.finding.sub_category === sub_category
    );
    return {
      count: matches.length,
      firstTs: tsNums.length ? new Date(Math.min.apply(null, tsNums)).toISOString() : null,
      lastTs:  tsNums.length ? new Date(Math.max.apply(null, tsNums)).toISOString() : null,
      uniqueSources: ips.size,
      confMin: confs.length ? Math.min.apply(null, confs) : null,
      confMax: confs.length ? Math.max.apply(null, confs) : null,
      confAvg: confs.length ? confs.reduce(function (a, b) { return a + b; }, 0) / confs.length : null,
      fpCount: fps.length,
      fpRate:  matches.length ? fps.length / matches.length : 0,
    };
  }, [findings, fpQueue, category, sub_category]);

  // Early returns — AFTER hooks.
  if (!pats.loading && list.length && !p) {
    return (
      <div>
        <PageBar
          crumbs={['Detect', 'Patterns', category, sub_category]}
          title="Pattern not found"
          subtitle={<>No pattern with sub_category <span className="mono">{sub_category}</span> under <span className="mono">{category}</span>.</>}
          actions={<button className="btn ghost" onClick={back}>‹ Back to library</button>}
        />
      </div>
    );
  }
  if (!p) {
    return <div className="muted" style={{padding:30, textAlign:'center'}}>loading…</div>;
  }

  const ringCapacity = fx.data ? fx.data.capacity : null;

  return (
    <div>
      <PageBar
        crumbs={['Detect', 'Patterns', category, sub_category]}
        title={<>
          <span className="mono" style={{color:'var(--ink-bright)'}}>{sub_category}</span>
          <span className="muted" style={{marginLeft:10, fontSize:14}}>·</span>
          <span style={{marginLeft:10, fontFamily:"'Space Grotesk', sans-serif"}}>{category}</span>
          <HelpIcon topic="patterns" title="Pattern anatomy" size={16} />
        </>}
        subtitle={<>
          <span className="mono">specificity {p.specificity.toFixed(2)}</span>
          <span className="muted"> · </span>
          <span className="mono">{p.context_required ? 'context required' : 'context optional'}</span>
          <span className="muted"> · </span>
          <span className="mono">{p.case_insensitive ? 'case-insensitive' : 'case-sensitive'}</span>
          {idx >= 0 && list.length > 0 && (
            <>
              <span className="muted"> · </span>
              <span className="mono">{idx + 1} of {list.length} in {category}</span>
            </>
          )}
        </>}
        actions={<>
          <window.LivePill source={pats.source} onClick={pats.refetch} />
          <div style={{display:'flex', gap:2, border:'1px solid var(--line-strong)', borderRadius:'var(--radius)', overflow:'hidden'}}>
            <button
              className="btn ghost"
              onClick={() => prev && gotoPat(prev.sub_category)}
              disabled={!prev}
              title={prev ? `prev · ${prev.sub_category} · k / ← / ↑` : 'no previous pattern in category'}
              style={{border:'none', borderRight:'1px solid var(--line-strong)', padding:'5px 10px', opacity: prev ? 1 : 0.4, cursor: prev ? 'pointer' : 'not-allowed'}}>
              ‹ Prev
            </button>
            <button
              className="btn ghost"
              onClick={() => next && gotoPat(next.sub_category)}
              disabled={!next}
              title={next ? `next · ${next.sub_category} · j / → / ↓` : 'no next pattern in category'}
              style={{border:'none', padding:'5px 10px', opacity: next ? 1 : 0.4, cursor: next ? 'pointer' : 'not-allowed'}}>
              Next ›
            </button>
          </div>
          <button className="btn ghost" onClick={back} title="Esc">‹ Back</button>
          <button className="btn" disabled title="pattern edit ships in Phase 5 · needs PatternOverrides layer (Phase 3-4)"
                  style={{opacity:0.5, cursor:'not-allowed'}}>✎ Edit</button>
          <button className="btn" disabled title="reset to compile-time default · Phase 5"
                  style={{opacity:0.5, cursor:'not-allowed'}}>↺ Reset</button>
          <button className="btn" disabled title="toggle enable/disable · Phase 4 · rolls ConfigMap + restarts detection pods"
                  style={{opacity:0.5, cursor:'not-allowed'}}>◉ Enabled</button>
        </>}
      />

      {/* Top pair: stats + regex */}
      <div style={{
             display:'grid',
             gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)',
             gap:'var(--gap)',
             alignItems:'stretch',
           }}>
        <PatternStatsBox stats={stats} ringCapacity={ringCapacity} />
        <PatternRegexBox pattern={p} />
      </div>

      {/* 3-row detail grid mirroring the FindingDetail shape */}
      <div className="finding-hero"
           style={{
             marginTop:'var(--gap)',
             gridTemplateColumns:'minmax(0, 1fr) minmax(0, 1fr)',
             alignItems:'stretch',
           }}>
        {/* row 1: context keywords + proximity (they go together — */}
        {/* keywords are the what, proximity is the how-close) */}
        <PatternKeywordsBox pattern={p} />
        <PatternProximityBox pattern={p} />
        {/* row 2: validators + specificity (scoring + gating knobs) */}
        <PatternValidatorsBox pattern={p} />
        <PatternSpecificityBox pattern={p} />
        {/* row 3: simulator + threshold (test + policy tie-in) */}
        <PatternSimulatorStub />
        <PatternThresholdStub />
        {/* row 4: change history — full-width, it'll host diffs later */}
        <div className="box" style={{gridColumn:'1 / -1'}}>
          <div className="box-title">
            <span className="t">Change history</span>
            <span className="k">Phase 7 · diff + revert per version</span>
          </div>
          <div className="note" style={{borderColor:'var(--line-strong)', background:'var(--bg-1)', color:'var(--ink-soft)', fontSize:12, lineHeight:1.7}}>
            Once the overrides layer is wired (Phase 3-4) every edit writes a versioned entry here,
            with diff view and a <i>Revert to version N</i> / <i>Revert to default</i> action.
            Base patterns always remain restorable — the overrides file is additive.
            <br/>
            Editable fields that'll flow through this history: regex, context keywords, proximity window,
            specificity, validator opt-in/out, enable/disable state.
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Patterns, Profiles, PatternDetail });

</script>

function AvailSpark({ series, slo }) {
  const w = 680, h = 60;
  const min = 98.5, max = 100;
  const pts = series.map((v,i) => {
    const x = (i/(series.length-1)) * w;
    const y = h - ((v - min)/(max-min)) * (h-4) - 2;
    return [x, y];
  });
  const d = pts.map(([x,y],i) => (i?'L':'M') + x.toFixed(1) + ',' + y.toFixed(1)).join(' ');
  const sloY = h - ((slo - min)/(max-min)) * (h-4) - 2;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{height:60, display:'block'}}>
      {/* SLO line */}
      <line x1="0" y1={sloY} x2={w} y2={sloY} stroke="var(--amber)" strokeWidth="1" strokeDasharray="3 4" opacity="0.6" />
      <text x={w-2} y={sloY-3} fontFamily="JetBrains Mono" fontSize="8" fill="var(--amber)" textAnchor="end">SLO {slo}%</text>
      <path d={d + ` L ${w},${h} L 0,${h} Z`} fill="var(--accent)" opacity="0.12" />
      <path d={d} fill="none" stroke="var(--accent)" strokeWidth="1.3" />
      {pts.map(([x,y],i) => {
        const under = series[i] < slo;
        if (!under) return null;
        return <circle key={i} cx={x} cy={y} r="3" fill="var(--threat)" />;
      })}
    </svg>
  );
}

/* ── tiny spark reused inline ── */
function DtSpark({ series, color='var(--accent)', w=60, h=18 }) {
  const max = Math.max(...series, 1);
  const min = Math.min(...series, 0);
  const range = Math.max(max - min, 1);
  const step = w / (series.length - 1 || 1);
  const pts = series.map((v,i) => `${(i*step).toFixed(1)},${(h - ((v-min)/range)*h).toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} style={{display:'block', overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.2" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Very small Markdown → HTML renderer, targeted at the subset siphon's
// docs actually use (headings, lists, code fences, inline code, bold,
// italic, links). Intentionally tiny so we don't pull a 30kb CDN lib
// just for a changelog. Output is injected via dangerouslySetInnerHTML;
// we escape HTML first so user docs can't inject tags.
function renderMarkdown(src) {
  if (!src) return '';
  const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = src.split('\n');
  const out = [];
  let inCode = false, codeLang = '', codeBuf = [];
  let inList = false, listOrdered = false;
  const flushList = () => { if (inList) { out.push(listOrdered ? '</ol>' : '</ul>'); inList = false; } };
  const inlineMd = (s) => {
    let t = esc(s);
    t = t.replace(/`([^`]+)`/g, '<code style="background:var(--bg-3);padding:0 4px;border-radius:2px;font-family:\'JetBrains Mono\',monospace;font-size:0.95em">$1</code>');
    t = t.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
    t = t.replace(/\*([^*]+)\*/g, '<i>$1</i>');
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
    return t;
  };
  for (let raw of lines) {
    if (raw.startsWith('```')) {
      if (inCode) {
        out.push(`<pre style="background:var(--bg-1);border:1px solid var(--line-soft);border-radius:var(--radius);padding:10px;margin:8px 0;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5;color:var(--ink)"><code>${codeBuf.map(esc).join('\n')}</code></pre>`);
        inCode = false; codeBuf = []; codeLang = '';
      } else {
        flushList();
        inCode = true; codeLang = raw.slice(3).trim();
      }
      continue;
    }
    if (inCode) { codeBuf.push(raw); continue; }
    const hMatch = /^(#{1,6})\s+(.+)$/.exec(raw);
    if (hMatch) {
      flushList();
      const lvl = hMatch[1].length;
      const size = ({1:22,2:18,3:15,4:13,5:12,6:11})[lvl];
      const mt = lvl <= 2 ? 18 : 12;
      out.push(`<h${lvl} style="font-family:'Space Grotesk',sans-serif;font-size:${size}px;font-weight:600;margin:${mt}px 0 8px;color:var(--ink-bright)">${inlineMd(hMatch[2])}</h${lvl}>`);
      continue;
    }
    const ol = /^\s*(\d+)\.\s+(.*)$/.exec(raw);
    const ul = /^\s*[-*]\s+(.*)$/.exec(raw);
    if (ul || ol) {
      const wantOrdered = !!ol;
      if (!inList || listOrdered !== wantOrdered) { flushList(); out.push(wantOrdered ? '<ol style="padding-left:22px;margin:6px 0">' : '<ul style="padding-left:22px;margin:6px 0">'); inList = true; listOrdered = wantOrdered; }
      out.push(`<li style="margin:3px 0">${inlineMd((ul||ol)[ul?1:2])}</li>`);
      continue;
    }
    if (!raw.trim()) { flushList(); out.push(''); continue; }
    flushList();
    out.push(`<p style="margin:6px 0;line-height:1.6">${inlineMd(raw)}</p>`);
  }
  flushList();

window.c2Flags = function() {
  try { return JSON.parse(localStorage.getItem('c2:flags') || '{}'); }
  catch { return {}; }
};
window.c2Flag = function(key) {
  const flags = window.c2Flags();
  const def = (FEATURE_FLAGS.find(f => f.key === key) || {}).default;
  return flags[key] != null ? flags[key] : def;
};
window.useFeatureFlag = function(key) {
  const [v, setV] = React.useState(window.c2Flag(key));
  React.useEffect(() => {
    const poll = setInterval(() => setV(window.c2Flag(key)), 500);
    const h = (e) => { if (e.key === 'c2:flags') setV(window.c2Flag(key)); };
    window.addEventListener('storage', h);
    return () => { clearInterval(poll); window.removeEventListener('storage', h); };
  }, [key]);
  return v;
};
window.setC2Flag = function(key, value) {
  const flags = window.c2Flags();
  flags[key] = value;
  try { localStorage.setItem('c2:flags', JSON.stringify(flags)); } catch {}
};

function FeaturesTab() {
  const [flags, setFlags] = React.useState(window.c2Flags());
  const setFlag = (k, v) => {
    const next = { ...flags, [k]: v };
    setFlags(next);
    try { localStorage.setItem('c2:flags', JSON.stringify(next)); } catch {}
  };
  const reset = () => {
    try { localStorage.removeItem('c2:flags'); } catch {}
    setFlags({});
  };
  return (
    <div className="box">
      <div className="box-title">
        <span className="t">Feature flags</span>
        <span className="k">persisted in localStorage.c2:flags · takes effect immediately</span>
      </div>
      {FEATURE_FLAGS.map(f => {
        const current = flags[f.key] != null ? flags[f.key] : f.default;
        return (
          <div key={f.key} style={{display:'grid', gridTemplateColumns:'1fr auto', gap:12, padding:'10px 0', borderBottom:'1px dashed var(--line-soft)', alignItems:'center'}}>
            <div>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span className="mono" style={{fontSize:10.5, color:'var(--ink-faint)'}}>{f.key}</span>
                {flags[f.key] != null && flags[f.key] !== f.default && (
                  <span className="chip chip--warn" style={{fontSize:9}}>OVERRIDDEN</span>
                )}
              </div>
              <div style={{color:'var(--ink-bright)', fontWeight:600, marginTop:2}}>{f.label}</div>
              <div className="muted" style={{fontSize:11.5, marginTop:3}}>{f.desc}</div>
            </div>
            <div style={{display:'flex', gap:4}}>
              {[true, false].map(v => (
                <button key={String(v)}
                        onClick={() => setFlag(f.key, v)}
                        className="btn ghost"
                        style={{
                          padding:'4px 14px', fontSize:10,
                          background: current === v ? 'var(--accent)' : 'transparent',
                          color: current === v ? 'var(--bg-0)' : 'var(--ink)',
                          borderColor: current === v ? 'var(--accent)' : 'var(--line)',
                        }}>
                  {v ? 'ON' : 'OFF'}
                </button>
              ))}
            </div>
          </div>
        );
      })}
      <div style={{display:'flex', gap:8, marginTop:12}}>
        <button className="btn ghost" onClick={reset}>Reset all to defaults</button>
        <span className="muted" style={{alignSelf:'center', fontSize:11}}>
          {Object.keys(flags).length} override{Object.keys(flags).length === 1 ? '' : 's'} active
        </span>
      </div>
    </div>
  );
}

function Spark({ series, w=120, h=28, color='var(--accent)', fill=true, dotLast=true }) {
  const max = Math.max(...series, 1), min = Math.min(...series, 0);
  const n = series.length;
  const pts = series.map((v,i) => {
    const x = (i/(n-1)) * w;
    const y = h - ((v - min)/Math.max(max-min,1)) * (h-2) - 1;
    return [x, y];
  });
  const d = pts.map(([x,y],i) => (i?'L':'M') + x.toFixed(1) + ',' + y.toFixed(1)).join(' ');
  const areaD = d + ` L ${w},${h} L 0,${h} Z`;
  const [lx, ly] = pts[pts.length-1];
  return (
    <svg width={w} height={h} style={{display:'block'}}>
      {fill && <path d={areaD} fill={color} opacity="0.12" />}
      <path d={d} fill="none" stroke={color} strokeWidth="1.25" />
      {dotLast && <circle cx={lx} cy={ly} r="2" fill={color} />}
    </svg>
  );
}

function HeatRow({ buckets, max, color='var(--accent)' }) {

        return <div key={i} style={{flex:1, background:color, opacity:a, borderRadius:1}} title={v}></div>;

  );

function randIp(subnet) {
  if (subnet === 'internal') return '10.' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0);
  return ((Math.random()*223+1)|0) + '.' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0);
}
function randHash() {
  const hex = '0123456789abcdef';
  let h = '';
  for (let i=0; i<16; i++) h += hex[(Math.random()*16)|0];

}
function synthFinding(ts) {

  const f = {

    action: sev === 'red' ? 'block' : (sev === 'warn' ? 'redact' : HF_ACTS[(Math.random()*HF_ACTS.length)|0]),
    match: HF_MATCH[cat][(Math.random()*3)|0],
    doc, fileType, channel,
    confidence: (0.55 + Math.random()*0.44).toFixed(2),
    hash: randHash(),
    srcIp: randIp(Math.random()<0.5?'internal':'external'),

  };
  if (channel === 'email') {
    const fromUser = ['j.doe','r.solanki','k.mori','billing','no-reply'][(Math.random()*5)|0];
    const toUser   = ['ops','finance','partner','external.vendor','j.lee'][(Math.random()*5)|0];

    f.emailTo   = toUser   + '@' + HF_EMAIL_DOMAINS[(Math.random()*HF_EMAIL_DOMAINS.length)|0];
  }
  if (channel === 'web' || channel === 'upload') {
    f.domain = HF_DOMAINS[(Math.random()*HF_DOMAINS.length)|0];
    f.url    = 'https://' + f.domain + HF_URL_PATHS[(Math.random()*HF_URL_PATHS.length)|0];

function seedFindings(n) {
  const now = Date.now();
  // Spread records across the last ~30 days so timeframe filters show meaningful differences.
  // 60% within last hour, 25% last 24h, 10% last 7d, 5% last 30d.
  return Array.from({length:n}).map((_,i) => {
    const r = Math.random();
    let age_ms;
    if (r < 0.60)       age_ms = Math.random() * 60 * 60 * 1000;                     // last 1h
    else if (r < 0.85)  age_ms = 60*60*1000 + Math.random() * 23 * 60 * 60 * 1000;   // 1h-24h
    else if (r < 0.95)  age_ms = 24*60*60*1000 + Math.random() * 6 * 24*60*60*1000;  // 1-7d
    else                age_ms = 7*24*60*60*1000 + Math.random() * 23 * 24*60*60*1000; // 7-30d
    return synthFinding(new Date(now - age_ms));
  }).sort((a,b) => new Date(b.ts) - new Date(a.ts));
}
function fmtTime(d) {
  const t = d instanceof Date ? d : new Date(d);
  return String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0') + ':' + String(t.getSeconds()).padStart(2,'0');
}
function isoDateLocal(d) {
  const t = d instanceof Date ? d : new Date(d);
  return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
}
function fmtDateTime(d) {
  const t = d instanceof Date ? d : new Date(d);
  const age = Date.now() - t.getTime();
  // Within last 24h → HH:MM:SS
  if (age < 24*60*60*1000) return fmtTime(t);
  // Else MM-DD HH:MM
  return String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0')
       + ' ' + String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
}
function fmtTimeRel(d) {
  const t = d instanceof Date ? d : new Date(d);
  const diff = Date.now() - t.getTime();
  if (diff < 60*1000)           return Math.floor(diff/1000) + 's';
  if (diff < 60*60*1000)        return Math.floor(diff/60000) + 'm';
  if (diff < 24*60*60*1000)     return Math.floor(diff/3600000) + 'h';
  if (diff < 30*24*60*60*1000)  return Math.floor(diff/(24*3600000)) + 'd';
  return Math.floor(diff/(30*24*3600000)) + 'mo';
}
