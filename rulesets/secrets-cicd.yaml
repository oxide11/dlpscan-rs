name: CI/CD Secrets Scanner
description: >
  Detects secrets, API keys, tokens, and credentials in source code
  and CI/CD pipelines. Rejects on detection to prevent secret leaks.

version: "1"

baselines:
  - source_code_secrets

action: reject
mode: denylist
min_confidence: 0.7

overrides:
  - category: Authentication Tokens
    min_confidence: 0.8
    require_context: true

custom_patterns:
  - name: Hardcoded Password
    regex: '(?i)(?:password|passwd|pwd)\s*[:=]\s*["\x27]([^"\x27]{8,})["\x27]'
    category: Custom Secrets
    confidence: 0.8
    keywords:
      - password
      - passwd
      - pwd
    keyword_proximity: 30
