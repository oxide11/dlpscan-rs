# Siphon reverse proxy — routes every request through Authelia
# forward-auth before it reaches siphon-api or siphon-fs.
#
# Layout:
#   /auth/*    → authelia:9091           (login UI, OIDC endpoints)
#   /api/*     → siphon-api:8080         (scan, batch, tokenize, admin)
#   /fs/*      → siphon-fs:8081          (file upload + extract)
#   /ui/*      → future Next.js SPA      (served from /srv/ui once Phase 0 ships)
#   /          → redirect to /ui/
#
# Forward-auth pattern:
#   Nginx calls Authelia's /api/verify on every request. If Authelia
#   says "unauthenticated", Nginx 302s to the Authelia login portal
#   with rd= set to the original URL. On success, Authelia replies
#   with Remote-User / Remote-Groups / Remote-Email headers which we
#   pass through to siphon-api so it can run RBAC against the user's
#   groups instead of (or alongside) API-key role mapping.
#
# TLS is terminated here in prod — the `ssl_*` block below is ready
# to uncomment once certs are mounted at /etc/nginx/certs/.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # --- hygiene ---------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    server_tokens off;

    # Upload size cap — siphon-fs accepts multipart files. Keep this
    # in sync with SIPHON_FS_MAX_BODY_BYTES; the smaller of the two
    # wins.
    client_max_body_size 50m;

    # --- mime + logs -----------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JSON access log — easier for SIEM forwarders to parse than the
    # combined format.
    log_format json escape=json
        '{"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt_ms":$request_time,'
        '"upstream_rt_ms":"$upstream_response_time",'
        '"user":"$authelia_user",'
        '"groups":"$authelia_groups",'
        '"ua":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # --- gzip -----------------------------------------------------------
    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # --- upstreams ------------------------------------------------------
    upstream authelia {
        server authelia:9091;
        keepalive 16;
    }

    upstream siphon_api {
        server siphon-api:8080;
        keepalive 32;
    }

    upstream siphon_fs {
        server siphon-fs:8081;
        keepalive 16;
    }

    # --- helper variables captured from Authelia's forward-auth reply ---
    # Nginx can't read headers from a sub-request directly, so we
    # stash them in variables via the auth_request_set directive.
    # These feed both the access log and the proxied request.
    map $upstream_http_remote_user     $authelia_user   { default ""; ~(.+) $1; }
    map $upstream_http_remote_groups   $authelia_groups { default ""; ~(.+) $1; }
    map $upstream_http_remote_email    $authelia_email  { default ""; ~(.+) $1; }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name siphon.local;

        # --- prod TLS (uncomment once certs are mounted) ---------------
        # listen 443 ssl http2;
        # listen [::]:443 ssl http2;
        # ssl_certificate     /etc/nginx/certs/siphon.local.crt;
        # ssl_certificate_key /etc/nginx/certs/siphon.local.key;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # Security headers — apply to every response. Nginx is the
        # single ingress, so these don't need to be repeated in
        # siphon-api.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # --- forward-auth sub-request ----------------------------------
        # Internal location that Nginx hits before every protected
        # request. Authelia's /api/verify returns 200 when the
        # request is authenticated and 401 (or 302 for browser flows)
        # otherwise.
        location = /internal/authelia/authz {
            internal;
            proxy_pass http://authelia/api/verify;
            proxy_set_header X-Original-URL   $scheme://$http_host$request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header Content-Length   "";
            proxy_pass_request_body           off;
        }

        # --- /auth/* → Authelia (login UI, OIDC, password reset) -------
        location /auth/ {
            proxy_pass http://authelia/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- /api/* → siphon-api (scan, tokenize, admin) --------------
        location /api/ {
            auth_request /internal/authelia/authz;
            auth_request_set $authelia_user_captured     $upstream_http_remote_user;
            auth_request_set $authelia_groups_captured   $upstream_http_remote_groups;
            auth_request_set $authelia_email_captured    $upstream_http_remote_email;

            # On 401, send the browser to Authelia's login with
            # rd=<original-url> so it comes back here after auth.
            error_page 401 =302 /auth/?rd=$scheme://$http_host$request_uri;

            proxy_pass http://siphon_api/;
            proxy_set_header Host                 $host;
            proxy_set_header X-Real-IP            $remote_addr;
            proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto    $scheme;
            proxy_set_header Remote-User          $authelia_user_captured;
            proxy_set_header Remote-Groups        $authelia_groups_captured;
            proxy_set_header Remote-Email         $authelia_email_captured;
        }

        # --- /fs/* → siphon-fs (multipart file scan) ------------------
        location /fs/ {
            auth_request /internal/authelia/authz;
            auth_request_set $authelia_user_captured     $upstream_http_remote_user;
            auth_request_set $authelia_groups_captured   $upstream_http_remote_groups;
            auth_request_set $authelia_email_captured    $upstream_http_remote_email;

            error_page 401 =302 /auth/?rd=$scheme://$http_host$request_uri;

            # siphon-fs streams large uploads — disable Nginx's
            # default response buffering so the connection isn't
            # held open while the full response is spooled to disk.
            proxy_request_buffering off;
            proxy_buffering         off;

            proxy_pass http://siphon_fs/;
            proxy_set_header Host                 $host;
            proxy_set_header X-Real-IP            $remote_addr;
            proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto    $scheme;
            proxy_set_header Remote-User          $authelia_user_captured;
            proxy_set_header Remote-Groups        $authelia_groups_captured;
            proxy_set_header Remote-Email         $authelia_email_captured;
        }

        # --- /ui/* → Next.js SPA (Phase 0 lands here) -----------------
        # Placeholder until the UI is scaffolded. Serves a 404 today;
        # swap root to /srv/ui once `ui/` exists and the build drops
        # an out/ directory into the image.
        location /ui/ {
            auth_request /internal/authelia/authz;
            error_page 401 =302 /auth/?rd=$scheme://$http_host$request_uri;

            root /srv;
            try_files $uri $uri/ /ui/index.html =404;
        }

        # --- / → redirect to /ui/ -------------------------------------
        location = / {
            return 302 /ui/;
        }

        # --- health/metrics (unauthenticated, internal only) ----------
        # Exposed so Kubernetes / Docker can probe the proxy without
        # a bearer token, but scoped to internal networks by allow-
        # listing RFC1918 CIDRs.
        location = /nginx-health {
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1/32;
            deny all;
            return 200 "ok\n";
        }
    }
}
