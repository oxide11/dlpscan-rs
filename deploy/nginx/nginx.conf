# Siphon reverse proxy — routes every request through Authelia
# forward-auth before it reaches siphon-api or siphon-fs.
#
# Layout:
#   /auth/*    → authelia:9091           (login UI, OIDC endpoints)
#   /api/*     → siphon-api:8080         (scan, batch, tokenize, admin)
#   /fs/*      → siphon-fs:8081          (file upload + extract)
#   /ui/*      → Next.js SPA static export (baked into the image at /srv/ui)
#   /          → redirect to /ui/
#
# Forward-auth pattern:
#   Nginx calls Authelia's /api/verify on every request. If Authelia
#   says "unauthenticated", Nginx 302s to the Authelia login portal
#   with rd= set to the original URL. On success, Authelia replies
#   with Remote-User / Remote-Groups / Remote-Email headers which we
#   pass through to siphon-api so it can run RBAC against the user's
#   groups instead of (or alongside) API-key role mapping.
#
# TLS is terminated here in prod — the `ssl_*` block below is ready
# to uncomment once certs are mounted at /etc/nginx/certs/.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # --- hygiene ---------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    server_tokens off;

    # Upload size cap — siphon-fs accepts multipart files. Keep this
    # in sync with SIPHON_FS_MAX_BODY_BYTES; the smaller of the two
    # wins.
    client_max_body_size 50m;

    # --- mime + logs -----------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JSON access log — easier for SIEM forwarders to parse than the
    # combined format.
    log_format json escape=json
        '{"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt_ms":$request_time,'
        '"upstream_rt_ms":"$upstream_response_time",'
        '"user":"$authelia_user",'
        '"groups":"$authelia_groups",'
        '"ua":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # --- gzip -----------------------------------------------------------
    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # --- upstreams ------------------------------------------------------
    # Hostnames here match the Service names the Helm chart emits
    # for a release named `siphon` (fullname collapses to `siphon`
    # and componentName is `siphon-<comp>`). The upstream names are
    # intentionally different from the internal location paths so
    # nginx directive lookups stay unambiguous.
    upstream authelia {
        server siphon-authelia:9091;
        keepalive 16;
    }

    upstream siphon_api {
        server siphon-api:8080;
        keepalive 32;
    }

    upstream siphon_fs {
        server siphon-fs:8081;
        keepalive 16;
    }

    # --- helper variables captured from Authelia's forward-auth reply ---
    # Nginx can't read headers from a sub-request directly, so we
    # stash them in variables via the auth_request_set directive.
    # These feed both the access log and the proxied request.
    map $upstream_http_remote_user     $authelia_user   { default ""; ~(.+) $1; }
    map $upstream_http_remote_groups   $authelia_groups { default ""; ~(.+) $1; }
    map $upstream_http_remote_email    $authelia_email  { default ""; ~(.+) $1; }

    # --- pick the browser-facing host for X-Original-URL ----------
    # Codespaces' port forwarder rewrites the request `Host:` to
    # `localhost` on the way through to the cluster, but preserves
    # the original hostname in `X-Forwarded-Host`. Authelia matches
    # the request URL against its session.cookies[*].domain values
    # and refuses to apply `default_policy: bypass` if the host
    # doesn't match — so handing it the localhost-based URL turns
    # every auth_request into a 401 → 302 to /auth/, breaking the
    # SPA shell, the API, and any other auth-gated path.
    #
    # Prefer the X-Forwarded-Host when present (codespaces, any
    # standards-compliant reverse proxy), fall back to the literal
    # Host header otherwise (direct browser → nginx, no proxy).
    map $http_x_forwarded_host $authelia_browser_host {
        default $http_host;
        "~.+"   $http_x_forwarded_host;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name siphon.local;

        # Send redirects as relative URIs (e.g. `Location: /ui/`)
        # rather than nginx's default of promoting them to absolute
        # URIs using the request `Host` header. Codespaces' port
        # forwarder rewrites the Host on the way through to the
        # cluster, so an absolute redirect ends up as
        # `http://localhost/ui/` and the browser tries to reach a
        # nonexistent local server. Relative redirects let the
        # browser resolve them against the original codespace URL.
        absolute_redirect off;

        # --- prod TLS (uncomment once certs are mounted) ---------------
        # listen 443 ssl http2;
        # listen [::]:443 ssl http2;
        # ssl_certificate     /etc/nginx/certs/siphon.local.crt;
        # ssl_certificate_key /etc/nginx/certs/siphon.local.key;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # Security headers — apply to every response. Nginx is the
        # single ingress, so these don't need to be repeated in
        # siphon-api.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # --- forward-auth sub-request ----------------------------------
        # Internal location that Nginx hits before every protected
        # request. Authelia's /api/verify returns 200 when the
        # request is authenticated and 401 (or 302 for browser flows)
        # otherwise.
        location = /internal/authelia/authz {
            internal;
            proxy_pass http://authelia/api/verify;
            # Authelia refuses any X-Original-URL whose scheme isn't
            # https/wss as a session-cookie-integrity guard (401 with
            # "Target URL ... has an insecure scheme"). Inside the
            # cluster Nginx serves plaintext, so $scheme is always
            # http — force https here. The URL is only consumed by
            # Authelia's access_control rule matcher; nothing connects
            # to it, so the scheme is a label, not a request target.
            proxy_set_header X-Original-URL   https://$authelia_browser_host$request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header Content-Length   "";
            proxy_pass_request_body           off;
        }

        # --- /auth/* → Authelia (login UI, OIDC, password reset) -------
        location /auth/ {
            proxy_pass http://authelia/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- /api/* → siphon-api (scan, tokenize, admin) --------------
        # Authelia auth_request intentionally omitted: the C2 / IR
        # wireframe consoles served at /ui/ authenticate themselves
        # with `Authorization: Bearer <SIPHON_API_KEY>` directly to
        # siphon-api, which enforces the bearer check natively. An
        # Authelia session-cookie gate at this layer would 401 every
        # API call (the wireframes don't carry a session cookie) and
        # nginx would 302 the request to /auth/ — turning every JSON
        # response into Authelia's login HTML. siphon-api's bearer
        # check is the source of truth.
        location /api/ {
            proxy_pass http://siphon_api/;
            proxy_set_header Host                 $host;
            proxy_set_header X-Real-IP            $remote_addr;
            proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto    $scheme;
        }

        # --- /fs/* → siphon-fs (multipart file scan) ------------------
        # Same bearer-vs-session reasoning as /api/ above — siphon-fs
        # validates SIPHON_API_KEY itself, so no Authelia gate here.
        location /fs/ {
            # siphon-fs streams large uploads — disable Nginx's
            # default response buffering so the connection isn't
            # held open while the full response is spooled to disk.
            proxy_request_buffering off;
            proxy_buffering         off;

            proxy_pass http://siphon_fs/;
            proxy_set_header Host                 $host;
            proxy_set_header X-Real-IP            $remote_addr;
            proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto    $scheme;
        }

        # --- /ui/* → C2 / IR wireframe consoles -----------------------
        # Two single-file React apps: siphon-c2.html (admin) and
        # siphon-ir.html (incident response). They link to each
        # other by relative href — both must be served from the
        # same directory tree so those links resolve correctly.
        # CSS / JS is inlined into each file at sync time
        # (docs/wireframes/sync-shared.sh) so there are no further
        # asset paths to expose, just the .html files and the
        # external siphon-logo.png that ir uses.
        location /ui/ {
            root /srv;
            index siphon-c2.html;
        }

        # --- / → redirect to the C2 console --------------------------
        location = / {
            return 302 /ui/siphon-c2.html;
        }

        # --- health/metrics (unauthenticated, internal only) ----------
        # Exposed so Kubernetes / Docker can probe the proxy without
        # a bearer token, but scoped to internal networks by allow-
        # listing RFC1918 CIDRs.
        location = /nginx-health {
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1/32;
            deny all;
            return 200 "ok\n";
        }
    }
}
