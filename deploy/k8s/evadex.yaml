# evadex — adversarial-testing service that drives evadex runs from
# siphon-c2 over HTTP and a daily CronJob that executes the
# "banking-daily" profile. Deploys into the `siphon` namespace; the
# dev-lab lives in `siphon-lab/` and has its own ConfigMap + RBAC —
# apply this file once you have a production-ish siphon namespace to
# join. Depends on: namespace `siphon` exists; PVC storage class
# available for ReadWriteOnce; image `evadex:latest` reachable from
# the node (pushed to GHCR or side-loaded into a local cluster).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evadex
  namespace: siphon
  labels:
    app: evadex
    component: adversarial-testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evadex
  template:
    metadata:
      labels:
        app: evadex
    spec:
      # evadex has no in-cluster API client; the bridge talks to
      # siphon-api over HTTP, not the kube apiserver.
      automountServiceAccountToken: false
      # Pod-level hardening, matching the siphon Helm chart's
      # podSecurityContext defaults.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: evadex
          image: evadex:latest
          args: ["bridge", "--host", "0.0.0.0", "--port", "8081"]
          ports:
            - containerPort: 8081
          # Container-level hardening. evadex writes generated
          # corpora to /results (PVC-mounted), which is the only
          # writable path; root FS stays read-only.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
          env:
            # Optional — if the `evadex-secrets/bridge-key` Secret
            # exists, uvicorn will require matching x-api-key on
            # every request. Omit the Secret for trusted-LAN dev.
            - name: EVADEX_BRIDGE_KEY
              valueFrom:
                secretKeyRef:
                  name: evadex-secrets
                  key: bridge-key
                  optional: true
            - name: SIPHON_EXE
              value: /usr/local/bin/siphon
            - name: EVADEX_BRIDGE_ROOT
              value: /results
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: evadex-results
---
apiVersion: v1
kind: Service
metadata:
  name: evadex
  namespace: siphon
spec:
  selector:
    app: evadex
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: evadex-results
  namespace: siphon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Daily run of the banking-daily profile. 06:00 UTC gives the team an
# overnight baseline report sitting in /results by the start of the
# work day. Bridge pod isn't reused here — the CronJob is a one-shot
# `evadex profile run banking-daily` so a bridge crash doesn't block
# the schedule.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: evadex-daily
  namespace: siphon
spec:
  schedule: "0 6 * * *"
  # Pin the timezone so the schedule doesn't silently drift when the
  # controller-manager node changes TZ. "0 6 * * *" without a zone
  # is interpreted in the controller's local tz — Etc/UTC makes the
  # intent explicit and matches the banking-daily profile.
  timeZone: Etc/UTC
  # Previous run must finish before the next fires. A full banking-
  # tier scan can run multiple minutes on a loaded node; Forbid
  # avoids piling up concurrent scans against siphon.
  concurrencyPolicy: Forbid
  # Prune job history so the namespace doesn't accumulate completed
  # Jobs forever. Three of each gives enough retrospective for
  # debugging without overwhelming `kubectl get jobs`.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # evadex has internal retry on the HTTP probe — one k8s-level
      # retry on top is enough for a transient siphon restart.
      backoffLimit: 1
      # 45 min cap. Full banking-tier scan runs well under this in
      # practice; the deadline keeps a stuck job from blocking the
      # next schedule via concurrencyPolicy: Forbid.
      activeDeadlineSeconds: 2700
      template:
        spec:
          # CronJob pod has no in-cluster API client either. Same
          # hardening shape as the bridge Deployment above.
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: evadex
              image: evadex:latest
              args:
                - "profile"
                - "run"
                - "banking-daily"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: [ALL]
              env:
                - name: EVADEX_BRIDGE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: evadex-secrets
                      key: bridge-key
                      optional: true
          restartPolicy: OnFailure
