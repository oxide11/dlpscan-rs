# Ingress — thin pass-through to siphon-nginx.
#
# siphon-nginx handles all routing internally using stable FQDN DNS
# names, injects the API key for /api/ and /fs/ paths, and proxies
# to siphon-ui, evadex, etc. The ingress just provides the external
# entry point (kind port-forward on host:80).
#
# Requires nginx-ingress-controller in the cluster. lab-up.sh
# installs it via the standard kind manifest.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: siphon-lab
  namespace: siphon-lab
  annotations:
    # Headroom for large file uploads (siphon-fs default 64MB).
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    # File parsers (PDF, archives) can be slow — give the proxy
    # enough time before it declares a 504.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: siphon-nginx
                port: { number: 80 }
