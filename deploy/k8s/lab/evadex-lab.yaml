# evadex — lab-namespace mirror of deploy/k8s/evadex.yaml.
#
# The prod manifest (deploy/k8s/evadex.yaml) targets the `siphon`
# namespace; this one lives alongside the siphon-api + siphon-fs
# lab under `siphon-lab` so a kind-cluster `lab-up.sh` brings up a
# complete Siphon + evadex slice for end-to-end dev testing.
#
# Labels follow the `app.kubernetes.io/*` scheme the rest of the
# siphon-lab manifests use (20-siphon-api.yaml, 30-siphon-fs.yaml).
# Image tag is `evadex:lab` to match siphon-api:lab / siphon-fs:lab;
# build + `kind load docker-image` before `kubectl apply` (follow-up
# will teach lab-up.sh to do it automatically).
#
# Same env-var contract as prod: EVADEX_BRIDGE_KEY (optional secret
# gate), SIPHON_EXE (siphon CLI path inside the image), and
# EVADEX_BRIDGE_ROOT (where /v1/generate + profile runs drop files).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: evadex-results
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: evadex
    app.kubernetes.io/part-of: siphon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi   # lab-scale; prod is 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evadex
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: evadex
    app.kubernetes.io/part-of: siphon
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: evadex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evadex
        app.kubernetes.io/part-of: siphon
    spec:
      # Matches prod evadex.yaml — image ships uid 1000 via useradd.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: evadex
          image: evadex:lab
          imagePullPolicy: IfNotPresent
          args: ["bridge", "--host", "0.0.0.0", "--port", "8081"]
          ports:
            - name: http
              containerPort: 8081
          env:
            # Optional — if the `evadex-secrets/bridge-key` Secret
            # exists, uvicorn enforces x-api-key on every request.
            # Skipped in the lab by default (no Secret applied).
            - name: EVADEX_BRIDGE_KEY
              valueFrom:
                secretKeyRef:
                  name: evadex-secrets
                  key: bridge-key
                  optional: true
            - name: SIPHON_EXE
              value: /usr/local/bin/siphon
            - name: EVADEX_BRIDGE_ROOT
              value: /results
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            # Lighter than prod — lab kind cluster sits on a laptop.
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: evadex-results
---
apiVersion: v1
kind: Service
metadata:
  name: evadex
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: evadex
    app.kubernetes.io/part-of: siphon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: evadex
  ports:
    - name: http
      port: 8081
      targetPort: http
---
# Daily banking-daily regression. Same schedule + invocation shape
# as prod so config is validated in lab before promotion. A kind
# cluster that's torn down between sessions simply won't fire the
# CronJob — no harm, no stale alerts.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: evadex-daily
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: evadex-daily
    app.kubernetes.io/part-of: siphon
spec:
  schedule: "0 6 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid         # previous run must finish first
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 2700   # 45 min cap
      template:
        metadata:
          labels:
            app.kubernetes.io/name: evadex-daily
            app.kubernetes.io/part-of: siphon
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: evadex
              image: evadex:lab
              imagePullPolicy: IfNotPresent
              args:
                - "profile"
                - "run"
                - "banking-daily"
              env:
                - name: EVADEX_BRIDGE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: evadex-secrets
                      key: bridge-key
                      optional: true
                - name: SIPHON_EXE
                  value: /usr/local/bin/siphon
                - name: EVADEX_BRIDGE_ROOT
                  value: /results
