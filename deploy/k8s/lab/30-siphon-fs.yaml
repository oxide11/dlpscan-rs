# siphon-fs — file-scanner service. Single replica for the lab.
# Same overrides ConfigMap mount so a rolling restart rolls both
# pod types together and keeps pattern state in lock-step.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siphon-fs
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: siphon-fs
    app.kubernetes.io/part-of: siphon
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: siphon-fs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: siphon-fs
        app.kubernetes.io/part-of: siphon
    spec:
      terminationGracePeriodSeconds: 60  # file uploads can be large
      # siphon-fs has no in-cluster API client; suppress the default
      # SA token mount to shrink attack surface. Mirrors the Helm
      # chart's deployment-fs.yaml.
      automountServiceAccountToken: false
      # Pod-level security context, matching the Helm chart's
      # podSecurityContext defaults.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: siphon-fs
          image: siphon-fs:lab
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          # Container-level hardening, mirrored from the chart's
          # containerSecurityContext.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
          env:
            - name: SIPHON_FS_BIND
              value: 0.0.0.0:8081
            - name: SIPHON_OVERRIDES_PATH
              value: /etc/siphon/overrides.json
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: overrides
              mountPath: /etc/siphon
              readOnly: true
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m           # extractor CPU is heavier than siphon-api
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        - name: overrides
          configMap:
            name: siphon-overrides
---
apiVersion: v1
kind: Service
metadata:
  name: siphon-fs
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: siphon-fs
    app.kubernetes.io/part-of: siphon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: siphon-fs
  ports:
    - name: http
      port: 8081
      targetPort: http
