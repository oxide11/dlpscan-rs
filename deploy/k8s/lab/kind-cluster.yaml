# kind cluster spec for the Siphon lab.
#
# Exposes port 80 on the host so the Ingress is reachable at
# http://localhost — analysts can point siphon-c2.html's API URL
# at http://localhost/api and the file-mode uploader at
# http://localhost/fs.
#
# Single control-plane node is plenty for 2 x siphon-api + 1 x
# siphon-fs + nginx-ingress. On a 16GB Mac Air the whole cluster
# footprint is ~2GB.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: siphon-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
