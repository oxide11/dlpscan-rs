# Postgres connection string for siphon-api + siphon-fs.
# Lab credentials only — not for production use.
apiVersion: v1
kind: Secret
metadata:
  name: siphon-postgres
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: siphon
type: Opaque
stringData:
  database-url: postgres://siphon:siphon-lab@postgres:5432/siphon
