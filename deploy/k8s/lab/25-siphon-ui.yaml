apiVersion: apps/v1
kind: Deployment
metadata:
  name: siphon-ui
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: siphon-ui
    app.kubernetes.io/part-of: siphon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: siphon-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: siphon-ui
        app.kubernetes.io/part-of: siphon
    spec:
      automountServiceAccountToken: false
      containers:
        - name: siphon-ui
          image: siphon-ui:lab
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: siphon-ui
  namespace: siphon-lab
  labels:
    app.kubernetes.io/name: siphon-ui
    app.kubernetes.io/part-of: siphon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: siphon-ui
  ports:
    - name: http
      port: 80
      targetPort: http
