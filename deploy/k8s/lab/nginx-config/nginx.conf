# siphon-nginx — lab reverse proxy.
#
# Uses FQDN .svc.cluster.local names so the config survives pod
# restarts and ClusterIP recycling. Stored as a ConfigMap so the
# config is independent of the image — no manual kubectl patching
# needed after pod restarts.
#
# API key injection:
#   lab-up.sh reads the key from the siphon-api-auth Secret, then
#   creates/updates the ConfigMap via:
#     sed "s|__SIPHON_API_KEY__|${API_KEY}|g" nginx.conf | \
#     kubectl create configmap siphon-nginx-config \
#       --from-file=nginx.conf=/dev/stdin -n siphon-lab \
#       --dry-run=client -o yaml | kubectl apply -f -
#
# Routes:
#   /api/*    → siphon-api:8080  (Authorization header injected)
#   /fs/*     → siphon-fs:8081   (Authorization header injected)
#   /evadex/* → evadex:8081
#   /ui/*     → siphon-ui:80     (static HTML wireframes)
#   /         → redirect → /ui/siphon-c2.html

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 30s;
    server_tokens   off;
    client_max_body_size 500m;

    # ── upstreams — FQDN names resolve via kube-dns, stable across
    # ClusterIP recycling (unlike hardcoded IPs). ─────────────────
    upstream siphon_api { server siphon-api.siphon-lab.svc.cluster.local:8080; keepalive 32; }
    upstream siphon_fs  { server siphon-fs.siphon-lab.svc.cluster.local:8081;  keepalive 16; }
    upstream siphon_ui  { server siphon-ui.siphon-lab.svc.cluster.local:80;    keepalive 8;  }
    upstream evadex     { server evadex.siphon-lab.svc.cluster.local:8081;     keepalive 8;  }

    server {
        listen 80 default_server;
        server_name _;
        absolute_redirect off;

        # Unauthenticated health endpoint for liveness probes.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # /api/* → siphon-api.
        # Authorization header injected so the C2 wireframe works
        # without having to store the API key in localStorage.
        location /api/ {
            proxy_pass         http://siphon_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Authorization     "Bearer __SIPHON_API_KEY__";
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # /fs/* → siphon-fs.  Large uploads — disable buffering.
        location /fs/ {
            proxy_pass              http://siphon_fs/;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        Authorization     "Bearer __SIPHON_API_KEY__";
            proxy_http_version      1.1;
            proxy_set_header        Connection        "";
            proxy_request_buffering off;
            proxy_buffering         off;
        }

        # /evadex/* → evadex bridge.
        location /evadex/ {
            proxy_pass       http://evadex/;
            proxy_set_header Host $host;
        }

        # /ui/* → siphon-ui static files.
        # No trailing slash on proxy_pass — preserves the /ui/ prefix
        # so siphon-ui's nginx matches its own location /ui/ correctly.
        location /ui/ {
            proxy_pass       http://siphon_ui;
            proxy_set_header Host $host;
        }

        # / → C2 console.
        location = / {
            return 302 /ui/siphon-c2.html;
        }
    }
}
