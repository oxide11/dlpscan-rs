version: '3.8'

# ---------------------------------------------------------------------------
# Siphon compose stack.
#
# Top-half: the CLI / scanner / guard containers (the original lab
# wiring).
#
# Bottom-half (siphon-api + siphon-fs + authelia + nginx): the Phase 2
# "zero-trust" front door. Nginx terminates every request and checks
# it against Authelia (OIDC + Passkeys) before routing to siphon-api
# or siphon-fs. Everything is on the `siphon-net` bridge so service
# names resolve via Docker DNS.
#
# Bring the auth stack up with:
#
#   docker compose -f deploy/docker-compose.yml \
#     --profile auth up --build
#
# The CLI containers stay in the default profile so plain
# `docker compose up` keeps today's behaviour.
# ---------------------------------------------------------------------------

services:
  dlpscan:
    build:
      context: .
      dockerfile: Dockerfile
    image: dlpscan:latest
    container_name: dlpscan
    volumes:
      - ./data:/data:ro
    environment:
      - RUST_LOG=info
    command: ["scan-dir", "/data", "--format", "json"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Scan a single file
  dlpscan-file:
    build:
      context: .
      dockerfile: Dockerfile
    image: dlpscan:latest
    profiles:
      - tools
    volumes:
      - ./data:/data:ro
    command: ["scan", "/data/input.txt"]

  # Run with InputGuard in redact mode
  dlpscan-guard:
    build:
      context: .
      dockerfile: Dockerfile
    image: dlpscan:latest
    profiles:
      - tools
    environment:
      - RUST_LOG=info
    command: ["guard", "--action", "redact", "--presets", "pci-dss,credentials"]

  # evadex — adversarial testing bridge. FastAPI service that drives
  # evadex runs from siphon-c2 and exposes /v1/evadex/{run,metrics,generate}.
  # Builds from the sibling evadex repo (../evadex), so both checkouts
  # need to live under the same parent directory for `docker compose up`.
  evadex:
    build:
      # Relative to the repo root — matches the sibling dlpscan services
      # above. Assumes the evadex checkout lives next to dlpscan-rs so
      # `docker compose -f deploy/docker-compose.yml up` from the repo
      # root can find ../evadex.
      context: ../evadex
      dockerfile: deploy/Dockerfile.bridge
    image: evadex:latest
    container_name: evadex
    environment:
      # Leave EVADEX_BRIDGE_KEY unset for trusted-network dev; set it
      # in .env or via shell to require x-api-key on every request.
      - EVADEX_BRIDGE_KEY=${EVADEX_BRIDGE_KEY:-}
      - SIPHON_EXE=/usr/local/bin/siphon
      - EVADEX_BRIDGE_ROOT=/results
    volumes:
      - evadex-results:/results
    ports:
      - "8081:8081"
    depends_on:
      - dlpscan
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Phase 2 — zero-trust front door
  # -------------------------------------------------------------------------
  siphon-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: siphon-api:2.2.0
    profiles: [auth]
    environment:
      # siphon-api reads SIPHON_BIND + SIPHON_PORT separately, never
      # a combined SIPHON_API_BIND. Default bind is 127.0.0.1 which
      # makes the container unreachable from nginx — force 0.0.0.0
      # explicitly, matching the Helm chart.
      - SIPHON_BIND=0.0.0.0
      - SIPHON_PORT=8080
      # Remove SIPHON_API_KEY to run the service in dev mode without
      # a bearer-token check — Nginx + Authelia are the real front
      # door in this stack.
      - SIPHON_API_KEY=${SIPHON_API_KEY:-}
      - RUST_LOG=info
    expose: ["8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  siphon-fs:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.fs
    # Pinned per the per-crate SemVer rules in CLAUDE.md. Bump
    # in lockstep with crates/siphon-fs/Cargo.toml.
    image: siphon-fs:1.0.0
    profiles: [auth]
    environment:
      - SIPHON_FS_BIND=0.0.0.0:8081
      - RUST_LOG=info
    expose: ["8081"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  authelia:
    image: authelia/authelia:4.38
    profiles: [auth]
    # Authelia runs as uid 1000 out of the box; mount the config
    # directory read-write so it can materialise db.sqlite3 and the
    # notification log next to the config it reads at startup.
    volumes:
      - ./authelia:/config
      - authelia-data:/config/runtime
    environment:
      # Rotate these with AUTHELIA_*_FILE secrets in prod. For
      # compose dev, pull defaults from the shell or an .env file.
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET:-please-change-me-32bytes-minimum}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:-please-change-me-32bytes-minimum}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY:-please-change-me-32bytes-minimum}
    expose: ["9091"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      # Repo root is the build context so the multi-stage Dockerfile
      # can see both `ui/` (Next.js source) and `deploy/nginx/` (the
      # proxy config). Running `docker compose build` from the repo
      # root already resolves `..` correctly because the compose
      # file lives in deploy/.
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    image: siphon-nginx:latest
    profiles: [auth]
    ports:
      - "8080:80"
      # - "8443:443"  # enable once TLS certs are mounted
    depends_on:
      authelia: { condition: service_healthy }
      siphon-api: { condition: service_healthy }
      siphon-fs: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  evadex-results:
  authelia-data:

networks:
  default:
    name: siphon-net
