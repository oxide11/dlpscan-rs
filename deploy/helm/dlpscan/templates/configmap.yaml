apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dlpscan.fullname" . }}-config
  labels:
    {{- include "dlpscan.labels" . | nindent 4 }}
data:
  DLPSCAN_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DLPSCAN_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  DLPSCAN_API_PORT: {{ .Values.config.apiPort | quote }}
  DLPSCAN_API_RATE_LIMIT: {{ .Values.config.rateLimit | quote }}
  DLPSCAN_MAX_PAYLOAD: {{ .Values.config.maxPayloadBytes | quote }}
  DLPSCAN_MIN_CONFIDENCE: {{ .Values.config.minConfidence | quote }}
  DLPSCAN_REQUIRE_CONTEXT: {{ .Values.config.requireContext | quote }}
  DLPSCAN_CACHE_ENABLED: {{ .Values.config.cacheEnabled | quote }}
  DLPSCAN_AUDIT_FILE: "/var/log/dlpscan/audit.jsonl"
  {{- if .Values.config.siem.enabled }}
  DLPSCAN_SIEM_TYPE: {{ .Values.config.siem.type | quote }}
  DLPSCAN_SIEM_ENDPOINT: {{ .Values.config.siem.endpoint | quote }}
  {{- end }}
  {{- if .Values.config.vault.backend }}
  DLPSCAN_VAULT_BACKEND: {{ .Values.config.vault.backend | quote }}
  {{- end }}
  {{- if .Values.config.vault.redisUrl }}
  DLPSCAN_REDIS_URL: {{ .Values.config.vault.redisUrl | quote }}
  {{- end }}
