# Siphon Helm values — the single source of operator-facing
# configuration. Each top-level key groups settings for one
# component; `global` carries cross-cutting concerns (image
# registry, labels, RBAC).
#
# Secrets (API keys, Authelia JWT seed, session seed, storage
# encryption key) are intentionally NOT set here. Stand them up out
# of band via External Secrets Operator, Sealed Secrets, or
# `kubectl create secret` and point the corresponding `*.secretRef`
# at the result.

# ---------------------------------------------------------------------------
# Global — cross-cutting concerns
# ---------------------------------------------------------------------------
global:
  # Common image registry + pull policy. Components can override
  # their own `image.registry` if you run a split registry (e.g.
  # Authelia from Docker Hub, Siphon from GHCR).
  # For local kind builds where images are loaded directly via
  # `kind load docker-image`, set this to "" so image names are
  # used as-is (e.g. siphon-api:lab, not ghcr.io/siphon-api:lab).
  imageRegistry: ghcr.io
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

  # Labels propagated to every resource in the release. Handy for
  # cost-allocation + multi-tenant clusters.
  commonLabels: {}
  commonAnnotations: {}

  # Linkerd sidecar injection. When enabled, every pod picks up
  # the `linkerd.io/inject: enabled` annotation and the Linkerd
  # control plane adds a sidecar for automatic mTLS.
  # Prerequisite: `linkerd install | kubectl apply -f -` in the cluster.
  linkerd:
    enabled: false

# ---------------------------------------------------------------------------
# siphon-api — REST scanner + k8s discovery endpoints
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2

  image:
    repository: oxide11/siphon-api
    tag: "2.2.0"
    pullPolicy: ""  # inherits global.imagePullPolicy

  service:
    type: ClusterIP
    port: 8080

  # `k8sRoll` gates the cargo-build `k8s-roll` feature from the
  # runtime side. When true, a Role + RoleBinding grants the
  # siphon-api ServiceAccount the RBAC to list pods and patch
  # Deployments in the release namespace, and the `/v1/k8s/*`
  # and `/v1/overrides/roll` endpoints become live.
  k8sRoll:
    enabled: true
    # Deployments the roller is allowed to patch. Leaving the list
    # empty makes the Role wildcard — not recommended; the default
    # restricts to Siphon's own Deployments.
    deployments:
      - siphon-api
      - siphon-fs

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Probes use tcpSocket rather than httpGet because siphon-api's
  # auth_middleware requires Bearer auth on every route, including
  # /health and /ready. kubelet probes don't carry the API key, so
  # an httpGet probe gets 401, kubelet treats it as a failure, and
  # the pod gets killed despite being healthy.
  #
  # tcpSocket on port 8080 confirms the binary is listening, which
  # is enough to gate "is this pod alive". Follow-up: exempt /health
  # + /ready from auth in siphon-api source so we can reinstate the
  # richer httpGet checks. Tracked in the chart README.
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

  # Required in prod. Create the secret out of band; pass its
  # name here. The secret must carry `api-key` as a 32+-byte
  # random string.
  #   kubectl create secret generic siphon-api-auth \
  #     --from-literal=api-key="$(openssl rand -hex 32)"
  auth:
    secretName: ""     # e.g. "siphon-api-auth"
    secretKey: "api-key"

  extraEnv:
    - name: SIPHON_FINDINGS_RETENTION_DAYS
      value: "90"
  extraVolumes: []
  extraVolumeMounts: []

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# siphon-fs — multipart file-scan service
# ---------------------------------------------------------------------------
fs:
  enabled: true
  replicaCount: 1

  image:
    repository: oxide11/siphon-fs
    # Pinned per the per-crate SemVer rules in CLAUDE.md. Bump
    # this in lockstep with crates/siphon-fs/Cargo.toml.
    tag: "1.0.0"
    pullPolicy: ""

  service:
    type: ClusterIP
    port: 8081

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 2
    periodSeconds: 3
    failureThreshold: 3

  # siphon-fs can accept large multipart uploads. Scratch goes to
  # an emptyDir by default; switch to a PVC via `persistentVolume`
  # below if the cluster can't tolerate 1 GiB of tmpfs per pod.
  scratchVolume:
    # "emptyDir" | "pvc"
    kind: emptyDir
    sizeLimit: 1Gi
    # Only consulted when kind == "pvc".
    pvc:
      storageClassName: ""
      accessModes: [ReadWriteOnce]

  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []

  podDisruptionBudget:
    # siphon-fs ships with replicaCount 1 by default — a PDB only
    # bites once you scale fs > 1 replica. Disabled here so the
    # default install doesn't render an unsatisfiable PDB; flip
    # this to `true` after bumping replicaCount.
    enabled: false
    # Default value lives here so flipping `enabled: true` works
    # without the operator also having to add minAvailable. PDB
    # template only renders when enabled is true, so this is inert
    # in the default config.
    minAvailable: 1

# ---------------------------------------------------------------------------
# postgres — backing store for scan findings history + C2 shared state
# ---------------------------------------------------------------------------
# Single-replica vanilla Postgres (no built-in TDE; encryption at rest
# comes from the underlying StorageClass — set storageClassName to a
# StorageClass with `csi.storage.k8s.io/fstype: ext4` + a CSI driver
# that supports per-volume encryption keys, or rely on the cloud
# provider's at-rest default for AWS EBS / Azure Disk / GCE PD).
#
# siphon-api treats SIPHON_DATABASE_URL as optional. Setting
# postgres.enabled=false here disables findings history and C2 shared
# state but doesn't break the scan / tokenize / extract endpoints.
postgres:
  enabled: true

  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: ""  # inherits global.imagePullPolicy

  service:
    port: 5432

  persistence:
    enabled: true
    # Leave empty in dev (k3d local-path). In prod, point at an
    # encrypted StorageClass to satisfy "encryption at rest"
    # language in SOC 2 / HIPAA / PCI audits.
    storageClassName: ""
    size: 10Gi
    accessModes: [ReadWriteOnce]

  # Logical database name + role. siphon-api connects as this user
  # over the in-cluster Service ClusterIP. The role's password is
  # sourced from a Secret you create out of band — the chart does
  # not generate one (avoids the helm-upgrade-rotates-everything
  # footgun). See codespace-deploy.sh for the dev recipe:
  #
  #   kubectl create secret generic siphon-postgres \
  #     --from-literal=password="$(openssl rand -hex 32)"
  database: siphon
  username: siphon
  secretName: ""  # e.g. "siphon-postgres"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ---------------------------------------------------------------------------
# UI (Next.js SPA) — served from the nginx Deployment below
# ---------------------------------------------------------------------------
# There is no standalone `ui` section. The reverse-proxy image
# produced by `deploy/nginx/Dockerfile` is a multi-stage build:
# Node compiles the SPA, nginx serves it out of `/srv/ui/`. Scaling
# the SPA and scaling the forward-auth proxy go together — one
# image, one Deployment, one scale knob (`nginx.replicaCount`).

# ---------------------------------------------------------------------------
# authelia — OIDC + passkey front door
# ---------------------------------------------------------------------------
authelia:
  enabled: true
  replicaCount: 1  # SQLite backend; bump to 2+ once you swap to postgres

  image:
    registry: docker.io  # Authelia isn't on GHCR
    repository: authelia/authelia
    tag: "4.38"
    pullPolicy: ""

  service:
    type: ClusterIP
    port: 9091

  # PVC to hold SQLite DB, session store, and notification log.
  persistence:
    enabled: true
    storageClassName: ""
    size: 1Gi
    accessModes: [ReadWriteOnce]

  # Authelia needs three high-entropy secrets at startup. Create
  # them out of band:
  #   kubectl create secret generic siphon-authelia \
  #     --from-literal=jwt_secret="$(openssl rand -hex 32)" \
  #     --from-literal=session_secret="$(openssl rand -hex 32)" \
  #     --from-literal=storage_encryption_key="$(openssl rand -hex 32)"
  # then set authelia.secretName = "siphon-authelia".
  secretName: ""

  # ConfigMap mount — the chart packages deploy/authelia/
  # configuration.yml as a ConfigMap. Override `configYaml` below
  # to point at your own, or leave it null to use the shipped
  # defaults.
  configYaml: null

  # Raw YAML for Authelia's file-backed users_database.yml.
  # Authelia refuses to start if this file is missing or empty,
  # even when every request goes through devBypass. Defaults to a
  # single admin user with the Authelia-project demo argon2id hash
  # for the password `authelia` — useful for local smoke-tests,
  # useless in prod. Replace with real entries (see
  # deploy/authelia/users_database.yml.example) in production.
  usersDatabase: null

  # Scheme the browser uses to reach the Siphon host. Threads into
  # Authelia's `session.cookies[*].authelia_url` and
  # `default_redirection_url` when `externalUrl` below is empty.
  # Default is https (prod). Set to "http" for local k3d where
  # Nginx serves plaintext on localhost:8080.
  scheme: "https"

  # Cookie Domain= attribute Authelia sets on its session cookie.
  # Empty -> falls back to `ingress.host`. Codespace / k3d deploys
  # leave `ingress.host` empty (so the k8s Ingress matches any Host
  # header) and set this to the browser-facing hostname only
  # (no port, no scheme). Browsers reject ports in Domain=.
  cookieDomain: ""

  # Full browser-facing origin Authelia uses in its portal redirect
  # URLs (`authelia_url`, `default_redirection_url`). Must match
  # what the user actually types in the URL bar or the login loop
  # never closes. Empty -> falls back to `{scheme}://{ingress.host}`.
  # NOTE: Authelia 4.38 validates that `authelia_url` uses https://.
  # For local kind/k3d deployments set authelia.scheme=http and
  # supply an https:// URL here (the redirect never fires with
  # devBypass=true, but the startup validator still rejects http://).
  # Examples:
  #   https://localhost:8080      (local kind with devBypass=true)
  #   https://<codespace>-8080.app.github.dev
  externalUrl: ""

  # devBypass=true swaps Authelia's default_policy from two_factor
  # to bypass, so every request is waved through the forward-auth
  # sub-request without a real login. Intended for Codespace /
  # k3d smoke-tests where there's no user directory seeded and the
  # point is to exercise the rest of the stack. NEVER set this true
  # in production — it defeats every access-control rule.
  devBypass: false

  # Authelia's password-reset flow needs a way to deliver the reset
  # link. With `smtp.enabled: false` the chart falls back to the
  # filesystem notifier — Authelia writes the "email" body to
  # /config/notification.txt and the operator tails the file to grab
  # the link. Fine for local dev / smoke tests; useless in prod.
  #
  # In prod, set `smtp.enabled: true` and fill in host / port /
  # username / sender. The SMTP password is sourced from the same
  # Secret as the other Authelia high-entropy values
  # (authelia.secretName above) under the key `smtp_password` —
  # add that key to the Secret in lockstep with flipping the toggle.
  notifier:
    smtp:
      enabled: false
      host: ""                # e.g. smtp.example.com
      port: 587               # 587 = STARTTLS submission; 465 = implicit TLS
      username: ""            # e.g. authelia@example.com
      sender: ""              # "Siphon <noreply@example.com>"
      identifier: "siphon"    # SMTP HELO/EHLO identifier
      subject: "[Siphon] {title}"
      # Authelia hits this address with a NOOP at startup to verify
      # SMTP is reachable. Empty disables the check (the configmap
      # template only emits `startup_check_address` when set).
      startupCheckAddress: ""
      disableHtmlEmails: false
      tls:
        # `true` accepts self-signed / private-CA SMTP relays.
        # Leave false unless you know the relay's TLS chain isn't
        # publicly trusted — accepting any cert lets a MITM see
        # reset links.
        skipVerify: false
        serverName: ""        # SNI override; empty = derive from `host`
        minimumVersion: "TLS1.2"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 2
    periodSeconds: 5

# ---------------------------------------------------------------------------
# nginx — reverse proxy / forward-auth
# ---------------------------------------------------------------------------
nginx:
  enabled: true
  replicaCount: 2

  image:
    repository: oxide11/siphon-nginx
    tag: ""
    pullPolicy: ""

  service:
    type: ClusterIP
    port: 80
    # tlsPort: 443  # enable when TLS cert / key are mounted

  # Upstream hostnames Nginx resolves to. Defaults match the
  # Service names this chart creates — override if you front
  # a siphon-api that lives in another namespace or cluster.
  upstreams:
    api: ""        # empty -> chart-default Service name
    fs: ""
    authelia: ""

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 500m
      memory: 128Mi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # nginx's master process binds port 80 and chowns worker-process
  # temp dirs to uid 101 (the nginx user). These per-component fields
  # replace the chart-wide podSecurityContext / containerSecurityContext
  # for the nginx pod only. Set both to {} to fall back to the globals.
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: [ALL]
      add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]

# ---------------------------------------------------------------------------
# ingress — single ingress for the proxy
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: ""   # "nginx", "traefik", etc.
  annotations: {}
  # The default assumes a single DNS entry for the whole stack
  # (Nginx handles path-based routing). Set to your real hostname.
  host: siphon.local
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

# ---------------------------------------------------------------------------
# Shared ConfigMap — overrides for siphon-api + siphon-fs
# ---------------------------------------------------------------------------
# Both the API and the file scanner read the same overrides JSON
# so ruleset tweaks land in one place. Override keys here become
# the ConfigMap contents.
overrides:
  # JSON as a string (Helm will render it into a ConfigMap key).
  # Default is an empty-overrides shell — extend as needed.
  config: |
    {
      "patterns": {},
      "categories": {}
    }

# ---------------------------------------------------------------------------
# Pod security (applies to every Deployment in the chart)
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  # Defense-in-depth duplicates of the pod-level fields. Pod
  # Security Admission's "restricted" baseline requires both
  # runAsNonRoot and seccompProfile at container level too —
  # admission rejects pods where the values appear only at pod
  # level, even though k8s itself inherits them. Setting them
  # again here makes the admission check pass without any
  # operator-side override.
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: [ALL]

# ---------------------------------------------------------------------------
# NetworkPolicy — default-deny + explicit allow-list
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Allow DNS + HTTPS egress by default (k8s API, OCSP responders,
  # SMTP, OIDC clients). Extend for SIEM forwarders / webhooks /
  # Redis etc.
  extraEgress: []

# ---------------------------------------------------------------------------
# Common pod scheduling knobs
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
