{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Drain-one-at-a-time: no scan gaps on roll.
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "siphon.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 8 }}
      annotations:
        # A ConfigMap checksum triggers a rolling restart whenever
        # the overrides JSON changes — otherwise ConfigMap updates
        # are picked up on pod restart only.
        checksum/overrides: {{ include (print $.Template.BasePath "/configmap-overrides.yaml") . | sha256sum }}
        {{- include "siphon.podAnnotations" (dict "root" .) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "siphon.fullname" . }}-api
      terminationGracePeriodSeconds: 45
      {{- with include "siphon.imagePullSecrets" (dict "root" .) }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.postgres.enabled }}
      # Wait for Postgres to accept connections before siphon-api
      # starts. Without this, k8s schedules both pods concurrently
      # and the api can lose its one startup-connection attempt
      # while postgres is still running initdb — siphon-api degrades
      # to no-DB mode silently and the operator has to `rollout
      # restart` to recover. The initContainer makes the api wait
      # explicitly. ~3-15 s on a cold cluster; near-zero on a warm one.
      initContainers:
        - name: wait-for-postgres
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          # Hardened to match the rest of the chart's containerSecurityContext.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 60); do
                if pg_isready -h {{ include "siphon.componentName" (dict "root" . "component" "postgres") }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.username }} -d {{ .Values.postgres.database }} -t 2 >/dev/null 2>&1; then
                  echo "postgres ready after ${i}s"
                  exit 0
                fi
                echo "waiting for postgres ($i/60)"
                sleep 1
              done
              echo "postgres did not become ready within 60s" >&2
              exit 1
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      {{- end }}
      containers:
        - name: siphon-api
          image: {{ include "siphon.image" (dict "root" . "image" .Values.api.image) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            # siphon-api reads SIPHON_BIND + SIPHON_PORT; default bind
            # is 127.0.0.1 which makes the pod unreachable from
            # kubelet probes + the Service. Force 0.0.0.0 here. The
            # binary has no clap CLI so `args:` is ignored — this
            # env pair is the only supported configuration path.
            - name: SIPHON_BIND
              value: "0.0.0.0"
            - name: SIPHON_PORT
              value: {{ .Values.api.service.port | quote }}
            - name: SIPHON_OVERRIDES_PATH
              value: /etc/siphon/overrides.json
            - name: SIPHON_K8S_NAMESPACE
              # /v1/overrides/roll defaults to `default` if neither
              # env nor body specifies — pin to the release namespace
              # so the chart-default roll targets the right pods.
              value: {{ .Release.Namespace | quote }}
            - name: RUST_LOG
              value: info
            {{- if .Values.api.auth.secretName }}
            - name: SIPHON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.auth.secretName }}
                  key: {{ .Values.api.auth.secretKey | quote }}
            {{- end }}
            {{- if .Values.postgres.enabled }}
            # Database connection. Built from the in-cluster Postgres
            # Service name + the random password generated out-of-
            # band into postgres.secretName (codespace-deploy.sh
            # creates this on first run). siphon-api falls back to a
            # no-DB code path if SIPHON_DATABASE_URL is unset, so
            # toggling postgres.enabled=false in values just turns
            # off findings history and C2 shared state without
            # breaking the API.
            - name: SIPHON_DATABASE_URL
              value: {{ printf "postgres://%s@%s:%v/%s"
                .Values.postgres.username
                (include "siphon.componentName" (dict "root" . "component" "postgres"))
                .Values.postgres.service.port
                .Values.postgres.database | quote }}
            - name: SIPHON_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "postgres.secretName is required when postgres.enabled is true" .Values.postgres.secretName }}
                  key: password
            {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: overrides
              mountPath: /etc/siphon
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: overrides
          configMap:
            name: {{ include "siphon.fullname" . }}-overrides
            items:
              - key: overrides.json
                path: overrides.json
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
