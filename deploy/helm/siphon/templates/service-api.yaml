{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "siphon.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
{{- end }}
