{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "siphon.fullname" . }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "nginx") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    # Omit `host:` entirely when ingress.host is empty so the rule
    # matches any Host header. Required for Codespaces / anywhere
    # the inbound Host doesn't match a fixed DNS name — Traefik /
    # nginx-ingress / whoever returns 404 when there's a Host
    # constraint it can't match.
    - {{ if .Values.ingress.host }}host: {{ .Values.ingress.host | quote }}
      {{ end }}http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "siphon.componentName" (dict "root" . "component" "nginx") }}
                port:
                  number: {{ .Values.nginx.service.port }}
{{- end }}
