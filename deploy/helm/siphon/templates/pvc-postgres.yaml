{{- if and .Values.postgres.enabled .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "postgres") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.postgres.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  {{- with .Values.postgres.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
