{{- if and .Values.api.enabled .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "siphon.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
{{- end }}
