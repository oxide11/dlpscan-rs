{{- if .Values.fs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "fs") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "fs") | nindent 4 }}
spec:
  replicas: {{ .Values.fs.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "siphon.selectorLabels" (dict "root" . "component" "fs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "siphon.labels" (dict "root" . "component" "fs") | nindent 8 }}
      annotations:
        checksum/overrides: {{ include (print $.Template.BasePath "/configmap-overrides.yaml") . | sha256sum }}
        {{- include "siphon.podAnnotations" (dict "root" .) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60  # large uploads may be in-flight
      # siphon-fs doesn't talk to the k8s API; the default SA
      # token would just be unused attack surface inside the
      # container. Block the auto-mount.
      automountServiceAccountToken: false
      {{- with include "siphon.imagePullSecrets" (dict "root" .) }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: siphon-fs
          image: {{ include "siphon.image" (dict "root" . "image" .Values.fs.image) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.fs.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fs.service.port }}
              protocol: TCP
          env:
            - name: SIPHON_FS_BIND
              value: "0.0.0.0:{{ .Values.fs.service.port }}"
            - name: SIPHON_OVERRIDES_PATH
              value: /etc/siphon/overrides.json
            - name: RUST_LOG
              value: info
            {{- with .Values.fs.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: overrides
              mountPath: /etc/siphon
              readOnly: true
            - name: scratch
              mountPath: /tmp
            {{- with .Values.fs.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.fs.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.fs.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.fs.resources | nindent 12 }}
      volumes:
        - name: overrides
          configMap:
            name: {{ include "siphon.fullname" . }}-overrides
            items:
              - key: overrides.json
                path: overrides.json
        - name: scratch
          {{- if eq .Values.fs.scratchVolume.kind "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "siphon.componentName" (dict "root" . "component" "fs") }}-scratch
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.fs.scratchVolume.sizeLimit }}
          {{- end }}
        {{- with .Values.fs.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
