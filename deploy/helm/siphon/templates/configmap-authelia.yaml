{{- if .Values.authelia.enabled }}
# Authelia configuration is long — we keep the canonical copy in
# deploy/authelia/configuration.yml and let operators either
# accept the default (chart packages it as a ConfigMap) or override
# by setting `authelia.configYaml` to their own full YAML document.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "authelia") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "authelia") | nindent 4 }}
data:
  configuration.yml: |
    {{- if .Values.authelia.configYaml }}
    {{- .Values.authelia.configYaml | nindent 4 }}
    {{- else }}
    # Built-in default. For anything beyond a dev deployment, copy
    # deploy/authelia/configuration.yml into your own values override,
    # rotate every placeholder secret, and switch the storage / notifier
    # stanzas to Postgres + SMTP before pointing real users at it.
    #
    # Public-origin resolution. Authelia's cookie Domain= attribute
    # and its login-portal redirect URLs both have to match what the
    # browser types in the URL bar — otherwise the portal sets a
    # cookie the browser refuses to send back and the login loop
    # never closes.
    #   * cookieDomain is the hostname only (no port, no scheme). If
    #     unset, falls back to ingress.host — fine for prod where
    #     the ingress matches a real DNS name.
    #   * externalUrl is the full origin (scheme + host + optional
    #     port). If unset, we build it from scheme + ingress.host,
    #     which matches the pre-Codespace layout.
    # Codespace / k3d deploys drive both via codespace-deploy.sh so
    # the Ingress can keep ingress.host empty (match any Host) while
    # Authelia still reflects the browser-facing origin.
    {{- $scheme := default "https" .Values.authelia.scheme }}
    {{- $cookieDomain := default .Values.ingress.host .Values.authelia.cookieDomain }}
    {{- $externalUrl := .Values.authelia.externalUrl }}
    {{- if not $externalUrl }}
    {{-   $externalUrl = printf "%s://%s" $scheme .Values.ingress.host }}
    {{- end }}
    server:
      address: "tcp://0.0.0.0:{{ .Values.authelia.service.port }}"
    log:
      level: info
      format: json
    totp:
      issuer: siphon
      period: 30
      algorithm: sha1
    webauthn:
      disable: false
      display_name: Siphon
      attestation_conveyance_preference: indirect
      user_verification: preferred
      timeout: 60s
    authentication_backend:
      password_reset:
        disable: false
      file:
        path: /config/users_database.yml
        password:
          algorithm: argon2id
          iterations: 3
          memory: 65536
          parallelism: 4
          key_length: 32
          salt_length: 16
    access_control:
      {{- if .Values.authelia.devBypass }}
      # devBypass=true — every request is waved through the
      # forward-auth sub-request, regardless of host. Authelia
      # 4.38 rejects `default_policy: bypass` with an empty rules
      # list and its `domain:` matcher is exact-only (no universal
      # wildcard), so the pattern is:
      #   default_policy: bypass (reached for any host that doesn't
      #                           match a rule — i.e. everything),
      #   plus a single dummy rule pointing at a hostname that will
      #   never resolve, solely to satisfy the validator.
      # Intended for Codespace / k3d smoke-tests where there's no
      # real user directory. NEVER ship this to production.
      default_policy: bypass
      rules:
        - domain: "authelia-devbypass.invalid"
          policy: two_factor
      {{- else }}
      # Production model — every /api/ request hits Authelia first
      # via nginx's forward-auth sub-request. Paths use the
      # `/api/...` prefix the browser sees; nginx strips that
      # before forwarding to siphon-api. Routes below are authored
      # against the real siphon-api router (see
      # crates/siphon-api/src/main.rs).
      default_policy: two_factor
      rules:
        # Probes — kubelet can't carry session cookies.
        # siphon-api also exempts these in its own auth_middleware.
        - domain: "{{ $cookieDomain }}"
          resources:
            - "^/api/(health|ready)$"
          policy: bypass
        # Admin-grade mutations: override management, deployment
        # rollouts, pipeline-stage edits. Add a `subject:` line
        # here once a real auth backend with groups is wired up.
        - domain: "{{ $cookieDomain }}"
          resources:
            - "^/api/v1/overrides/(apply|reload|revert|roll)$"
            - "^/api/v1/k8s/deployments/.*/rollout$"
            - "^/api/v1/pipeline/stages$"
          policy: two_factor
        # Operator-grade scan path.
        - domain: "{{ $cookieDomain }}"
          resources:
            - "^/api/scan$"
          policy: two_factor
        # Everything else (read-only /api/v1/* metadata) falls
        # through to default_policy: two_factor.
      {{- end }}
    session:
      name: authelia_session
      same_site: lax
      expiration: 1h
      inactivity: 15m
      cookies:
        - domain: {{ $cookieDomain | quote }}
          authelia_url: "{{ $externalUrl }}/auth/"
          default_redirection_url: "{{ $externalUrl }}/"
    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 5m
    storage:
      local:
        path: /config/db.sqlite3
    notifier:
      {{- if .Values.authelia.notifier.smtp.enabled }}
      # SMTP notifier — password-reset and account-management
      # links land in a real inbox. Password is sourced from the
      # Authelia secret via AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE
      # (see deployment-authelia.yaml); under the chart's
      # convention the key on the Secret is `smtp_password`.
      disable_startup_check: {{ if .Values.authelia.notifier.smtp.startupCheckAddress }}false{{ else }}true{{ end }}
      smtp:
        host: {{ required "authelia.notifier.smtp.host is required when smtp.enabled=true" .Values.authelia.notifier.smtp.host | quote }}
        port: {{ .Values.authelia.notifier.smtp.port }}
        username: {{ .Values.authelia.notifier.smtp.username | quote }}
        sender: {{ required "authelia.notifier.smtp.sender is required when smtp.enabled=true" .Values.authelia.notifier.smtp.sender | quote }}
        identifier: {{ .Values.authelia.notifier.smtp.identifier | quote }}
        subject: {{ .Values.authelia.notifier.smtp.subject | quote }}
        {{- if .Values.authelia.notifier.smtp.startupCheckAddress }}
        startup_check_address: {{ .Values.authelia.notifier.smtp.startupCheckAddress | quote }}
        {{- end }}
        disable_html_emails: {{ .Values.authelia.notifier.smtp.disableHtmlEmails }}
        tls:
          skip_verify: {{ .Values.authelia.notifier.smtp.tls.skipVerify }}
          {{- with .Values.authelia.notifier.smtp.tls.serverName }}
          server_name: {{ . | quote }}
          {{- end }}
          minimum_version: {{ .Values.authelia.notifier.smtp.tls.minimumVersion | quote }}
      {{- else }}
      # Dev-default filesystem notifier — Authelia drops every
      # "email" (password-reset links, identity-verification
      # codes) into /config/notification.txt. Tail it during dev
      # to grab the reset link without an SMTP relay. Flip
      # authelia.notifier.smtp.enabled=true for prod.
      disable_startup_check: false
      filesystem:
        filename: /config/notification.txt
      {{- end }}
    {{- end }}
  # File-backed user database. Authelia's authentication_backend.file
  # provider refuses to start if /config/users_database.yml is missing
  # or empty, even when default_policy never consults it (e.g.
  # devBypass). Seed a minimal-but-valid entry here; mounted into the
  # pod via subPath alongside configuration.yml. The password hash
  # below is the long-published Authelia demo hash for the password
  # `authelia` — fine for smoke-tests, worthless in prod. Override
  # `authelia.usersDatabase` in your values to plug real users in.
  users_database.yml: |
    {{- if .Values.authelia.usersDatabase }}
    {{- .Values.authelia.usersDatabase | nindent 4 }}
    {{- else }}
    users:
      admin:
        disabled: false
        displayname: "Siphon Admin"
        # Demo hash for the password `authelia` — replace for prod.
        password: "$argon2id$v=19$m=65536,t=3,p=4$BpLnfgDsc2WD8F2q$o/vzA4myCqZZ36bUGsDY//8mKUYNZZaR0t4MFFSs+iM"
        email: admin@siphon.local
        groups:
          - admins
          - operators
    {{- end }}
{{- end }}
