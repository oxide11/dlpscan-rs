{{- if .Values.nginx.enabled }}
# Reverse proxy / forward-auth for the whole stack. Fronts the
# /auth/, /api/, /fs/, and /ui/ paths. Sits behind the Ingress so
# the Ingress controller only has to route one Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "nginx") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "nginx") | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "siphon.selectorLabels" (dict "root" . "component" "nginx") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "siphon.labels" (dict "root" . "component" "nginx") | nindent 8 }}
      annotations:
        {{- include "siphon.podAnnotations" (dict "root" .) | nindent 8 }}
    spec:
      {{- with include "siphon.imagePullSecrets" (dict "root" .) }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: {{ include "siphon.image" (dict "root" . "image" .Values.nginx.image) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            {{- if .Values.nginx.service.tlsPort }}
            - name: https
              containerPort: 443
              protocol: TCP
            {{- end }}
          env:
            # The reverse-proxy image resolves upstream hostnames at
            # startup via an env-var substitution step; plumb the
            # chart-derived Service names in so the config doesn't
            # need separate overrides.
            - name: SIPHON_UPSTREAM_API
              value: {{ default (include "siphon.componentName" (dict "root" . "component" "api")) .Values.nginx.upstreams.api }}
            - name: SIPHON_UPSTREAM_FS
              value: {{ default (include "siphon.componentName" (dict "root" . "component" "fs")) .Values.nginx.upstreams.fs }}
            - name: SIPHON_UPSTREAM_AUTHELIA
              value: {{ default (include "siphon.componentName" (dict "root" . "component" "authelia")) .Values.nginx.upstreams.authelia }}
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: 64Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 16Mi
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
