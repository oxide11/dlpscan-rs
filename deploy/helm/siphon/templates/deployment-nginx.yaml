{{- if .Values.nginx.enabled }}
# Reverse proxy / forward-auth for the whole stack. Fronts the
# /auth/, /api/, /fs/, and /ui/ paths. Sits behind the Ingress so
# the Ingress controller only has to route one Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siphon.componentName" (dict "root" . "component" "nginx") }}
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "nginx") | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "siphon.selectorLabels" (dict "root" . "component" "nginx") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "siphon.labels" (dict "root" . "component" "nginx") | nindent 8 }}
      annotations:
        {{- include "siphon.podAnnotations" (dict "root" .) | nindent 8 }}
    spec:
      # nginx is the reverse proxy — never talks to the k8s API.
      # Default-SA token wouldn't be used; suppress the auto-mount.
      automountServiceAccountToken: false
      {{- with include "siphon.imagePullSecrets" (dict "root" .) }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml (default .Values.podSecurityContext .Values.nginx.podSecurityContext) | nindent 8 }}
      containers:
        - name: nginx
          image: {{ include "siphon.image" (dict "root" . "image" .Values.nginx.image) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            {{- if .Values.nginx.service.tlsPort }}
            - name: https
              containerPort: 443
              protocol: TCP
            {{- end }}
          # Upstream hostnames are hardcoded in nginx.conf — they
          # match the Service names the chart's siphon.componentName
          # helper emits (siphon-api, siphon-fs, siphon-authelia).
          # If you ever templatize them via envsubst at container
          # startup, plumb SIPHON_UPSTREAM_API / _FS / _AUTHELIA in
          # here and consume them from a Dockerfile entrypoint
          # script — without that script, env vars here are dead.
          # nginx.upstreams.* values are reserved for that future
          # work and not currently consumed.
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          securityContext:
            {{- toYaml (default .Values.containerSecurityContext .Values.nginx.containerSecurityContext) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: 64Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 16Mi
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
