{{- if .Values.api.enabled }}
# siphon-api needs its own SA so the k8sRoll RBAC below binds to
# something narrower than the namespace default.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "siphon.fullname" . }}-api
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 4 }}
---
{{- if .Values.api.k8sRoll.enabled }}
# Role + RoleBinding for the k8s-roll feature. Two resource
# groups:
#
#   - `pods` / `pods/log` / `events` — read-only discovery so the
#     /v1/k8s/pods endpoint can render the Ops UI's live pod list.
#   - `deployments` — get + patch so /v1/overrides/roll can
#     trigger a rolling restart. Narrowed to the list in
#     `values.api.k8sRoll.deployments` so a compromised siphon-api
#     pod can't touch anything else in the namespace.
#
# Scoped as a Role, not a ClusterRole — siphon-api should never
# see pods outside the release namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "siphon.fullname" . }}-api-k8s
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    {{- with .Values.api.k8sRoll.deployments }}
    # When the caller narrows the list, the Role locks to exactly
    # those Deployments. Leaving the list empty would remove the
    # resourceNames constraint — left as a deliberate option for
    # clusters that run Siphon alongside a dynamic set of
    # Deployments, but the shipped default always names them.
    resourceNames:
      {{- range . }}
      - {{ . | quote }}
      {{- end }}
    {{- end }}
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "siphon.fullname" . }}-api-k8s
  labels:
    {{- include "siphon.labels" (dict "root" . "component" "api") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "siphon.fullname" . }}-api
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "siphon.fullname" . }}-api-k8s
{{- end }}
{{- end }}
