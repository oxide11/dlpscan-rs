[package]
name = "siphon-api"
version = "2.1.0"
edition = "2021"
description = "Polygon Siphon API — sync HTTP scan service"
license = "MIT"
rust-version = "1.75"

[[bin]]
name = "siphon-api"
path = "src/main.rs"

[dependencies]
siphon-core = { path = "../siphon-core" }

# HTTP server
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net"] }
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Misc
uuid = { version = "1", features = ["v4"] }
